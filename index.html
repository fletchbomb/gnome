  <script>



// ─────────────────────────────────────────────────────────────────────────────
// SAFARI SYSTEM-LEVEL FIXES (JS side)
// Single detection point — all Safari behaviour differences are handled here.
// CSS fixes are in the matching .is-safari block in the <style> section.
// ─────────────────────────────────────────────────────────────────────────────
(function applySafariFixes() {
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent)
    || (navigator.vendor && navigator.vendor.includes('Apple'));
  if (!isSafari) return;

  // CSS class for all Safari-specific style overrides
  document.documentElement.classList.add('is-safari');

  // Fix 3: Safari AudioContext requires explicit resume on EVERY user gesture,
  // not just the first. We hook pointerdown and touchstart at the document level.
  // The actual AudioContext is created later in the audio engine — we store a
  // flag and let unlockGameAudio (defined below) call resume() on every gesture.
  window._SAFARI_AUDIO_NEEDS_RESUME = true;
})();


const THEME_MUSIC = new Audio("https://raw.githubusercontent.com/fletchbomb/gnome/main/files/gnomes-theme.mp3");
THEME_MUSIC.loop = false;
THEME_MUSIC.volume = 0.10;
let THEME_CYCLE_STAGE = 0;
let THEME_BREAK_TIMER = null;

function clearThemeBreakTimer() {
  if (THEME_BREAK_TIMER) {
    clearTimeout(THEME_BREAK_TIMER);
    THEME_BREAK_TIMER = null;
  }
}

function startThemeMusicCycle(resetTrack = true) {
  if (GAME_AUDIO_MUTED) return;
  clearThemeBreakTimer();
  unlockGameAudio();
  resumeGameAudio();
  if (resetTrack) THEME_MUSIC.currentTime = 0;
  THEME_MUSIC.play().catch(()=>{});
}

function scheduleNextThemeStep(delayMs) {
  clearThemeBreakTimer();
  THEME_BREAK_TIMER = setTimeout(() => {
    THEME_BREAK_TIMER = null;
    startThemeMusicCycle(true);
  }, delayMs);
}

THEME_MUSIC.addEventListener('ended', () => {
  if (GAME_AUDIO_MUTED) return;

  if (THEME_CYCLE_STAGE === 0) {
    THEME_CYCLE_STAGE = 1;
    startThemeMusicCycle(true);
    return;
  }
  if (THEME_CYCLE_STAGE === 1) {
    THEME_CYCLE_STAGE = 2;
    startThemeMusicCycle(true);
    return;
  }
  if (THEME_CYCLE_STAGE === 2) {
    THEME_CYCLE_STAGE = 3;
    scheduleNextThemeStep(60000);
    return;
  }
  if (THEME_CYCLE_STAGE === 3) {
    THEME_CYCLE_STAGE = 4;
    scheduleNextThemeStep(30000);
    return;
  }

  THEME_CYCLE_STAGE = 5;
  scheduleNextThemeStep(60000);
});

/* === Audio / SFX === */
const AUDIO_CTX = new (window.AudioContext || window.webkitAudioContext)();

const SFX_URLS = Object.freeze({
  creaky: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/creaky.mp3",
  sticky: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/sticky.mp3",
  dog: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/dog.mp3",
  roomba: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/roomba.mp3",
  kid: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/kid.mp3",
  dad: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/dad.mp3",
  kick: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/kick.mp3",
  woosh: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/woosh.mp3",
  vent: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/vent.mp3",
  dynamite: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/dynamite.mp3",
  shroom: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/shroom.mp3",
  pickup: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/pickup.mp3",
  drop: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/drop.mp3",
  deposit: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/deposit.mp3",
  placetile: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/placetile.mp3",
  trouble: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/trouble.mp3",
  step: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/2step.mp3",
  click: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/click.mp3"
});

const SFX_VOLUMES = Object.freeze({
  creaky: 0.60,
  sticky: 0.60,
  dog: 0.30,
  roomba: 0.30,
  kid: 0.30,
  dad: 0.30,
  kick: 0.60,
  woosh:0.60,
  vent:0.60,
  dynamite:0.60,
  shroom:0.60,
  pickup: 0.60,
  drop: 0.60,
  deposit: 0.60,
  placetile: 0.60,
  trouble: 0.30,
  step: 0.30,
  click: 0.30
});

const AUDIO_CACHE = new Map();
let GAME_AUDIO_UNLOCKED = false;
let GAME_AUDIO_MUTED = false;

function resumeGameAudio() {
  try {
    if (AUDIO_CTX && AUDIO_CTX.state === 'suspended') AUDIO_CTX.resume();
  } catch (e) {}
}

function unlockGameAudio() {
  // On Safari, AudioContext can re-suspend between gestures — always try to resume.
  // On other browsers, only do the unlock work once.
  if (window._SAFARI_AUDIO_NEEDS_RESUME) {
    resumeGameAudio();
  }
  if (GAME_AUDIO_UNLOCKED) return;
  GAME_AUDIO_UNLOCKED = true;
  resumeGameAudio();
  try {
    const a = new Audio();
    a.volume = 0;
    a.play().catch(()=>{});
  } catch (e) {}
}

// Strong references to in-flight Audio nodes — prevents GC on Safari/mobile
// from collecting them before playback finishes.
const _AUDIO_LIVE = new Set();

function playSfx(name, opts = {}) {
  const src = SFX_URLS[name];
  if (!src || GAME_AUDIO_MUTED) return;
  unlockGameAudio();
  resumeGameAudio();
  const a = new Audio(src);
  a.preload = 'auto';
  a.volume = opts.volume ?? SFX_VOLUMES[name] ?? 0.60;
  if (opts.playbackRate) a.playbackRate = opts.playbackRate;
  _AUDIO_LIVE.add(a);
  a.addEventListener('ended', () => _AUDIO_LIVE.delete(a), { once: true });
  a.addEventListener('error', () => _AUDIO_LIVE.delete(a), { once: true });
  a.play().catch(() => _AUDIO_LIVE.delete(a));
}

async function getAudioBuffer(url) {
  if (AUDIO_CACHE.has(url)) return AUDIO_CACHE.get(url);
  const p = fetch(url)
    .then(r => r.arrayBuffer())
    .then(buf => AUDIO_CTX.decodeAudioData(buf));
  AUDIO_CACHE.set(url, p);
  return p;
}

async function playPannedSfx(name, pan = 0) {
  const url = SFX_URLS[name];
  if (!url || GAME_AUDIO_MUTED) return;
  unlockGameAudio();
  resumeGameAudio();
  try {
    const audioBuf = await getAudioBuffer(url);
    const src = AUDIO_CTX.createBufferSource();
    src.buffer = audioBuf;
    const gain = AUDIO_CTX.createGain();
    gain.gain.value = SFX_VOLUMES[name] ?? 0.60;
    const stereo = AUDIO_CTX.createStereoPanner();
    stereo.pan.value = pan;
    src.connect(gain);
    gain.connect(stereo);
    stereo.connect(AUDIO_CTX.destination);
    src.start();
  } catch (e) {
    playSfx(name);
  }
}

function syncAudioMuteUi() {

// ─────────────────────────────────────────────
// GAME EVENT BUS
// A lightweight pub/sub bus. All gameplay events (sounds, animations, UI
// reactions) are wired here rather than scattered through game logic.
// ─────────────────────────────────────────────
const GAME_EVENTS = (() => {
  const listeners = new Map();
  function on(name, handler) {
    if (!listeners.has(name)) listeners.set(name, new Set());
    listeners.get(name).add(handler);
    return () => listeners.get(name)?.delete(handler);
  }
  function emit(name, detail = {}) {
    const set = listeners.get(name);
    if (!set) return;
    for (const handler of [...set]) {
      try { handler(detail); } catch (err) { console.error(`Event handler failed for ${name}`, err); }
    }
  }
  return { on, emit };
})();
window.GAME_EVENTS = GAME_EVENTS;

// ─────────────────────────────────────────────
// AUDIO MANAGER
// Single place that maps game events → sounds.
// Keeps audio logic out of gameplay code entirely.
// ─────────────────────────────────────────────
const AUDIO_MANAGER = (() => {
  const state = {
    pendingMove: null,
  };

  const PATROL_SFX = Object.freeze({ dog: 'dog', roomba: 'roomba', kid: 'kid', dad: 'dad' });

  function nowMs() { return Date.now(); }
  function randomPan() { return (Math.random() * 1.6) - 0.8; }

  function planMove(type, detail = {}) {
    state.pendingMove = { type, ...detail };
  }

  function beginMove(type, detail = {}) {
    const planned = state.pendingMove && state.pendingMove.type === type ? state.pendingMove : null;
    const merged  = { ...(planned || {}), ...detail };
    state.pendingMove = null;
    if (type === 'gnome') {
      if (!merged.suppressMoveSound) playSfx('step', { playbackRate: 0.9 + Math.random() * 0.2 });
      return;
    }
    playPannedSfx(PATROL_SFX[type], randomPan());
  }

  // ── Single-sound priority system ─────────────────────────────────────
  // Each interaction nominates a sound via nominate(). At the end of the
  // synchronous call stack, exactly one sound plays — the highest priority.
  // Nothing is suppressed or blocked; lower-priority sounds simply never
  // get nominated over a higher one.
  //
  // Priority order (index 0 = highest):
  const SFX_PRIORITY = [
    'creaky', 'sticky', 'kick', 'vent', 'dynamite',
    'roomba', 'dog', 'kid', 'dad',
    'trouble', 'happy', 'oh',
    'placetile', 'pickup', 'deposit', 'drop', 'shroom',
    'step', 'click',
  ];

  let _nominated = null; // { sfx, opts }
  let _nominateScheduled = false;

  function priorityOf(sfx) {
    const i = SFX_PRIORITY.indexOf(sfx);
    return i === -1 ? SFX_PRIORITY.length : i; // unknown sounds play last
  }

  function flushNominated() {
    const winner = _nominated;
    _nominated = null;
    _nominateScheduled = false;
    if (winner) playSfx(winner.sfx, winner.opts);
  }

  function nominate(sfx, opts = {}) {
    if (_nominated === null || priorityOf(sfx) < priorityOf(_nominated.sfx)) {
      _nominated = { sfx, opts };
    }
    if (!_nominateScheduled) {
      _nominateScheduled = true;
      // Flush at the end of the current synchronous call stack.
      Promise.resolve().then(() => {
        if (!_nominateScheduled) return;
        flushNominated();
      });
    }
  }

  function commit(sfx = null, opts = {}) {
    if (sfx) nominate(sfx, opts);
    flushNominated();
  }

  // Card sounds fire through the SEQ (asynchronous) so they're always alone —
  // nominate them directly rather than competing with sync sounds.
  function nominateCard(sfx) {
    _nominated = null; // clear any stale nomination from a previous tick
    playSfx(sfx);
  }

  // ── Event → Sound wiring ─────────────────────────────────────────────
  GAME_EVENTS.on('ui.click',           () => nominate('click'));
  GAME_EVENTS.on('tile.created',       () => nominate('placetile'));
  GAME_EVENTS.on('sticky.triggered',   () => nominate('sticky'));
  GAME_EVENTS.on('creaky.triggered',   () => nominate('creaky'));
  GAME_EVENTS.on('item.pickedUp',      () => nominate('pickup'));
  GAME_EVENTS.on('item.dropped',       ({ mode } = {}) => {
    if (String(mode || '').startsWith('deposit')) nominate('deposit');
    else nominate('drop');
  });
  GAME_EVENTS.on('vent.used',          () => nominate('vent'));
  GAME_EVENTS.on('shroom.rotate',      () => nominate('shroom'));
  GAME_EVENTS.on('dynamite.blast',     () => {
    triggerExplosionFlash();
    nominate('dynamite');
  });
  GAME_EVENTS.on('card.presented', ({ step }) => {
    // Cards are SEQ-sequenced so always alone — fire immediately, not via nominate.
    const cardType = String(step?.cardType || '').toLowerCase();
    const name     = String(step?.name    || '').toLowerCase();
    const cls      = String(step?.cls     || '').toLowerCase();

    if (cardType.includes('trouble')) { nominateCard('trouble'); return; }

    const isPatrolSpawn = cardType.includes('patrol spawn') || cls.includes('patrol-spawn');
    if (isPatrolSpawn) {
      if      (name.includes('roomba')) nominateCard('roomba');
      else if (name.includes('dog'))    nominateCard('dog');
      else if (name.includes('kid'))    nominateCard('kid');
      else if (name.includes('dad'))    nominateCard('dad');
      return;
    }

    if (cardType.includes('event')) {
      if (['sticky','creaky','dynamite','roomba','dog','kid','dad','woosh'].includes(step?.sfxHint)) {
        nominateCard(step.sfxHint);
        return;
      }
      if (step?.sfxHint === 'none') return;
      const isSilent = /sticky|creaky|patrol|dog|roomba|kid|dad|explosion/i.test(name);
      if (!isSilent) nominateCard('woosh');
    }
  });

  // Footstep: nominated by beginMoveGated below, competes normally.
  function beginMoveGated(type, detail = {}) {
    const planned = state.pendingMove && state.pendingMove.type === type ? state.pendingMove : null;
    const merged  = { ...(planned || {}), ...detail };
    state.pendingMove = null;
    if (type === 'gnome') {
      if (!merged.suppressMoveSound) {
        nominate('step', { playbackRate: 0.9 + Math.random() * 0.2 });
      }
      return;
    }
    // Patrol sounds are always sequenced alone by the patrol animator — play directly.
    playPannedSfx(PATROL_SFX[type], randomPan());
  }

  return { state, planMove, beginMove: beginMoveGated, nominate, commit };

})();
window.AUDIO_MANAGER = AUDIO_MANAGER;

(function(){
  const tip = document.createElement('div');
  tip.id = 'game-tooltip';
  document.body.appendChild(tip);
  let current = null;
  document.addEventListener('mouseover', e => {
    const el = e.target.closest('[title]');
    if (!el || el === current) return;
    current = el;
    const txt = el.getAttribute('title');
    if (!txt) return;
    // Remove native tooltip
    el._tipTitle = txt;
    el.removeAttribute('title');
    tip.textContent = txt;
    tip.style.display = 'block';
    positionTip(e);
  }, true);
  document.addEventListener('mousemove', e => {
    if (current) positionTip(e);
  }, true);
  document.addEventListener('mouseout', e => {
    const el = e.target.closest('[title]') || (current && e.relatedTarget && !current.contains(e.relatedTarget) ? current : null);
    if (current && (!current.contains(e.relatedTarget))) {
      if (current._tipTitle) current.setAttribute('title', current._tipTitle);
      current = null;
      tip.style.display = 'none';
    }
  }, true);
  function positionTip(e) {
    const margin = 10;
    const offsetX = 16;
    const x = Math.min(e.clientX + offsetX, window.innerWidth - tip.offsetWidth - margin);
    const minY = margin;
    const maxY = window.innerHeight - tip.offsetHeight - margin;
    const y = Math.max(minY, Math.min(e.clientY - (tip.offsetHeight / 2), maxY));
    tip.style.left = x + 'px';
    tip.style.top = y + 'px';
  }
})();

const ROOM_DOORS = {
  1:  ['N','E','S','W'],    // Laundry Room (4 doors)
  2:  ['N','E','S','W'],    // Hallway (4 doors)
  3:  ['N','E','S'],        // Living Room (3 doors)
  4:  ['N','E','S'],        // Dining Room (3 doors)
  5:  ['N','E'],            // Bedroom (corner)
  6:  ['N','E'],            // Kitchen (corner)
  7:  ['N','E'],            // TV Room (corner)
  8:  ['N','E'],            // Nursery (corner)
  9:  ['N','S'],            // Mud Room (straight)
  10: ['N','S'],            // Office (straight)
  11: ['N'],                // Pantry (dead end)
  12: ['N'],                // Bathroom (dead end)
  13: ['N'],                // Linen Closet (dead end)
  14: ['N','E'],            // Dad's Room (corner)
  15: ['N','E','S'],        // Kids' Room (3 doors)
  16: ['N','E'],            // Garage (corner)
  17: ['N'],                // Supply Closet (dead end)
};

// Direction helpers
const OPPOSITE = {N:'S', S:'N', E:'W', W:'E'};
const DIR_DELTA = {N:[-1,0], S:[1,0], W:[0,-1], E:[0,1]};

function roomCanProvideDoor(roomId, dir) {
  const baseDirs = ROOM_DOORS[roomId] || [];
  for (let rot = 0; rot < 4; rot++) {
    if (rotateDirs(baseDirs, rot).includes(dir)) return true;
  }
  return false;
}


function getDoorDirSet(values = []) {
  return [...new Set((values || []).filter(dir => DIR_DELTA[dir]))];
}
function getBaseDoorDirs(tile, rotationOverride = null) {
  const baseDirs = ROOM_DOORS[tile.roomId] || [];
  const rot = rotationOverride ?? tile.rotationOffset ?? 0;
  return rot ? rotateDirs(baseDirs, rot) : [...baseDirs];
}

function getManualDoorDirs(tile) {
  if (!tile) return [];
  tile.manualDoorDirs = getDoorDirSet(tile.manualDoorDirs || []);
  return [...tile.manualDoorDirs];
}

function getForcedDoorDirs(tile) {
  if (!tile) return [];
  tile.pendingDoorDirs = getDoorDirSet(tile.pendingDoorDirs || []);
  return [...tile.pendingDoorDirs];
}

function addManualDoor(tile, dir) {
  if (!tile || !DIR_DELTA[dir]) return;
  const dirs = new Set(getManualDoorDirs(tile));
  dirs.add(dir);
  tile.manualDoorDirs = [...dirs];
  normalizeTileDoorState(tile);
}

function addForcedDoor(tile, dir) {
  if (!tile || !DIR_DELTA[dir]) return;
  const dirs = new Set(getForcedDoorDirs(tile));
  dirs.add(dir);
  tile.pendingDoorDirs = [...dirs];
  normalizeTileDoorState(tile);
}

function openDoorFromTile(tile, dir) {
  if (!tile || !DIR_DELTA[dir]) return false;
  const [dr, dc] = DIR_DELTA[dir];
  const nr = tile.row + dr, nc = tile.col + dc;
  const neighbor = G.grid[nr]?.[nc] || null;
  addManualDoor(tile, dir);
  if (neighbor) connectTilesWithDoor(tile, neighbor, dir);
  else addForcedDoor(tile, dir);
  normalizeTileDoorState(tile);
  if (neighbor) normalizeTileDoorState(neighbor);
  return true;
}

function getDynamiteTargets() {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome) return [];
  const myTile = G.grid[gnome.row]?.[gnome.col];
  if (!myTile) return [];

  const targets = [];
  for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
    const nr = gnome.row + dr, nc = gnome.col + dc;
    if (nr < 0 || nr >= G.GRID || nc < 0 || nc >= G.GRID) continue;
    const neighbor = G.grid[nr]?.[nc] || null;
    const myOpen = tileHasDoor(myTile, dir, { includeForced: true });
    if (!neighbor) {
      if (!myOpen) targets.push({ dir, nr, nc });
      continue;
    }
    const opp = OPPOSITE[dir];
    const neighborOpen = tileHasDoor(neighbor, opp);
    if (!myOpen || !neighborOpen) targets.push({ dir, nr, nc });
  }
  return targets;
}

function removeForcedDoor(tile, dir) {
  if (!tile) return;
  tile.pendingDoorDirs = getForcedDoorDirs(tile).filter(d => d !== dir);
  normalizeTileDoorState(tile);
}

function armDynamite(gnome, source = {}) {
  G.dynamiteMode = {

function disarmDynamite({ restoreInventory = false, render = true } = {}) {
  const mode = G.dynamiteMode;
  if (restoreInventory && mode?.returnGoodieId) {
    const actorIdx = mode.sourceActorIdx ?? G.currentGnomeIdx;
    const gnome = G.gnomes?.[actorIdx];
    if (gnome) {
      const targetSlot = (mode.sourceSlotIdx != null && gnome.satchel[mode.sourceSlotIdx] == null)

        : gnome.satchel.findIndex(s => s == null);
      if (targetSlot !== -1) gnome.satchel[targetSlot] = { type:'goodie', id: mode.returnGoodieId };
    }
  }
  G.dynamiteMode = false;
  if (render) renderAll();
}

function shroomRotationMaintainsConnection(r, c, rotation) {
  const tile = G.grid[r]?.[c];
  if (!tile) return false;
  const dirs = getShroomPreviewDoorDirs(tile, rotation);
  for (const dir of dirs) {
    const [dr, dc] = DIR_DELTA[dir];
    const nr = r + dr, nc = c + dc;
    const nb = G.grid[nr]?.[nc];
    if (!nb) continue;
    const opp = OPPOSITE[dir];
    if (getTileDoors(nb).includes(opp)) return true;
  }
  return false;
}

function updateShroomActionTooltip() {
  const btn = document.getElementById(G.shroomMode ? 'btn-scurry' : 'btn-shroom-confirm');
  if (!btn) return;
  if (!G.shroomMode) {
    btn.removeAttribute('title');
    return;
  }
  const sourceName = G.shroomMode?.sourceName || 'Shroom';
  const refundable = !!G.shroomMode?.returnGoodieId;
  if (!G.shroomPreview) {
    btn.title = refundable ? `Cancel and refund the ${sourceName}.` : `Cancel ${sourceName}.`;
    return;
  }
  const tile = G.grid[G.shroomPreview.r]?.[G.shroomPreview.c];
  const originalRot = tile ? (tile.rotationOffset || 0) : 0;
  if ((G.shroomPreview.rotation % 4) === originalRot) {
    btn.title = refundable
      ? `Cancel and refund the ${sourceName}. This rotation matches the room's original position.`
      : `${sourceName} has not changed this room yet. Cancel to exit room rotation.`;
    return;
  }
  if (!shroomRotationMaintainsConnection(G.shroomPreview.r, G.shroomPreview.c, G.shroomPreview.rotation)) {
    btn.title = 'This rotation cannot be confirmed because no door would connect to an existing adjacent room.';
    return;
  }
  btn.title = 'Confirm this Shroom rotation.';
}

function tileHasDoor(tile, dir, { includeForced = false } = {}) {
  if (!tile || !DIR_DELTA[dir]) return false;
  normalizeTileDoorState(tile);
  if ((tile.doors || []).includes(dir)) return true;
  return includeForced ? getForcedDoorDirs(tile).includes(dir) : false;
}

function tilesConnected(tileA, tileB) {
  if (!tileA || !tileB) return false;
  const dr = tileB.row - tileA.row;
  const dc = tileB.col - tileA.col;
  let dir = null;
  for (const [key, [rStep, cStep]] of Object.entries(DIR_DELTA)) {
    if (rStep === dr && cStep === dc) { dir = key; break; }
  }
  if (!dir) return false;
  const opp = OPPOSITE[dir];
  return tileHasDoor(tileA, dir, { includeForced: true }) && tileHasDoor(tileB, opp, { includeForced: true });
}

function connectTilesWithDoor(tileA, tileB, dirFromA) {
  if (!tileA || !DIR_DELTA[dirFromA]) return false;
  const opp = OPPOSITE[dirFromA];
  addManualDoor(tileA, dirFromA);
  removeForcedDoor(tileA, dirFromA);
  if (tileB) {
    addManualDoor(tileB, opp);
    removeForcedDoor(tileB, opp);
    normalizeTileDoorState(tileB);
  }
  normalizeTileDoorState(tileA);
  return true;
}

function getRenderableDoorDirs(r, c) {
  const tile = G.grid[r]?.[c];
  if (!tile) return [];
  // Only render doors that belong to an already-placed room.
  // Pending/forced doors may still exist in state to guide future reveals,
  // but they must stay hidden until a room is actually placed there.
  return getTileDoors(tile);
}

function reconcileDoorConnections(state = G) {
  if (!state?.grid) return;
  const prev = G;
  G = state;
  try {
    for (let r = 0; r < state.GRID; r++) {
      for (let c = 0; c < state.GRID; c++) {
        const tile = state.grid[r]?.[c];
        if (tile) normalizeTileDoorState(tile);
      }
    }
    for (let r = 0; r < state.GRID; r++) {
      for (let c = 0; c < state.GRID; c++) {
        const tile = state.grid[r]?.[c];
        if (!tile) continue;
        for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
          const neighbor = state.grid[r + dr]?.[c + dc];
          if (!neighbor) continue;
          const opp = OPPOSITE[dir];
          const tileForced = getForcedDoorDirs(tile).includes(dir);
          const neighborForced = getForcedDoorDirs(neighbor).includes(opp);
          const tileOpen = tileHasDoor(tile, dir, { includeForced: true });
          const neighborOpen = tileHasDoor(neighbor, opp, { includeForced: true });
          const wantsConnection = (tileForced && neighborOpen) || (neighborForced && tileOpen) || (tileOpen && neighborOpen);
          if (wantsConnection) connectTilesWithDoor(tile, neighbor, dir);
        }
        normalizeTileDoorState(tile);
      }
    }
  } finally {
    G = prev;
  }
}

function cx(...parts) {

function createElement(tag, { className = '', text = '', html = '', disabled = false, attrs = {}, onClick = null } = {}) {
  const node = document.createElement(tag);
  const normalizedClassName = normalizeClassNames(className);
  if (normalizedClassName) node.className = normalizedClassName;
  if (text) node.textContent = text;
  if (html) node.innerHTML = html;
  if (disabled) node.disabled = true;
  Object.entries(attrs).forEach(([key, value]) => {
    if (value !== undefined && value !== null) node.setAttribute(key, value);
  });
  if (typeof onClick === 'function') node.onclick = onClick;
  return node;
}

function buildButton(label, action, { className = '', disabled = false, stopPropagation = false, emitClick = false } = {}) {

  if (disabled) {
    btn.style.opacity = '0.4';
    btn.style.cursor = 'not-allowed';

  btn.onclick = (e) => {
    if (stopPropagation) e.stopPropagation();
    if (!disabled && emitClick) GAME_EVENTS.emit('ui.click', { source: 'button', label });
    if (!disabled && typeof action === 'function') action();

}

  if (/^-?\d+$/.test(raw)) return Number(raw);
  if (raw === 'true') return true;
  if (raw === 'false') return false;
  return raw;
}

    if (BLOCKABLE_GAMEPLAY_COMMANDS.has(commandName)) {
      const multiplayerLock = getMultiplayerInputLockState(commandName, arg);
      if (multiplayerLock.active) {
        event.preventDefault();
        event.stopImmediatePropagation();
        if (multiplayerLock.message) addLog(multiplayerLock.message, 'system');
        return;
      }
    }
    const shouldClick = UI_CLICK_COMMANDS.has(commandName);
    if (shouldClick) GAME_EVENTS.emit('ui.click', { source: 'command', commandName });
    command(trigger, arg, event);
  }, true);
}

function rotateShroomTarget(r, c) {
  const tile = G.grid[r]?.[c];
  if (!tile) return false;
  const shroomTargets = getRoomRotateTargets();
  const isTarget = shroomTargets.some(([tr, tc]) => tr === r && tc === c);
  if (!isTarget) return false;
  const curRot = (G.shroomPreview?.r === r && G.shroomPreview?.c === c)
    ? G.shroomPreview.rotation
    : (tile.rotationOffset || 0);
  const nextRot = (curRot + 1) % 4;
  G.shroomPreview = { r, c, rotation: nextRot };
  renderAll();
  return true;
}

function handleMoveRoomSelection(r, c) {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome || gnome.ko) return false;
  if (gnome.stickyBlocked) {
    addLog(`🫟 ${gnome.name} is stuck — cannot move this turn!`, 'bad');
    return true;
  }
  const targets = getConnectedRooms(gnome.row, gnome.col);
  const isTarget = targets.some(([tr, tc]) => tr === r && tc === c);
  if (!isTarget) return false;
  return executeGameAction('moveToRoom', { r, c });
}

function getCommandLinkedActionIds(commandName = '', arg = undefined) {
  const resolver = INTERACTION_LOCK_COMMAND_ACTIONS[commandName];
  if (!resolver) return [];
  if (typeof resolver === 'function') {
    const result = resolver(arg);
    return Array.isArray(result) ? result.filter(Boolean) : (result ? [result] : []);
  }
  return Array.isArray(resolver) ? resolver.filter(Boolean) : (resolver ? [resolver] : []);
}

function getInteractionLockState() {
  if (G?.dynamiteMode) return { active: true, id: 'dynamite', ...INTERACTION_LOCK_CONFIG.dynamite };
  const activeInteraction = getActiveBoardInteraction();
  const cfg = activeInteraction ? INTERACTION_LOCK_CONFIG[activeInteraction.id] : null;
  if (!cfg) return { active: false, id: null, ownerButtonId: '', allowedActionIds: Object.freeze([]), allowedCommands: Object.freeze([]), message: '' };
  return { active: true, id: activeInteraction.id, ...cfg };
}

function isActionAllowedDuringInteractionLock(actionId = '') {
  const lock = getInteractionLockState();
  if (!lock.active) return true;
  return lock.allowedActionIds.includes(actionId);
}

function isCommandAllowedDuringInteractionLock(commandName = '', arg = undefined) {
  const lock = getInteractionLockState();
  if (!lock.active) return true;
  if (!BLOCKABLE_GAMEPLAY_COMMANDS.has(commandName)) return true;
  if (lock.allowedCommands.includes(commandName)) return true;
  const linkedActionIds = getCommandLinkedActionIds(commandName, arg);
  return linkedActionIds.some(actionId => lock.allowedActionIds.includes(actionId));
}

function getInteractionLockMessage() {
  return getInteractionLockState().message || 'Finish or cancel the current action first.';
}

function resolveActiveBoardInteraction(kind, context, options = {}) {
  const activeInteraction = getActiveBoardInteraction();
  if (!activeInteraction) return false;
  const handler = kind === 'reveal'
    ? activeInteraction.def.handleReveal
    : activeInteraction.def.handleRoom;
  if (typeof handler !== 'function') return false;
  return !!handler(context, options);
}

function handleActiveBoardInteractionMiss(kind, context, options = {}) {
  const activeInteraction = getActiveBoardInteraction();
  if (!activeInteraction) return false;
  const missHandler = kind === 'reveal'
    ? activeInteraction.def.handleRevealMiss
    : activeInteraction.def.handleRoomMiss;
  if (typeof missHandler !== 'function') return false;
  return !!missHandler(context, options);
}

function createActionContext(intent = {}) {
  const actorIdx = intent.actorIdx ?? G.currentGnomeIdx;
  const gnome = actorIdx == null ? null : (G.gnomes?.[actorIdx] || null);
  const tile = gnome ? (G.grid[gnome.row]?.[gnome.col] || null) : null;
  return { intent, actorIdx, gnome, tile };
}

function validateGnomeTurnActionContext(ctx, { requireActions = true } = {}) {
  if (G.phase !== 'gnome') return 'Not in gnome phase.';
  if (!ctx.gnome || ctx.gnome.ko) return 'That gnome cannot act.';
  if (requireActions && G.actionsLeft <= 0) return 'No actions left.';
  return '';
}

function restoreGameState(snapshot, { render = true } = {}) {
  G = snapshotStateForTests(snapshot);
  if (render) renderAll();
  return G;
}

function createGameActionIntent(actionId, payload = undefined) {
  const action = GAME_ACTIONS[actionId];
  if (!action) return null;
  return action.createIntent ? action.createIntent(payload) : { actionId, payload };
}

function validateGameActionIntent(intent) {
  const action = intent ? GAME_ACTIONS[intent.actionId] : null;
  if (!action) return { ok: false, reason: `Unknown action: ${intent?.actionId || 'unknown'}` };
  if (!action.validate) return { ok: true };
  const result = action.validate(intent);
  if (result === true || result == null) return { ok: true };
  if (typeof result === 'string') return { ok: false, reason: result };
  return result;
}

function performGameActionIntent(intent) {
  const action = intent ? GAME_ACTIONS[intent.actionId] : null;
  if (!action || typeof action.apply !== 'function') {
    console.warn('Unknown game action intent', intent);
    return false;
  }
  if (action.transactional === false) {
    const result = action.apply(intent);
    return result === undefined ? true : result;
  }
  const snapshot = snapshotStateForTests();
  try {
    const result = action.apply(intent);
    return result === undefined ? true : result;
  } catch (err) {
    console.error(`Action failed: ${intent.actionId}`, err);
    restoreGameState(snapshot);
    addLog(`⚠️ ${intent.actionId} failed. State restored.`, 'bad');
    return false;
  }
}


function actionValidationOk() {
  return { ok: true };
}

function createActorActionIntent(actionId, payload = {}, actorIdx = G.currentGnomeIdx) {
  return Object.assign({ actionId, actorIdx }, payload || {});
}

function createRoomTargetIntent(actionId, payload = {}, extras = {}) {
  return createActorActionIntent(actionId, Object.assign({
    target: { r: Number(payload?.r), c: Number(payload?.c) },
  }, extras));
}

function validateActorAction(intent, validator, options = {}) {
  const ctx = createActionContext(intent);
  const baseError = validateGnomeTurnActionContext(ctx, options);
  if (baseError) return baseError;
  if (typeof validator !== 'function') return actionValidationOk();
  const result = validator(ctx, intent);
  return result == null || result === true ? actionValidationOk() : result;
}

function defineGameAction(actionId, config) {
  const action = Object.assign({
    createIntent: payload => createActorActionIntent(actionId, payload),
    transactional: true,
  }, config || {});
  return Object.freeze(action);
}

function defineActorAction(actionId, config = {}) {
  const {
    createPayload,
    requireActions = true,
    validate,
    apply,
    transactional = true,
  } = config;
  return defineGameAction(actionId, {
    transactional,
    createIntent: payload => createActorActionIntent(actionId, typeof createPayload === 'function' ? createPayload(payload) : {}),
    validate: intent => validateActorAction(intent, validate, { requireActions }),
    apply,
  });
}

function defineRoomTargetActorAction(actionId, config = {}) {
  const {
    createExtras,
    requireActions = true,
    validate,
    apply,
    transactional = true,
  } = config;
  return defineGameAction(actionId, {
    transactional,
    createIntent: payload => createRoomTargetIntent(actionId, payload, typeof createExtras === 'function' ? createExtras(payload) : {}),
    validate: intent => validateActorAction(intent, validate, { requireActions }),
    apply,
  });
}

function isCoordInList(coords, r, c) {
  return Array.isArray(coords) && coords.some(([row, col]) => row === r && col === c);
}

function isMatchingDynamiteTarget(targets, payload = {}) {
  return Array.isArray(targets) && targets.some(w => w.dir === payload.dir && w.nr === payload.nr && w.nc === payload.nc);
}

function validateMoveToRoomIntent(ctx, intent) {
  if (!isMoveIntentArmed('move', intent)) return 'Move is not armed.';
  if (!canSpendMove(ctx.gnome)) return `🫟 ${ctx.gnome.name} is stuck — cannot move this turn!`;
  return isCoordInList(getConnectedRooms(ctx.gnome.row, ctx.gnome.col), intent.target.r, intent.target.c)
    ? actionValidationOk()
    : 'That room is not a legal move target.';
}

function validateRevealRoomIntent(ctx, intent) {
  if (!isMoveIntentArmed('move', intent)) return 'Move is not armed.';
  if (!canSpendMove(ctx.gnome)) return `🫟 ${ctx.gnome.name} is stuck — cannot move this turn!`;
  if (G.roomDeck.length === 0) return 'No rooms left to reveal!';
  return isCoordInList(getRevealableFrom(ctx.gnome.row, ctx.gnome.col), intent.target.r, intent.target.c)
    ? actionValidationOk()
    : 'That reveal is not legal from the current room.';
}

function validatePickupIntent(ctx) {
  const free = findFirstFreeSatchelSlot(ctx.gnome);
  if (free === -1) return `${ctx.gnome.name}'s satchel is full!`;
  const tileHasItems = !!(ctx.tile?.Socks > 0 || ctx.tile?.goodieIds?.length > 0 || ctx.tile?.hatIds?.length > 0);
  return tileHasItems ? actionValidationOk() : 'Nothing to pick up here!';
}

function validateKickIntent(ctx) {
  if (!getKickTargetsForGnome(ctx.gnome).length) return 'Nothing to kick here!';
  if (!getKickDestinationsForGnome(ctx.gnome).length) return 'No connected rooms to kick into!';
  return actionValidationOk();
}

function validateHideIntent(ctx) {
  if (G.lightsOn) return '💡 Lights On! Cannot hide this turn.';
  return isInHidingRoom(ctx.gnome) ? actionValidationOk() : 'No hiding spot here!';
}

function validateVentIntent(ctx) {
  const ventRooms = getVentRooms();
  if (!ctx.tile?.vent) return 'No vent in this room.';
  return ventRooms.filter(([r, c]) => !(ctx.gnome.row === r && ctx.gnome.col === c)).length > 0
    ? actionValidationOk()
    : 'No other vent room to travel to.';
}

function validateDepositIntent(ctx) {
  const hasSocks = ctx.gnome.satchel.some(s => s?.type === 'Socks');
  if (!hasSocks) return 'No socks to deposit!';
  const depositable = !!(ctx.tile?.roomId === 1 || ctx.tile?.chute);
  return depositable ? actionValidationOk() : 'Must be in the Laundry Room or a chute room to deposit.';
}

function validateHatAbilityIntent(ctx, ability, errorMessage) {
  return getHatActionType(ctx.gnome) === ability ? actionValidationOk() : errorMessage;
}

function validateKickTargetIntent(intent) {
  if (!G.kickMode) return 'Kick is not armed.';
  return isCoordInList(G.kickMode.destinations, intent.target.r, intent.target.c)
    ? actionValidationOk()
    : 'That room is not a legal kick destination.';
}

function validateVentTargetIntent(ctx, intent) {
  if (!G.ventMode) return 'Vent is not armed.';
  if (!ctx.gnome) return 'No active gnome.';
  const isValid = getVentRooms().some(([r, c]) => r === intent.target.r && c === intent.target.c && !(ctx.gnome.row === r && ctx.gnome.col === c));
  return isValid ? actionValidationOk() : 'That vent destination is not legal.';
}

function validateShroomTargetIntent(intent) {
  const tile = G.grid[intent.target.r]?.[intent.target.c];
  if (!tile) return 'No room there to rotate.';
  return isCoordInList(getRoomRotateTargets(), intent.target.r, intent.target.c)
    ? actionValidationOk()
    : 'That room cannot be rotated by Shroom.';
}

function validateGoodieIntent(ctx, intent) {
  const item = ctx.gnome.satchel[intent.slotIdx];
  if (!item || item.type !== 'goodie') return 'No goodie in that slot.';
  return isGoodieUsable(ctx.gnome, item.id) ? actionValidationOk() : "That goodie can't be used here.";
}

function validateDynamiteIntent(intent) {
  if (!G.dynamiteMode) return 'Dynamite is not armed.';
  return isMatchingDynamiteTarget(getDynamiteTargets(), intent.payload)
    ? actionValidationOk()
    : 'That wall is not a legal blast target.';

function isGameplayInputLocked(actionId = '') {
  if (document.body.classList.contains('card-showing')) return true;
  const multiplayerLock = getMultiplayerInputLockState(actionId);
  if (multiplayerLock.active) return true;
  if (SEQ.queuedCount > 0) {
    return actionId !== 'moveToRoom';
  }
  if (!actionId) return getInteractionLockState().active;
  return !isActionAllowedDuringInteractionLock(actionId);
}

function executeGameAction(actionId, payload = undefined) {
  if (isInterruptActive() && !['moveToRoom'].includes(actionId)) {
    addLog('Resolve the Event first.', 'bad');
    return false;
  }
  if (isGameplayInputLocked(actionId)) {
    if (getInteractionLockState().active && !isActionAllowedDuringInteractionLock(actionId)) addLog(getInteractionLockMessage(), 'system');
    return false;
  }
  const intent = createGameActionIntent(actionId, payload);
  if (!intent) {
    console.warn('Unknown game action', actionId, payload);
    return false;
  }
  const validation = validateGameActionIntent(intent);
  if (!validation.ok) {
    if (validation.reason) addLog(validation.reason, 'bad');
    return false;
  }
  return performGameActionIntent(intent);
}

function setPatrolTargetOverride(override = null) {
  if (!G) return null;
  if (!override) {
    clearPatrolTargetOverride();
    return null;
  }
  G.patrolTargetSeq = (G.patrolTargetSeq || 0) + 1;
  G.patrolTargetOverride = { ...override, seq: G.patrolTargetSeq };
  updateAllPatrolNextDirs();
  return G.patrolTargetOverride;
}

function getActivePatrolTargetOverride() {
  const override = G?.patrolTargetOverride || null;
  if (!override) return null;
  if (override.mode === 'stinky') {
    const target = getPatrolDistractTarget();
    if (!target) {
      G.patrolTargetOverride = null;
      return null;
    }
  }
  return override;
}

function getPatrolOverrideTarget(patrol) {
  const override = getActivePatrolTargetOverride();
  if (!override) return null;
  if (override.scope === 'specific' && override.patrolType !== patrol.type) return null;
  if (override.mode === 'stinky') return getPatrolDistractTarget();
  if (override.mode === 'room') return { row: override.targetR, col: override.targetC };
  if (override.mode === 'roomId') {
    const coords = getRoomCoordsById(override.roomId);
    return coords ? { row: coords[0], col: coords[1] } : null;
  }
  return null;
}

  G.patrolMoveBonuses.push({ targetType: targetType || null, extraMoves, source });
  updateAllPatrolNextDirs();
}

function consumeQueuedPatrolBonusMoves(patrol) {
  const bonuses = Array.isArray(G?.patrolMoveBonuses) ? G.patrolMoveBonuses : [];
  let total = 0;
  G.patrolMoveBonuses = bonuses.filter(b => {
    const applies = !b?.targetType || b.targetType === patrol.type;
    if (applies) total += (Number(b.extraMoves) || 0);
    return !applies;
  });
  return total;
}

  const active = isInterruptActive();
  const isPanic = isPanicInterruptActive();
  const isEventInterrupt = isEventInterruptActive();
  const theme = getInterruptTheme();

  document.body.classList.toggle('interrupt-mode', active);
  document.body.classList.toggle('panic-mode', isPanic);
  document.body.classList.toggle('event-mode', isEventInterrupt);
  document.body.classList.toggle('interrupt-purple', active && theme === 'purple');

  if (panicOverlay) panicOverlay.classList.toggle('show', isPanic);
  if (panicBanner) {
    panicBanner.classList.toggle('show', isPanic);

function triggerEventRoomEntryForGnome(gnomeIdx, r, c) {
  if (!isEventTriggerEnabled('eventRoom') || !G || G.gameEnded) return false;
  const tile = G.grid?.[r]?.[c];
  if (!tile?.event) return false;
  const gnome = G.gnomes?.[gnomeIdx];
  if (!gnome) return false;
  if (!(gnome.eventRoomEntryKeysThisTurn instanceof Set)) gnome.eventRoomEntryKeysThisTurn = new Set();
  const key = `${r},${c}`;
  if (gnome.eventRoomEntryKeysThisTurn.has(key)) return false;
  gnome.eventRoomEntryKeysThisTurn.add(key);
  return tryTriggerEventForGnome(gnomeIdx, r, c, {
    reason:'first entry into an Event room this gnome turn',
    reasonPrefix:'⁉️',
    reasonClass:'event',
    logPrefix:'⁉️ Event Room',
    logClass:'event'
  });
}

function tryTriggerEventForGnome(gnomeIdx, r, c, opts = {}) {
  if (!G || G.gameEnded || !G.grid?.[r]?.[c]) return false;
  const gnome = G.gnomes?.[gnomeIdx];
  if (!gnome) return false;
  const reason = opts.reason || 'Event trigger';
  addLog(`${opts.reasonPrefix || '🎲'} ${gnome.name} triggered an Event: ${reason}.`, opts.reasonClass || 'event');
  if (gnome.eventDrawnThisTurn) {
    addLog(`ℹ️ No Event Card drawn because ${gnome.name} already drew one this turn.`, 'system');
    return false;
  }
  const triggered = triggerEvent(r, c, { ...opts, actorGnomeIdx: gnomeIdx });
  if (triggered) gnome.eventDrawnThisTurn = true;
  return triggered;
}

function triggerRoundEventOnce(kind, gnomeIdx, r, c, opts = {}) {
  if (!G || G.gameEnded) return false;
  const key = kind === 'reveal'
    ? 'roundFirstRevealEventUsed'
    : kind === 'deposit'
      ? 'roundFirstDepositEventUsed'
      : null;
  if (!key || G[key]) return false;
  if (!G.grid?.[r]?.[c]) return false;
  G[key] = true;
  return tryTriggerEventForGnome(gnomeIdx, r, c, opts);
}

function triggerFirstRevealRoundEvent(gnomeIdx, r, c) {
  if (!isEventTriggerEnabled('firstRevealPerRound')) return false;
  return triggerRoundEventOnce('reveal', gnomeIdx, r, c, {

function isHouseFullyEnclosed() {
  for (let r = 0; r < G.GRID; r++) {
    for (let c = 0; c < G.GRID; c++) {
      const tile = G.grid[r]?.[c];
      if (!tile) continue;
      for (const dir of getRenderableDoorDirs(r, c)) {
        const [dr, dc] = DIR_DELTA[dir];

        if (nr < 0 || nr >= G.GRID || nc < 0 || nc >= G.GRID) continue;

function finishTurnPortraitTransition(actorIdx) {
  const card = el('turn-portrait-card');
  if (!card) return;
  TURN_PORTRAIT_STATE.timeoutId = null;
  if (actorIdx == null || G.phase !== 'gnome') {
    TURN_PORTRAIT_STATE.displayedActorIdx = null;
    card.classList.remove('is-visible', 'is-exiting');
    return;
  }
  const gnome = G.gnomes?.[actorIdx];
  if (!gnome) return;
  setTurnPortraitContent(gnome);
  TURN_PORTRAIT_STATE.displayedActorIdx = actorIdx;
  card.classList.remove('is-exiting');
  requestAnimationFrame(() => card.classList.add('is-visible'));
}

function renderTurnPortrait() {
  const card = el('turn-portrait-card');
  if (!card) return;
  const desiredActorIdx = G.phase === 'gnome' ? G.currentGnomeIdx : null;
  if (TURN_PORTRAIT_STATE.desiredActorIdx === desiredActorIdx && TURN_PORTRAIT_STATE.displayedActorIdx === desiredActorIdx) {
    if (desiredActorIdx != null) setTurnPortraitContent(G.gnomes?.[desiredActorIdx]);
    return;
  }
  TURN_PORTRAIT_STATE.desiredActorIdx = desiredActorIdx;
  if (TURN_PORTRAIT_STATE.timeoutId) {
    clearTimeout(TURN_PORTRAIT_STATE.timeoutId);
    TURN_PORTRAIT_STATE.timeoutId = null;
  }
  if (TURN_PORTRAIT_STATE.displayedActorIdx == null && desiredActorIdx == null) {
    card.classList.remove('is-visible', 'is-exiting');
    return;
  }
  if (TURN_PORTRAIT_STATE.displayedActorIdx == null) {
    finishTurnPortraitTransition(desiredActorIdx);
    return;
  }
  card.classList.remove('is-visible');
  card.classList.add('is-exiting');
  TURN_PORTRAIT_STATE.timeoutId = setTimeout(() => finishTurnPortraitTransition(TURN_PORTRAIT_STATE.desiredActorIdx), 320);
}

  const tile = G.grid[r]?.[c];
  if (!tile) return [];
  const result = [];
  for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
    const nr = r + dr, nc = c + dc;
    const nb = G.grid[nr]?.[nc];
    if (!nb) continue;
    if (tilesConnected(tile, nb)) result.push([nr, nc]);
  }
  return result;
}

// Get empty cells where a new room COULD be placed from (r,c)
// i.e. current tile has a door in that direction AND the cell is empty
function getRevealableFrom(r, c) {
  const tile = G.grid[r]?.[c];
  if (!tile) return [];
  const result = [];
  for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
    const nr = r + dr, nc = c + dc;
    if (nr < 0 || nr >= G.GRID || nc < 0 || nc >= G.GRID) continue;
    if (G.grid[nr]?.[nc]) continue;
    if (tileHasDoor(tile, dir, { includeForced: true })) result.push([nr, nc, dir]);
  }
  return result;
}

// When placing a new room at (nr,nc) coming from direction fromDir (door on incoming tile),
// filter the room deck to only rooms that have a door on the OPPOSITE side (so they connect).
// Returns the first valid roomId from the deck.
function drawConnectingRoom(fromDir) {
  const needed = OPPOSITE[fromDir]; // new tile must be rotatable to provide a door on this side
  if (Array.isArray(G.scryQueue) && G.scryQueue.length) {
    while (G.scryQueue.length) {
      const queuedId = G.scryQueue.shift();
      const idx = G.roomDeck.lastIndexOf(queuedId);
      if (idx === -1) continue;
      if (!roomCanProvideDoor(queuedId, needed)) {
        G._pendingEntryDoor = needed;
        console.warn(`drawConnectingRoom: Scry forcing entry door ${needed} on room ${queuedId}`);
      }
      const id = G.roomDeck.splice(idx, 1)[0];
      if (!G.scryQueue.length) G.scryQueue = null;
      return id;
    }
    G.scryQueue = null;
  }
  for (let i=G.roomDeck.length-1;i>=0;i--) {
    if (roomCanProvideDoor(G.roomDeck[i], needed)) {
      return G.roomDeck.splice(i,1)[0];
    }
  }
  // Fallback: no room in the deck can natively provide the needed door in any rotation.
  // Take whatever is left and signal doReveal to force-rotate it via _pendingEntryDoor.
  // This should be rare; if it fires often the room deck mix may need adjustment.
  const id = G.roomDeck.pop();
  if (id) {
    G._pendingEntryDoor = needed;
    console.warn(`drawConnectingRoom: fallback triggered — forcing entry door ${needed} on room ${id}`);
  }
  return id;
}

var setupMode = null;
var setupOnlineView = 'choice';
var setupPlayerCount = 0;
var setupSelectedGnomes = [];

function setSetupSelectedGnomes(indices, { render = true } = {}) {
  setupSelectedGnomes = normalizeSetupSelection(indices);
  setupPlayerCount = setupSelectedGnomes.length;
  if (render) renderSetupUi();
  return setupSelectedGnomes.slice();
}

function setSetupOnlineView(view, { render = true } = {}) {
  const normalized = view === 'join' || view === 'room' ? view : 'choice';
  if (setupMode !== 'online') setupMode = 'online';
  setupOnlineView = normalized;
  if (render) renderSetupUi();
  return setupOnlineView;
}

function normalizeSetupSelection(indices) {
  return [...new Set((indices || [])
    .map(v => Number(v))
    .filter(v => Number.isInteger(v) && v >= 0 && v <= 3))].sort((a,b)=>a-b);
}

function enterLocalSetup() {
  setupMode = 'local';
  setupOnlineView = 'choice';
  renderSetupUi();
}

function enterOnlineSetup() {
  setupMode = 'online';
  if (window.__gnomeMPApi && typeof window.__gnomeMPApi.prepareOnlineMode === 'function') {
    window.__gnomeMPApi.prepareOnlineMode();
  }
  setSetupOnlineView(window.__gnomeMPApi?.hasSession?.() ? 'room' : 'choice');
}

function resetSetupMenu() {
  setupMode = null;
  setupOnlineView = 'choice';
  setSetupSelectedGnomes([], { render: false });
  const joinInput = el('setup-join-code-input');
  if (joinInput) joinInput.value = '';
  if (window.__gnomeMPApi && typeof window.__gnomeMPApi.leaveMenuToLanding === 'function') {
    window.__gnomeMPApi.leaveMenuToLanding();
  }
  renderSetupUi();
}

function selectPlayers(n) {
  const count = Math.max(0, Math.min(4, Number(n) || 0));
  setSetupSelectedGnomes(Array.from({ length: count }, (_, i) => i));
}

function getSetupOnlineMeta() {
  if (window.__gnomeMPApi && typeof window.__gnomeMPApi.getOnlineUiState === 'function') {
    return window.__gnomeMPApi.getOnlineUiState();
  }
  return null;
}

function toggleSetupGnome(idx) {
  const index = Number(idx);
  if (!Number.isInteger(index) || index < 0 || index > 3) return;
  if (setupMode === 'online') {
    if (window.__gnomeMPApi && typeof window.__gnomeMPApi.requestClaim === 'function') {
      window.__gnomeMPApi.requestClaim(index);
    }
    return;
  }
  if (setupMode !== 'local') return;
  if (setupSelectedGnomes.includes(index)) setSetupSelectedGnomes(setupSelectedGnomes.filter(v => v !== index));
  else setSetupSelectedGnomes([...setupSelectedGnomes, index].sort((a,b)=>a-b));
}

function renderSetupOnlineSubviews() {
  const choice = el('setup-online-choice-view');
  const join = el('setup-online-join-view');
  const room = el('setup-online-room-view');
  if (!choice || !join || !room) return;
  choice.classList.toggle('is-active', setupMode === 'online' && setupOnlineView === 'choice');
  join.classList.toggle('is-active', setupMode === 'online' && setupOnlineView === 'join');
  room.classList.toggle('is-active', setupMode === 'online' && setupOnlineView === 'room');
}

function renderGnomeNameInputs() {
  const container = el('gnome-names');
  if (!container) return;

  if (container.children.length !== 4 || !container.dataset.cardsBuilt) {
    const startingHatByProfile = [1,2,9,6];
    container.innerHTML = Array.from({length:4},(_,i)=> {
      const hatDef = getHatDef(startingHatByProfile[i]);
      return `
        <button class="setup-gnome-card" style="--setup-card-index:${i}; --gnome-accent:${GNOME_COLORS[i]};" type="button" data-command="toggleSetupGnome" data-command-arg="${i}" aria-pressed="false">
          <span class="setup-selection-ribbon" hidden></span>

          <div class="setup-card-topline">
            <div class="setup-gnome-head">
              <span class="setup-color-dot" style="background:${GNOME_COLORS[i]};"></span>
              <span class="setup-name-wrap">
                <span>${GNOME_NAMES_DEFAULT[i]}</span>
              </span>
            </div>
            <div class="setup-card-chips">
              <span class="setup-role-chip">Bench</span>
            </div>
          </div>
          <div class="setup-hat-block">
            <div class="setup-hat-name">${hatDef ? `${getIconHTML({ ...getHatIconProps(hatDef), alt: hatDef.name, className: 'ui-icon' })} ${hatDef.name}` : 'No Hat'}</div>
            <div class="setup-hat-desc">${hatDef?.desc || ''}</div>
          </div>
        </button>`;
    }).join('');
    container.dataset.cardsBuilt = '1';
  }

  const selected = new Set(setupSelectedGnomes);
  const onlineMeta = setupMode === 'online' && window.__gnomeMPApi && typeof window.__gnomeMPApi.getSetupCardMeta === 'function'
    ? window.__gnomeMPApi
    : null;

  Array.from(container.querySelectorAll('.setup-gnome-card')).forEach((card, i) => {
    const active = selected.has(i);
    const cardMeta = onlineMeta ? onlineMeta.getSetupCardMeta(i) : null;
    const selfClaimed = cardMeta?.claimed ? !!cardMeta.ownerSelf : (setupMode === 'local' && active);
    const otherClaimed = !!(cardMeta?.claimed && !cardMeta.ownerSelf);
    const ribbonText = cardMeta?.ownerLabel || (active && setupMode === 'local' ? 'Selected' : '');
    const ribbonClass = cardMeta?.claimed
      ? (cardMeta.ownerSelf ? 'self' : 'other')
      : (active ? 'local' : '');

    card.style.setProperty('--setup-card-index', i);
    card.style.setProperty('--gnome-accent', GNOME_COLORS[i]);
    card.classList.toggle('is-active', active);
    card.classList.toggle('is-claimed-self', selfClaimed);
    card.classList.toggle('is-claimed-other', otherClaimed);
    card.setAttribute('aria-pressed', active ? 'true' : 'false');

    const ribbon = card.querySelector('.setup-selection-ribbon');
    if (ribbon) {
      ribbon.hidden = !ribbonText;
      ribbon.textContent = ribbonText;
      ribbon.className = `setup-selection-ribbon ${ribbonClass}`.trim();
    }

    const roleChip = card.querySelector('.setup-role-chip');
    if (roleChip) {
      roleChip.textContent = active ? 'Playing' : 'Bench';
      roleChip.classList.toggle('ready', active);
    }
  });

function renderSetupUi() {
  renderGnomeNameInputs();
  renderSetupOnlineSubviews();

  const modeButtons = el('setup-mode-buttons');
  const onlinePanel = el('setup-online-panel');
  const localPanel = el('setup-local-panel');
  const roster = el('gnome-names');
  const startWrap = el('setup-start-wrap');
  const startBtn = el('start-game-btn');
  const waitingHost = el('setup-waiting-host');
  const statusLine = el('setup-status-line');
  const localStartSlot = el('setup-local-start-slot');
  const onlineStartSlot = el('setup-online-start-slot');

  if (modeButtons) modeButtons.classList.toggle('is-hidden', !!setupMode);
  if (onlinePanel) onlinePanel.classList.toggle('is-hidden', setupMode !== 'online');
  if (localPanel) localPanel.classList.toggle('is-hidden', setupMode !== 'local');
  const showRoster = setupMode === 'local' || (setupMode === 'online' && setupOnlineView === 'room');
  if (roster) {
    roster.classList.toggle('is-hidden', !showRoster);
    roster.classList.toggle('is-visible', !!showRoster);
  }

  let statusText = '';
  let showStartButton = false;
  let showWaitingForHost = false;

  if (setupMode === 'local') {
    showStartButton = setupSelectedGnomes.length >= 1;
  } else if (setupMode === 'online') {
    const online = getSetupOnlineMeta();
    if (online) {
      const showInlineStatus = !!(online.statusText && (setupOnlineView !== 'room' || !online.sessionActive));
      statusText = showInlineStatus ? (online.statusText || '') : '';
      showStartButton = !!(online.sessionActive && online.isHost && online.startReady);
      showWaitingForHost = !!(online.sessionActive && online.isClient && online.startReady);
    }
  }

  if (statusLine) statusLine.textContent = statusText;
  if (startWrap) {
    const desiredParent = setupMode === 'local'
      ? localStartSlot
      : (setupMode === 'online' && setupOnlineView === 'room' ? onlineStartSlot : null);
    if (desiredParent && startWrap.parentElement !== desiredParent) desiredParent.appendChild(startWrap);
    startWrap.classList.toggle('is-visible', !!desiredParent && (showStartButton || showWaitingForHost));
  }
  if (startBtn) {
    startBtn.style.display = showStartButton ? '' : 'none';
    startBtn.disabled = !showStartButton;
  }
  if (waitingHost) {
    waitingHost.classList.toggle('is-visible', showWaitingForHost);
    waitingHost.textContent = showWaitingForHost ? 'Waiting for host to start' : '';
  }
}

function startGame() {
  unlockGameAudio();
  resumeGameAudio();
  THEME_MUSIC.play().catch(()=>{});
  mountUnifiedTurnDock();
  const selected = normalizeSetupSelection(setupSelectedGnomes);
  if (!selected.length) return;
  setupPlayerCount = selected.length;
  const names = selected.map(i => GNOME_NAMES_DEFAULT[i]);
  warmUiPerformance().catch(() => undefined);
  el('screen-setup').classList.remove('show');
  el('screen-end').classList.remove('show');
  setOverlayScreenOpen('screen-victory', false);
  setOverlayScreenOpen('screen-weaver', false);
  syncWeaverScreenMode('');
  initState(setupPlayerCount, names, selected);
  renderAll();
  requestAnimationFrame(() => {
    const boardArea = el('board-area');

    if (!boardArea || !laundryCell) return;

    const targetTop = laundryCell.offsetTop + (laundryCell.offsetHeight / 2) - (boardArea.clientHeight / 2);
    boardArea.scrollLeft = targetLeft;
    boardArea.scrollTop = targetTop;
  });
  addLog('🎮 Game started! House 1 — Collect '+getHouseGoal()+' socks.','system');

}

function resetGame() {
  SEQ.reset();
  mountUnifiedTurnDock();
  clearPatrolRefCards();
  closeModal();
  closeItemPopup();
  hideBanner();
  el('card-overlay').classList.remove('show');
  document.body.classList.remove('card-showing');
  el('screen-end').classList.remove('show');
  setOverlayScreenOpen('screen-victory', false);
  setOverlayScreenOpen('screen-weaver', false);
  syncWeaverScreenMode('');
  el('screen-setup').classList.add('show');

initDebugFork();
refreshDebugForkUi();
}

const PERF = {

  cardWarm: false,
  startupWarmPromise: null,
};

function onNextFrame(fn) {
  requestAnimationFrame(() => requestAnimationFrame(fn));
}

function warmCardOverlay() {
  if (PERF.cardWarm) return;
  const overlay = el('card-overlay');
  const inner = el('game-card-inner');
  if (!overlay || !inner) return;

  const prevOverlayDisplay = overlay.style.display;
  const prevOverlayVisibility = overlay.style.visibility;
  const prevOverlayPointerEvents = overlay.style.pointerEvents;
  const prevOverlayOpacity = overlay.style.opacity;
  const prevBodyState = document.body.classList.contains('card-showing');
  const prevAnimation = inner.style.animation;
  const prevClassName = inner.className;

  document.body.classList.add('card-showing');
  overlay.classList.add('show');
  overlay.style.visibility = 'hidden';
  overlay.style.pointerEvents = 'none';
  overlay.style.opacity = '0';
  inner.className = 'game-card';
  inner.style.animation = 'none';
  void inner.offsetWidth;

  overlay.style.display = 'flex';
  void overlay.offsetWidth;

  onNextFrame(() => {
    overlay.classList.remove('show');
    overlay.style.display = prevOverlayDisplay;
    overlay.style.visibility = prevOverlayVisibility;
    overlay.style.pointerEvents = prevOverlayPointerEvents;
    overlay.style.opacity = prevOverlayOpacity;
    inner.className = prevClassName;
    inner.style.animation = prevAnimation;
    if (!prevBodyState) document.body.classList.remove('card-showing');
    PERF.cardWarm = true;
  });
}

function warmUiPerformance() {
  if (PERF.startupWarmPromise) return PERF.startupWarmPromise;
  const fontReady = document.fonts && document.fonts.ready ? document.fonts.ready.catch(() => undefined) : Promise.resolve();
  PERF.startupWarmPromise = fontReady.then(() => new Promise(resolve => {
    warmCardOverlay();
    onNextFrame(resolve);
  }));
  return PERF.startupWarmPromise;
}

function primeUiPerformance() {
  warmUiPerformance().catch(() => undefined);
}

document.addEventListener('DOMContentLoaded', () => {
  applyBuildMetadata();
  primeUiPerformance();
}, { once: true });

const BOARD_PAN_STATE = {
  active: false,
  pending: false,
  pointerId: null,
  startX: 0,
  startY: 0,
  originScrollLeft: 0,
  originScrollTop: 0,
  boardArea: null,
};

function isBoardPanBlocked() {
  return document.body.classList.contains('card-showing') ||
    document.body.classList.contains('weaver-manage-open') ||
    !!document.querySelector('.ui-shell-popup');
}

function isBoardPanEligibleTarget(target) {
  const boardArea = BOARD_PAN_STATE.boardArea || el('board-area');
  if (!boardArea || !target || !boardArea.contains(target) || isBoardPanBlocked()) return false;
  if (target.closest('#patrol-tray, .door, .ui-room-item, .patrol-coin, .gnome-token, .slot.clickable, .ui-shell-popup, #modal, #modal-overlay, #card-overlay, button, a, input, select, textarea, label')) {
    return false;
  }
  const cell = target.closest('.cell');
  if (!cell) return true;
  if (
    cell.classList.contains('can-reveal') ||
    cell.classList.contains('move-target') ||
    cell.classList.contains('current-gnome') ||
    cell.classList.contains('shroom-target') ||
    cell.classList.contains('kick-dest') ||
    cell.classList.contains('vent-dest') ||
    cell.classList.contains('event-target-patrol')
  ) {
    return false;
  }
  return true;
}

function syncBoardPanCursor(target = null) {
  const boardArea = BOARD_PAN_STATE.boardArea || el('board-area');
  if (!boardArea) return;
  if (BOARD_PAN_STATE.active) {
    boardArea.classList.add('is-panning');
    boardArea.classList.remove('pan-ready');
    return;
  }
  boardArea.classList.remove('is-panning');
  const probeTarget = target || document.elementFromPoint(window.innerWidth / 2, window.innerHeight / 2);
  if (probeTarget && isBoardPanEligibleTarget(probeTarget)) {
    boardArea.classList.add('pan-ready');
  } else {
    boardArea.classList.remove('pan-ready');
  }
}

function beginBoardPanDrag(clientX, clientY) {
  const boardArea = BOARD_PAN_STATE.boardArea || el('board-area');
  if (!boardArea) return;
  BOARD_PAN_STATE.active = true;
  BOARD_PAN_STATE.pending = false;
  BOARD_PAN_STATE.startX = clientX;
  BOARD_PAN_STATE.startY = clientY;
  BOARD_PAN_STATE.originScrollLeft = boardArea.scrollLeft;
  BOARD_PAN_STATE.originScrollTop = boardArea.scrollTop;
  boardArea.classList.add('is-panning');
  boardArea.classList.remove('pan-ready');
}

function stopBoardPanDrag() {
  const boardArea = BOARD_PAN_STATE.boardArea || el('board-area');
  BOARD_PAN_STATE.active = false;
  BOARD_PAN_STATE.pending = false;
  BOARD_PAN_STATE.pointerId = null;
  if (boardArea) boardArea.classList.remove('is-panning');
}

function initBoardPanControls() {
  const boardArea = el('board-area');
  if (!boardArea || boardArea.dataset.panInit === '1') return;
  boardArea.dataset.panInit = '1';
  BOARD_PAN_STATE.boardArea = boardArea;

  boardArea.addEventListener('pointerdown', (e) => {
    if (e.button != 0) return;
    if (!isBoardPanEligibleTarget(e.target)) return;
    BOARD_PAN_STATE.pending = true;
    BOARD_PAN_STATE.pointerId = e.pointerId;
    BOARD_PAN_STATE.startX = e.clientX;
    BOARD_PAN_STATE.startY = e.clientY;
    BOARD_PAN_STATE.originScrollLeft = boardArea.scrollLeft;
    BOARD_PAN_STATE.originScrollTop = boardArea.scrollTop;
    boardArea.setPointerCapture?.(e.pointerId);
    syncBoardPanCursor(e.target);
  });

  boardArea.addEventListener('pointermove', (e) => {
    if (BOARD_PAN_STATE.pointerId !== null && e.pointerId !== BOARD_PAN_STATE.pointerId) return;
    if (BOARD_PAN_STATE.pending && !BOARD_PAN_STATE.active) {
      const dx = e.clientX - BOARD_PAN_STATE.startX;
      const dy = e.clientY - BOARD_PAN_STATE.startY;
      if ((dx * dx) + (dy * dy) >= 16) {
        beginBoardPanDrag(BOARD_PAN_STATE.startX, BOARD_PAN_STATE.startY);
      }
    }
    if (BOARD_PAN_STATE.active) {
      const dx = e.clientX - BOARD_PAN_STATE.startX;
      const dy = e.clientY - BOARD_PAN_STATE.startY;
      boardArea.scrollLeft = BOARD_PAN_STATE.originScrollLeft - dx;
      boardArea.scrollTop = BOARD_PAN_STATE.originScrollTop - dy;
      e.preventDefault();
      return;
    }
    syncBoardPanCursor(e.target);
  });

  const releasePan = (e) => {
    if (BOARD_PAN_STATE.pointerId !== null && e.pointerId !== undefined && e.pointerId !== BOARD_PAN_STATE.pointerId) return;
    const wasActive = BOARD_PAN_STATE.active;
    stopBoardPanDrag();
    boardArea.releasePointerCapture?.(e.pointerId);
    if (wasActive) e.preventDefault?.();
    syncBoardPanCursor(e.target || null);
  };

  boardArea.addEventListener('pointerup', releasePan);
  boardArea.addEventListener('pointercancel', releasePan);
  boardArea.addEventListener('lostpointercapture', releasePan);
  boardArea.addEventListener('pointerleave', () => {
    if (!BOARD_PAN_STATE.active && !BOARD_PAN_STATE.pending) boardArea.classList.remove('pan-ready');
  });
  boardArea.addEventListener('mousemove', (e) => {
    if (!BOARD_PAN_STATE.pending && !BOARD_PAN_STATE.active) syncBoardPanCursor(e.target);
  });
  boardArea.addEventListener('dragstart', (e) => {
    if (BOARD_PAN_STATE.active || BOARD_PAN_STATE.pending) e.preventDefault();
  });
}

document.addEventListener('DOMContentLoaded', initBoardPanControls, { once: true });

function getMultiplayerTurnOwnerState() {
  const api = window.__gnomeMPApi;
  if (!api || typeof api.getTurnOwnerState !== 'function') return null;
  try { return api.getTurnOwnerState(); } catch (_err) { return null; }
}

function getMultiplayerInputLockState(actionId = '', commandName = '', commandArg = undefined) {
  const api = window.__gnomeMPApi;
  if (!api || typeof api.getInputLockState !== 'function') {
    return { active: false, ownerButtonId: '', message: '' };
  }
  try {
    const state = api.getInputLockState(actionId, commandName, commandArg);
    if (!state || !state.active) return { active: false, ownerButtonId: '', message: '' };
    return {
      active: true,
      ownerButtonId: state.ownerButtonId || '',
      message: state.message || 'Not your turn.'
    };
  } catch (_err) {
    return { active: false, ownerButtonId: '', message: '' };
  }
}

function shouldShowPatrolTurnUi() {
  return G?.phase === 'patrol' && Array.isArray(G?.patrols) && G.patrols.length > 0;
}

const TURN_HANDOFF_CUE_STATE = {
  lastKey: '',
  hideTimeoutId: null,
  pulseTimeoutId: null,
};

function syncTurnHandoffCue() {
  const banner = el('turn-handoff-banner');
  const portrait = el('turn-portrait-card');
  const ownerState = getTurnOwnerOverlayState();
  const shouldShow = G?.phase === 'gnome' && !ownerState.active && !isInterruptActive() && Number.isInteger(G?.currentGnomeIdx);
  const cueKey = shouldShow ? `gnome:${G.currentGnomeIdx}` : '';
  const clearGlow = () => document.querySelectorAll('.turn-handoff-glow').forEach(node => node.classList.remove('turn-handoff-glow'));
  if (!shouldShow) {
    if (banner) banner.classList.remove('show');
    clearGlow();
    if (!G || G.phase !== 'gnome') TURN_HANDOFF_CUE_STATE.lastKey = '';
    return;
  }
  if (TURN_HANDOFF_CUE_STATE.lastKey === cueKey) return;
  TURN_HANDOFF_CUE_STATE.lastKey = cueKey;
  const gnome = G.gnomes?.[G.currentGnomeIdx];
  if (!gnome) return;
  const activeCard = document.querySelector(`.gnome-card[data-gnome-idx="${G.currentGnomeIdx}"]`);
  document.body.style.setProperty('--turn-handoff-accent', gnome.color || 'var(--color-text-strong)');
  if (banner) {
    banner.textContent = `${gnome.emoji || '🧝'} ${gnome.name}'s Turn`;
    banner.classList.remove('show');
    void banner.offsetWidth;
    banner.classList.add('show');
  }
  clearGlow();
  [portrait, activeCard].filter(Boolean).forEach(node => {
    node.classList.remove('turn-handoff-glow');
    void node.offsetWidth;
    node.classList.add('turn-handoff-glow');
  });
  if (TURN_HANDOFF_CUE_STATE.hideTimeoutId) clearTimeout(TURN_HANDOFF_CUE_STATE.hideTimeoutId);
  if (TURN_HANDOFF_CUE_STATE.pulseTimeoutId) clearTimeout(TURN_HANDOFF_CUE_STATE.pulseTimeoutId);
  TURN_HANDOFF_CUE_STATE.hideTimeoutId = setTimeout(() => { if (banner) banner.classList.remove('show'); }, 950);
  TURN_HANDOFF_CUE_STATE.pulseTimeoutId = setTimeout(() => clearGlow(), 900);
}

function getTurnOwnerOverlayState() {
  if (!G || G.gameEnded || isInterruptActive()) return { active: false };
  if (shouldShowPatrolTurnUi()) {
    return {
      active: true,
      theme: 'patrol',
      color: '#d64545',
      label: '🚨 Patrol Turn',
      detail: 'Hands off — patrols are acting now.'
    };
  }
  const mpState = getMultiplayerTurnOwnerState();
  if (G.phase === 'gnome' && mpState?.isRemoteTurn && Number.isInteger(mpState.currentGnomeIdx)) {
    const gnome = G.gnomes?.[mpState.currentGnomeIdx] || null;
    const ownerLabel = mpState.remoteOwnerLabel || 'Other Player';
    const gnomeName = gnome?.name || mpState.currentGnomeName || 'Active Gnome';
    return {
      active: true,
      theme: 'remote',
      color: gnome?.color || mpState.currentGnomeColor || '#8d63c7',
      label: `${gnome?.emoji || '🎩'} ${ownerLabel} — ${gnomeName}'s Turn`,
      detail: 'Not your turn.'
    };
  }
  return { active: false };
}

function syncTurnOwnerUi() {
  const overlay = el('turn-owner-overlay');
  const banner = el('turn-owner-banner');
  const state = getTurnOwnerOverlayState();
  document.body.classList.toggle('turn-owner-overlay-active', !!state.active);
  document.body.classList.toggle('turn-owner-overlay-patrol', state.theme === 'patrol');
  document.body.classList.toggle('turn-owner-overlay-remote', state.theme === 'remote');
  if (state.theme === 'remote' && state.color) document.body.style.setProperty('--turn-owner-remote-color', state.color);
  else document.body.style.removeProperty('--turn-owner-remote-color');
  if (state.color) document.body.style.setProperty('--turn-owner-accent', state.color);
  else document.body.style.removeProperty('--turn-owner-accent');
  if (overlay) {
    overlay.classList.toggle('show', !!state.active);
    overlay.setAttribute('aria-hidden', state.active ? 'false' : 'true');
  }
  if (banner) {
    banner.classList.toggle('show', !!state.active);
    banner.textContent = state.label || '';
    banner.title = state.detail || '';
  }
}

const ACTOR_STATUS_LIBRARY = Object.freeze({
  sticky: {
    key: 'sticky', emoji: '🫟', label: 'Sticky', tokenRing: true, appliesTo: ['gnome', 'patrol'],
    test: actor => !!actor?.stickyBlocked,
  },
  frozen: {
    key: 'frozen', emoji: '❄️', label: 'Frozen', tokenRing: true, appliesTo: ['gnome', 'patrol'],
    test: actor => !!actor?.frozen || !!actor?.frozenBlocked || Number(actor?.frozenTurns || 0) > 0,
  },
  revealed: {
    key: 'revealed', emoji: '💡', label: 'Revealed', tokenRing: true, appliesTo: ['gnome'],
    test: actor => !!G?.lightsOn || !!actor?.thiefCowlRevealUntilTurnStart,
  },
  hidden: {
    key: 'hidden', emoji: '🫣', label: 'Hidden', tokenRing: true, appliesTo: ['gnome'],
    test: actor => !!actor?.hidden,
  },
  distract: {
    key: 'distract', emoji: '🤢', label: 'Stinky', tokenRing: true, appliesTo: ['gnome'],
    test: actor => !!actor?.distractActive,
  },
  ko: {
    key: 'ko', emoji: '💀', label: 'KO', tokenRing: false, appliesTo: ['gnome', 'patrol'],
    test: actor => !!actor?.ko,
  },
});

function getActorStatusDescriptors(actor, actorKind = 'gnome') {
  if (!actor) return [];
  return Object.values(ACTOR_STATUS_LIBRARY).filter(meta => meta.appliesTo.includes(actorKind) && meta.test(actor));
}

function getActorTokenRingStatus(actor, actorKind = 'gnome', { active = false, ko = false } = {}) {
  if (ko) return null;
  const ringMeta = getActorStatusDescriptors(actor, actorKind).find(meta => meta.tokenRing);
  return ringMeta?.key || (active ? 'active' : null);
}

function buildActorStatusStack(actor, actorKind = 'gnome', options = {}) {
  const descriptors = getActorStatusDescriptors(actor, actorKind);
  if (!descriptors.length) return null;
  const {
    containerTag = 'span',
    containerClass = 'gnome-status-stack',
    badgeTag = 'span',
    badgeClass = 'gnome-status-badge',
    includeLabel = false,
  } = options;
  const container = createElement(containerTag, { className: containerClass });
  descriptors.forEach(descriptor => {
    const badge = createElement(badgeTag, {
      className: `${badgeClass} ${descriptor.key}`,
      text: includeLabel ? `${descriptor.emoji} ${descriptor.label}` : descriptor.emoji,
      attrs: { title: descriptor.label }
    });
    container.appendChild(badge);
  });
  return container;
}

function getActorCardStatusDescriptors(actor, actorKind = 'gnome') {

function buildActorPortraitStatusOverlay(actor, actorKind = 'gnome', options = {}) {

function hasWeaverTradeResources(gnome = G?.gnomes?.[G?.currentGnomeIdx]) {
  return (G?.SocksBanked >= 1) || !!(gnome && Array.isArray(gnome.satchel) && gnome.satchel.some(item => item && (item.type === 'Socks' || item.type === 'goodie')));
}

function canOpenWeaverNow(gnome = G?.gnomes?.[G?.currentGnomeIdx], options = {}) {
  if (!gnome || G.phase !== 'gnome' || gnome.ko) return false;
  const tile = G.grid?.[gnome.row]?.[gnome.col];
  const inWeaver = !!(tile?.weaver || tile?.roomId === 1);
  if (!inWeaver) return false;
  if (!options.ignoreActionCost && G.actionsLeft <= 0) return false;
  return hasWeaverTradeResources(gnome);
}

function createStickyRoomOverlay(stickyKey) {
  const overlay = createElement('div', { className: 'sticky-room-overlay', attrs: { 'data-sticky-key': stickyKey } });
  const blobDefs = [
    { cls: 'blob-a', left: '26%', top: '28%', scale: 1.1, rot: '-10deg' },
    { cls: 'blob-b', left: '64%', top: '30%', scale: 0.84, rot: '14deg' },
    { cls: 'blob-c', left: '46%', top: '60%', scale: 1.26, rot: '8deg' },
    { cls: 'blob-d', left: '72%', top: '68%', scale: 0.78, rot: '-18deg' },
    { cls: 'blob-e', left: '18%', top: '68%', scale: 0.62, rot: '18deg' },
  ];
  blobDefs.forEach((blob, idx) => {
    const node = createElement('span', { className: `sticky-room-blob ${blob.cls}` });
    node.style.cssText = `left:${blob.left};top:${blob.top};transform:translate(-50%,-50%) scale(${blob.scale}) rotate(${blob.rot});--sticky-rot:${blob.rot};animation-delay:${(idx * 120)}ms;`;
    overlay.appendChild(node);
  });
  return overlay;
}

function getRoomFeatureVisualClass(enabled = null) {
  if (enabled === 'identity' || enabled === 'static') return 'room-feature-static';
  if (enabled === null || enabled === undefined) return 'room-feature-static';
  return enabled ? 'room-feature-live' : 'room-feature-disabled';
}

function getCurrentTurnGnome() {
  return G?.gnomes?.[G?.currentGnomeIdx] || null;
}

function getRoomActionAffordanceState(kind, tile, r, c) {
  const activeGnome = getCurrentTurnGnome();
  const phaseIsGnome = G?.phase === 'gnome';
  const inRoom = !!(phaseIsGnome && activeGnome && !activeGnome.ko && activeGnome.row === r && activeGnome.col === c);
  switch (kind) {
    case 'hide':
      return {
        enabled: !G?.lightsOn,
        title: G?.lightsOn ? '💡 Lights On! Cannot hide this turn.' : UI_TEXT.action.hide,
      };
    case 'weaver':
      return {
        enabled: inRoom && canOpenWeaverNow(activeGnome),
        title: inRoom && !canOpenWeaverNow(activeGnome)
          ? '🧌 Need trade goods or a banked Sock to trade with the Weaver.'
          : UI_TEXT.action.weaver,
      };
    case 'vent': {
      const ventDestinations = activeGnome ? getVentDestinations(activeGnome) : [];
      const canUseVent = inRoom && phaseIsGnome && activeGnome && !activeGnome.ko && G.actionsLeft > 0 && ventDestinations.length > 0;
      return {
        enabled: canUseVent,
        visualState: 'identity',
        title: ventDestinations.length > 0
          ? UI_TEXT.action.vent
          : '♨️ Vent room — reveal another vent room before traveling through vents.',
      };
    }
    case 'chute':
      return {
        enabled: inRoom && !!activeGnome?.satchel?.some?.(s => s?.type === 'Socks'),
        title: UI_TEXT.action.deposit,
      };
    default:
      return { enabled: null, title: '' };
  }
}

function getRoomRevealMarker(tile) {
  if (!tile) return null;
  if (tile.special && ['dad','kid','dog','roomba'].includes(tile.special)) {
    return { emoji:'🚨', title:'Patrol room — only appears from Patrol effects', className: cx('is-patrol', getRoomFeatureVisualClass(true)) };
  }
  if (tile.event) {
    const key = `${tile.row},${tile.col}`;
    const activeGnome = getCurrentTurnGnome();
    const roomSeenThisTurn = !!activeGnome?.eventRoomEntryKeysThisTurn?.has?.(key);
    const canTrigger = !!(G.phase === 'gnome'
      && activeGnome && !activeGnome.ko
      && isEventTriggerEnabled('eventRoom')
      && !roomSeenThisTurn
      && !activeGnome.eventDrawnThisTurn);
    return canTrigger
      ? { emoji:'⁉️', title:'Event room — entering now will trigger an Event', className: cx('is-event-live', getRoomFeatureVisualClass(true)) }
      : { emoji:'⁉️', title:'Event room — will not trigger right now', className: cx('is-event-spent', getRoomFeatureVisualClass(false)) };
  }
  return null;
}

function buildBoardActorToken({
  rootClass,
  title,
  emoji,
  sticky = false,
  hidden = false,
  active = false,
  ko = false,
  ringStatus = null,
  artClass = 'actor-art',
  artStyle = '',
  tokenStyle = '',
  onClick = null,
  direction = null,
  dataset = null,
}) {
  const token = document.createElement('span');
  token.className = cx(rootClass, 'actor-token', 'token-pop', { 'token-ko': !!ko, 'token-active': !!active });
  token.title = title || '';
  if (tokenStyle) token.style.cssText = tokenStyle;
  if (dataset) {
    Object.entries(dataset).forEach(([key, value]) => {
      if (value !== undefined && value !== null) token.dataset[key] = String(value);
    });
  }

  const art = document.createElement('span');
  art.className = artClass;
  if (artStyle) art.style.cssText = artStyle;
  art.textContent = emoji;
  token.appendChild(art);

  const resolvedRingStatus = ko ? null : (ringStatus || (sticky ? 'sticky' : hidden ? 'hidden' : active ? 'active' : null));
  if (resolvedRingStatus) {
    const ring = document.createElement('span');
    ring.className = `token-status-ring status-${resolvedRingStatus}`;
    token.appendChild(ring);
  }

  if (direction) {
    const dot = document.createElement('span');
    dot.className = `patrol-facing-dot ${direction}`;
    token.appendChild(dot);
  }

  if (typeof onClick === 'function') token.onclick = onClick;
  return token;
}

  if (!p) return false;
  const destinations = getConnectedRooms(p.row, p.col);

function getBoardDoorTitle(doorClick) {
  if (!doorClick) return '';
  const [dr,dc] = DIR_DELTA[doorClick.dir];
  const nr = doorClick.fromR + dr, nc = doorClick.fromC + dc;
  const destTile = G.grid[nr]?.[nc];
  const addsTrouble = G.tilesRevealed > getFreeTiles();
  return destTile ? UI_TEXT.action.moveHere : UI_TEXT.reveal(addsTrouble);
}

function buildBoardRenderState() {
  const gnome = G.gnomes[G.currentGnomeIdx];
  const isPanic = isPanicInterruptActive();
  const isMindControlDest = G.eventMode?.kind === 'mindControlSelectDest';
  const isThirdEye = G.eventMode?.kind === 'thirdEye';
  const canMove = isPanic
    ? (gnome && !gnome.ko)
    : ((!isMindControlDest && G.selectedAction==='move') && gnome && canSpendMove(gnome));
  const moveTargets = isMindControlDest
    ? new Set((G.eventMode?.destinations || []).map(([r,c]) => getCellKey(r, c)))
    : (canMove
      ? new Set(getConnectedRooms(gnome.row, gnome.col).map(([r,c]) => getCellKey(r, c)))
      : new Set());
  const revealable = isThirdEye
    ? (G.eventMode?.options || []).map(opt => [opt.targetR, opt.targetC, opt.fromDir])
    : (!isPanic && G.selectedAction==='move' && gnome && !gnome.stickyBlocked
      ? getRevealableFrom(gnome.row, gnome.col)
      : []);
  return {
    gnome,
    revealable,
    revealSet: new Set(revealable.map(([r,c]) => getCellKey(r, c))),
    moveTargets,
  };
}

      cell.classList.add('shroom-target');
