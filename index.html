function doMove(gnome, r, c) {
  const costType = useMoveCost(gnome);
  if (costType === 'none') return;
  moveGnomeTo(gnome, r, c);
}

function removeStickyForActiveGnome() {
  const { gnome } = createActiveGnomeRuleContext();
  if (!gnome || G.phase !== 'gnome' || gnome.ko || !gnome.stickyBlocked || G.actionsLeft <= 0) return false;
  clearStickyStateForActor(gnome);
  addLog(`🫟 ${gnome.name} spends 1 action to remove Sticky.`, 'good');
  return finalizeGnomeRuleAction();
}

function moveGnomeTo(gnome, r, c, isScurry=false) {
  if (G.dynamiteMode) disarmDynamite({ restoreInventory: true, render: false });
  if (G.shroomMode) disarmRoomRotateMode({ restoreInventory: true, render: false });
  const fromKey = `${gnome.row},${gnome.col}`;
  const toKey = `${r},${c}`;
  const tile = G.grid[r][c];
  AUDIO_MANAGER.beginMove('gnome', { gnome, toR: r, toC: c, isScurry, suppressMoveSound: !!tile?.sticky });
  gnome.row = r; gnome.col = c;
  gnome.hidden = false;
  gnome.cowlHiddenActive = false;
  syncPassiveHiddenForGnome(gnome);
  const def = ROOM_DEFS[tile.roomId];
  addLog(`${gnome.name} → ${def.name}`);
  maybeApplyLooseSatchelOnMove(gnome);

  // Sticky: state change is immediate; splat animation is a SEQ step
  if (tile.sticky) {
    GAME_EVENTS.emit('sticky.triggered', { gnome, r, c });
    addLog(`🫟 Sticky floor! ${gnome.name} must spend 1 action to remove Sticky before moving again.`, 'bad');
    gnome.stickyBlocked = true;
    gnome.stickyCell = `${r},${c}`;
    G.selectedAction = null;
    if (!G.stickyAnimated.has(`${r},${c}`)) {
      G.stickyAnimated.add(`${r},${c}`);
      queueStickyTriggerAnimation(r, c, 900);
    }
  }

  // Creaky: board anim fires THEN trouble (card THEN effect) — all via SEQ
  if (tile.creaky && gnome.satchel.some(s=>s?.type==='Socks')) {
    GAME_EVENTS.emit('creaky.triggered', { gnome, r, c });
    addLog(`📢 Creaky floor! ${gnome.name} carries socks → +1 Trouble`,'bad');
    SEQ.push(
      {t:'boardAnim', r, c, css:'creaky-crack-anim', ms:900},
      {t:'effect', fn:() => addTrouble(1, 'Creaky room')}
    );
  }

  // Chute: notify gnome they can deposit via Drop button
  if (tile.chute && gnome.satchel.some(s=>s?.type==='Socks')) {
    addLog(`🕳️ Chute room! Use ${UI_TEXT.action.deposit} to bank Socks here.`, 'good');
  }

  if (fromKey !== toKey) triggerEventRoomEntryForGnome(gnome.id, r, c);

  updateAllPatrolNextDirs();
}

function doReveal(gnome, r, c, fromDir) {
  const costType = useMoveCost(gnome);
  if (costType === 'none') return;

  const roomId = drawConnectingRoom(fromDir);
  if (!roomId) { addLog('No compatible room available!', 'bad'); return; }

  const previewDef = ROOM_DEFS[roomId] || {};
  AUDIO_MANAGER.planMove('gnome', {
    toR: r,
    toC: c,
    suppressMoveSound: !!previewDef.sticky,
    reason: previewDef.sticky ? 'reveal-entry-sticky' : 'reveal-entry'
  });

  const tile = placeRevealedTile(roomId, r, c, fromDir);
  return finalizeRevealResolution(gnome, tile, r, c, roomId, {
    logMessage: `🗺️ Revealed: ${ROOM_DEFS[roomId].name}!`,
    moveGnome: true,
    triggerFirstRevealRound: true,
    clearSelectedAction: true
  });
}

// Returns walls the current gnome can blast with dynamite.
// Includes walls facing discovered rooms (no door yet) AND undiscovered cells.
function getBlastableWalls() {
  return getDynamiteTargets();
}

// Rotate a set of door directions 90° clockwise n times
function rotateDirs(dirs, times) {
  const CW = {N:'E', E:'S', S:'W', W:'N'};
  let result = [...dirs];
  for (let t=0; t<times; t++) result = result.map(d=>CW[d]);
  return result;
}

function pruneUnmatchedNeighborDoor(tile, dir) {
  if (!tile || !DIR_DELTA[dir]) return;
  const [dr, dc] = DIR_DELTA[dir];
  const neighbor = G.grid[tile.row + dr]?.[tile.col + dc];
  if (!neighbor) return;
  const opp = OPPOSITE[dir];
  const neighborBase = getBaseDoorDirs(neighbor);
  const neighborForced = getForcedDoorDirs(neighbor);
  if (!getManualDoorDirs(neighbor).includes(opp)) return;
  if (neighborBase.includes(opp) || neighborForced.includes(opp)) return;
  neighbor.manualDoorDirs = getManualDoorDirs(neighbor).filter(d => d !== opp);
  normalizeTileDoorState(neighbor);
}

function getShroomPreviewDoorDirs(tile, rotationOverride = null) {
  if (!tile) return [];
  const currentRot = tile.rotationOffset || 0;
  const nextRot = rotationOverride ?? currentRot;
  const delta = (nextRot - currentRot + 4) % 4;
  return delta ? rotateDirs(getTileDoors(tile), delta) : getTileDoors(tile);
}

function confirmRoomRotate() {
  if (!G.shroomPreview) { addLog('No rotation selected — click a room first.','bad'); return; }
  const mode = G.shroomMode || {};
  const sourceName = mode.sourceName || 'Shroom';
  const sourceEmoji = mode.sourceEmoji || '🍄';
  const {r, c, rotation} = G.shroomPreview;
  const tile = G.grid[r][c];
  if (!tile) return;
  if (!shroomRotationMaintainsConnection(r, c, rotation)) {
    const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    showGameTooltip('Confirm only works while this room connects to a matching door on an adjacent placed room.', cell);
    return;
  }

  const prevRot = tile.rotationOffset || 0;
  const nextRot = rotation % 4;
  const delta = (nextRot - prevRot + 4) % 4;
  const rotatedVisibleDirs = getShroomPreviewDoorDirs(tile, nextRot);
  const rotatedPendingDirs = rotateDirs(getForcedDoorDirs(tile), delta).filter(dir => {
    const [dr, dc] = DIR_DELTA[dir];
    return !G.grid[r + dr]?.[c + dc];
  });

  tile.rotationOffset = nextRot;
  const nextBaseDirs = getBaseDoorDirs(tile, nextRot);
  tile.manualDoorDirs = rotatedVisibleDirs.filter(dir => !nextBaseDirs.includes(dir));
  tile.pendingDoorDirs = rotatedPendingDirs;
  normalizeTileDoorState(tile);

  if (!mode.committed) {
    const sourceSlotIdx = mode.sourceSlotIdx;
    const sourceActorIdx = mode.sourceActorIdx ?? G.currentGnomeIdx;
    if (typeof sourceSlotIdx === 'number' && sourceSlotIdx >= 0 && mode.returnGoodieId) {
      const actor = G.gnomes[sourceActorIdx];
      if (actor && actor.satchel[sourceSlotIdx]?.type === 'goodie' && actor.satchel[sourceSlotIdx]?.id === mode.returnGoodieId) actor.satchel[sourceSlotIdx] = null;
    }
    spendAction();
    G.shroomMode.committed = true;
  }
  GAME_EVENTS.emit('shroom.rotate');
  addLog(`${sourceEmoji} ${sourceName} applied — ${ROOM_DEFS[tile.roomId].name} rotated to ${rotation*90}°!`, 'good');
  G.shroomMode = false;
  G.shroomPreview = null;
  renderAll();
}

function getRoomRotateTargets() {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome) return [];
  const targets = [[gnome.row, gnome.col]];
  for (const [,[dr,dc]] of Object.entries(DIR_DELTA)) {
    const nr=gnome.row+dr, nc=gnome.col+dc;
    if (nr>=0&&nr<G.GRID&&nc>=0&&nc<G.GRID&&G.grid[nr][nc]) targets.push([nr,nc]);
  }
  return targets;
}

function createActiveGnomeRuleContext() {
  const actorIdx = G.currentGnomeIdx;
  const gnome = G.gnomes[actorIdx] || null;
  const tile = gnome ? (G.grid[gnome.row]?.[gnome.col] || null) : null;
  return { actorIdx, gnome, tile };
}

function finalizeGnomeRuleAction({ clearSelectedAction = true, spend = true, render = true, sfx = null } = {}) {
  if (sfx) playSfx(sfx);
  if (spend) spendAction();
  if (clearSelectedAction) G.selectedAction = null;
  if (render) renderAll();
  return true;
}

function buildPickupButtonOption(labelOrConfig, action, cls = 'good') {
  const config = typeof labelOrConfig === 'object' && labelOrConfig !== null
    ? { ...labelOrConfig }
    : { label: labelOrConfig, cls };
  return {
    ...config,
    cls: config.cls || cls,
    action: () => { closeModal(); action(); }
  };
}

function presentChoiceOrRunDirectly(title, body, buttons = [], options = {}) {
  const actionable = buttons.filter(btn => btn?.cls !== 'cancel');
  if (buttons.length === 2 && actionable.length === 1) {
    actionable[0].action();
    return true;
  }
  showModal(title, body, buttons, options);
  return false;
}

function getPickupStateForTile(tile) {
  return {
    hasSocks: !!(tile?.Socks > 0),
    hasGoodies: !!(tile?.goodieIds?.length > 0),
    hasHats: !!(tile?.hatIds?.length > 0),
  };
}

function commitPickupIntoSatchel(gnome, slotIdx, item, { logMessage = '', eventDetail = null } = {}) {
  gnome.satchel[slotIdx] = item;
  if (eventDetail) GAME_EVENTS.emit('item.pickedUp', eventDetail);
  if (logMessage) addLog(logMessage, 'good');
  return finalizeGnomeRuleAction();
}

function moveKickablePatrolToRoom(patrol, dr, dc, destName) {
  const kicker = G.gnomes[G.currentGnomeIdx];
  const srcTile = G.grid[patrol.row]?.[patrol.col];
  if (srcTile) dropPatrolCarriedSocks(patrol, srcTile, { reason: 'kick' });
  patrol.row = dr;
  patrol.col = dc;
  GAME_EVENTS.emit('kick.executed', { itemType: patrol?.type || 'patrol' });
  addLog(`${kicker.name} kicks ${capitalize(patrol.type)} into ${destName}!`, 'good');
  const destTile = G.grid[dr][dc];
  if (destTile) applyPatrolRoomEntryEffects(patrol, destTile);
  if (destTile?.sticky) {
    if (isPatrolStickyImmune(patrol)) {
      patrol.stickyBlocked = false;
      patrol.stickyCell = null;
    } else {
      patrol.stickyBlocked = true;
      patrol.stickyCell = `${dr},${dc}`;
      addLog(`${capitalize(patrol.type)} lands in sticky room!`, 'patrol');
    }
  }
  checkPatrolCatch(patrol);
}

function finalizeKickExecution() {
  G.kickMode = null;
  G.selectedAction = null;
  return finalizeGnomeRuleAction({ clearSelectedAction: false, sfx: 'kick' });
}

function getRevealPlacementScore(tile, r, c, rotation, mandatoryEntry = null) {
  const dirs = getBaseDoorDirs(tile, rotation);
  if (mandatoryEntry && !dirs.includes(mandatoryEntry) && !roomCanProvideDoor(tile.roomId, mandatoryEntry)) return null;
  let score = 0;
  if (mandatoryEntry && dirs.includes(mandatoryEntry)) score += 100;
  for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
    const nr = r + dr, nc = c + dc;
    const nb = G.grid[nr]?.[nc];
    if (!nb) continue;
    const opp = OPPOSITE[dir];
    if (dirs.includes(dir) && tileHasDoor(nb, opp, { includeForced: true })) score += 10;
    if (getForcedDoorDirs(nb).includes(opp)) score += 25;
  }
  return score;
}

function chooseBestRevealRotation(tile, r, c, mandatoryEntry = null) {
  let bestRot = tile.rotationOffset || 0;
  let bestScore = -Infinity;
  for (let rot = 0; rot < 4; rot++) {
    const score = getRevealPlacementScore(tile, r, c, rot, mandatoryEntry);
    if (score != null && score > bestScore) {
      bestScore = score;
      bestRot = rot;
    }
  }
  return bestRot;
}

function connectRevealedTileToNeighbors(tile, r, c) {
  for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
    const nr = r + dr, nc = c + dc;
    const nb = G.grid[nr]?.[nc];
    if (!nb) continue;
    const opp = OPPOSITE[dir];
    if (getForcedDoorDirs(nb).includes(opp)) {
      connectTilesWithDoor(tile, nb, dir);
    } else if (tileHasDoor(tile, dir) && tileHasDoor(nb, opp)) {
      connectTilesWithDoor(tile, nb, dir);
    }
  }
}

function placeRevealedTile(roomId, r, c, fromDir = null) {
  const tile = createRoomTile(roomId, r, c);
  G.grid[r][c] = tile;
  const mandatoryEntry = fromDir ? OPPOSITE[fromDir] : null;
  tile.rotationOffset = chooseBestRevealRotation(tile, r, c, mandatoryEntry);
  normalizeTileDoorState(tile);
  if (mandatoryEntry && !tileHasDoor(tile, mandatoryEntry)) addManualDoor(tile, mandatoryEntry);
  connectRevealedTileToNeighbors(tile, r, c);
  reconcileDoorConnections();
  return tile;
}

function finalizeRevealResolution(gnome, tile, r, c, roomId, options = {}) {
  const {
    logMessage = `🗺️ Revealed: ${ROOM_DEFS[roomId].name}!`,
    logClass = 'good',
    moveGnome = false,
    triggerFirstRevealRound = false,
    clearSelectedAction = false,
    render = true,
  } = options;

  G.tilesRevealed++;
  SEQ.push({ t: 'effect', fn: () => GAME_EVENTS.emit('tile.created', { r, c, roomId }) });
  addLog(logMessage, logClass);

  if (moveGnome && gnome) {
    moveGnomeTo(gnome, r, c);
  }

  const extra = G.tilesRevealed - getFreeTiles() - 1;
  if (extra > 0) {
    addLog(`🏠 Extra tile → +1 Trouble`, 'bad');
    addTrouble(1, 'Extra tile reveal');
  }

  if (triggerFirstRevealRound && gnome) {
    triggerFirstRevealRoundEvent(G.currentGnomeIdx, r, c);
  }

  if (isHouseFullyEnclosed()) {
    addLog(`💥 Fully enclosed house! ${ROOM_DEFS[tile.roomId].name} instantly triggers an automatic Explosion Event.`, 'good');
    GAME_EVENTS.emit('dynamite.blast');
    applyEvent({ effect: 'explosion' }, r, c);
  }

  if (clearSelectedAction) {
    G.selectedAction = null;
  }
  if (render) {
    renderAll();
  }
  return true;
}

function blastWall(dir, nr, nc) {
  const { gnome, tile: myTile } = createActiveGnomeRuleContext();
  if (!gnome || !myTile || !G.dynamiteMode || !DIR_DELTA[dir]) return false;

  const [dr, dc] = DIR_DELTA[dir];
  const targetR = gnome.row + dr, targetC = gnome.col + dc;
  if (targetR !== nr || targetC !== nc) return false;

  openDoorFromTile(myTile, dir);
  reconcileDoorConnections();

  const neighbor = G.grid[targetR]?.[targetC] || null;
  if (neighbor) addLog(`💥 Dynamite blasts a door ${dir} into ${ROOM_DEFS[neighbor.roomId].name}!`, 'good');
  else addLog(`💥 Dynamite blasts a door ${dir} into the unknown!`, 'good');

  GAME_EVENTS.emit('dynamite.blast');
  disarmDynamite({ restoreInventory: false, render: false });
  finalizeGnomeRuleAction();
  return true;
}

function pickupInCurrentRoom() {
  const { gnome, tile } = createActiveGnomeRuleContext();
  if (G.phase !== 'gnome' || G.actionsLeft <= 0 || !gnome || gnome.ko || !tile) return;

  const free = findFirstFreeSatchelSlot(gnome);
  if (free === -1) { addLog(`${gnome.name}'s satchel is full!`, 'bad'); return; }

  const { hasSocks, hasGoodies, hasHats } = getPickupStateForTile(tile);
  if (!hasSocks && !hasGoodies && !hasHats) { addLog('Nothing to pick up here!', 'bad'); return; }

  const pickSocks = () => {
    tile.Socks--;
    return commitPickupIntoSatchel(gnome, free, { type: 'Socks' }, {
      logMessage: `${gnome.name} picked up 🧦 Socks.`,
      eventDetail: { itemType: 'Socks' },
    });
  };

  const pickGoodie = idx => {
    const gid = tile.goodieIds.splice(idx, 1)[0];
    const gdef = GOODIES_DEFS.find(d => d.id === gid);
    return commitPickupIntoSatchel(gnome, free, { type: 'goodie', id: gid }, {
      logMessage: `${gnome.name} picked up ${getGoodieLabel(gid)}.`,
      eventDetail: { itemType: 'goodie', id: gid },
    });
  };

  const pickHat = idx => {
    const hid = tile.hatIds.splice(idx, 1)[0];
    const hdef = HAT_DEF_BY_ID[hid];
    const result = giveHatToGnome(gnome, hid);
    GAME_EVENTS.emit('item.pickedUp', { itemType: 'hat', id: hid });
    addLog(result === 'equipped'
      ? `${gnome.name} picked up and equipped ${hdef?.name || 'Hat'}!`
      : `${gnome.name} picked up ${hdef?.name || 'Hat'}.`, 'good');
    return finalizeGnomeRuleAction();
  };

  const buttons = [];
  if (hasSocks) buttons.push(buildPickupButtonOption({ icon: '🧦', title: 'Socks', meta: 'Pick up and stash them.' }, pickSocks));
  if (hasGoodies) {
    tile.goodieIds.forEach((gid, idx) => {
      const gdef = GOODIES_DEFS.find(d => d.id === gid);
      buttons.push(buildPickupButtonOption({
        icon: getGoodieEmoji(gid),
        title: getGoodieName(gid),
        meta: getGoodieDesc(gid, 'Pick up this goodie.'),
      }, () => pickGoodie(idx)));
    });
  }
  if (hasHats) {
    tile.hatIds.forEach((hid, idx) => {
      const hdef = HAT_DEF_BY_ID[hid];
      buttons.push(buildPickupButtonOption({
        icon: hdef?.emoji || '🎩',
        title: hdef?.name || 'Hat',
        meta: hdef?.desc || 'Pick up this hat.',
      }, () => pickHat(idx)));
    });
  }
  buttons.push({ label: 'Cancel', cls: 'cancel', action: closeModal });

  presentChoiceOrRunDirectly('🤏 Pick Up', '', buttons, { variant: 'choice-tray' });
}

function doHide() {
  const { gnome } = createActiveGnomeRuleContext();
  if (G.phase !== 'gnome' || G.actionsLeft <= 0 || !gnome || gnome.ko) return;
  if (G.lightsOn) { addLog('💡 Lights On! Cannot hide this turn.', 'bad'); return; }
  if (!isInHidingRoom(gnome)) { addLog('No hiding spot here!', 'bad'); return; }

  const commitHide = () => {
    if (gnome.distractActive) clearDistractState({ reason: ' because they hid.', log: true });
    gnome.hidden = true;
    addLog(`${gnome.name} hides! 🫣`, 'good');
    finalizeGnomeRuleAction();
  };

  if (gnome.distractActive) { confirmHideCancelsDistract(gnome, commitHide); return; }
  commitHide();
}

function buildKickTarget(label, emoji, type, ref) {
  return { label, emoji, type, ref };
}

function getKickTargetsForGnome(kicker = G.gnomes[G.currentGnomeIdx]) {
  if (!kicker) return [];
  const targets = [];
  G.gnomes.forEach((g, i) => {
    if (i === G.currentGnomeIdx) return;
    if (g.row !== kicker.row || g.col !== kicker.col) return;
    targets.push(buildKickTarget(`${g.emoji} ${g.name}${g.ko?' (KO)':''}`, g.emoji, 'gnome', g));
  });
  G.patrols.forEach(p => {
    if (p.row !== kicker.row || p.col !== kicker.col) return;
    const em = patrolEmoji(p.type);
    targets.push(buildKickTarget(`${em} ${capitalize(p.type)} patrol`, em, 'patrol', p));
  });
  const kickTile = G.grid[kicker.row]?.[kicker.col];
  if (kickTile?.Socks > 0) {
    targets.push(buildKickTarget('🧦 Socks', '🧦', 'Socks', kickTile));
  }
  if (kickTile?.goodieIds?.length > 0) {
    kickTile.goodieIds.forEach((gid, idx) => {
      const gdef = GOODIES_DEFS.find(d=>d.id===gid);
      targets.push(buildKickTarget(getGoodieLabel(gid), getGoodieEmoji(gid), 'goodie', { tile: kickTile, idx }));
    });
  }
  if (kickTile?.hatIds?.length > 0) {
    kickTile.hatIds.forEach((hid, idx) => {
      const hdef = HATS_DEFS.find(d=>d.id===hid);
      targets.push(buildKickTarget(`${hdef?.emoji||'🎩'} ${hdef?.name||'Hat'}`, hdef?.emoji||'🎩', 'hat', { tile: kickTile, idx }));
    });
  }
  if (kickTile?.mothEggs) {
    targets.push(buildKickTarget('🥚 Moth Eggs', '🥚', 'moth_eggs', kickTile));
  }
  return targets;
}

function getStraightLineKickDestinationsForGnome(kicker = G.gnomes[G.currentGnomeIdx]) {
  if (!kicker) return [];
  const result = [];
  for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
    let cr = kicker.row;
    let cc = kicker.col;
    let current = G.grid[cr]?.[cc];
    while (current) {
      const nr = cr + dr;
      const nc = cc + dc;
      const next = G.grid[nr]?.[nc];
      if (!next || !tilesConnected(current, next)) break;
      result.push([nr, nc]);
      cr = nr;
      cc = nc;
      current = next;
    }
  }
  return result;
}

function getKickDestinationsForGnome(kicker = G.gnomes[G.currentGnomeIdx]) {
  if (!kicker) return [];
  return isBandanaActive(kicker)
    ? getStraightLineKickDestinationsForGnome(kicker)
    : getConnectedRooms(kicker.row, kicker.col);
}


function executeKickDestroyMothEggs(target) {
  const kicker = G.gnomes[G.currentGnomeIdx];
  const tile = target?.ref;
  if (!kicker || !tile?.mothEggs) return false;
  tile.mothEggs = false;
  G.kickMode = null;
  G.selectedAction = null;
  GAME_EVENTS.emit('kick.executed', { itemType: 'moth_eggs' });
  addLog(`${kicker.name} kicks and destroys the Moth Eggs in ${getRoomName(kicker.row, kicker.col)}!`, 'good');
  playSfx('kick');
  spendAction();
  renderAll();
  return true;
}

function doKick() {
  if (G.kickMode) { cancelPendingBoardAction('kick'); return; }
  const { gnome: kicker } = createActiveGnomeRuleContext();
  if (G.phase !== 'gnome' || G.actionsLeft <= 0 || !kicker || kicker.ko) return;

  const targets = getKickTargetsForGnome(kicker);
  if (!targets.length) { addLog('Nothing to kick here!', 'bad'); return; }
  const destinations = getKickDestinationsForGnome(kicker);
  if (!destinations.length) { addLog('No connected rooms to kick into!', 'bad'); return; }

  const armKickTarget = target => {
    if (target.type === 'moth_eggs') { executeKickDestroyMothEggs(target); return; }
    G.kickMode = { target, destinations };
    addLog(UI_TEXT.kickChooseRoom(target), 'system');
    renderAll();
  };

  if (targets.length === 1) {
    armKickTarget(targets[0]);
    return;
  }

  showModal('👟 Kick — Choose Target', 'Choose what to kick.',
    targets.map(target => ({
      label: target.label,
      icon: target.emoji || '👟',
      title: stripLeadingIconText(target.label),
      meta: 'Kick into an adjacent connected room.',
      cls: 'confirm',
      action: () => { closeModal(); armKickTarget(target); },
    }))
      .concat([{ label: 'Cancel', cls: 'cancel', action: closeModal }]),
    { variant: 'choice-tray' }
  );
}

function executeKick(dr, dc) {
  if (!G.kickMode) return;
  const { target } = G.kickMode;
  const destName = getRoomName(dr, dc);
  const kicker = G.gnomes[G.currentGnomeIdx];
  const destTile = G.grid[dr][dc];

  if (target.type === 'gnome') {
    target.ref.row = dr;
    target.ref.col = dc;
    GAME_EVENTS.emit('kick.executed', { itemType: 'gnome' });
    addLog(`${kicker.name} kicks ${target.ref.name} into ${destName}!`, 'good');
    if (destTile?.sticky) {
      target.ref.stickyBlocked = true;
      target.ref.stickyCell = `${dr},${dc}`;
      addLog(`🫟 ${target.ref.name} lands in sticky room!`, 'bad');
    }
  } else if (target.type === 'Socks') {
    const srcTile = target.ref;
    if (destTile && srcTile.Socks > 0) {
      srcTile.Socks--;
      destTile.Socks++;
      GAME_EVENTS.emit('kick.executed', { itemType: 'Socks' });
      addLog(`${kicker.name} kicks 🧦 Socks into ${destName}!`, 'good');
    }
  } else if (target.type === 'goodie') {
    const { tile: srcTile, idx } = target.ref;
    const gid = srcTile.goodieIds.splice(idx, 1)[0];
    const gdef = GOODIES_DEFS.find(d => d.id === gid);
    if (destTile) {
      if (!destTile.goodieIds) destTile.goodieIds = [];
      destTile.goodieIds.push(gid);
      GAME_EVENTS.emit('kick.executed', { itemType: 'goodie' });
      addLog(`${kicker.name} kicks ${getGoodieLabel(gid)} into ${destName}!`, 'good');
    }
  } else if (target.type === 'hat') {
    const { tile: srcTile, idx } = target.ref;
    const hid = srcTile.hatIds.splice(idx, 1)[0];
    const hdef = HATS_DEFS.find(d => d.id === hid);
    if (destTile) {
      if (!destTile.hatIds) destTile.hatIds = [];
      destTile.hatIds.push(hid);
      GAME_EVENTS.emit('kick.executed', { itemType: 'hat' });
      addLog(`${kicker.name} kicks ${hdef?.emoji || '🎩'} ${hdef?.name || 'Hat'} into ${destName}!`, 'good');
    }
  } else {
    moveKickablePatrolToRoom(target.ref, dr, dc, destName);
  }

  return finalizeKickExecution();
}

function depositSocks() {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome||gnome.ko||G.phase!=='gnome') return;
  const tile = G.grid[gnome.row][gnome.col];
  const socks = gnome.satchel.map((s,i)=>s?.type==='Socks'?{item:s,idx:i}:null).filter(Boolean);
  if (!socks.length) { addLog('No socks to deposit!','bad'); return; }
  socks.forEach(({idx})=>{ gnome.satchel[idx]=null; G.SocksBanked++; });
  const via = tile?.chute ? ' via chute' : '';
  const plural = socks.length > 1 ? ` ${socks.length}🧦` : ' 🧦';
  spendAction();
  GAME_EVENTS.emit('item.dropped', { itemType: 'Socks', mode: 'deposit-bulk', count: socks.length });
  addLog(`${gnome.name} deposited${plural}${via}! Total: ${G.SocksBanked}/${getHouseGoal()}`, 'good');
  checkGoalMet();
  renderAll();
}


function useGoodieFromSlot(slotIdx) {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome||gnome.ko||G.phase!=='gnome' || G.actionsLeft<=0) return;
  const item = gnome.satchel[slotIdx];
  if (!item || item.type !== 'goodie') return;
  if (!isGoodieUsable(gnome, item.id)) { addLog("That goodie can't be used here.",'bad'); return; }
  if (item.id !== 1) gnome.satchel[slotIdx] = null;
  if (item.id !== 3 && item.id !== 1) spendAction();
  applyGoodie(gnome, item.id, { slotIdx });
  renderAll();
}

function useGoodie() {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome||gnome.ko||G.phase!=='gnome' || G.actionsLeft<=0) return;
  const goodies = gnome.satchel.map((s,i)=>s?.type==='goodie'?{item:s,idx:i}:null).filter(Boolean);
  if (!goodies.length) { addLog('No goodies!','bad'); return; }
  const buttons = goodies.map(({item, idx}) => {
    const capturedItem = item;
    const capturedIdx = idx;
    const def = GOODIES_DEFS.find(g=>g.id===capturedItem.id);
    const usable = isGoodieUsable(gnome, capturedItem.id);
    return {
      label: `${def?.emoji} ${def?.name}`,
      icon: getGoodieEmoji(capturedItem.id),
      title: def?.name || 'Goodie',
      meta: usable ? (def?.desc || 'Use this goodie now.') : `${def?.desc || 'Cannot use here.'} (can't use here)`,
      cls: 'good',
      disabled: !usable,
      action: usable ? () => {
        if (capturedItem.id !== 1) gnome.satchel[capturedIdx]=null;
        if (capturedItem.id !== 3 && capturedItem.id !== 1) spendAction();
        applyGoodie(gnome, capturedItem.id, { slotIdx: capturedIdx });
        closeModal();
        renderAll();
      } : ()=>{}
    };
  });
  showModal('🍄 Use Goodie', '', buttons, { variant: 'choice-tray' });
}

function isGoodieUsable(gnome, id) {
  switch(id) {
    case 1: return true;
    case 2: return true;
    case 3: return getBlastableWalls().length > 0;
    case 4: return G.trouble > 0;
    case 6: {
      const t=G.grid[gnome.row][gnome.col];
      return !!(t?.sticky || t?.creaky);
    }
    case 8: return true;
    default: return true;
  }
}

function applyGoodie(gnome, id, options = {}) {
  id = normalizeGoodieId(id);
  const def = GOODIES_DEFS.find(g=>g.id===id);
  addLog(`${gnome.name} used ${def?.emoji} ${def?.name}!`,'good');

  switch(id) {
    case 1:
      openGoodieScryModal(gnome, { slotIdx: options.slotIdx ?? null });
      addLog(`🍄 ${gnome.name} reorders the next ${Math.min(4, getScryPreviewIds().length)} Room Tiles.`, 'good');
      renderAll();
      break;
    case 2:
      G.actionsLeft += 2;
      G.actionCapacity = Math.max(G.actionCapacity || 0, G.actionsLeft);
      addLog(`☕ Coffee Bean! +2 actions this turn.`, 'good');
      renderAll();
      break;
    case 3: {
      const blastable = getBlastableWalls();
      if (!blastable.length) {
        const free = gnome.satchel.findIndex(s=>s===null);
        if (free !== -1) gnome.satchel[free] = {type:'goodie', id};
        addLog('💥 No walls to blast here — Dynamite returned.', 'bad');
        renderAll();
      } else {
        armDynamite(gnome, { actorIdx: G.currentGnomeIdx, slotIdx: options.slotIdx ?? null });
        addLog(`💥 Dynamite! Click a wall to ${UI_TEXT.action.addDoor.replace(/^💥\s*/, '').toLowerCase()}.`,'good');
        renderAll();
      }
      break;
    }
    case 4:
      if (G.trouble <= 0) {
        const free = gnome.satchel.findIndex(s=>s===null);
        if (free !== -1) gnome.satchel[free] = {type:'goodie', id};
        addLog('🪈 Trouble is already 0 — Flute returned.', 'bad');
      } else {
        G.trouble = Math.max(0, G.trouble-2); updateHeader(); addLog('🪈 Trouble -2!','good');
      }
      break;
    case 8:
      doStinky('goodie');
      break;
    case 6: {
      const tileTools = G.grid[gnome.row][gnome.col];
      if (tileTools?.sticky || tileTools?.creaky) {
        const cleared = [];
        if (tileTools.sticky) {
          tileTools.sticky = false;
          cleared.push('Sticky');
        }
        if (tileTools.creaky) {
          tileTools.creaky = false;
          cleared.push('Creaky');
        }
        addLog(`🧰 Tools! ${cleared.join(' and ')} removed from ${ROOM_DEFS[tileTools.roomId].name}.`,'good');
      } else {
        const free = gnome.satchel.findIndex(s=>s===null);
        if (free !== -1) gnome.satchel[free] = {type:'goodie', id};
        addLog('🧰 No Sticky or Creaky here — Tools returned.','bad');
      }
      break;
    }
    default: addLog(`(Effect applied)`,'good');
  }
}
const SEQ_DEBUG = false;
function seqDebugLog(action, steps) {
  if (!SEQ_DEBUG || !Array.isArray(steps) || !steps.length) return;
  try {
    console.debug('[SEQ]', action, steps.map(step => step?.t || 'unknown').join(' -> '));
  } catch (err) {}
}

// ─────────────────────────────────────────────────────────────────────────
// SEQ — linear step-queue that serialises all animations, cards and effects.
//
// Every timed operation in the game flows through here, one step at a time.
// The queue pauses at 'card' and 'pause' steps until explicitly resumed.
//
// Step types:
//   {t:'render'}                           — call renderAll()
//   {t:'log', msg, cls}                    — addLog()
//   {t:'wait', ms}                         — setTimeout delay
//   {t:'effect', fn}                       — synchronous game-state change
//   {t:'boardAnim', r, c, css, ms}         — add/remove CSS class on a cell
//   {t:'card', cardType,emoji,name,desc,cls} — show card; queue pauses until dismissed
//   {t:'banner', text}                     — show patrol banner
//   {t:'hideBanner'}                       — hide patrol banner
//   {t:'patrolMove', patrol,fromR,fromC,toR,toC} — animate meeple, then continue
//   {t:'pause', fn}                        — fn(resume) called; queue pauses until resume()
//
// To add a new sequenced step from anywhere in game code:
//   SEQ.push( {t:'card', ...}, {t:'effect', fn:()=>applyMyThing()} )
// ─────────────────────────────────────────────────────────────────────────
const SEQ = (() => {
  const q = [];       // pending steps
  let running = false;
  let cancelled = false;
  let generation = 0;

  function shouldStop(runGen = generation) {
    return cancelled || runGen !== generation || !!G?.gameEnded;
  }

  function drain() {
    if (shouldStop()) {
      q.length = 0;
      running = false;
      return;
    }
    if (running || !q.length) return;
    running = true;
    exec(q.shift(), generation);
  }

  function next(runGen = generation) {
    if (runGen !== generation) return;
    running = false;
    if (shouldStop(runGen)) {
      q.length = 0;
      return;
    }
    drain();
  }

  function exec(step, runGen = generation) {
    if (shouldStop(runGen)) {
      running = false;
      q.length = 0;
      return;
    }
    switch (step.t) {

      case 'render':
        renderAll();
        next(runGen);
        break;

      case 'log':
        addLog(step.msg, step.cls || '');
        next(runGen);
        break;

      case 'wait':
        setTimeout(() => next(runGen), step.ms);
        break;

      case 'effect':
        step.fn();
        next(runGen);
        break;

      case 'boardAnim': {
        // Wait one rAF pair so the board is painted before we query the DOM
        const go = () => {
          const cell = getBoardCell(step.r, step.c);
          if (cell) {
            cell.classList.add(step.css);
            setTimeout(() => {
              if (runGen !== generation) return;
              cell.classList.remove(step.css);
              next(runGen);
            }, step.ms);
          } else {
            next(runGen);
          }
        };
        requestAnimationFrame(() => requestAnimationFrame(go));
        break;
      }

      case 'card': {
        try { GAME_EVENTS.emit('card.presented', { step }); } catch(e) {}
        document.body.classList.remove('card-showing');
        const overlay = document.getElementById('card-overlay');
        const inner = document.getElementById('game-card-inner');
        const back = document.getElementById('game-card-back');
        overlay.classList.remove('show');
        inner.classList.remove('dismissing', 'stacked-front', 'no-dismiss');
        inner.style.animation = 'none';
        inner.dataset.stackPending = '0';
        inner.dataset.command = 'dismissCard';
        if (back) {
          back.classList.remove('show', 'dismissing');
          back.style.animation = 'none';
        }

        document.getElementById('card-type-label').textContent = step.cardType;
        document.getElementById('card-emoji').textContent      = step.emoji;
        document.getElementById('card-name').textContent       = step.name;
        document.getElementById('card-desc').textContent       = step.desc;
        inner.className = 'game-card ' + (step.cls || '');
        if (step.noDismiss) {
          inner.classList.add('no-dismiss');
          inner.dataset.command = '';
        }

        if (back && step.stackBehind) {
          setOverlayCardContent(back, step.stackBehind);
          back.classList.add('show');
          inner.classList.add('stacked-front');
        }

        inner.classList.remove('dismissing');
        void inner.offsetWidth;
        document.body.classList.add('card-showing');
        overlay.classList.add('show');
        notifyMultiplayerUiStateChanged(40);

        requestAnimationFrame(() => {
          inner.style.animation = step.stackBehind
            ? 'cardStackDeal .48s cubic-bezier(.22,.68,0,1.12) 1s forwards'
            : 'cardDeal .55s cubic-bezier(.22,.68,0,1.15) forwards';
        });

        if (back && step.stackAfterDelay && !step.stackBehind) {
          const baseCard = { cardType: step.cardType, emoji: step.emoji, name: step.name, desc: step.desc, cls: step.cls || '' };
          inner.dataset.stackPending = '1';
          const stackDelay = Number.isFinite(step.stackAfterDelayMs) ? step.stackAfterDelayMs : 1000;
          setTimeout(() => {
            if (!overlay.classList.contains('show')) return;
            setOverlayCardContent(back, baseCard);
            back.classList.add('show');
            back.style.animation = 'none';
            void back.offsetWidth;
            back.style.animation = 'cardBumpBase .34s cubic-bezier(.22,.68,0,1.08) forwards';
            document.getElementById('card-type-label').textContent = step.stackAfterDelay.cardType;
            document.getElementById('card-emoji').textContent      = step.stackAfterDelay.emoji;
            document.getElementById('card-name').textContent       = step.stackAfterDelay.name;
            document.getElementById('card-desc').textContent       = step.stackAfterDelay.desc;
            inner.className = 'game-card ' + (step.stackAfterDelay.cls || '');
            inner.classList.remove('no-dismiss');
            inner.dataset.command = 'dismissCard';
            inner.classList.add('stacked-front');
            inner.style.animation = 'none';
            void inner.offsetWidth;
            requestAnimationFrame(() => {
              inner.style.animation = 'cardStackDeal .48s cubic-bezier(.22,.68,0,1.12) forwards';
              setTimeout(() => {
                inner.dataset.stackPending = '0';
              }, 520);
            });
          }, stackDelay);
        }
        break;
      }

      case 'banner':
        document.getElementById('patrol-banner').textContent = step.text;
        document.getElementById('patrol-banner').classList.add('show');
        next(runGen);
        break;

      case 'hideBanner':
        document.getElementById('patrol-banner').classList.remove('show');
        next(runGen);
        break;

      case 'patrolMove': {
        const {patrol, fromR, fromC, toR, toC} = step;
        animatePatrolMeeple(patrol, patrolEmoji(patrol.type), fromR, fromC, toR, toC, () => next(runGen));
        break;
      }

      case 'pause':
        // fn receives a resume callback; queue stays paused until resume() is called
        step.fn(() => next(runGen));
        break;

      default:
        console.warn('SEQ: unknown step type', step.t);
        next(runGen);
    }
  }

  function flattenSteps(steps) {
    const incoming = [];
    for (const s of steps) {
      if (Array.isArray(s)) incoming.push(...s);
      else if (s != null) incoming.push(s);
    }
    return incoming;
  }

  return {
    // Push steps; accepts individual steps or flat arrays
    push(...steps) {
      if (shouldStop()) return;
      const incoming = flattenSteps(steps);
      if (!incoming.length) return;
      seqDebugLog('push', incoming);
      q.push(...incoming);
      drain();
    },
    prepend(...steps) {
      if (shouldStop()) return;
      const incoming = flattenSteps(steps);
      if (!incoming.length) return;
      seqDebugLog('prepend', incoming);
      q.unshift(...incoming);
      drain();
    },
    insertAfterCurrent(...steps) {
      if (shouldStop()) return;
      const incoming = flattenSteps(steps);
      if (!incoming.length) return;
      seqDebugLog('insertAfterCurrent', incoming);
      q.unshift(...incoming);
      drain();
    },
    // Called by dismissCard to unblock a 'card' step
    resume() {
      if (shouldStop()) return;
      next(generation);
    },
    clear() {
      q.length = 0;
      running = false;
      cancelled = true;
      generation++;
    },
    reset() {
      q.length = 0;
      running = false;
      cancelled = false;
      generation++;
    },
    // True while a card or pause is blocking — callers can check this if needed
    get blocked() { return !shouldStop() && running && q.length === 0 && document.getElementById('card-overlay').classList.contains('show'); },
    get queuedCount() { return q.length; },
  };
})();

// ── showCard: push a card step onto SEQ (existing call-sites unchanged) ──
function showCard(cardType, emoji, name, desc, cls) {
  SEQ.push({t:'card', cardType, emoji, name, desc, cls});
}

function setOverlayCardContent(cardNode, data = {}) {
  if (!cardNode) return;
  const typeNode = cardNode.querySelector('.card-type-band');
  const emojiNode = cardNode.querySelector('.card-emoji-big');
  const nameNode = cardNode.querySelector('.card-name-big');
  const descNode = cardNode.querySelector('.card-desc-body');
  if (typeNode) typeNode.textContent = data.cardType || '';
  if (emojiNode) emojiNode.textContent = data.emoji || '';
  if (nameNode) nameNode.textContent = data.name || '';
  if (descNode) descNode.textContent = data.desc || '';
  cardNode.className = 'game-card ' + (data.cls || '');
}


// ── dismissCard: called by the player clicking the card overlay ───────────
function dismissCard() {
  // Card dismissal is intentionally silent — no click SFX.
  const overlay = document.getElementById('card-overlay');
  const inner = document.getElementById('game-card-inner');
  const back = document.getElementById('game-card-back');
  if (inner && inner.dataset.stackPending === '1') return;
  const finishDismiss = () => {
    overlay.classList.remove('show');
    document.body.classList.remove('card-showing');
    inner.classList.remove('dismissing', 'stacked-front', 'no-dismiss');
    inner.style.animation = 'none';
    inner.dataset.stackPending = '0';
    inner.dataset.command = 'dismissCard';
    if (back) {
      back.classList.remove('show', 'dismissing');
      back.style.animation = 'none';
    }
    SEQ.resume();
    notifyMultiplayerUiStateChanged(40);
  };
  inner.classList.add('dismissing');
  if (back && back.classList.contains('show')) back.classList.add('dismissing');
  let done = false;
  const onceFinish = () => {
    if (done) return;
    done = true;
    inner.removeEventListener('animationend', onceFinish);
    finishDismiss();
  };
  inner.addEventListener('animationend', onceFinish, { once: true });
  setTimeout(onceFinish, 450);
}
