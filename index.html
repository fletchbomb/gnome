  const topRight = createCornerNode('tr');
  const itemStack = createElement('div', { className: 'corner-stack' });
  for (let u = 0; u < Math.min(tile.Socks || 0, 4); u++) {
    itemStack.appendChild(createRoomItemNode({
      emoji: '🧦',
      title: 'Socks',
      onClick: (e) => { e.stopPropagation(); showRoomItemPopup(e.currentTarget, r, c, 'Socks', u); },
    }));
  }
  (tile.goodieIds || []).forEach((gid, idx) => {
    const span = createElement('span');
    attachGoodieTileBehavior(span, gid, (e) => {
      e.stopPropagation();
      showRoomItemPopup(span, r, c, 'goodie', idx);
    });
    itemStack.appendChild(span);
  });
  (tile.hatIds || []).forEach((hid, idx) => {
    const hdef = HAT_DEF_BY_ID[hid];
    itemStack.appendChild(createRoomItemNode({
      ...getHatIconProps(hdef),
      title: `${hdef?.name||'Hat'}: ${hdef?.desc||''}`,
      onClick: (e) => { e.stopPropagation(); showRoomItemPopup(e.currentTarget, r, c, 'hat', idx); },
    }));
  });
  topRight.appendChild(itemStack);
  inner.appendChild(topRight);

  if (tile.hide || tile.weaver || tile.vent || tile.chute || tile.roomId === 1) {
    const bottomLeft = createCornerNode('bl');
    if (tile.roomId === 1) bottomLeft.appendChild(createLaundryDepositIcon(r, c));
    if (tile.hide) {
      const affordance = getRoomActionAffordanceState('hide', tile, r, c);
      bottomLeft.appendChild(createIconNode({
        emoji: '🪑',
        title: affordance.title || UI_TEXT.action.hide,
        className: cx('room-static-icon hide-chair', getRoomFeatureVisualClass(affordance.visualState ?? affordance.enabled)),
        onClick: (e) => { e.stopPropagation(); showQuirkPopup(e.currentTarget, 'hide', r, c); },
      }));
    }
    if (tile.weaver) {
      const affordance = getRoomActionAffordanceState('weaver', tile, r, c);
      bottomLeft.appendChild(createIconNode({
        emoji: '🧌',
        title: affordance.title || UI_TEXT.action.weaver,
        className: cx('room-static-icon', getRoomFeatureVisualClass(affordance.visualState ?? affordance.enabled)),
        onClick: (e) => { e.stopPropagation(); showQuirkPopup(e.currentTarget, 'weaver', r, c); },
      }));
    }
    if (tile.vent) {
      const affordance = getRoomActionAffordanceState('vent', tile, r, c);
      bottomLeft.appendChild(createIconNode({
        emoji: '♨️',
        title: affordance.title || UI_TEXT.action.vent,
        className: cx('room-static-icon', getRoomFeatureVisualClass(affordance.visualState ?? affordance.enabled)),
        onClick: (e) => { e.stopPropagation(); showQuirkPopup(e.currentTarget, 'vent', r, c); },
      }));
    }
    if (tile.chute) {
      const affordance = getRoomActionAffordanceState('chute', tile, r, c);
      bottomLeft.appendChild(createIconNode({
        emoji: '🕳️',
        title: affordance.title || UI_TEXT.action.deposit,
        className: cx('room-static-icon', getRoomFeatureVisualClass(affordance.visualState ?? affordance.enabled)),
        onClick: (e) => { e.stopPropagation(); showQuirkPopup(e.currentTarget, 'chute', r, c); },
      }));
    }
    inner.appendChild(bottomLeft);
  }

  const bottomRightIcons = [];
  if (tile.sticky) bottomRightIcons.push({ emoji:'🫟', title:'🫟 Sticky floor — entering this room makes the actor Sticky.' });
  if (tile.creaky) bottomRightIcons.push({ emoji:'📢', title:UI_TEXT.status.creaky });
  if (tile.mothEggs) bottomRightIcons.push({ emoji:'🥚', title:'Kick to destroy Moth Eggs', onClick: (e) => { e.stopPropagation(); showQuirkPopup(e.currentTarget, 'mothEggs', r, c); } });
  if (bottomRightIcons.length) {
    const bottomRight = createCornerNode('br');
    bottomRightIcons.forEach(icon => bottomRight.appendChild(createIconNode(icon)));
    inner.appendChild(bottomRight);
  }

  const nameBand = createElement('div', { className: 'room-name-band' });
  nameBand.appendChild(createElement('div', { className: 'room-name', text: def.name }));
  inner.appendChild(nameBand);

  const occupantNodes = createRoomOccupantNodes({ gnomsHere, patrolsHere, koHere, r, c });
  if (occupantNodes.length) placeRoomOccupants(inner, occupantNodes);

  return { artLayer, inner };
}

function attachRoomDoorHandlers(cell, r, c, allDoors) {
  allDoors.forEach(dir => {
    const doorEl = cell.querySelector(`.door.${dir}`);
    if (!doorEl) return;
    const doorClick = getDoorClickConfig(r, c, dir);
    if (!doorClick) return;
    doorEl.onclick = (e) => { e.stopPropagation(); handleDoorClick(doorClick.fromR, doorClick.fromC, doorClick.dir, doorClick.tile); };
  });
}

function configureEmptyBoardCell(cell, r, c, boardState) {
  cell.className = 'cell empty';
  if (boardState.revealSet.has(`${r},${c}`)) {
    cell.classList.add('can-reveal');
    const inTroubleZone = G.tilesRevealed > getFreeTiles();
    if (inTroubleZone) cell.classList.add('trouble-zone');
    const rData = boardState.revealable.find(([rr,cc])=>rr===r&&cc===c);
    cell.onclick = () => handleRevealClick(r, c, rData[2]);
    cell.title = getRevealCursorText(inTroubleZone);
  }
  appendDebugDoorOverlay(cell, r, c);
}


function renderBoard() {
  const board = el('board');
  board.style.gridTemplateColumns = `repeat(${G.GRID}, ${GAME_BUILD.boardCellSize}px)`;
  board.style.gridTemplateRows = `repeat(${G.GRID}, ${GAME_BUILD.boardCellSize}px)`;
  BOARD_CELL_INDEX.clear();

  const frag = document.createDocumentFragment();
  const boardState = buildBoardRenderState();
  const currentRoomKeys = new Set();

  for (let r=0;r<G.GRID;r++) {
    for (let c=0;c<G.GRID;c++) {
      const tile = G.grid[r][c];
      const cell = createElement('div', { attrs: { 'data-r': r, 'data-c': c } });

      if (tile) {
        const cellKey = getCellKey(r, c);
        currentRoomKeys.add(cellKey);
        cell.className = getRoomCellClassNames({
          tile,
          key: cellKey,
          currentGnome: boardState.gnome,
          selectedCell: G.selectedCell,
          moveTargets: boardState.moveTargets,
        });

        const allDoors = getRenderableDoorDirs(r, c);
        allDoors.forEach(dir => {
          const disabledDoor = isDoorDisabled(r, c, dir);
          const doorClick = disabledDoor ? null : getDoorClickConfig(r, c, dir);
          const doorTitle = getBoardDoorTitle(doorClick);
          cell.appendChild(createElement('div', { className: `door ${dir}${disabledDoor ? ' disabled' : ''}`, attrs: doorTitle ? { title: doorTitle } : {} }));
        });
        appendDebugDoorOverlay(cell, r, c);
        appendRoomTargetModeOverlays(cell, tile, r, c, boardState.gnome);

        const { artLayer, inner } = buildRoomOverlayLayer(tile, r, c, cellKey);
        if (LAST_RENDERED_ROOM_KEYS && !LAST_RENDERED_ROOM_KEYS.has(cellKey)) cell.classList.add('room-reveal-pop');
        cell.appendChild(artLayer);
        if (tile.sticky) {
          cell.classList.add('sticky-room');
          cell.appendChild(createStickyRoomOverlay(cellKey));
        }
        cell.appendChild(inner);

        if (tile.creaky) {
          cell.classList.add('creaky-active');
          cell.appendChild(createCreakyOverlay(`${r},${c}`));
        }

        cell.onclick = () => handleRoomClick(r, c, tile);
        attachRoomDoorHandlers(cell, r, c, allDoors);
      } else {
        configureEmptyBoardCell(cell, r, c, boardState);
      }
      rememberBoardCell(r, c, cell);
      frag.appendChild(cell);
    }
  }
  board.replaceChildren(frag);
  LAST_RENDERED_ROOM_KEYS = currentRoomKeys;
}



function patrolEmoji(t){ return PATROL_EMOJI_BY_TYPE[t]||'🚨'; }

function mountUnifiedTurnDock() {
  const bottomDock = el('bottom-dock');
  const gnomePanels = el('gnome-panels');
  const patrolTray = el('patrol-tray');
  const actionGrid = el('primary-action-grid');
  const endTurnBtn = el('btn-end');
  const winHouseBtn = el('btn-win-house');
  const actionDivider = document.querySelector('#actions .action-divider');
  if (!bottomDock || !gnomePanels) return;
  if (gnomePanels.parentElement !== bottomDock) bottomDock.prepend(gnomePanels);
  if (patrolTray && patrolTray.parentElement !== bottomDock) bottomDock.appendChild(patrolTray);
  if (actionGrid && endTurnBtn && endTurnBtn.parentElement !== actionGrid) actionGrid.appendChild(endTurnBtn);
  if (actionGrid && winHouseBtn && winHouseBtn.parentElement !== actionGrid) actionGrid.appendChild(winHouseBtn);
  if (actionDivider) actionDivider.style.display = 'none';
  layoutActionButtons();
}

function betweenHouseTradeForDock() {
  return !!G.weaverModal && (G.weaverModal.mode || 'room') === 'between';
}


function mountActionsShellInSidebar(actionsShell, sidebar, gnomesShell) {
  if (!actionsShell || !sidebar) return;
  if (actionsShell.parentElement !== sidebar) {
    if (gnomesShell) sidebar.insertBefore(actionsShell, gnomesShell);
    else sidebar.appendChild(actionsShell);
  }
  actionsShell.classList.remove('gnome-card-actions');
}

function buildGnomeStatusStack(gnome) {
  return buildActorStatusStack(gnome, 'gnome', {
    containerTag: 'span',
    containerClass: 'gnome-status-stack',
    badgeTag: 'span',
    badgeClass: 'gnome-status-badge',
    includeLabel: false,
  });
}

function buildGnomeHatRow(gnome, gnomeIdx, hat, canManageInventory) {
  const hatRow = document.createElement('div');
  hatRow.className = 'gnome-hat-row';

  const hatSlot = document.createElement('div');
  hatSlot.className = 'slot hat-slot ui-icon-host' + (canManageInventory ? ' clickable' : '');
  hatSlot.title = hat ? `${hat.name}: ${hat.desc}${showHatCancelled(gnome) ? ' (cancelled this round)' : ''}` : 'No hat equipped';
  if (hat) setNodeIcon(hatSlot, { ...getHatIconProps(hat), title: hat.name });
  else hatSlot.textContent = '—';
  if (!hat) hatSlot.style.opacity = '0.4';
  if (showHatCancelled(gnome)) {
    hatSlot.classList.add('cancelled');
    hatSlot.dataset.cancelled = 'true';
  }
  if (canManageInventory) hatSlot.onclick = (e) => { e.stopPropagation(); showInventoryItemPopup(hatSlot, gnome, gnomeIdx, 'hat', -1); };
  hatRow.appendChild(hatSlot);

  const hatCopy = createElement('div', { className: 'gnome-hat-copy' });
  hatCopy.appendChild(createElement('div', { className: 'gnome-hat-label', text: 'Hat' }));
  hatCopy.appendChild(createElement('div', { className: 'gnome-hat-name', text: hat ? hat.name : 'No hat equipped' }));
  hatRow.appendChild(hatCopy);

  return hatRow;
}

function buildGnomeSatchelSection(gnome, gnomeIdx, size, canManageInventory) {
  const frag = document.createDocumentFragment();

  const satchelLabel = document.createElement('div');
  satchelLabel.style.cssText = 'font-size:.6rem;color:var(--color-text-muted);margin-bottom:2px;';
  satchelLabel.textContent = `Satchel (${gnome.satchel.slice(0,size).filter(Boolean).length}/${size})`;
  frag.appendChild(satchelLabel);

  const slotsRow = document.createElement('div');
  slotsRow.className = 'satchel-slots';
  for (let s = 0; s < size; s++) {
    const item = gnome.satchel[s];
    const slotEl = document.createElement('div');
    slotEl.className = 'slot' + (canManageInventory && item ? ' clickable' : '');
    let tooltip = 'Empty';
    if (item) {
      if (item.type === 'goodie') {
        const gdef = GOODIES_DEFS.find(d=>d.id===item.id);
        tooltip = `${gdef?.name||'Goodie'}: ${gdef?.desc||''}`;
      } else if (item.type === 'hat') {
        const hdef = HATS_DEFS.find(h=>h.id===item.id);
        tooltip = `${hdef?.name||'Hat'}: ${hdef?.desc||''}`;
      } else {
        tooltip = getItemName(item);
      }
    }
    slotEl.title = tooltip;
    slotEl.textContent = item ? getItemEmoji(item) : '';
    if (canManageInventory && item) slotEl.onclick = (e) => { e.stopPropagation(); showInventoryItemPopup(slotEl, gnome, gnomeIdx, item.type, s); };
    slotsRow.appendChild(slotEl);
  }
  frag.appendChild(slotsRow);
  return frag;
}

function buildGnomeActionTrack() {
  const actionTrack = document.createElement('div');
  actionTrack.className = 'gnome-action-track';
  actionTrack.appendChild(createElement('div', { className: 'gnome-action-label', text: 'Action' }));
  const slotsWrap = document.createElement('div');
  slotsWrap.className = 'gnome-action-slots';
  const capacity = Math.max(1, G.actionCapacity || G.actionsLeft || 0);
  slotsWrap.style.setProperty('--action-capacity', capacity);
  for (let a = 0; a < capacity; a++) {
    const slot = document.createElement('div');
    slot.className = 'gnome-action-slot' + (a < G.actionsLeft ? ' filled' : '');
    slotsWrap.appendChild(slot);
  }
  actionTrack.appendChild(slotsWrap);
  return actionTrack;
}

function getGnomeCardViewState(gnomeIdx) {
  const gnome = G.gnomes[gnomeIdx];
  const isShopperHighlight = !!G.weaverModal && ((G.weaverModal.mode === 'between' ? (Number.isInteger(G.weaverModal.shopperIdx) ? G.weaverModal.shopperIdx : G.currentGnomeIdx) : G.currentGnomeIdx) === gnomeIdx);
  const isActive = !G.weaverModal && gnomeIdx === G.currentGnomeIdx && G.phase === 'gnome' && !isInterruptActive();
  const hat = HAT_DEF_BY_ID[gnome.hat] || null;
  const size = getSatchelSize(gnome);
  const canAct = isActive && !gnome.ko;
  const canManageInventory = !gnome.ko && (canAct || !!G.weaverModal);
  return { gnome, isShopperHighlight, isActive, hat, size, canManageInventory };
}

function buildGnomeCard(gnomeIdx) {
  const state = getGnomeCardViewState(gnomeIdx);
  const { gnome, isShopperHighlight, isActive, hat, size, canManageInventory } = state;

  const card = document.createElement('div');
  const weaverShopperClass = G.weaverModal && isShopperHighlight ? 'weaver-shopper-highlight' : '';
  card.className = `gnome-card floating-panel ${isActive ? 'active' : ''} ${weaverShopperClass} ${gnome.ko?'ko':''}`;
  card.dataset.gnomeIdx = String(gnomeIdx);
  card.style.setProperty('--gnome-accent', gnome.color || 'var(--color-text-strong)');

  const main = createElement('div', { className: 'gnome-card-main' });
  const portraitChip = createElement('div', { className: 'gnome-portrait-chip' });
  const portraitImg = createElement('img', { attrs: { src: getGnomePortraitUrl(gnome), alt: `${gnome.name} portrait`, loading: 'eager' } });
  portraitChip.appendChild(portraitImg);
  const portraitStatus = isActive
    ? buildActorStatusPillRow(gnome, 'gnome', {
        containerClass: 'actor-portrait-status-pills',
        pillClass: 'actor-status-pill actor-status-pill-compact',
      })
    : buildActorPortraitStatusOverlay(gnome, 'gnome');
  if (portraitStatus) portraitChip.appendChild(portraitStatus);
  main.appendChild(portraitChip);

  const content = createElement('div', { className: 'gnome-card-content' });
  const header = document.createElement('div');
  header.className = 'gnome-header';
  const emojiWrap = createElement('span', { className: 'gnome-emoji-wrap' });
  emojiWrap.appendChild(createElement('span', { className: 'gnome-emoji', text: gnome.emoji || '🧝' }));
  if (!isActive) {
    const collapsedStatus = buildActorStatusStack(gnome, 'gnome', {
      containerTag: 'span',
      containerClass: 'gnome-status-stack',
      badgeTag: 'span',
      badgeClass: 'gnome-status-badge',
      includeLabel: false,
    });
    if (collapsedStatus) emojiWrap.appendChild(collapsedStatus);
  }
  header.appendChild(emojiWrap);

  const nameEl = createElement('span', { className: 'gnome-name-text', text: gnome.name });
  if ((gnome.name || '').length > 7) {
    const fontSize = Math.max(0.62, 0.88 - (((gnome.name || '').length - 7) * 0.04));
    nameEl.style.fontSize = `${fontSize}rem`;
  }
  header.appendChild(nameEl);
  header.appendChild(createElement('div', { className: 'gnome-header-status' }));
  content.appendChild(header);

  const body = document.createElement('div');
  body.className = 'gnome-card-body';
  const statusRow = isActive
    ? createElement('div', { className: 'actor-status-pills' })
    : (buildActorStatusPillRow(gnome, 'gnome') || createElement('div', { className: 'actor-status-pills' }));
  if (G.phase === 'patrol' && !isActive) statusRow.appendChild(createElement('span', { className: 'actor-status-pill wait', text: '⏳ Waiting' }));
  if (statusRow.childNodes.length) body.appendChild(statusRow);

  body.appendChild(buildGnomeHatRow(gnome, gnomeIdx, hat, canManageInventory));
  body.appendChild(buildGnomeSatchelSection(gnome, gnomeIdx, size, canManageInventory));
  if (isActive && G.phase === 'gnome') body.appendChild(buildGnomeActionTrack());

  content.appendChild(body);
  main.appendChild(content);
  card.appendChild(main);

  if (G.weaverModal && betweenHouseTradeForDock()) {
    card.addEventListener('click', () => {
      if (gnomeIdx === (Number.isInteger(G.weaverModal?.shopperIdx) ? G.weaverModal.shopperIdx : G.currentGnomeIdx)) return;
      setWeaverModalContext(buildWeaverShopState('between', {
        offers: G.weaverModal?.offers || null,
        shopperIdx: gnomeIdx
      }, G.weaverModal || {}));
      renderAll();
      renderWeaverScreen();
    });
  }

  return { card, isActive, gnome };
}


function renderGnomePanels() {
  const container = document.getElementById('gnome-panels');
  const actionsShell = document.getElementById('actions-shell');
  const sidebar = document.getElementById('sidebar');
  const gnomesShell = document.getElementById('gnomes-shell');
  if (!container) return;

  mountActionsShellInSidebar(actionsShell, sidebar, gnomesShell);
  container.innerHTML = '';

  let activeCard = null;
  let activeGnome = null;

  G.gnomes.forEach((g, i) => {
    const { card, isActive, gnome } = buildGnomeCard(i);
    container.appendChild(card);
    if (isActive && G.phase === 'gnome') {
      activeCard = card;
      activeGnome = gnome;
    }
  });

  if (actionsShell && activeCard && activeGnome) {
    actionsShell.classList.add('gnome-card-actions');
    actionsShell.style.setProperty('--active-gnome-color', activeGnome.color || 'var(--color-text-strong)');
    layoutActionButtons();
    activeCard.appendChild(actionsShell);
  } else {
    mountActionsShellInSidebar(actionsShell, sidebar, gnomesShell);
  }

}



function destroyInventoryPopupItem({ gnome, slotIdx, itemType, isHatSlot, label }) {
  closeItemPopup();
  if (isHatSlot) gnome.hat = null;
  else gnome.satchel[slotIdx] = null;
  if (itemType === 'hat') {
    if (isHatSlot) clearDistractState({ reason: ' because the hat was destroyed.', log: true });
    updateActionsForHat();
    reconcileSatchelOverflow(gnome);
  }
  addLog(`🗑️ ${gnome.name} destroys ${label}.`, 'system');
  renderAll();
}

function buildGoodieInventoryPopup(popup, context) {
  const { gnome, item, slotIdx, tile, inWeaverScreen } = context;
  const goodieLabel = getGoodieLabel(item.id);
  const usable = isGoodieUsable(gnome, normalizeGoodieId(item.id));
  const canUse = usable && G.actionsLeft > 0;
  addPopupBtn(popup, `${getGoodieEmoji(item.id)} Use ${getGoodieName(item.id)}`, () => {
    if (!canUse) return;
    closeItemPopup();
    useGoodieFromSlot(slotIdx);
  }, !canUse);
  addPopupBtn(popup, UI_TEXT.action.drop, () => {
    if (G.actionsLeft <= 0) return;
    closeItemPopup();
    gnome.satchel[slotIdx] = null;
    spendAction();
    placeGoodieOnTile(tile, item.id, { emitDrop:true, logMessage:`${gnome.name} dropped ${goodieLabel}.` });
    renderAll();
  }, G.actionsLeft <= 0);
  if (inWeaverScreen) addPopupBtn(popup, '🗑️ Destroy', () => destroyInventoryPopupItem({ ...context, label: getGoodieName(item.id) }));
}

function buildSocksInventoryPopup(popup, context) {
  const { gnome, item, slotIdx, tile, inWeaverScreen } = context;
  addPopupBtn(popup, tile?.roomId===1 || tile?.chute ? UI_TEXT.action.deposit : UI_TEXT.action.drop, () => {
    if (G.actionsLeft <= 0) return;
    closeItemPopup();
    gnome.satchel[slotIdx] = null;
    spendAction();
    if (tile?.roomId === 1 || tile?.chute) {
      G.SocksBanked++;
      GAME_EVENTS.emit('item.dropped', { itemType: 'Socks', mode: 'deposit' });
      addLog(`${gnome.name} deposited 🧦! Total: ${G.SocksBanked}/${getHouseGoal()}`, 'good');
      checkGoalMet();
        } else {
      tile.Socks++;
      GAME_EVENTS.emit('item.dropped', { itemType: 'Socks', mode: 'floor' });
      addLog(`${gnome.name} dropped 🧦 in ${ROOM_DEFS[tile.roomId].name}.`);
    }
    renderAll();
  }, G.actionsLeft <= 0);
  if (inWeaverScreen) addPopupBtn(popup, '🗑️ Destroy', () => destroyInventoryPopupItem({ ...context, label: 'Socks 🧦' }));
}

function buildEquippedHatInventoryPopup(popup, context) {
  const { gnome, item, inWeaverScreen } = context;
  if (!gnome.hat) {
    addPopupBtn(popup, '(no hat equipped — Scurry unavailable)', ()=>closeItemPopup(), true);
    return;
  }

  const hatsInSatchel = gnome.satchel.map((s,i)=>s?.type==='hat'?{item:s,idx:i}:null).filter(Boolean);
  const freeSlot = findFirstFreeSatchelSlot(gnome);

  if (freeSlot !== -1) {
    addPopupBtn(popup, `📦 Move to Satchel`, () => {
      closeItemPopup();
      const oldHat = gnome.hat;
      gnome.hat = null;
      gnome.satchel[freeSlot] = {type:'hat', id:oldHat};
      addLog(`${gnome.name} moves their hat to satchel.`);
      clearDistractState({ reason: ' because the hat was unequipped.', log: true });
      updateActionsForHat();
      reconcileSatchelOverflow(gnome);
      renderAll();
    });
  }

  hatsInSatchel.forEach(({item:hItem, idx:hIdx}) => {
    const hdef = HATS_DEFS.find(h=>h.id===hItem.id);
    addPopupBtn(popup, `🔄 Equip ${hdef?.name||'Hat'}`, () => {
      closeItemPopup();
      const oldHat = gnome.hat;
      gnome.hat = hItem.id;
      gnome.satchel[hIdx] = {type:'hat', id: oldHat};
      addLog(`${gnome.name} equips ${hdef?.name}!`, 'good');
      clearDistractState({ reason: ' because the old hat was replaced.', log: !!gnome.distractActive });
      updateActionsForHat();
      reconcileSatchelOverflow(gnome);
      renderAll();
    });
  });

  addPopupBtn(popup, UI_TEXT.action.drop, () => {
    closeItemPopup();
    const oldHat = gnome.hat;
    gnome.hat = null;
    const dropTile = G.grid[gnome.row][gnome.col];
    if (!dropTile.hatIds) dropTile.hatIds = [];
    dropTile.hatIds.push(oldHat);
    GAME_EVENTS.emit('item.dropped', { itemType: 'hat', mode: 'floor' });
    addLog(`${gnome.name} drops their hat on the floor.`);
    clearDistractState({ reason: ' because the hat was dropped.', log: true });
    updateActionsForHat();
    reconcileSatchelOverflow(gnome);
    renderAll();
  });

  if (inWeaverScreen) addPopupBtn(popup, '🗑️ Destroy', () => destroyInventoryPopupItem({ ...context, label: HAT_DEF_BY_ID[item.id]?.name||'Hat' }));
}

function buildSatchelHatInventoryPopup(popup, context) {
  const { gnome, item, slotIdx, inWeaverScreen } = context;
  const hdef = HATS_DEFS.find(h=>h.id===item.id);
  addPopupBtn(popup, `🎩 Equip ${hdef?.name||'Hat'} (replace current)`, () => {
    closeItemPopup();
    const oldHat = gnome.hat;
    gnome.hat = item.id;
    gnome.satchel[slotIdx] = oldHat ? {type:'hat', id: oldHat} : null;
    addLog(`${gnome.name} equips ${hdef?.name}!`, 'good');
    updateActionsForHat();
    renderAll();
  });
  addPopupBtn(popup, UI_TEXT.action.drop, () => {
    closeItemPopup();
    gnome.satchel[slotIdx] = null;
    const dropTile2 = G.grid[gnome.row][gnome.col];
    if (!dropTile2.hatIds) dropTile2.hatIds = [];
    dropTile2.hatIds.push(item.id);
    GAME_EVENTS.emit('item.dropped', { itemType: 'hat', id: item.id, mode: 'floor' });
    addLog(`${gnome.name} drops ${hdef?.name||'Hat'} on the floor.`);
    renderAll();
  });
  if (inWeaverScreen) addPopupBtn(popup, '🗑️ Destroy', () => destroyInventoryPopupItem({ ...context, label: hdef?.name||'Hat' }));
}

function getInventoryPopupSummary(context) {
  if (!context) return { title: '', meta: '' };
  if (context.itemType === 'goodie') {
    return { title: getGoodieLabel(context.item?.id), meta: getGoodieDesc(context.item?.id) || context.gnome?.name || '' };
  }
  if (context.itemType === 'Socks') {
    return { title: '🧦 Socks', meta: context.gnome?.name || '' };
  }
  if (context.itemType === 'hat') {
    const hdef = HAT_DEF_BY_ID[context.item?.id] || HATS_DEFS.find(h => h.id === context.item?.id);
    return { title: `${hdef?.emoji || '🎩'} ${hdef?.name || 'Hat'}`, meta: hdef?.desc || context.gnome?.name || '' };
  }
  return { title: '', meta: '' };
}

function getRoomItemPopupSummary(ctx) {
  if (!ctx?.tile) return { title: '', meta: '' };
  const roomName = getRoomName(ctx.r, ctx.c);
  if (ctx.type === 'Socks') return { title: '🧦 Socks', meta: roomName };
  if (ctx.type === 'goodie') {
    const gid = ctx.tile.goodieIds?.[ctx.idx];
    return { title: getGoodieLabel(gid), meta: roomName };
  }
  if (ctx.type === 'hat') {
    const hid = ctx.tile.hatIds?.[ctx.idx];
    const hdef = HAT_DEF_BY_ID[hid] || HATS_DEFS.find(h => h.id === hid);
    return { title: `${hdef?.emoji || '🎩'} ${hdef?.name || 'Hat'}`, meta: roomName };
  }
  return { title: '', meta: roomName };
}

function getOccupantPopupSummary(ctx) {
  if (!ctx?.obj) return { title: '', meta: '' };
  if (ctx.type === 'gnome') return { title: `${ctx.obj.emoji || '🧝'} ${ctx.obj.name}`, meta: getRoomName(ctx.obj.row, ctx.obj.col) };
  return { title: `${patrolEmoji(ctx.obj.type)} ${capitalize(ctx.obj.type)}`, meta: getRoomName(ctx.obj.row, ctx.obj.col) };
}

function getQuirkPopupSummary(quirkType, ctx) {
  const roomName = ctx?.tile ? getRoomName(ctx.r, ctx.c) : '';
  const byType = {
    hide: { title: '🪑 Hide', meta: roomName },
    vent: { title: '♨️ Vent', meta: roomName },
    weaver: { title: '🧌 Weaver', meta: roomName },
    chute: { title: '🧺 Deposit', meta: roomName },
    mothEggs: { title: '🥚 Moth Eggs', meta: roomName },
  };
  return byType[quirkType] || { title: capitalize(String(quirkType || 'Room Action')), meta: roomName };
}

function shouldDelegateSharedDecisionPopupToHost(state) {
  try { return !!window.__gnomeMPApi?.requestSharedDecisionPopup?.(state); } catch (_err) { return false; }
}

function shouldDelegateSharedDecisionActionToHost(actionKey) {
  try { return !!window.__gnomeMPApi?.requestSharedDecisionAction?.(actionKey); } catch (_err) { return false; }
}

function shouldDelegateSharedDecisionClearToHost() {
  try { return !!window.__gnomeMPApi?.requestSharedDecisionClear?.(); } catch (_err) { return false; }
}

function normalizeSharedDecisionPopupState(state) {
  if (!state || typeof state !== 'object') return null;
  return JSON.parse(JSON.stringify(state));
}

function setSharedDecisionPopup(state, { render = true } = {}) {
  if (!G) return null;
  removeLegacyItemPopupDom();
  G.sharedDecisionPopup = normalizeSharedDecisionPopupState(state);
  notifyMultiplayerUiStateChanged(40);
  if (render) renderAll();
  return G.sharedDecisionPopup;
}

function clearSharedDecisionPopup({ render = true } = {}) {
  if (!G) return;
  removeLegacyItemPopupDom();
  G.sharedDecisionPopup = null;
  notifyMultiplayerUiStateChanged(40);
  if (render) renderAll();
}

function openSharedDecisionPopup(state, { render = true } = {}) {
  if (!state) {
    clearSharedDecisionPopup({ render });
    return null;
  }
  if (shouldDelegateSharedDecisionPopupToHost(state)) return true;
  return setSharedDecisionPopup(state, { render });
}

function createSharedDecisionActionSpec(key, label, perform, disabled = false, options = {}) {
  return { key, label, perform, disabled: !!disabled, tone: options.tone || '', detail: options.detail || '' };
}

function getSharedDecisionOccupant(state) {
  if (!state) return null;
  if (state.occupantType === 'gnome') {
    return G.gnomes?.[Number(state.targetGnomeIdx)] || null;
  }
  if (state.occupantType === 'patrol') {
    return (G.patrols || []).find(p => p.type === state.targetPatrolType && p.row === state.targetPatrolRow && p.col === state.targetPatrolCol) || null;
  }
  return null;
}

function buildSharedDecisionRoomItemSpec(state) {
  const ctx = buildRoomItemPopupContext(null, state.r, state.c, state.itemType, state.idx);
  const actions = [];
  if (!ctx.tile) return { title: 'Unavailable', meta: '', actions: [createSharedDecisionActionSpec('__close__', 'Close', () => clearSharedDecisionPopup())] };
  if (state.itemType === 'Socks') {
    const freeSlot = ctx.inRoom ? findFirstFreeSatchelSlot(ctx.gnome) : -1;
    actions.push(createSharedDecisionActionSpec('pickup-socks', '🤏 Pick Up 🧦 Socks', () => {
      clearSharedDecisionPopup({ render: false });
      ctx.gnome.satchel[freeSlot] = { type: 'Socks' };
      ctx.tile.Socks--;
      GAME_EVENTS.emit('item.pickedUp', { itemType: 'Socks' });
      spendAction();
      G.selectedAction = null;
      renderAll();
    }, !(freeSlot !== -1 && ctx.hasActions)));
    const dests = getPopupKickDestinations(ctx);
    actions.push(createSharedDecisionActionSpec('kick-socks', '👟 Kick', () => {
      clearSharedDecisionPopup({ render: false });
      G.kickMode = { target: { label:'🧦 Socks', emoji:'🧦', type:'Socks', ref:ctx.tile }, destinations:dests };
      addLog(UI_TEXT.kickChooseRoom('Socks'), 'system');
      renderAll();
    }, !(dests.length && G.actionsLeft > 0)));
  } else if (state.itemType === 'goodie') {
    const gid = ctx.tile.goodieIds?.[ctx.idx];
    const freeSlot = ctx.inRoom ? findFirstFreeSatchelSlot(ctx.gnome) : -1;
    const gdef = GOODIES_DEFS.find(d => d.id === gid);
    actions.push(createSharedDecisionActionSpec('pickup-goodie', `🤏 Pick Up ${gdef?.emoji || '🎁'} ${gdef?.name || 'Goodie'}`, () => {
      clearSharedDecisionPopup({ render: false });
      ctx.tile.goodieIds.splice(ctx.idx, 1);
      ctx.gnome.satchel[freeSlot] = { type:'goodie', id:gid };
      addLog(`${ctx.gnome.name} picks up ${gdef?.name || 'Goodie'}.`, 'good');
      spendAction();
      G.selectedAction = null;
      renderAll();
    }, !(freeSlot !== -1 && ctx.hasActions)));
    const dests = getPopupKickDestinations(ctx);
    actions.push(createSharedDecisionActionSpec('kick-goodie', '👟 Kick', () => {
      clearSharedDecisionPopup({ render: false });
      G.kickMode = { target: { label:`🍄 ${gdef?.name || 'Goodie'}`, emoji:'🍄', type:'goodie', ref:{ tile:ctx.tile, idx:ctx.idx } }, destinations:dests };
      addLog(UI_TEXT.kickChooseRoom(gdef?.name || 'Goodie'), 'system');
      renderAll();
    }, !(dests.length && G.actionsLeft > 0)));
  } else if (state.itemType === 'hat') {
    const hid = ctx.tile.hatIds?.[ctx.idx];
    const hdef = HAT_DEF_BY_ID[hid] || HATS_DEFS.find(h => h.id === hid);
    const freeSlot = ctx.inRoom ? findFirstFreeSatchelSlot(ctx.gnome) : -1;
    const hatSlotEmpty = ctx.inRoom && !ctx.gnome.hat;
    const canPick = ctx.hasActions && (freeSlot !== -1 || hatSlotEmpty);
    const pickLabel = `🤏 Pick Up ${hdef?.name || 'Hat'}${!canPick && ctx.inRoom && ctx.hasActions ? ' (satchel full)' : ''}`;
    actions.push(createSharedDecisionActionSpec('pickup-hat', pickLabel, () => {
      clearSharedDecisionPopup({ render: false });
      ctx.tile.hatIds.splice(ctx.idx, 1);
      const result = giveHatToGnome(ctx.gnome, hid);
      addLog(result === 'equipped' ? `${ctx.gnome.name} picks up and equips ${hdef?.name || 'Hat'}!` : `${ctx.gnome.name} picks up ${hdef?.name || 'Hat'}.`, 'good');
      spendAction();
      G.selectedAction = null;
      renderAll();
    }, !canPick));
    const dests = getPopupKickDestinations(ctx);
    actions.push(createSharedDecisionActionSpec('kick-hat', '👟 Kick', () => {
      clearSharedDecisionPopup({ render: false });
      G.kickMode = { target: { label:`${hdef?.emoji || '🎩'} ${hdef?.name || 'Hat'}`, emoji:hdef?.emoji || '🎩', type:'hat', ref:{ tile:ctx.tile, idx:ctx.idx } }, destinations:dests };
      addLog(UI_TEXT.kickChooseRoom(hdef?.name || 'Hat'), 'system');
      renderAll();
    }, !(dests.length && G.actionsLeft > 0)));
  }
  return { ...getRoomItemPopupSummary(ctx), actions };
}

function buildSharedDecisionOccupantSpec(state) {
  const obj = getSharedDecisionOccupant(state);
  const ctx = buildOccupantPopupContext(null, obj, state.occupantType, state.r, state.c);
  const actions = [];
  if (!obj) return { title: 'Unavailable', meta: '', actions: [createSharedDecisionActionSpec('__close__', 'Close', () => clearSharedDecisionPopup())] };
  if (state.occupantType === 'gnome') {
    if (obj.id === G.currentGnomeIdx) {
      actions.push(createSharedDecisionActionSpec('remove-sticky', UI_TEXT.action.removeSticky, () => {
        clearSharedDecisionPopup({ render: false });
        removeStickyForActiveGnome();
      }, !(G.actionsLeft > 0 && obj.stickyBlocked)));
    } else if (ctx.inRoom) {
      const dests = getPopupKickDestinations(ctx);
      actions.push(createSharedDecisionActionSpec('kick-gnome', '👟 Kick', () => {
        clearSharedDecisionPopup({ render: false });
        G.kickMode = { target:{ label:`${obj.emoji} ${obj.name}`, emoji:obj.emoji, type:'gnome', ref:obj }, destinations:dests };
        addLog(UI_TEXT.kickChooseRoom(obj.name), 'system');
        renderAll();
      }, !(dests.length && G.actionsLeft > 0)));
    }
  } else if (state.occupantType === 'patrol' && ctx.inRoom) {
    const em = patrolEmoji(obj.type);
    const dests = getPopupKickDestinations(ctx);
    actions.push(createSharedDecisionActionSpec('kick-patrol', '👟 Kick', () => {
      clearSharedDecisionPopup({ render: false });
      G.kickMode = { target:{ label:`${em} ${capitalize(obj.type)}`, emoji:em, type:'patrol', ref:obj }, destinations:dests };
      addLog(UI_TEXT.kickChooseRoom(capitalize(obj.type)), 'system');
      renderAll();
    }, !(dests.length && G.actionsLeft > 0)));
  }
  return { ...getOccupantPopupSummary(ctx), actions };
}

function buildSharedDecisionQuirkSpec(state) {
  const ctx = getPopupActorContext(null, state.r, state.c);
  const actions = [];
  if (state.quirkType === 'hide') {
    actions.push(createSharedDecisionActionSpec('quirk-hide', UI_TEXT.action.hide, () => { clearSharedDecisionPopup({ render:false }); doHide(); }, !(ctx.inRoom && canGnomeHideNow(ctx.gnome))));
  } else if (state.quirkType === 'vent') {
    const ventDestinations = ctx.gnome ? getVentDestinations(ctx.gnome) : [];
    actions.push(createSharedDecisionActionSpec('quirk-vent', UI_TEXT.action.vent, () => { clearSharedDecisionPopup({ render:false }); doVent(); }, !(ctx.inRoom && G.actionsLeft > 0 && ventDestinations.length > 0)));
  } else if (state.quirkType === 'weaver') {
    actions.push(createSharedDecisionActionSpec('quirk-weaver', UI_TEXT.action.weaver, () => { clearSharedDecisionPopup({ render:false }); openWeaver(); }, !(ctx.inRoom && ctx.hasActions && canOpenWeaverNow(ctx.gnome))));
  } else if (state.quirkType === 'chute') {
    const hasSocks = ctx.inRoom && ctx.gnome.satchel.some(s => s?.type === 'Socks');
    actions.push(createSharedDecisionActionSpec('quirk-deposit', UI_TEXT.action.deposit, () => { clearSharedDecisionPopup({ render:false }); depositSocks(); }, !hasSocks));
  } else if (state.quirkType === 'mothEggs') {
    const canKickEggs = ctx.inRoom && G.actionsLeft > 0 && getKickTargetsForGnome(ctx.gnome).some(t => t.type === 'moth_eggs');
    actions.push(createSharedDecisionActionSpec('quirk-kick-eggs', '👟 Kick', () => { clearSharedDecisionPopup({ render:false }); doKick(); }, !canKickEggs));
  }
  return { ...getQuirkPopupSummary(state.quirkType, ctx), actions };
}

function buildSharedDecisionInventorySpec(state) {
  const gnome = G.gnomes?.[Number(state.gnomeIdx)] || null;
  if (!gnome) return { title: 'Unavailable', meta: '', actions: [createSharedDecisionActionSpec('__close__', 'Close', () => clearSharedDecisionPopup())] };
  const slotIdx = Number(state.slotIdx);
  const isHatSlot = slotIdx === -1;
  const item = isHatSlot ? (gnome.hat ? { type:'hat', id:gnome.hat } : null) : gnome.satchel[slotIdx];
  const context = { anchor:null, gnome, gnomeIdx:Number(state.gnomeIdx), itemType:state.itemType, slotIdx, isHatSlot, item, tile:G.grid[gnome.row]?.[gnome.col], inWeaverScreen:!!G.weaverModal };
  const actions = [];
  if (!item && !isHatSlot) return { title: 'Unavailable', meta: '', actions: [createSharedDecisionActionSpec('__close__', 'Close', () => clearSharedDecisionPopup())] };
  if (state.itemType === 'goodie') {
    const usable = isGoodieUsable(gnome, normalizeGoodieId(item.id));
    const canUse = usable && G.actionsLeft > 0;
    actions.push(createSharedDecisionActionSpec('use-goodie', `${getGoodieEmoji(item.id)} Use ${getGoodieName(item.id)}`, () => { clearSharedDecisionPopup({ render:false }); useGoodieFromSlot(slotIdx); }, !canUse));
    actions.push(createSharedDecisionActionSpec('drop-goodie', UI_TEXT.action.drop, () => {
      clearSharedDecisionPopup({ render:false });
      gnome.satchel[slotIdx] = null;
      spendAction();
      placeGoodieOnTile(context.tile, item.id, { emitDrop:true, logMessage:`${gnome.name} dropped ${getGoodieLabel(item.id)}.` });
      renderAll();
    }, G.actionsLeft <= 0));
    if (context.inWeaverScreen) actions.push(createSharedDecisionActionSpec('destroy-goodie', '🗑️ Destroy', () => { clearSharedDecisionPopup({ render:false }); destroyInventoryPopupItem({ ...context, label:getGoodieName(item.id) }); }));
  } else if (state.itemType === 'Socks') {
    const dropLabel = context.tile?.roomId === 1 || context.tile?.chute ? UI_TEXT.action.deposit : UI_TEXT.action.drop;
    actions.push(createSharedDecisionActionSpec('drop-socks', dropLabel, () => {
      clearSharedDecisionPopup({ render:false });
      gnome.satchel[slotIdx] = null;
      spendAction();
      if (context.tile?.roomId === 1 || context.tile?.chute) {
        G.SocksBanked++;
        GAME_EVENTS.emit('item.dropped', { itemType:'Socks', mode:'deposit' });
        addLog(`${gnome.name} deposited 🧦! Total: ${G.SocksBanked}/${getHouseGoal()}`, 'good');
        checkGoalMet();
      } else {
        context.tile.Socks++;
        GAME_EVENTS.emit('item.dropped', { itemType:'Socks', mode:'floor' });
        addLog(`${gnome.name} dropped 🧦 in ${ROOM_DEFS[context.tile.roomId].name}.`);
      }
      renderAll();
    }, G.actionsLeft <= 0));
    if (context.inWeaverScreen) actions.push(createSharedDecisionActionSpec('destroy-socks', '🗑️ Destroy', () => { clearSharedDecisionPopup({ render:false }); destroyInventoryPopupItem({ ...context, label:'Socks 🧦' }); }));
  } else if (state.itemType === 'hat') {
    if (isHatSlot) {
      const hatsInSatchel = gnome.satchel.map((s,i)=>s?.type==='hat'?{item:s,idx:i}:null).filter(Boolean);
      const freeSlot = findFirstFreeSatchelSlot(gnome);
      actions.push(createSharedDecisionActionSpec('move-hat-to-satchel', '📦 Move to Satchel', () => {
        clearSharedDecisionPopup({ render:false });
        const oldHat = gnome.hat;
        gnome.hat = null;
        gnome.satchel[freeSlot] = { type:'hat', id:oldHat };
        addLog(`${gnome.name} moves their hat to satchel.`);
        clearDistractState({ reason:' because the hat was unequipped.', log:true });
        updateActionsForHat();
        reconcileSatchelOverflow(gnome);
        renderAll();
      }, freeSlot === -1));
      hatsInSatchel.forEach(({ item:hItem, idx:hIdx }) => {
        const hdef = HATS_DEFS.find(h => h.id === hItem.id);
        actions.push(createSharedDecisionActionSpec(`equip-hat-${hIdx}`, `🔄 Equip ${hdef?.name || 'Hat'}`, () => {
          clearSharedDecisionPopup({ render:false });
          const oldHat = gnome.hat;
          gnome.hat = hItem.id;
          gnome.satchel[hIdx] = { type:'hat', id:oldHat };
          addLog(`${gnome.name} equips ${hdef?.name}!`, 'good');
          clearDistractState({ reason:' because the old hat was replaced.', log:!!gnome.distractActive });
          updateActionsForHat();
          reconcileSatchelOverflow(gnome);
          renderAll();
        }));
      });
      actions.push(createSharedDecisionActionSpec('drop-equipped-hat', UI_TEXT.action.drop, () => {
        clearSharedDecisionPopup({ render:false });
        const oldHat = gnome.hat;
        gnome.hat = null;
        const dropTile = G.grid[gnome.row][gnome.col];
        if (!dropTile.hatIds) dropTile.hatIds = [];
        dropTile.hatIds.push(oldHat);
        GAME_EVENTS.emit('item.dropped', { itemType:'hat', mode:'floor' });
        addLog(`${gnome.name} drops their hat on the floor.`);
        clearDistractState({ reason:' because the hat was dropped.', log:true });
        updateActionsForHat();
        reconcileSatchelOverflow(gnome);
        renderAll();
      }));
      if (context.inWeaverScreen) actions.push(createSharedDecisionActionSpec('destroy-equipped-hat', '🗑️ Destroy', () => { clearSharedDecisionPopup({ render:false }); destroyInventoryPopupItem({ ...context, label:HAT_DEF_BY_ID[item.id]?.name || 'Hat' }); }));
    } else {
      const hdef = HATS_DEFS.find(h => h.id === item.id);
      actions.push(createSharedDecisionActionSpec('equip-satchel-hat', `🎩 Equip ${hdef?.name || 'Hat'} (replace current)`, () => {
        clearSharedDecisionPopup({ render:false });
        const oldHat = gnome.hat;
        gnome.hat = item.id;
        gnome.satchel[slotIdx] = oldHat ? { type:'hat', id:oldHat } : null;
        addLog(`${gnome.name} equips ${hdef?.name}!`, 'good');
        updateActionsForHat();
        renderAll();
      }));
      actions.push(createSharedDecisionActionSpec('drop-satchel-hat', UI_TEXT.action.drop, () => {
        clearSharedDecisionPopup({ render:false });
        gnome.satchel[slotIdx] = null;
        const dropTile2 = G.grid[gnome.row][gnome.col];
        if (!dropTile2.hatIds) dropTile2.hatIds = [];
        dropTile2.hatIds.push(item.id);
        GAME_EVENTS.emit('item.dropped', { itemType:'hat', id:item.id, mode:'floor' });
        addLog(`${gnome.name} drops ${hdef?.name || 'Hat'} on the floor.`);
        renderAll();
      }));
      if (context.inWeaverScreen) actions.push(createSharedDecisionActionSpec('destroy-satchel-hat', '🗑️ Destroy', () => { clearSharedDecisionPopup({ render:false }); destroyInventoryPopupItem({ ...context, label:hdef?.name || 'Hat' }); }));
    }
  }
  return { ...getInventoryPopupSummary(context), actions };
}

function getSharedDecisionPopupSpec(state = G?.sharedDecisionPopup) {
  if (!state) return null;
  let spec = null;
  if (state.kind === 'inventory') spec = buildSharedDecisionInventorySpec(state);
  else if (state.kind === 'roomItem') spec = buildSharedDecisionRoomItemSpec(state);
  else if (state.kind === 'occupant') spec = buildSharedDecisionOccupantSpec(state);
  else if (state.kind === 'quirk') spec = buildSharedDecisionQuirkSpec(state);
  if (!spec) return null;
  const actions = Array.isArray(spec.actions) ? spec.actions.filter(Boolean) : [];
  if (!actions.length) actions.push(createSharedDecisionActionSpec('__close__', '(no actions)', () => clearSharedDecisionPopup(), true, { tone:'muted' }));
  actions.push(createSharedDecisionActionSpec('__close__', 'Close', () => clearSharedDecisionPopup()));
  spec.actions = actions;
  return spec;
}

function renderSharedDecisionButtons(actions, lockState) {
  const actionsEl = el('shared-decision-actions');
  if (!actionsEl) return;
  actionsEl.innerHTML = '';
  actions.forEach(action => {
    const btn = buildButton(action.label, () => {
      if (action.key === '__close__') {
        if (shouldDelegateSharedDecisionClearToHost()) return;
        clearSharedDecisionPopup();
        return;
      }
      if (shouldDelegateSharedDecisionActionToHost(action.key)) return;
      if (typeof action.perform === 'function') action.perform();
    }, {
      className: `shared-decision-btn${action.tone === 'muted' ? ' is-muted' : ''}`,
      disabled: !!action.disabled || !!lockState?.active,
      emitClick: true,
      stopPropagation: true,
    });
    if (action.detail) btn.title = action.detail;
    actionsEl.appendChild(btn);
  });
}

function syncSharedDecisionUi() {
  const overlay = el('shared-decision-overlay');
  const titleEl = el('shared-decision-title');
  const metaEl = el('shared-decision-meta');
  const noteEl = el('shared-decision-note');
  const spec = getSharedDecisionPopupSpec();
  if (!overlay || !titleEl || !metaEl || !noteEl) return;
  if (!spec || !G?.sharedDecisionPopup) {
    overlay.classList.remove('show');
    overlay.setAttribute('aria-hidden', 'true');
    return;
  }
  const lockState = getMultiplayerInputLockState();
  titleEl.textContent = spec.title || 'Choose an Action';
  metaEl.textContent = spec.meta || '';
  if (lockState.active) {
    noteEl.hidden = false;
    noteEl.textContent = lockState.message || 'Waiting for the active player.';
  } else {
    noteEl.hidden = true;
    noteEl.textContent = '';
  }
  renderSharedDecisionButtons(spec.actions || [], lockState);
  overlay.classList.add('show');
  overlay.setAttribute('aria-hidden', 'false');
}

function resolveAndPerformSharedDecisionAction(actionKey) {
  const spec = getSharedDecisionPopupSpec();
  if (!spec) return false;
  const action = (spec.actions || []).find(entry => entry && entry.key === actionKey);
  if (!action || action.disabled || typeof action.perform !== 'function') return false;
  action.perform();
  return true;
}

function showInventoryItemPopup(anchor, gnome, gnomeIdx, itemType, slotIdx) {
  if (isGameplayInputLocked()) { if (getInteractionLockState().active) addLog(getInteractionLockMessage(), 'system'); return; }
  const isHatSlot = Number(slotIdx) === -1;
  const item = isHatSlot ? (gnome.hat ? { type:'hat', id: gnome.hat } : null) : gnome.satchel[slotIdx];
  if (!item && !isHatSlot) return;
  openSharedDecisionPopup({ kind:'inventory', gnomeIdx:Number(gnomeIdx), itemType, slotIdx:Number(slotIdx) });
}


function createPopupActionDescriptor(label, action, disabled = false, options = {}) {
  if (disabled && typeof disabled === 'object') {
    options = disabled;
    disabled = !!options.disabled;
  }
  return { label, action, disabled, ...options };
}

function createPopupInfoActionDescriptor(label) {
  return createPopupActionDescriptor(label, () => closeItemPopup(), true, { tone: 'muted' });
}

function appendPopupActionDescriptors(popup, actions, options = {}) {
  const settings = typeof options === 'string' ? { emptyLabel: options } : (options || {});
  const descriptors = (actions || []).filter(Boolean);
  if (!descriptors.length) {
    addPopupBtn(popup, settings.emptyLabel || '(no actions available)', () => closeItemPopup(), true);
    return;
  }
  descriptors.forEach(({ label, action, disabled = false }) => addPopupBtn(popup, label, action, disabled));
}

function getPopupActorContext(anchor, r, c) {
  const gnome = G.gnomes[G.currentGnomeIdx];
  const isActive = G.phase === 'gnome' && gnome && !gnome.ko;
  return {
    anchor,
    r,
    c,
    gnome,
    tile: G.grid[r]?.[c],

function mountPopupNearAnchor(anchor, popup, { align = 'center', preferAbove = true } = {}) {
  if (!anchor || !popup) return;
  document.body.appendChild(popup);
  const rect = anchor.getBoundingClientRect();
  const popupRect = popup.getBoundingClientRect();
  const maxLeft = Math.max(8, window.innerWidth - popupRect.width - 8);
  const preferredLeft = align === 'left'
    ? rect.left
    : align === 'right'
      ? rect.right - popupRect.width
      : rect.left + Math.max(0, (rect.width - popupRect.width) / 2);
  popup.style.left = `${Math.min(maxLeft, Math.max(8, preferredLeft))}px`;
  const aboveTop = rect.top - popupRect.height - 6;
  const belowTop = rect.bottom + 6;
  const preferredTop = preferAbove ? aboveTop : belowTop;
  const fallbackTop = preferAbove ? belowTop : aboveTop;
  const fitsPreferred = preferAbove ? preferredTop >= 8 : preferredTop <= window.innerHeight - popupRect.height - 8;
  popup.style.top = `${fitsPreferred
    ? preferredTop
    : Math.max(8, Math.min(window.innerHeight - popupRect.height - 8, fallbackTop))}px`;
  deferDocumentOneShotClick(closeItemPopup);
}

function getDoorClickConfig(r, c, dir) {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome || gnome.ko || G.phase !== 'gnome') return null;

  if (gnome.row === r && gnome.col === c) {
    const tile = G.grid[r]?.[c];
    return tile ? { fromR:r, fromC:c, dir, tile } : null;
  }

  const [dr, dc] = DIR_DELTA[dir];
  const srcR = r + dr;
  const srcC = c + dc;
  if (gnome.row !== srcR || gnome.col !== srcC) return null;

  const srcTile = G.grid[srcR]?.[srcC];
  const clickedTile = G.grid[r]?.[c];
  const moveDir = OPPOSITE[dir];
  if (!srcTile || !clickedTile) return null;
  if (!tileHasDoor(srcTile, moveDir) || !tileHasDoor(clickedTile, dir)) return null;

  return { fromR:srcR, fromC:srcC, dir:moveDir, tile:srcTile };
}

function handleDoorClick(r, c, dir, tile) {
  const multiplayerLock = getMultiplayerInputLockState();
  if (multiplayerLock.active) {
    if (multiplayerLock.message) addLog(multiplayerLock.message, 'system');
    return;
  }
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome || gnome.ko || G.phase !== 'gnome' || G.actionsLeft <= 0) return;
  if (gnome.row !== r || gnome.col !== c) return;
  if (gnome.stickyBlocked) { addLog('🫟 Stuck this turn!','bad'); return; }
  const [dr, dc] = DIR_DELTA[dir];
  const nr = r+dr, nc = c+dc;
  const destTile = G.grid[nr]?.[nc];
  if (destTile) {
    if (!tilesConnected(tile, destTile)) return;
    executeGameAction('moveToRoom', { r: nr, c: nc, implicit: true });
  } else {
    if (!tileHasDoor(tile, dir)) return;
    if (!G.roomDeck.length) { addLog('No rooms left!','bad'); return; }
    executeGameAction('revealRoom', { r: nr, c: nc, fromDir: dir, implicit: true });
  }
}

function dropAllInventoryToCurrentRoom(gnome, { includeHat = true, log = true } = {}) {
  if (!gnome) return [];
  const tile = G.grid[gnome.row]?.[gnome.col];
  if (!tile) return [];
  const dropped = [];
  gnome.satchel.forEach((item, idx) => {
    if (!item) return;
    if (item.type === 'Socks') {
      tile.Socks = (tile.Socks || 0) + 1;
    } else if (item.type === 'goodie') {
      placeGoodieOnTile(tile, item.id);
    } else if (item.type === 'hat') {
      if (!tile.hatIds) tile.hatIds = [];
      tile.hatIds.push(item.id);
    }
    dropped.push(item);
    gnome.satchel[idx] = null;
  });
  if (includeHat && gnome.hat) {
    if (!tile.hatIds) tile.hatIds = [];
    tile.hatIds.push(gnome.hat);
    dropped.push({ type:'hat', id: gnome.hat, equipped: true });
    gnome.hat = null;
  }
  if (dropped.length) {
    GAME_EVENTS.emit('item.dropped', { itemType: 'inventory', mode: 'ko', count: dropped.length });
    if (log) addLog(`💥 ${gnome.name} drops everything in ${ROOM_DEFS[tile.roomId].name}!`, 'bad');
    updateActionsForHat();
  }
  return dropped;
}


function dropSingleCarriedItemToCurrentRoom(gnome, { log = true } = {}) {
  if (!gnome) return null;
  const tile = G.grid[gnome.row]?.[gnome.col];
  if (!tile) return null;
  const slotIdx = gnome.satchel.findIndex(Boolean);
  if (slotIdx === -1) return null;
  const item = gnome.satchel[slotIdx];
  if (!item) return null;
  if (item.type === 'Socks') {
    tile.Socks = (tile.Socks || 0) + 1;
  } else if (item.type === 'goodie') {
    placeGoodieOnTile(tile, item.id);
  } else if (item.type === 'hat') {
    tile.hatIds = tile.hatIds || [];
    tile.hatIds.push(item.id);
  }
  gnome.satchel[slotIdx] = null;
  if (log) addLog(`💼 ${gnome.name} drops ${getItemEmoji(item)} ${getItemName(item)} in ${ROOM_DEFS[tile.roomId].name}.`, 'bad');
  GAME_EVENTS.emit('item.dropped', { itemType: item.type, mode: 'loose-satchel', count: 1 });
  updateActionsForHat();
  return item;
}

function maybeApplyLooseSatchelOnMove(gnome) {

  const multiplayerLock = getMultiplayerInputLockState();
  const actionLocked = interruptLocked || !phaseIsGnome || !g || g.ko || G.actionsLeft <= 0;
  const moveLocked = interruptLocked || actionLocked || g?.stickyBlocked;
  const satchelSize = g ? getSatchelSize(g) : 0;
  const satchelFull = !g || g.satchel.slice(0, satchelSize).every(Boolean);
  const tileHasSocks = tile?.Socks > 0;
  const tileHasGoodies = tile?.goodieIds?.length > 0;
  const tileHasHats = tile?.hatIds?.length > 0;
  const tileHasItems = !!(tileHasSocks || tileHasGoodies || tileHasHats);
  const hasSocksInSatchel = !!g?.satchel.some(s => s?.type === 'Socks');
  const inLaundryRoom = !!(tile?.roomId === 1);

  const canDeposit = hasSocksInSatchel && (inLaundryRoom || inChuteRoom);
  const inLaundryForWeaver = !!(tile?.roomId === 1);
  const inWeaver = !!(tile?.weaver || inLaundryForWeaver);
  const canAffordAnyTrade = hasWeaverTradeResources(g);
  const ventDestinations = g ? getVentDestinations(g) : [];
  return {
    g,
    tile,
    phaseIsGnome,
    actionsShell,
    interruptLocked,
    interactionLock,
    multiplayerLock,
    interactionLockActive: !!interactionLock.active || !!multiplayerLock.active,
    lockOwnerButtonId: interactionLock.ownerButtonId || multiplayerLock.ownerButtonId || '',
    actionLocked,
    moveLocked,
    satchelSize,
    satchelFull,
    tileHasItems,
    inLaundryRoom,
    inChuteRoom,
    canDeposit,
    inWeaver,
    canAffordAnyTrade,
    ventDestinations,
    inVent: !!tile?.vent,

const HEADER_FX_STATE = { trouble: null, socks: null };
function restartHeaderAnimation(node, className) {
  if (!node) return;
  node.classList.remove(className);
  void node.offsetWidth;
  node.classList.add(className);
  window.setTimeout(()=>node.classList.remove(className), 1200);
}
function spawnSockBurst() {
  const chip = el('socks-chip');
  if (!chip) return;
  const burst = document.createElement('span');
  burst.className = 'sock-burst';
  burst.textContent = '🧦';
  chip.appendChild(burst);
  window.setTimeout(()=>burst.remove(), 950);
}
function flashThresholdMarker(threshold) {
  const marker = document.querySelector(`#trouble-bar-markers .trouble-marker[data-threshold="${threshold}"]`);
  if (!marker) return;
  restartHeaderAnimation(marker, 'threshold-flash');
}
function getNextTroubleThreshold(current) {
  const thresholds = [3,6,10,15];
  return thresholds.find(t=>t>current) || null;
}
function updateHeader() {
  const prevTrouble = HEADER_FX_STATE.trouble;
  const prevSocks = HEADER_FX_STATE.socks;
  const goal = getHouseGoal();
  el('Socks-count').textContent = G.SocksBanked;
  el('Socks-goal').textContent = goal;
  el('trouble-val').textContent = G.trouble;
  el('house-num').textContent = G.house;
  const maxTrouble = getMaxTrouble();
  const troubleMaxEl = el('trouble-max');
  if (troubleMaxEl) troubleMaxEl.textContent = `/${maxTrouble}`;
  const pct = (G.trouble / Math.max(1, maxTrouble)) * 100;
  const fill = el('trouble-bar-fill');
  const troubleWrap = el('trouble-bar-wrap');
  const socksChip = el('socks-chip');
  fill.style.width = pct+'%';
  fill.style.background = G.trouble<6?'#4caf50':G.trouble<10?'#ff9800':'#f44336';
  fill.style.boxShadow = G.trouble < 6 ? '0 0 18px rgba(76,175,80,.26)' : (G.trouble < 10 ? '0 0 18px rgba(255,152,0,.28)' : '0 0 22px rgba(244,67,54,.34)');
  const ph = el('phase-indicator');
  if (ph) {
    if (G.phase==='patrol') { ph.textContent='🚨 Patrol Phase'; ph.className='phase-indicator patrol-phase'; }
    else { const g=G.gnomes[G.currentGnomeIdx]; ph.textContent=g?`${g.emoji} ${g.name}`:'Gnome Phase'; ph.className='phase-indicator gnome-phase'; }
  }
  const nextThreshold = getNextTroubleThreshold(G.trouble);
  document.querySelectorAll('#trouble-bar-markers .trouble-marker').forEach(marker=>{
    const threshold = Number(marker.dataset.threshold||0);
    marker.classList.toggle('active', G.trouble >= threshold);
    marker.classList.toggle('next-danger', threshold === nextThreshold);
  });
  if (typeof prevTrouble === 'number' && G.trouble !== prevTrouble) {
    restartHeaderAnimation(troubleWrap, G.trouble > prevTrouble ? 'trouble-hit' : 'trouble-settle');
    if (G.trouble > prevTrouble) {
      [3,6,10,15].forEach(threshold => {
        if (prevTrouble < threshold && G.trouble >= threshold) flashThresholdMarker(threshold);
      });
    }
  }
  if (troubleWrap) troubleWrap.classList.toggle('high-alert', G.trouble >= 10);
  if (typeof prevSocks === 'number' && G.SocksBanked > prevSocks) {
    restartHeaderAnimation(socksChip, 'sock-pop');
    spawnSockBurst();
    if (G.SocksBanked >= goal && prevSocks < goal) restartHeaderAnimation(socksChip, 'goal-glow');
  }
  const roomsEl = el('rooms-tracker');
  if (roomsEl) {
    roomsEl.innerHTML = `🚪 <span id="rooms-count-inline">${G.tilesRevealed||1}</span>`;
    const overFree = (G.tilesRevealed||1) > getFreeTiles();
    roomsEl.style.color = overFree ? '#f44336' : '';
    roomsEl.style.fontWeight = overFree ? '800' : '';
  }
  HEADER_FX_STATE.trouble = G.trouble;
  HEADER_FX_STATE.socks = G.SocksBanked;
}

const BASE_SATCHEL_SIZE = 3;
function getSatchelSize(g) { const hatId = getEffectiveHatId(g); return BASE_SATCHEL_SIZE + (HAT_DEF_BY_ID[hatId]?.satchelBonus || 0); }
function findFirstFreeSatchelSlot(gnome) {
  const size = getSatchelSize(gnome);
  return gnome.satchel.findIndex((s,i)=>s===null && i < size);
}
function canReceiveInSatchel(gnome, item) {
  if (gnome?.ko) return false;
  if (findFirstFreeSatchelSlot(gnome) !== -1) return true;

  if (item?.type === 'hat' && !gnome.hat) return true;

// Give a hat to a gnome: auto-equips if the hat slot is empty, otherwise goes to satchel.

function giveHatToGnome(gnome, hid) {
  if (!gnome.hat) {

function handleRoomClick(r, c, tile) {
  const multiplayerLock = getMultiplayerInputLockState();
  if (multiplayerLock.active) {
    if (multiplayerLock.message) addLog(multiplayerLock.message, 'system');
    return;
  }
  // Panic phase: current gnome must move to an adjacent room
  if (isPanicInterruptActive()) {
    if (G.panicMoving) return;   // still resolving previous move
    const gnome = G.gnomes[G.currentGnomeIdx];
    if (!gnome || gnome.ko) return;
    // Only respond if this gnome is actually at the front of the panic queue
    if (!G.panicState || G.panicState.panicQueue[0] !== G.currentGnomeIdx) return;
    const targets = getConnectedRooms(gnome.row, gnome.col);
    const isTarget = targets.some(([tr,tc])=>tr===r&&tc===c);
    if (isTarget) {
      completePanicMove(r, c);
    } else {
      addLog(`😱 Panic! ${gnome.name} must move to an adjacent room.`, 'bad');
    }
    return;
  }
  if (G.phase!=='gnome') return;
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome||gnome.ko) return;

  const context = { r, c, tile };
  const handled = resolveActiveBoardInteraction('room', context);
  if (!handled && handleActiveBoardInteractionMiss('room', context)) return;
  if (!handled) {
    G.selectedCell = [r,c];
  }
  renderAll();
}

function handleRevealClick(r, c, fromDir) {
  const multiplayerLock = getMultiplayerInputLockState();
  if (multiplayerLock.active) {
    if (multiplayerLock.message) addLog(multiplayerLock.message, 'system');
    return;
  }
  if (G.phase !== 'gnome') return;
  const context = { r, c, fromDir };
  if (resolveActiveBoardInteraction('reveal', context)) return;
  if (handleActiveBoardInteractionMiss('reveal', context)) return;
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome || gnome.ko) return;
  if (!canSpendMove(gnome)) return;
  if (gnome.stickyBlocked) { addLog(`🫟 ${gnome.name} is stuck — cannot move this turn!`,'bad'); return; }
  if (G.roomDeck.length===0) { addLog('No rooms left to reveal!','bad'); return; }
  executeGameAction('revealRoom', { r, c, fromDir, implicit: true });
}

function cancelPendingBoardAction(kind='action') {
  const cancelled = clearInteractionModes({ render: false });
  if (cancelled) {
    addLog(`Cancelled ${kind}.`, 'system');
    renderAll();
  }
  return cancelled;
}

function selectAction(action) {
  const multiplayerLock = getMultiplayerInputLockState(action);
  if (multiplayerLock.active) {
    if (multiplayerLock.message) addLog(multiplayerLock.message, 'system');
    return;
  }
  const active = G.gnomes[G.currentGnomeIdx];
  if (isInterruptActive()) {
    if (isEventInterruptActive()) addLog('Resolve the Event first.', 'bad');
    return;
  }
  if (G.phase !== 'gnome' || !active || active.ko) return;
  if (action === 'move' && !canSpendMove(active)) return;
  if (action !== 'move' && G.actionsLeft <= 0) return;
  if (G.selectedAction===action) { cancelPendingBoardAction(action); return; }
  clearInteractionModes();
  if (action === 'hatAction') { triggerHatAction(); return; }
  G.selectedAction = action;
  renderAll();
}
