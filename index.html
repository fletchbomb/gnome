<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gnome Invasion v156</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
  :root {
    --bg:#1a1a2e;--panel:#16213e;--card:#0f3460;--accent:#e94560;--gold:#f5a623;
    --green:#4caf50;--text:#eaeaea;--muted:#8899aa;--radius:10px;

    /* Theme architecture aliases — keep visuals identical, but route future reskins through semantic tokens */
    --color-bg-app:var(--bg);
    --color-surface-panel:var(--panel);
    --color-surface-board:var(--card);
    --color-surface-elevated:var(--card);
    --color-accent-primary:var(--accent);
    --color-accent-gold:var(--gold);
    --color-accent-positive:var(--green);
    --color-text-primary:var(--text);
    --color-text-muted:var(--muted);
    --radius-sm:7px;
    --radius-md:var(--radius);
    --radius-lg:14px;
    --board-cell-size:162px;
    --board-gap:4px;
    --shadow-card-pop:0 10px 30px rgba(0,0,0,.7);
    --shadow-panel-deep:0 8px 40px #000c;
    --font-display:'Fredoka One',cursive;
    --font-body:'Nunito',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font-body);background:var(--color-bg-app);color:var(--color-text-primary);min-height:100vh;overflow-x:hidden;}
  h1,h2,h3{font-family:var(--font-display);}

  /* Semantic UI shell hooks for future theme swaps */
  .ui-shell-app{}
  .ui-shell-header{}
  .ui-shell-main{}
  .ui-shell-board-area{}
  .ui-shell-sidebar{}
  .ui-shell-log{}
  .ui-shell-overlay{}
  .ui-shell-panel{}
  .ui-shell-popup{}
  .ui-shell-card{}
  .ui-shell-token{}
  #app{position:relative;height:100vh;overflow:hidden;background:var(--color-bg-app);}
  #header{position:absolute;top:12px;left:12px;right:332px;z-index:40;padding:0;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;background:transparent;border:none;pointer-events:none;}
  #header > *{pointer-events:auto;}
  #header h1{font-size:1.4rem;color:var(--gold);padding:7px 12px;border-radius:14px;background:rgba(15,52,96,.88);box-shadow:0 8px 20px rgba(0,0,0,.28);}
  #main{position:relative;height:100%;overflow:hidden;}
  #board-area{position:absolute;inset:0;overflow:auto;padding:24px 24px 116px 24px;display:flex;align-items:safe center;justify-content:safe center;}
  #board-area.pan-ready{cursor:grab;}
  #board-area.is-panning{cursor:grabbing;user-select:none;}
  #board-area.is-panning,
  #board-area.is-panning *{cursor:grabbing !important;}
  #sidebar{position:fixed;left:50%;transform:translateX(-50%);top:auto;right:auto;bottom:12px;width:auto;padding:0;overflow:visible;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:10px;background:transparent;border:none;z-index:45;pointer-events:none;}
  #sidebar > *{pointer-events:auto;}
  #log-area{position:relative;left:auto;right:auto;bottom:auto;top:auto;width:100%;max-height:none;background:transparent;border:none;border-radius:0;padding:8px 0 0;z-index:auto;box-shadow:none;backdrop-filter:none;overflow:hidden;}
  #top-left-shell{position:fixed;top:12px;left:auto;right:12px;width:min(292px,calc(100vw - 24px));z-index:45;padding:10px 12px 9px;}
  #top-left-shell #header{position:relative;inset:auto;background:transparent;border:none;box-shadow:none;padding:0;}
  #top-left-shell #header-summary{display:flex;flex-direction:column;gap:6px;width:100%;}
  #header-brand{display:none !important;}
  #top-left-shell .tracker-row{display:grid;grid-template-columns:1.35fr 1fr .8fr .8fr 28px;gap:4px;align-items:center;width:100%;}
  #top-left-shell #log-area.collapsed{width:100%;}
  #top-left-shell #log{max-height:min(24vh,200px);}
  .tracker-row{flex-wrap:nowrap;align-items:center;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .tracker{background:var(--card);border-radius:var(--radius);padding:4px 6px;font-weight:700;font-size:0.66rem;text-align:center;min-width:0;display:flex;align-items:center;justify-content:center;gap:2px;}
  .tracker.good{background:#1a3a2a;color:#6bff9e;}
  .tracker-compact{padding:3px 4px !important; min-width:0;}

  .audio-toggle-btn{
    margin-left:0;
    width:24px;
    height:24px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.35);
    background:rgba(255,255,255,.08);
    color:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 0 8px rgba(255,255,255,.24), inset 0 0 8px rgba(255,255,255,.05);
    transition:transform .15s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease, opacity .15s ease;
    flex:0 0 auto;
  }
  .audio-toggle-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 0 14px rgba(255,255,255,.38), inset 0 0 10px rgba(255,255,255,.08);
  }
  .audio-toggle-btn .audio-icon{
    font-size:11px;
    line-height:1;
    filter:drop-shadow(0 0 4px rgba(255,255,255,.55));
  }
  .audio-toggle-btn.muted{
    background:transparent;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.16);
    border-color:rgba(255,255,255,.22);
    opacity:.8;
  }

  #trouble-bar-wrap{background:var(--card);border-radius:var(--radius);padding:6px 10px 9px;min-width:0;width:100%;}
  #trouble-bar-bg{position:relative;background:#333d4a;border-radius:8px;height:18px;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);}
  #trouble-bar-fill{position:absolute;left:0;top:0;bottom:0;border-radius:8px 0 0 8px;transition:width .4s,background .4s;background:var(--green);z-index:1;}
  #trouble-bar-bg::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(to right, transparent 0 calc(5% - 1px), rgba(255,255,255,.10) calc(5% - 1px) 5%);pointer-events:none;z-index:2;}
  #trouble-bar-markers{position:absolute;inset:0;pointer-events:none;z-index:3;}
  .trouble-marker{position:absolute;top:50%;transform:translate(-50%,-52%);font-size:9px;line-height:1;opacity:.42;filter:grayscale(.25);text-shadow:0 1px 2px rgba(0,0,0,.9);transition:opacity .2s,transform .2s,filter .2s;}
  .trouble-marker.active{opacity:.9;filter:none;transform:translate(-50%,-52%) scale(1.08);} 

  #header .tracker-row{justify-content:flex-start;pointer-events:auto;}
  #sidebar::-webkit-scrollbar,#board-area::-webkit-scrollbar{width:10px;height:10px;}
  #sidebar::-webkit-scrollbar-thumb,#board-area::-webkit-scrollbar-thumb{background:#28476b;border-radius:999px;}
  #sidebar > :not(#actions-shell):not(#gnomes-shell):not(#patrol-tray){display:none !important;}
  #actions-shell,#gnomes-shell{display:flex;flex-direction:column;gap:6px;}
  #patrol-tray{z-index:25;display:flex;flex-direction:column;align-items:flex-start;gap:10px;}
  .floating-panel{background:rgba(22,33,62,.94);border:1px solid rgba(73,103,141,.9);border-radius:16px;padding:10px 12px;box-shadow:0 12px 36px rgba(0,0,0,.35);}
  .gnome-stack{display:flex;flex-direction:column;gap:8px;}
  #bottom-dock{position:fixed;left:12px;right:auto;top:12px;bottom:auto;transform:none;display:flex;flex-direction:column;justify-content:flex-start;align-items:flex-start;gap:10px;z-index:45;pointer-events:none;max-width:min(360px,calc(100vw - 24px));}
  #bottom-dock > *{pointer-events:auto;}
  #gnome-panels{position:relative;left:auto;right:auto;bottom:auto;display:flex;flex-direction:column;justify-content:flex-start;align-items:flex-start;gap:10px;z-index:auto;pointer-events:none;flex-wrap:nowrap;overflow:visible;width:100%;}
  #gnome-panels > *{pointer-events:auto;}
  #actions .section-title, #gnomes-shell > .section-title{margin-bottom:0;}
  #actions{display:flex;flex-direction:row;align-items:flex-start;justify-content:flex-start;gap:0;width:100%;flex-wrap:nowrap;}
  #actions-shell .floating-title-row{display:none;}
  #actions-shell #current-gnome-info{width:100%;text-align:center;}
  #primary-action-grid{margin:0;}
  #actions-shell .action-btn-grid, #actions-shell .action-btn.end-turn{margin-left:0;margin-right:0;}

  #room-detail,.legend,#hamper-display,#patrol-display,#current-gnome-info{display:none !important;}
  .floating-title-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .floating-title-row .section-title{margin-bottom:0;}
  .inline-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:999px;background:#0a2040;border:1px solid #2a4a6a;color:var(--text);font-size:.66rem;font-weight:800;white-space:nowrap;}
  .inline-badge.turn{border-color:rgba(245,166,35,.6);color:var(--gold);}
  .inline-badge.actions{border-color:rgba(76,255,158,.55);color:#7dffb5;}
  .gnome-meta{display:flex;flex-wrap:wrap;gap:5px;margin:0 0 6px;}
  #log-area.collapsed #log{display:none;}
  #log-area:not(.collapsed) #log-latest{display:none;}
  #log-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;}
  #log-latest{font-size:.78rem;line-height:1.45;min-height:1.45em;padding:2px 0 0;}
  #log-toggle{background:#0a2040;border:1px solid #2a4a6a;border-radius:999px;color:var(--text);font-family:var(--font-body);font-weight:800;font-size:.72rem;padding:4px 10px;cursor:pointer;}
  #log-toggle:hover{border-color:var(--accent);background:#1a3a6a;}
  #log{max-height:min(34vh,280px);overflow:auto;padding-right:4px;}
  #log-area.collapsed{width:100%;}
#screen-edge-vignette{position:fixed;inset:0;z-index:30;pointer-events:none;}
  #screen-edge-vignette::before{content:'';position:absolute;inset:0;background:linear-gradient(to bottom, rgba(6,10,20,.82) 0px, rgba(6,10,20,.52) 64px, rgba(6,10,20,.18) 118px, rgba(6,10,20,0) 168px),linear-gradient(to top, rgba(6,10,20,.72) 0px, rgba(6,10,20,.26) 72px, rgba(6,10,20,0) 148px),linear-gradient(to right, rgba(6,10,20,.56) 0px, rgba(6,10,20,.2) 72px, rgba(6,10,20,0) 138px),linear-gradient(to left, rgba(6,10,20,.56) 0px, rgba(6,10,20,.2) 72px, rgba(6,10,20,0) 138px);}
  #screen-edge-vignette::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at center, rgba(0,0,0,0) 56%, rgba(0,0,0,.05) 82%, rgba(0,0,0,.11) 100%);}
#actions-shell{align-self:stretch;width:100%;max-width:100%;display:flex;flex-direction:column;align-items:stretch;background:rgba(8,20,39,.92);border:1px solid rgba(255,255,255,.08);box-shadow:none;padding:10px 8px 6px;border-radius:16px;backdrop-filter:none;--active-gnome-color:var(--gold);box-sizing:border-box;}
.action-btn-grid{display:grid;grid-template-columns:repeat(4,61px);grid-auto-rows:61px;justify-content:center;align-items:start;column-gap:7px;row-gap:7px;width:max-content;max-width:100%;overflow:visible;padding-top:4px;padding-bottom:2px;margin:0 auto;}
.action-group-label{font-size:.65rem;color:var(--muted);margin:2px 0 0;}
.action-divider{border-color:#2a3a4a;margin:8px 0 6px;width:100%;}
.action-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;width:61px;height:61px;min-height:61px;padding:4px 3px;margin-bottom:0;background:#0a2040;border:1px solid #2a4a6a;border-radius:14px;color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;font-size:.6rem;cursor:pointer;text-align:center;transition:background .15s,border-color .15s,transform .12s,box-shadow .15s;}
.action-btn:hover:not(:disabled){background:#1a3a6a;border-color:var(--accent);transform:translateY(-1px);}
.action-btn:disabled{background:rgba(10,22,42,.78);border-color:rgba(86,109,141,.34);color:rgba(234,234,234,.42);box-shadow:none;filter:grayscale(.38) saturate(.72);opacity:1;cursor:not-allowed;transform:none;}
.action-btn:disabled .action-icon,.action-btn:disabled .action-label{opacity:.58;}
.action-btn .action-icon{font-size:1.45rem;line-height:1;}
.action-btn .action-label{font-size:.52rem;line-height:1.02;max-width:54px;display:block;text-wrap:balance;}
.action-btn.end-turn{width:61px;height:61px;min-height:61px;flex-direction:column;justify-content:center;gap:4px;}
.action-btn.end-turn .action-icon{font-size:1.32rem;}
#actions h3{display:none;}
#actions-shell,#gnomes-shell{backdrop-filter:none;}
#actions-shell.is-hidden{display:none !important;}
.gnome-card-actions{margin:10px 0 0;padding:10px 8px 4px;border-top:1px solid rgba(255,255,255,.10);border-radius:0;background:none;box-shadow:none;overflow:visible;animation:activeTrayUnfold .24s cubic-bezier(.2,.8,.2,1);transform-origin:top center;align-self:stretch;width:100%;box-sizing:border-box;}
.gnome-card-actions #actions{align-items:stretch;gap:0;justify-content:flex-start;width:100%;padding:0;box-sizing:border-box;margin:0;}
.gnome-card-actions .action-divider{display:none;}
.gnome-card-actions .action-btn-grid{padding-top:0;padding-bottom:2px;justify-content:start;justify-items:start;margin:0;overflow:visible;}
.gnome-card-actions .action-btn{animation:actionButtonSettle .24s ease both;}
.gnome-card-actions .action-btn:nth-child(1){animation-delay:.02s;}
.gnome-card-actions .action-btn:nth-child(2){animation-delay:.04s;}
.gnome-card-actions .action-btn:nth-child(3){animation-delay:.06s;}
.gnome-card-actions .action-btn:nth-child(4){animation-delay:.08s;}
.gnome-card-actions .action-btn:nth-child(5){animation-delay:.10s;}
.gnome-card-actions .action-btn:nth-child(6){animation-delay:.12s;}
.gnome-card-actions .action-btn:nth-child(7){animation-delay:.14s;}
@keyframes activeTrayUnfold{from{opacity:0;transform:translateY(-6px) scaleY(.95);}to{opacity:1;transform:translateY(0) scaleY(1);}}
@keyframes actionButtonSettle{from{opacity:0;transform:translateY(-4px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}
  @media (max-width: 1100px){
    #header{right:12px;}
    #board-area{padding:20px 16px 108px 16px;}
    #sidebar{left:50%;bottom:12px;max-height:none;width:auto;}
    #top-left-shell{width:min(292px,calc(100vw - 24px));}
    #log-area,#log-area.collapsed{width:100%;}
    #gnome-panels{gap:8px;}
    #bottom-dock{left:10px;top:10px;max-width:calc(100vw - 20px);}
  }

  /* BOARD */
   #board{display:grid;gap:var(--board-gap);position:relative;}

  /* CELL BASE */
  .cell{width:var(--board-cell-size);height:var(--board-cell-size);border-radius:7px;position:relative;overflow:visible;}

  /* Empty cells */
  .cell.empty{background:#0d1525;border:1px dashed #1e2d40;cursor:default;}
  .cell.empty.can-reveal{border:2px dashed var(--gold);background:#121e10;cursor:pointer;}
  .cell.empty.can-reveal:hover{background:#1a2e18;transform:scale(1.04);}
  .cell.empty.can-reveal.trouble-zone{border-color:#f44336;background:#200a0a;}
  .cell.empty.can-reveal.trouble-zone:hover{background:#2e0e0e;}

  /* Room cells */
  .cell.room{background:var(--card);border:2px solid #1e4a7a;cursor:pointer;display:flex;flex-direction:column;align-items:stretch;justify-content:center;padding:2px;transition:transform .1s,box-shadow .1s;}
  .cell.room:hover{transform:scale(1.03);z-index:30;}
  .cell.room.laundry{background:linear-gradient(180deg, rgba(76,136,192,.99), rgba(34,78,124,.99)),repeating-linear-gradient(0deg, rgba(21,92,150,.95) 0 1px, transparent 1px 12px),repeating-linear-gradient(90deg, rgba(21,92,150,.95) 0 1px, transparent 1px 12px),repeating-linear-gradient(180deg, rgba(232,247,255,.34) 0 5px, rgba(122,186,232,.28) 5px 11px, rgba(33,82,126,.13) 11px 12px),repeating-linear-gradient(90deg, rgba(228,245,255,.30) 0 5px, rgba(112,176,224,.24) 5px 11px, rgba(28,76,118,.13) 11px 12px);border-color:var(--gold);box-shadow:inset 0 0 0 1px rgba(232,246,255,.28), inset 0 0 28px rgba(7,20,36,.20);background-size:auto,12px 12px,12px 12px,12px 12px,12px 12px;}
  .cell.room.move-target{border-color:#4cff9e;box-shadow:0 0 8px #4cff9e88;}
  .cell.room.current-gnome{border-color:var(--gold);}
  .cell.room.selected-room{border-color:var(--accent);}

  .room-name{font-size:0.9rem;font-family:'Fredoka One';line-height:1.08;margin:0;text-align:center;}
  .room-quirks{font-size:1.07rem;line-height:1.2;text-align:center;}
  .room-tokens{font-size:1.12rem;text-align:center;}
  .room-occupants{font-size:1.4rem;text-align:center;line-height:1;}
  .room-name-band{position:absolute;left:22px;right:22px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;z-index:4;pointer-events:none;}
  .room-center-tools{font-size:1.05rem;line-height:1;display:flex;gap:4px;justify-content:center;pointer-events:auto;}
  .room-token-lane{position:absolute;left:22px;right:22px;display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap;z-index:4;}
  .room-token-lane.top{top:34px;min-height:30px;}
  .room-token-lane.bottom{bottom:30px;min-height:30px;}
  .room-corner{position:absolute;display:flex;align-items:center;gap:2px;z-index:4;}
  .room-corner.tl{top:8px;left:8px;opacity:.52;font-size:1.05rem;filter:grayscale(1) saturate(0) brightness(.38);}
  .room-corner.tr{top:8px;right:8px;max-width:62px;justify-content:flex-end;flex-wrap:wrap;}
  .room-corner.bl{bottom:8px;left:8px;max-width:62px;flex-wrap:wrap;}
  .room-corner.br{bottom:8px;right:8px;justify-content:flex-end;max-width:48px;flex-wrap:wrap;}
  .corner-stack{display:flex;gap:2px;flex-wrap:wrap;justify-content:flex-end;align-items:flex-start;}
  .room-static-icon{display:inline-flex;align-items:center;justify-content:center;min-width:16px;line-height:1;font-size:1.03rem;}


  /* ── GNOME FLIP (hidden state) ───────────────────────────────────────── */
  .gnome-token {
    display: inline-block;
    position: relative;
    width: 2.16em; height: 2.16em;
    cursor: pointer;
    vertical-align: middle;
    perspective: 200px;
    -webkit-perspective: 200px;
  }
  .gnome-token-inner {
    position: relative;
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    -webkit-transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(.4,0,.2,1);
    -webkit-transition: -webkit-transform 0.5s cubic-bezier(.4,0,.2,1);
  }
  .gnome-token.is-hidden .gnome-token-inner {
    transform: rotateY(180deg);
    -webkit-transform: rotateY(180deg);
  }
  .gnome-token-front,
  .gnome-token-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    font-size: 1em;
  }
  .gnome-token-back {
    transform: rotateY(180deg);
    -webkit-transform: rotateY(180deg);
  }
  /* Back face: just the 🫣 emoji, rendered monochrome and semi-transparent like etched into the coin */
  .gnome-token-back .back-hide {
    font-size: 0.88em;
    filter: grayscale(1) brightness(0.55) opacity(0.6);
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%;
  }

  .gnome-token.sticky-gnome .gnome-token-front {
    animation: stickyPulse 1.6s ease-in-out infinite;
  }
  @keyframes stickyPulse {
    0%   { filter: drop-shadow(0 0 0px transparent); }
    50%  { filter: drop-shadow(0 0 6px #a855f7) drop-shadow(0 0 3px #7c3aed); }
    100% { filter: drop-shadow(0 0 0px transparent); }
  }

  /* Freeze board animations while card overlay is up */
  #card-overlay.show ~ * .gnome-token.sticky-gnome .gnome-token-front,
  body.card-showing .gnome-token.sticky-gnome .gnome-token-front {
    animation-play-state: paused;
  }
  .patrol-coin {
    display: inline-flex;
    align-items: center; justify-content: center;
    position: relative;
    width: 2.3em; height: 2.3em;
    cursor: pointer;
    vertical-align: middle;
  }
  .patrol-coin::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, #ef4444 0%, #b91c1c 55%, #7f1d1d 100%);
    box-shadow:
      0 2px 5px rgba(0,0,0,.55),
      inset 0 1px 2px rgba(255,255,255,.18),
      inset 0 -2px 4px rgba(0,0,0,.3);
  }
  .patrol-coin-emoji {
    position: relative;
    z-index: 1;
    font-size: 1.05em;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.6));
    line-height: 1;
  }
  .patrol-facing-dot {
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 3px #fff, 0 0 6px rgba(255,255,200,.8);
    z-index: 2;
    pointer-events: none;
  }
  .patrol-facing-dot.N { top: 3px;    left: 50%; transform: translateX(-50%); }
  .patrol-facing-dot.S { bottom: 3px; left: 50%; transform: translateX(-50%); }
  .patrol-facing-dot.W { left: 3px;   top: 50%;  transform: translateY(-50%); }
  .patrol-facing-dot.E { right: 3px;  top: 50%;  transform: translateY(-50%); }

  /* DOOR INDICATORS — rendered as notches on the cell border, clickable */
  .door{position:absolute;background:#f5a623;z-index:5;cursor:pointer;transition:background .15s, opacity .15s, box-shadow .15s;}
  .door:hover{background:#ffe082;}
  .door.disabled{background:#6b7280;opacity:.55;cursor:not-allowed;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);}
  .door.disabled:hover{background:#6b7280;}
  .door.N{top:-3px;left:50%;transform:translateX(-50%);width:48px;height:8px;border-radius:3px 3px 0 0;}
  .door.S{bottom:-3px;left:50%;transform:translateX(-50%);width:48px;height:8px;border-radius:0 0 3px 3px;}
  .door.W{left:-3px;top:50%;transform:translateY(-50%);width:8px;height:48px;border-radius:3px 0 0 3px;}
  .door.E{right:-3px;top:50%;transform:translateY(-50%);width:8px;height:48px;border-radius:0 3px 3px 0;}
  .cell.room.shroom-target{border-color:#a855f7;box-shadow:0 0 10px #a855f788;}
  .cell.room.shroom-target:hover{border-color:#c084fc;}
  .cell.room.kick-dest{border-color:#f59e0b;box-shadow:0 0 10px #f59e0b88;}
  .cell.room.vent-dest{border-color:#4dd0e1;box-shadow:0 0 10px #4dd0e188;}
  .cell.room.patrol-new{animation:patrolPulse 1s ease-in-out infinite;}
  .cell.room.dynamite-active{z-index:40;isolation:isolate;overflow:visible;}
  .cell.room.dynamite-active:hover{z-index:60;}

  @keyframes patrolPulse{0%,100%{border-color:#ff4444;box-shadow:0 0 6px #ff444488;}50%{border-color:#ff0000;box-shadow:0 0 18px #ff0000cc;}}
  .game-card.patrol-spawn  { --card-border:#ff4444; --card-header-bg:#2a0606; --card-pip:#ff4444; }
  #game-tooltip{position:fixed;z-index:10000;background:#0d1f35;border:1px solid var(--accent);border-radius:8px;padding:6px 11px;font-size:.75rem;color:var(--text);white-space:pre-wrap;max-width:220px;pointer-events:none;display:none;box-shadow:0 4px 16px #000b;line-height:1.4;font-family:'Nunito',sans-serif;}
  /* Patrol turn announcement banner */
  #patrol-banner{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:500;background:#0d1f35;border:3px solid #ff4444;border-radius:16px;padding:18px 36px;text-align:center;font-family:'Fredoka One';font-size:1.6rem;color:#fff;box-shadow:0 8px 40px #000c;pointer-events:none;}
  #patrol-banner.show{display:block;animation:bannerPop .3s ease-out;}
  /* When a card is showing, blur elements behind the card overlay */
  body.card-showing #patrol-banner,
  body.card-showing #patrol-tray,
  body.card-showing #board,
  body.card-showing #sidebar,
  body.card-showing #log-area,
  body.card-showing #header {
    opacity: 0.55;
    transition: opacity 0.12s ease;
  }
  @keyframes bannerPop{from{transform:translate(-50%,-50%) scale(.7);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}

  /* ── PANIC INTERRUPT OVERLAY ─────────────────────────────────────────── */
  #panic-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 450;
    pointer-events: none;
    border: 4px solid transparent;
    animation: panicBorderPulse 1s ease-in-out infinite;
  }
  #panic-overlay.show { display: block; }

  #explosion-flash{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:700;
    display:none;
    background:
      radial-gradient(circle at center, rgba(255,245,180,.92) 0%, rgba(255,180,70,.75) 18%, rgba(255,90,0,.45) 38%, rgba(255,40,0,.18) 58%, rgba(0,0,0,0) 74%);
    mix-blend-mode:screen;
  }
  #explosion-flash.show{
    display:block;
    animation: explosionFlashPulse .6s ease-out forwards;
  }
  @keyframes explosionFlashPulse{
    0%{opacity:0; transform:scale(.96);}
    12%{opacity:1; transform:scale(1);}
    45%{opacity:.55; transform:scale(1.02);}
    100%{opacity:0; transform:scale(1.05);}
  }

  @keyframes panicBorderPulse {
    0%,100% { border-color: rgba(239,68,68,0); box-shadow: inset 0 0 0px rgba(239,68,68,0); }
    50%      { border-color: rgba(239,68,68,.9); box-shadow: inset 0 0 60px rgba(239,68,68,.18); }
  }
  #panic-banner {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 460;
    background: linear-gradient(90deg, rgba(127,0,0,.85), rgba(220,38,38,.92), rgba(127,0,0,.85));
    color: #fff;
    font-family: 'Fredoka One';
    font-size: 1.1rem;
    text-align: center;
    padding: 6px 16px;
    letter-spacing: .06em;
    pointer-events: none;
    animation: panicBannerPulse 1s ease-in-out infinite;
  }
  #panic-banner.show { display: block; }
  @keyframes panicBannerPulse {
    0%,100% { opacity: .8; }
    50%      { opacity: 1; }
  }
  /* Dim everything on the board except move targets and current gnome room during panic */
  body.panic-mode #board .cell.room:not(.move-target):not(.current-gnome) {
    opacity: 0.35;
    filter: saturate(0.2);
  }
  body.panic-mode #board .cell.room.move-target {
    border-color: #ff4444 !important;
    box-shadow: 0 0 12px #ff444488 !important;
    animation: panicTargetPulse .8s ease-in-out infinite;
  }
  @keyframes panicTargetPulse {
    0%,100% { box-shadow: 0 0 8px #ff444466; }
    50%      { box-shadow: 0 0 20px #ff4444bb; }
  }
  body.panic-mode #sidebar { opacity: 0.25; pointer-events: none; }
  body.panic-mode #log-area { opacity: 0.25; }
  /* Animated patrol meeple */
  .patrol-meeple-anim{position:fixed;z-index:600;font-size:1.6rem;pointer-events:none;transition:left 3s ease-in-out, top 3s ease-in-out;}

  /* Card popup overlay */
  /* ── PLAYING CARD OVERLAY ── */
  /* ═══════════════════════════════════════
     CARD OVERLAY & MAT
  ═══════════════════════════════════════ */
  #card-overlay{
    display:none; position:fixed; inset:0; z-index:800;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,.72);
    contain:layout style paint;
  }
  #card-overlay.show{display:flex;align-items:center;justify-content:center;}

  /* Felt mat underneath the card */
  #card-mat {
    position:relative;
    display:flex; align-items:center; justify-content:center;
    width:300px; height:388px;
    background: radial-gradient(ellipse at 50% 60%, #0f3460 0%, #0a1f3a 100%);
    border-radius:22px;
    box-shadow:
      0 0 0 2px #1e4a7a,
      0 0 0 5px #0d2040,
      0 8px 40px #000e,
      inset 0 0 40px rgba(0,0,0,.5);
  }

  /* ═══════════════════════════════════════
     THE CARD ITSELF — playing card proportions
     2.5" × 3.5" scaled → 220 × 308px
  ═══════════════════════════════════════ */
  .game-card {
    width: 220px;
    height: 308px;
    border-radius: 14px;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    transform-origin: center center;
    will-change: transform, opacity;
    contain: layout style paint;
    /* rich multi-layer shadow */
    box-shadow:
      0 0 0 2px var(--card-border, #f5a623),
      0 4px 0 2px color-mix(in srgb, var(--card-border,#f5a623) 40%, #000),
      0 10px 30px rgba(0,0,0,.7),
      0 2px 6px rgba(0,0,0,.5);
    /* Entrance: slide in from left with slight arc */
    animation: cardDeal .55s cubic-bezier(.22,.68,0,1.15) forwards;
    user-select: none;
  }

  @keyframes cardDeal {
    0%   {
      transform: translateX(-140vw) rotate(-22deg) scale(.8);
      opacity: 0;
      box-shadow: 0 0 0 2px var(--card-border,#f5a623), 0 2px 0 2px #000, 0 30px 60px rgba(0,0,0,.9);
    }
    55%  {
      transform: translateX(12px) rotate(2.5deg) scale(1.04);
      opacity: 1;
    }
    72%  { transform: translateX(-4px) rotate(-.8deg) scale(.98); }
    86%  { transform: translateX(2px) rotate(.3deg) scale(1.005); }
    100% { transform: translateX(0) rotate(0deg) scale(1); opacity: 1; }
  }

  .game-card.dismissing {
    animation: cardDismiss .4s cubic-bezier(.55,0,1,.7) forwards !important;
    pointer-events: none;
  }
  @keyframes cardDismiss {
    0%   { transform: translateX(0) rotate(0deg) scale(1); opacity: 1; }
    15%  { transform: translateX(-6px) rotate(-1.5deg) scale(1.01); }
    100% { transform: translateX(140vw) rotate(16deg) scale(.85); opacity: 0; }
  }

  /* Colour themes — each card type gets its own palette */
  .game-card.trouble       { --card-border:#ff5555; --card-bg-top:#2a0808; --card-bg-bot:#1a0404; --card-pip:#ff6666; --card-shine:rgba(255,80,80,.12); }
  .game-card.event-good    { --card-border:#4ade80; --card-bg-top:#0a2a14; --card-bg-bot:#061a0c; --card-pip:#4ade80; --card-shine:rgba(74,222,128,.1); }
  .game-card.event-trouble { --card-border:#f59e0b; --card-bg-top:#2a1a00; --card-bg-bot:#1a0f00; --card-pip:#fbbf24; --card-shine:rgba(251,191,36,.1); }
  .game-card.event-patrol  { --card-border:#a855f7; --card-bg-top:#1a0a2a; --card-bg-bot:#0f0518; --card-pip:#c084fc; --card-shine:rgba(168,85,247,.1); }
  .game-card.patrol-spawn  { --card-border:#ff4444; --card-bg-top:#2a0606; --card-bg-bot:#1a0303; --card-pip:#ff6666; --card-shine:rgba(255,60,60,.12); }
  #game-card-back{display:none;pointer-events:none;position:absolute;left:-24px;top:34px;transform:rotate(-5deg) scale(.985);opacity:.98;z-index:1;}
  #game-card-back.show{display:block;animation:cardBaseSettle .22s ease-out forwards;}
  #game-card-inner.stacked-front{position:absolute;left:142px;top:18px;z-index:2;}
  @keyframes cardBaseSettle{
    from{transform:translate3d(-12px,8px,0) rotate(-7deg) scale(.97);opacity:0;}
    to{transform:translate3d(0,0,0) rotate(-5deg) scale(.985);opacity:.98;}
  }
  @keyframes cardBumpBase{
    0%{transform:translate3d(166px,-16px,0) rotate(0deg) scale(1);opacity:1;}
    58%{transform:translate3d(-10px,2px,0) rotate(-7.5deg) scale(.985);opacity:.99;}
    100%{transform:translate3d(0,0,0) rotate(-5deg) scale(.985);opacity:.98;}
  }
  @keyframes cardStackDeal{
    from{transform:translate3d(240px,4px,0) rotate(10deg) scale(.97);opacity:0;}
    to{transform:translate3d(0,0,0) rotate(4deg) scale(1);opacity:1;}
  }

  /* ── Card face structure ── */
  .card-face {
    width:100%; height:100%;
    display:flex; flex-direction:column;
    border-radius:14px; overflow:hidden;
    background: linear-gradient(160deg, var(--card-bg-top, #1a0a28) 0%, var(--card-bg-bot, #0a0515) 100%);
  }

  /* Diagonal shine overlay */
  .card-face::before {
    content:'';
    position:absolute; inset:0;
    background: linear-gradient(135deg,
      var(--card-shine, rgba(255,255,255,.06)) 0%,
      transparent 50%,
      rgba(0,0,0,.15) 100%);
    border-radius:14px;
    pointer-events:none; z-index:2;
  }

  /* ── Top corner pip area ── */
  .card-top-pip {
    padding: 8px 10px 4px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-shrink: 0;
    position:relative; z-index:3;
  }
  .pip-left, .pip-right {
    display:flex; flex-direction:column; align-items:center; line-height:1;
    gap:1px;
  }
  .pip-right { transform: rotate(180deg); }
  .pip-emoji { font-size:.9rem; }
  .pip-label {
    font-size:.42rem; font-weight:900; letter-spacing:.08em;
    color: var(--card-pip, #f5a623);
    font-family:'Fredoka One'; text-transform:uppercase;
    white-space:nowrap;
  }

  /* ── Center divider line ── */
  .card-divider {
    height:1px;
    background: linear-gradient(90deg, transparent, var(--card-pip,#f5a623), transparent);
    opacity:.3; margin: 0 16px; flex-shrink:0;
  }

  /* ── Main body ── */
  .card-body {
    flex:1;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding: 6px 14px 4px;
    gap: 6px;
    position:relative; z-index:3;
  }
  .card-type-band {
    font-size:.44rem; letter-spacing:.2em; text-transform:uppercase;
    color: var(--card-pip, #f5a623); font-family:'Fredoka One';
    opacity:.8;
  }
  .card-emoji-big {
    font-size: 3.2rem; line-height:1;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,.6));
    animation: cardEmojiPop .5s .3s cubic-bezier(.22,.68,0,1.4) both;
  }
  @keyframes cardEmojiPop {
    0%   { transform: scale(0) rotate(-15deg); opacity:0; }
    70%  { transform: scale(1.15) rotate(4deg); }
    100% { transform: scale(1) rotate(0deg); opacity:1; }
  }
  .card-name-big {
    font-family:'Fredoka One'; font-size:1.1rem; color:#fff;
    text-align:center; line-height:1.2;
    text-shadow: 0 1px 6px rgba(0,0,0,.7);
  }
  .card-desc-body {
    font-size:.68rem; color:#bcd; text-align:center;
    line-height:1.55; font-family:'Nunito',sans-serif;
    opacity:.9;
  }

  /* ── Footer ── */
  .card-footer {
    padding: 8px 10px 10px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; position:relative; z-index:3;
  }
  .card-ok {
    background: var(--card-pip, #f5a623);
    color:#111; border:none; border-radius:20px;
    padding: 6px 28px; font-size:.8rem; font-weight:900;
    cursor:pointer; font-family:'Fredoka One'; letter-spacing:.06em;
    box-shadow: 0 3px 0 color-mix(in srgb, var(--card-pip,#f5a623) 60%, #000), 0 4px 12px rgba(0,0,0,.4);
    transition: transform .1s, box-shadow .1s;
    position:relative; top:0;
  }
  .card-ok:hover  { transform:translateY(-2px); box-shadow: 0 5px 0 color-mix(in srgb, var(--card-pip,#f5a623) 60%, #000), 0 8px 16px rgba(0,0,0,.5); }
  .card-ok:active { transform:translateY(2px); box-shadow: 0 1px 0 color-mix(in srgb, var(--card-pip,#f5a623) 60%, #000), 0 2px 6px rgba(0,0,0,.4); top:2px; }
  #game-card-inner.no-dismiss{cursor:default;}
  #game-card-inner.no-dismiss .card-footer{display:none;}

  /* ── Bottom pip (upside-down mirror of top) ── */
  .card-bottom-pip {
    padding: 4px 10px 8px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-shrink: 0;
    position:relative; z-index:3;
  }
  /* border accent along card edge */
  .card-face::after {
    content:'';
    position:absolute; inset:0;
    border-radius:14px;
    border: 1.5px solid rgba(255,255,255,.07);
    pointer-events:none; z-index:4;
  }
  .blast-wall{position:absolute;z-index:80;background:rgba(255,120,0,0.18);border:2px dashed #ff7800;cursor:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><text y='26' font-size='26'>💥</text></svg>") 16 16, crosshair;transition:background .15s;border-radius:12px;box-shadow:0 0 0 1px rgba(255,180,80,.15),0 4px 10px rgba(0,0,0,.18);}
  .blast-wall:hover{background:rgba(255,120,0,0.45);}
  .blast-wall.W,.blast-wall.E{width:24px;height:35%;top:32.5%;transform:none;}
  .blast-wall.N,.blast-wall.S{width:35%;height:24px;left:32.5%;transform:none;}
  .blast-wall.N{top:-12px;}
  .blast-wall.S{bottom:-12px;}
  .blast-wall.W{left:-12px;}
  .blast-wall.E{right:-12px;}

  /* Sticky splat overlay */
  /* ── STICKY GOO — Balatro-style foil seal on the tile ───────────────── */

  .cell.room.sticky-active {
    border-color: #5b21b6 !important;
    box-shadow: 0 0 10px rgba(91,33,182,.55), inset 0 0 6px rgba(91,33,182,.25);
  }

  /* Static settled goo texture — NO animation, always present while stuck */
  .cell.room.sticky-active::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 7px;
    pointer-events: none;
    z-index: 1;
    background:
      repeating-linear-gradient(118deg,
        transparent 0px, rgba(167,139,250,.05) 1px,
        transparent 2px, transparent 8px),
      radial-gradient(ellipse 75% 55% at 38% 32%, rgba(167,139,250,.14) 0%, transparent 65%),
      linear-gradient(160deg, rgba(91,33,182,.48) 0%, rgba(55,15,120,.55) 50%, rgba(30,8,80,.52) 100%);
  }

  /* Slow shimmer sweep */
  .cell.room.sticky-active::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 7px;
    pointer-events: none;
    z-index: 2;
    background: linear-gradient(105deg,
      transparent 35%, rgba(196,167,255,.05) 48%,
      rgba(221,205,255,.09) 52%, transparent 65%);
    background-size: 200% 100%;
    animation: gooShimmer 6s 0s ease-in-out infinite;
  }

  /* One-shot splat flood — class added/removed by JS at the moment of getting stuck */
  .cell.room.sticky-splat-anim::before {
    animation: gooFlood 0.75s cubic-bezier(.25,.46,.45,.94) forwards !important;
  }

  @keyframes gooFlood {
    0%   { inset:30% 40% 60% 40%; border-radius:50%; opacity:0;
           background:radial-gradient(circle, rgba(167,139,250,.7) 0%, rgba(91,33,182,.85) 100%); }
    30%  { inset:15% 20% 40% 20%; border-radius:40% 40% 55% 55%/30% 30% 45% 45%; opacity:1;
           background:radial-gradient(circle, rgba(139,92,246,.45) 0%, rgba(76,29,149,.72) 100%); }
    65%  { inset:0% 0% 0% 0%; border-radius:18% 12% 10% 15%/12% 10% 8% 14%; opacity:1; }
    100% { inset:0; border-radius:7px; opacity:1; }
  }

  @keyframes gooShimmer {
    0%   { background-position:210% 0; opacity:1; }
    25%  { background-position:-10% 0; opacity:1; }
    35%  { background-position:-10% 0; opacity:0; }
    100% { background-position:-10% 0; opacity:0; }
  }

  /* ── CREAKY CRACKS ───────────────────────────────────────────────────── */
  .cell.room.creaky-active {
    outline: 1px solid rgba(0,0,0,.25);
  }

  .creaky-crack-svg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
    overflow: visible;
  }

  /* Already-cracked state — instant full reveal, no animation */
  .creaky-crack-svg.already-cracked .crack-main,
  .creaky-crack-svg.already-cracked .crack-branch,
  .creaky-crack-svg.already-cracked .crack-highlight {
    stroke-dashoffset: 0;
    animation: none;
  }
  .creaky-crack-svg.already-cracked .crack-highlight {
    opacity: 0.12;
  }

  /* Main crack — draws in on first reveal */
  .creaky-crack-svg .crack-main {
    stroke: #1a0a00;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    opacity: 0.55;
    stroke-dasharray: 130;
    stroke-dashoffset: 130;
    animation: crackDrawIn 1.4s 0.1s cubic-bezier(.4,0,.2,1) forwards;
  }
  .creaky-crack-svg .crack-branch {
    stroke: #1a0a00;
    stroke-width: 1.3;
    stroke-linecap: round;
    fill: none;
    opacity: 0.35;
    stroke-dasharray: 40;
    stroke-dashoffset: 40;
    animation: crackDrawIn 0.8s 1.0s cubic-bezier(.4,0,.2,1) forwards;
  }
  .creaky-crack-svg .crack-highlight {
    stroke: #92400e;
    stroke-width: 0.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    opacity: 0;
    stroke-dasharray: 130;
    stroke-dashoffset: 130;
    animation: crackDrawIn 1.4s 0.3s cubic-bezier(.4,0,.2,1) forwards,
               crackHighlightFade 1.2s 1.6s ease forwards;
  }

  /* Impact lines — hidden by default, shown during pulse */
  .creaky-crack-svg .crack-impact {
    opacity: 0;
    stroke: #fff;
    stroke-width: 2;
    stroke-linecap: round;
    fill: none;
  }

  @keyframes crackDrawIn {
    to { stroke-dashoffset: 0; }
  }
  @keyframes crackHighlightFade {
    0%   { opacity: 0.3; }
    100% { opacity: 0.12; }
  }

  /* Re-trigger: comic impact flash */
  .cell.room.creaky-crack-anim {
    animation: crackyCellShake 1.5s ease-out forwards !important;
  }
  .cell.room.creaky-crack-anim .creaky-crack-svg .crack-impact {
    animation: impactFlash 1.5s ease-out forwards !important;
  }
  .cell.room.creaky-crack-anim .creaky-crack-svg .crack-main {
    animation: crackPulse 1.5s ease-out forwards !important;
  }
  .cell.room.creaky-crack-anim .creaky-crack-svg .crack-branch {
    animation: crackPulseBranch 1.5s 0.06s ease-out forwards !important;
  }
  .cell.room.creaky-crack-anim .creaky-crack-svg .crack-highlight {
    animation: crackHighlightPulse 1.5s ease-out forwards !important;
  }

  @keyframes crackyCellShake {
    0%   { transform: scale(1)    translate(0,0)      rotate(0deg); box-shadow: none; }
    5%   { transform: scale(1.08) translate(-3px,-3px) rotate(-1deg); box-shadow: 0 0 24px 6px rgba(255,200,50,.8), 0 0 60px 12px rgba(255,100,0,.5); }
    10%  { transform: scale(1.1)  translate(3px,-2px)  rotate(1deg);  box-shadow: 0 0 32px 8px rgba(255,240,80,.9), 0 0 80px 20px rgba(255,120,0,.6); }
    18%  { transform: scale(1.07) translate(-2px,2px)  rotate(-0.5deg); box-shadow: 0 0 20px 5px rgba(255,180,60,.7); }
    26%  { transform: scale(1.04) translate(2px,-1px)  rotate(0.5deg); box-shadow: 0 0 14px 3px rgba(255,160,40,.5); }
    40%  { transform: scale(1.02) translate(-1px,1px)  rotate(0deg);  box-shadow: 0 0 8px 2px rgba(255,140,20,.3); }
    60%  { transform: scale(1.01) translate(0,0)       rotate(0deg);  box-shadow: 0 0 4px 1px rgba(255,120,0,.15); }
    100% { transform: scale(1)    translate(0,0)       rotate(0deg);  box-shadow: none; }
  }

  @keyframes impactFlash {
    0%   { opacity: 1;   stroke-width: 4;   filter: brightness(6) blur(0px); }
    8%   { opacity: 1;   stroke-width: 3.5; filter: brightness(5); }
    20%  { opacity: 0.85;stroke-width: 2.5; filter: brightness(3); }
    45%  { opacity: 0.4; stroke-width: 1.5; filter: brightness(1.5); }
    70%  { opacity: 0.15;stroke-width: 1;   filter: brightness(1); }
    100% { opacity: 0; }
  }
  @keyframes crackPulse {
    0%   { stroke-dashoffset:0; opacity:1;    stroke-width:6;   filter:brightness(6) drop-shadow(0 0 6px #fff); }
    8%   { stroke-dashoffset:0; opacity:1;    stroke-width:5.5; filter:brightness(5); }
    20%  { stroke-dashoffset:0; opacity:0.9;  stroke-width:4;   filter:brightness(3); }
    50%  { stroke-dashoffset:0; opacity:0.7;  stroke-width:3;   filter:brightness(1.5); }
    80%  { stroke-dashoffset:0; opacity:0.6;  stroke-width:2.4; filter:brightness(1.1); }
    100% { stroke-dashoffset:0; opacity:0.55; stroke-width:2.2; filter:brightness(1); }
  }
  @keyframes crackPulseBranch {
    0%   { stroke-dashoffset:0; opacity:0.9;  stroke-width:4;   filter:brightness(6); }
    8%   { stroke-dashoffset:0; opacity:0.85; stroke-width:3.5; filter:brightness(5); }
    20%  { stroke-dashoffset:0; opacity:0.7;  stroke-width:2.8; filter:brightness(3); }
    50%  { stroke-dashoffset:0; opacity:0.5;  stroke-width:1.8; filter:brightness(1.5); }
    100% { stroke-dashoffset:0; opacity:0.35; stroke-width:1.3; filter:brightness(1); }
  }
  @keyframes crackHighlightPulse {
    0%   { stroke-dashoffset:0; opacity:1;    stroke-width:3;   filter:brightness(6) drop-shadow(0 0 4px #fff8); }
    8%   { stroke-dashoffset:0; opacity:0.9;  stroke-width:2.5; filter:brightness(5); }
    25%  { stroke-dashoffset:0; opacity:0.55; stroke-width:1.5; filter:brightness(2.5); }
    60%  { stroke-dashoffset:0; opacity:0.25; stroke-width:1;   filter:brightness(1.2); }
    100% { stroke-dashoffset:0; opacity:0.12; stroke-width:0.8; filter:brightness(1); }
  }



  /* PATROL REFERENCE TRAY */

  .gnome-card{background:linear-gradient(180deg, rgba(20,56,101,.96) 0%, rgba(11,35,66,.98) 100%);border-radius:18px;padding:8px;border:2px solid transparent;box-shadow:0 10px 24px rgba(0,0,0,.28);min-height:0;width:128px;min-width:128px;max-width:128px;overflow:visible;transition:width .22s ease, box-shadow .22s ease, border-color .22s ease, transform .22s ease;position:relative;}
  .gnome-card::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg, rgba(255,255,255,.08) 0%, rgba(255,255,255,0) 42%);opacity:.55;pointer-events:none;}
  .gnome-card::after{content:'';position:absolute;inset:1px;border-radius:16px;border:1px solid rgba(255,255,255,.06);pointer-events:none;}
  .gnome-card:not(.active){width:128px;min-width:128px;max-width:128px;}
  .gnome-card:not(.active):hover{width:188px;min-width:188px;max-width:188px;box-shadow:0 14px 28px rgba(0,0,0,.34);transform:translateY(-2px);}
  .gnome-card.active{width:297px;min-width:297px;max-width:297px;border-color:color-mix(in srgb, var(--gnome-accent, var(--gold)) 70%, #f7e3a4);box-shadow:0 20px 40px rgba(0,0,0,.42),0 0 0 1px rgba(255,255,255,.10) inset,0 0 18px color-mix(in srgb, var(--gnome-accent, var(--gold)) 28%, transparent);transform-origin:top left;animation:activeGnomeSettle .3s cubic-bezier(.2,.8,.2,1);overflow:visible;}
  .gnome-card.active .gnome-card-main{position:relative;z-index:1;}
  .gnome-card.active .gnome-card-content{padding-top:2px;}
  .gnome-card.active .gnome-header{margin-bottom:2px;}
  .gnome-card.active::before{background:linear-gradient(180deg, color-mix(in srgb, var(--gnome-accent, var(--gold)) 16%, rgba(255,255,255,.10)) 0%, rgba(255,255,255,0) 52%), radial-gradient(circle at top right, color-mix(in srgb, var(--gnome-accent, var(--gold)) 18%, transparent) 0%, transparent 58%);opacity:.9;}
  .gnome-card.active::after{border-color:rgba(255,255,255,.10);}
  .gnome-card.ko{opacity:.5;}
  .gnome-card-main{display:flex;gap:8px;align-items:stretch;width:100%;padding:0 8px;}
  .gnome-portrait-chip{display:none;flex:0 0 88px;width:88px;align-self:stretch;border-radius:16px;overflow:hidden;background:linear-gradient(180deg, rgba(8,17,33,.95) 0%, rgba(16,28,52,.98) 100%);border:2px solid rgba(255,255,255,.18);box-shadow:inset 0 0 0 1px rgba(255,255,255,.05), 0 8px 16px rgba(0,0,0,.22);}
  .gnome-portrait-chip img{display:block;width:100%;height:100%;object-fit:cover;transform:scale(1.02);}
  .gnome-card.active .gnome-portrait-chip{display:block;animation:activeGnomePortraitRise .3s cubic-bezier(.2,.8,.2,1);}
  .gnome-card-content{display:flex;flex-direction:column;min-width:0;flex:1 1 auto;width:calc(100% - 96px);}
  @keyframes activeGnomeSettle{from{opacity:.86;transform:translateY(-6px) scale(.985);}to{opacity:1;transform:translateY(0) scale(1);}}
  @keyframes activeGnomePortraitRise{from{opacity:0;transform:translateY(14px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
  .gnome-header{display:flex;align-items:center;gap:6px;margin-bottom:0;font-weight:800;font-size:.88rem;}
  .hat-slot-inline{margin-left:auto;flex:0 0 auto;justify-self:end;align-self:flex-start;}

  .gnome-card:not(.active):hover .hat-slot-inline{display:flex;}
  .gnome-header-status{display:flex;align-items:center;gap:4px;flex:0 0 auto;}
  .gnome-action-track{margin-top:7px;}
  .gnome-action-label{font-size:.6rem;color:var(--muted);margin-bottom:3px;}
  .gnome-action-slots{display:grid;grid-template-columns:repeat(var(--action-capacity, 2), minmax(0,1fr));gap:4px;width:100%;min-width:0;}
  .gnome-action-slot{height:10px;border-radius:999px;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.08);box-shadow:inset 0 0 0 1px rgba(255,255,255,.03);flex:1 1 0;}
  .gnome-action-slot.filled{background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(235,243,255,.78));border-color:rgba(255,255,255,.82);box-shadow:0 0 8px rgba(255,255,255,.55), inset 0 0 0 1px rgba(255,255,255,.38);}

  .gnome-status-badge{display:inline-flex;align-items:center;justify-content:center;min-width:.58rem;height:.58rem;padding:0 .06rem;border-radius:999px;background:rgba(10,32,64,.96);border:1px solid rgba(255,255,255,.16);font-size:.42rem;line-height:1;box-shadow:0 1px 3px rgba(0,0,0,.45);}
  .gnome-status-badge.hidden{color:#d6dde8;}
  .gnome-status-badge.sticky{color:#f59e0b;}
  .gnome-name-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.88rem;line-height:1.05;}
  .gnome-card-body{max-height:240px;opacity:1;overflow:hidden;transition:max-height .22s ease, opacity .2s ease, margin-top .2s ease;margin-top:6px;}
  .gnome-card:not(.active) .gnome-card-body{max-height:0;opacity:0;margin-top:0;pointer-events:none;}
  .gnome-card:not(.active):hover .gnome-card-body{max-height:190px;opacity:1;margin-top:6px;pointer-events:auto;}

  .gnome-card.active .hat-slot-inline{display:flex;}

  .setup-gnome-card{background:linear-gradient(180deg, rgba(8,20,39,.76), rgba(11,25,47,.9));border:2px solid rgba(255,255,255,.10);border-radius:24px;padding:12px;display:flex;flex-direction:column;gap:10px;min-height:0;box-shadow:0 16px 28px rgba(0,0,0,.26);transition:transform .18s,opacity .18s,border-color .18s,box-shadow .18s,filter .18s;position:relative;overflow:hidden;cursor:pointer;backdrop-filter:blur(6px);}

/* normalize corner margins */

/* active gnome glow */
.gnome-token.active{
    box-shadow:0 0 10px rgba(255,255,255,.9),
               0 0 20px rgba(255,255,255,.6);

}
@keyframes activePulse{
    0%,100%{box-shadow:0 0 8px rgba(255,255,255,.6)}
    50%{box-shadow:0 0 18px rgba(255,255,255,1)}
}

/* end turn pulse when ready */
.end-turn.ready{
    background:#d00 !important;
    color:#fff;
    animation:endPulse 1.6s ease-in-out infinite;
}
@keyframes endPulse{
    0%,100%{box-shadow:0 0 0 rgba(255,0,0,0)}
    50%{box-shadow:0 0 10px rgba(255,0,0,.9)}
}

@keyframes activeTurnGlow{0%,100%{filter:drop-shadow(0 0 0px transparent);}50%{filter:drop-shadow(0 0 2px rgba(255,255,255,.9)) drop-shadow(0 0 1px rgba(255,255,255,.7));}}

/* ─────────────────────────────────────────────────────────────────────────
   SAFARI SYSTEM-LEVEL FIXES
   Detected at runtime via JS (see SAFARI_FIXES block in the script).
   All Safari overrides live here — do not scatter -webkit fixes elsewhere.
   ───────────────────────────────────────────────────────────────────────── */

/* Fix 1: Action buttons render at top of container on Safari because it
   doesn't honour align-items:center on flex children when min-height is set.
   Solution: switch to an explicit height + margin:auto pattern. */
.is-safari .action-btn {
  height: 61px;
  min-height: unset;
  margin-top: auto;
  margin-bottom: auto;
}
.is-safari .action-btn-grid {
  align-items: stretch;
}

/* Fix 2: Gnome tokens blurry on Safari because scale(1.44) + preserve-3d
   triggers sub-pixel rendering. Force pixel-aligned compositing. */
.is-safari .gnome-token {
  transform: scale(1.44) translateZ(0);
  -webkit-transform: scale(1.44) translateZ(0);
  image-rendering: -webkit-optimize-contrast;
  -webkit-font-smoothing: antialiased;
}
.is-safari .gnome-token-inner {
  -webkit-transform-style: preserve-3d;
}
.is-safari .gnome-token-front,
.is-safari .gnome-token-back {
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}

  <script>

// ─────────────────────────────────────────────────────────────────────────────
// SAFARI SYSTEM-LEVEL FIXES (JS side)
// Single detection point — all Safari behaviour differences are handled here.
// CSS fixes are in the matching .is-safari block in the <style> section.
// ─────────────────────────────────────────────────────────────────────────────
(function applySafariFixes() {
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent)
    || (navigator.vendor && navigator.vendor.includes('Apple'));
  if (!isSafari) return;

  // CSS class for all Safari-specific style overrides
  document.documentElement.classList.add('is-safari');

  // Fix 3: Safari AudioContext requires explicit resume on EVERY user gesture,
  // not just the first. We hook pointerdown and touchstart at the document level.
  // The actual AudioContext is created later in the audio engine — we store a
  // flag and let unlockGameAudio (defined below) call resume() on every gesture.
  window._SAFARI_AUDIO_NEEDS_RESUME = true;
})();


const THEME_MUSIC = new Audio("https://raw.githubusercontent.com/fletchbomb/gnome/main/files/gnomes-theme.mp3");
THEME_MUSIC.loop = false;
THEME_MUSIC.volume = 0.10;
let THEME_CYCLE_STAGE = 0;
let THEME_BREAK_TIMER = null;

function clearThemeBreakTimer() {
  if (THEME_BREAK_TIMER) {
    clearTimeout(THEME_BREAK_TIMER);
    THEME_BREAK_TIMER = null;
  }
}

function startThemeMusicCycle(resetTrack = true) {
  if (GAME_AUDIO_MUTED) return;
  clearThemeBreakTimer();
  unlockGameAudio();
  resumeGameAudio();
  if (resetTrack) THEME_MUSIC.currentTime = 0;
  THEME_MUSIC.play().catch(()=>{});
}

function scheduleNextThemeStep(delayMs) {
  clearThemeBreakTimer();
  THEME_BREAK_TIMER = setTimeout(() => {
    THEME_BREAK_TIMER = null;
    startThemeMusicCycle(true);
  }, delayMs);
}

THEME_MUSIC.addEventListener('ended', () => {
  if (GAME_AUDIO_MUTED) return;

  if (THEME_CYCLE_STAGE === 0) {
    THEME_CYCLE_STAGE = 1;
    startThemeMusicCycle(true);
    return;
  }
  if (THEME_CYCLE_STAGE === 1) {
    THEME_CYCLE_STAGE = 2;
    startThemeMusicCycle(true);
    return;
  }
  if (THEME_CYCLE_STAGE === 2) {
    THEME_CYCLE_STAGE = 3;
    scheduleNextThemeStep(60000);
    return;
  }
  if (THEME_CYCLE_STAGE === 3) {
    THEME_CYCLE_STAGE = 4;
    scheduleNextThemeStep(30000);
    return;
  }

  THEME_CYCLE_STAGE = 5;
  scheduleNextThemeStep(60000);
});

/* === Audio / SFX === */
const AUDIO_CTX = new (window.AudioContext || window.webkitAudioContext)();

const SFX_URLS = Object.freeze({
  creaky: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/creaky.mp3",
  sticky: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/sticky.mp3",
  dog: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/dog.mp3",
  roomba: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/roomba.mp3",
  kid: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/kid.mp3",
  dad: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/dad.mp3",
  kick: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/kick.mp3",
  woosh: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/woosh.mp3",
  vent: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/vent.mp3",
  dynamite: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/dynamite.mp3",
  shroom: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/shroom.mp3",
  pickup: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/pickup.mp3",
  drop: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/drop.mp3",
  deposit: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/deposit.mp3",
  placetile: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/placetile.mp3",
  trouble: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/trouble.mp3",
  step: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/2step.mp3",
  click: "https://raw.githubusercontent.com/fletchbomb/gnome/main/files/click.mp3"
});

const SFX_VOLUMES = Object.freeze({
  creaky: 0.60,
  sticky: 0.60,
  dog: 0.30,
  roomba: 0.30,
  kid: 0.30,
  dad: 0.30,
  kick: 0.60,
  woosh:0.60,
  vent:0.60,
  dynamite:0.60,
  shroom:0.60,
  pickup: 0.60,
  drop: 0.60,
  deposit: 0.60,
  placetile: 0.60,
  trouble: 0.30,
  step: 0.30,
  click: 0.30
});

const AUDIO_CACHE = new Map();
let GAME_AUDIO_UNLOCKED = false;
let GAME_AUDIO_MUTED = false;

function resumeGameAudio() {
  try {
    if (AUDIO_CTX && AUDIO_CTX.state === 'suspended') AUDIO_CTX.resume();
  } catch (e) {}
}

function unlockGameAudio() {
  // On Safari, AudioContext can re-suspend between gestures — always try to resume.
  // On other browsers, only do the unlock work once.
  if (window._SAFARI_AUDIO_NEEDS_RESUME) {
    resumeGameAudio();
  }
  if (GAME_AUDIO_UNLOCKED) return;
  GAME_AUDIO_UNLOCKED = true;
  resumeGameAudio();
  try {
    const a = new Audio();
    a.volume = 0;
    a.play().catch(()=>{});
  } catch (e) {}
}

// Strong references to in-flight Audio nodes — prevents GC on Safari/mobile
// from collecting them before playback finishes.
const _AUDIO_LIVE = new Set();

function playSfx(name, opts = {}) {
  const src = SFX_URLS[name];
  if (!src || GAME_AUDIO_MUTED) return;
  unlockGameAudio();
  resumeGameAudio();
  const a = new Audio(src);
  a.preload = 'auto';
  a.volume = opts.volume ?? SFX_VOLUMES[name] ?? 0.60;
  if (opts.playbackRate) a.playbackRate = opts.playbackRate;
  _AUDIO_LIVE.add(a);
  a.addEventListener('ended', () => _AUDIO_LIVE.delete(a), { once: true });
  a.addEventListener('error', () => _AUDIO_LIVE.delete(a), { once: true });
  a.play().catch(() => _AUDIO_LIVE.delete(a));
}

async function getAudioBuffer(url) {
  if (AUDIO_CACHE.has(url)) return AUDIO_CACHE.get(url);
  const p = fetch(url)
    .then(r => r.arrayBuffer())
    .then(buf => AUDIO_CTX.decodeAudioData(buf));
  AUDIO_CACHE.set(url, p);
  return p;
}

async function playPannedSfx(name, pan = 0) {
  const url = SFX_URLS[name];
  if (!url || GAME_AUDIO_MUTED) return;
  unlockGameAudio();
  resumeGameAudio();
  try {
    const audioBuf = await getAudioBuffer(url);
    const src = AUDIO_CTX.createBufferSource();
    src.buffer = audioBuf;
    const gain = AUDIO_CTX.createGain();
    gain.gain.value = SFX_VOLUMES[name] ?? 0.60;
    const stereo = AUDIO_CTX.createStereoPanner();
    stereo.pan.value = pan;
    src.connect(gain);
    gain.connect(stereo);
    stereo.connect(AUDIO_CTX.destination);
    src.start();
  } catch (e) {
    playSfx(name);
  }
}

function syncAudioMuteUi() {
  const btn = document.getElementById('btn-audio-mute');
  if (!btn) return;
  btn.classList.toggle('muted', GAME_AUDIO_MUTED);
  btn.setAttribute('aria-pressed', GAME_AUDIO_MUTED ? 'true' : 'false');
  btn.setAttribute('title', GAME_AUDIO_MUTED ? 'Unmute audio' : 'Mute audio');
  const icon = btn.querySelector('.audio-icon');
  if (icon) icon.textContent = GAME_AUDIO_MUTED ? '🔈' : '🔊';
}

function setGameAudioMuted(muted) {
  GAME_AUDIO_MUTED = !!muted;
  if (typeof THEME_MUSIC !== 'undefined' && THEME_MUSIC) {
    if (GAME_AUDIO_MUTED) {
      THEME_MUSIC.pause();
      clearThemeBreakTimer();
    } else {
      startThemeMusicCycle(true);
    }
  }
  syncAudioMuteUi();
}

function toggleGameAudioMute() {
  setGameAudioMuted(!GAME_AUDIO_MUTED);
}

/* === End Audio / SFX === */

// ─────────────────────────────────────────────
// GAME EVENT BUS
// A lightweight pub/sub bus. All gameplay events (sounds, animations, UI
// reactions) are wired here rather than scattered through game logic.
// ─────────────────────────────────────────────
const GAME_EVENTS = (() => {
  const listeners = new Map();
  function on(name, handler) {
    if (!listeners.has(name)) listeners.set(name, new Set());
    listeners.get(name).add(handler);
    return () => listeners.get(name)?.delete(handler);
  }
  function emit(name, detail = {}) {
    const set = listeners.get(name);
    if (!set) return;
    for (const handler of [...set]) {
      try { handler(detail); } catch (err) { console.error(`Event handler failed for ${name}`, err); }
    }
  }
  return { on, emit };
})();
window.GAME_EVENTS = GAME_EVENTS;

// ─────────────────────────────────────────────
// AUDIO MANAGER
// Single place that maps game events → sounds.
// Keeps audio logic out of gameplay code entirely.
// ─────────────────────────────────────────────
const AUDIO_MANAGER = (() => {
  const state = {
    pendingMove: null,
  };

  const PATROL_SFX = Object.freeze({ dog: 'dog', roomba: 'roomba', kid: 'kid', dad: 'dad' });

  function nowMs() { return Date.now(); }
  function randomPan() { return (Math.random() * 1.6) - 0.8; }

  function planMove(type, detail = {}) {
    state.pendingMove = { type, ...detail };
  }

  function beginMove(type, detail = {}) {
    const planned = state.pendingMove && state.pendingMove.type === type ? state.pendingMove : null;
    const merged  = { ...(planned || {}), ...detail };
    state.pendingMove = null;
    if (type === 'gnome') {
      if (!merged.suppressMoveSound) playSfx('step', { playbackRate: 0.9 + Math.random() * 0.2 });
      return;
    }
    playPannedSfx(PATROL_SFX[type], randomPan());
  }

  // ── Single-sound priority system ─────────────────────────────────────
  // Each interaction nominates a sound via nominate(). At the end of the
  // synchronous call stack, exactly one sound plays — the highest priority.
  // Nothing is suppressed or blocked; lower-priority sounds simply never
  // get nominated over a higher one.
  //
  // Priority order (index 0 = highest):
  const SFX_PRIORITY = [
    'creaky', 'sticky', 'kick', 'vent', 'dynamite',
    'roomba', 'dog', 'kid', 'dad',
    'trouble', 'happy', 'oh',
    'placetile', 'pickup', 'deposit', 'drop', 'shroom',
    'step', 'click',
  ];

  let _nominated = null; // { sfx, opts }
  let _nominateScheduled = false;

  function priorityOf(sfx) {
    const i = SFX_PRIORITY.indexOf(sfx);
    return i === -1 ? SFX_PRIORITY.length : i; // unknown sounds play last
  }

  function flushNominated() {
    const winner = _nominated;
    _nominated = null;
    _nominateScheduled = false;
    if (winner) playSfx(winner.sfx, winner.opts);
  }

  function nominate(sfx, opts = {}) {
    if (_nominated === null || priorityOf(sfx) < priorityOf(_nominated.sfx)) {
      _nominated = { sfx, opts };
    }
    if (!_nominateScheduled) {
      _nominateScheduled = true;
      // Flush at the end of the current synchronous call stack.
      Promise.resolve().then(() => {
        if (!_nominateScheduled) return;
        flushNominated();
      });
    }
  }

  function commit(sfx = null, opts = {}) {
    if (sfx) nominate(sfx, opts);
    flushNominated();
  }

  // Card sounds fire through the SEQ (asynchronous) so they're always alone —
  // nominate them directly rather than competing with sync sounds.
  function nominateCard(sfx) {
    _nominated = null; // clear any stale nomination from a previous tick
    playSfx(sfx);
  }

  // ── Event → Sound wiring ─────────────────────────────────────────────
  GAME_EVENTS.on('ui.click',           () => nominate('click'));
  GAME_EVENTS.on('tile.created',       () => nominate('placetile'));
  GAME_EVENTS.on('sticky.triggered',   () => nominate('sticky'));
  GAME_EVENTS.on('creaky.triggered',   () => nominate('creaky'));
  GAME_EVENTS.on('item.pickedUp',      () => nominate('pickup'));
  GAME_EVENTS.on('item.dropped',       ({ mode } = {}) => {
    if (String(mode || '').startsWith('deposit')) nominate('deposit');
    else nominate('drop');
  });
  GAME_EVENTS.on('vent.used',          () => nominate('vent'));
  GAME_EVENTS.on('shroom.rotate',      () => nominate('shroom'));
  GAME_EVENTS.on('dynamite.blast',     () => {
    triggerExplosionFlash();
    nominate('dynamite');
  });
  GAME_EVENTS.on('card.presented', ({ step }) => {
    // Cards are SEQ-sequenced so always alone — fire immediately, not via nominate.
    const cardType = String(step?.cardType || '').toLowerCase();
    const name     = String(step?.name    || '').toLowerCase();
    const cls      = String(step?.cls     || '').toLowerCase();

    if (cardType.includes('trouble')) { nominateCard('trouble'); return; }

    const isPatrolSpawn = cardType.includes('patrol spawn') || cls.includes('patrol-spawn');
    if (isPatrolSpawn) {
      if      (name.includes('roomba')) nominateCard('roomba');
      else if (name.includes('dog'))    nominateCard('dog');
      else if (name.includes('kid'))    nominateCard('kid');
      else if (name.includes('dad'))    nominateCard('dad');
      return;
    }

    if (cardType.includes('event')) {
      if (['sticky','creaky','dynamite','roomba','dog','kid','dad','woosh'].includes(step?.sfxHint)) {
        nominateCard(step.sfxHint);
        return;
      }
      if (step?.sfxHint === 'none') return;
      const isSilent = /sticky|creaky|patrol|dog|roomba|kid|dad|explosion/i.test(name);
      if (!isSilent) nominateCard('woosh');
    }
  });

  // Footstep: nominated by beginMoveGated below, competes normally.
  function beginMoveGated(type, detail = {}) {
    const planned = state.pendingMove && state.pendingMove.type === type ? state.pendingMove : null;
    const merged  = { ...(planned || {}), ...detail };
    state.pendingMove = null;
    if (type === 'gnome') {
      if (!merged.suppressMoveSound) {
        nominate('step', { playbackRate: 0.9 + Math.random() * 0.2 });
      }
      return;
    }
    // Patrol sounds are always sequenced alone by the patrol animator — play directly.
    playPannedSfx(PATROL_SFX[type], randomPan());
  }

  return { state, planMove, beginMove: beginMoveGated, nominate, commit };

})();
window.AUDIO_MANAGER = AUDIO_MANAGER;

window.addEventListener('pointerdown', unlockGameAudio, true);
window.addEventListener('keydown',     unlockGameAudio, true);


// ─────────────────────────────────────────────
(function(){
  const tip = document.createElement('div');
  tip.id = 'game-tooltip';
  document.body.appendChild(tip);
  let current = null;
  document.addEventListener('mouseover', e => {
    const el = e.target.closest('[title]');
    if (!el || el === current) return;
    current = el;
    const txt = el.getAttribute('title');
    if (!txt) return;
    // Remove native tooltip
    el._tipTitle = txt;
    el.removeAttribute('title');
    tip.textContent = txt;
    tip.style.display = 'block';
    positionTip(e);
  }, true);
  document.addEventListener('mousemove', e => {
    if (current) positionTip(e);
  }, true);
  document.addEventListener('mouseout', e => {
    const el = e.target.closest('[title]') || (current && e.relatedTarget && !current.contains(e.relatedTarget) ? current : null);
    if (current && (!current.contains(e.relatedTarget))) {
      if (current._tipTitle) current.setAttribute('title', current._tipTitle);
      current = null;
      tip.style.display = 'none';
    }

// DOOR DEFINITIONS
// Each room has a fixed set of doors: array of directions from ['N','S','E','W']
// Chosen to be architecturally sensible and matching the door counts in the rulebook.
// ─────────────────────────────────────────────
const ROOM_DOORS = {
  1:  ['N','E','S','W'],    // Laundry Room (4 doors)
  2:  ['N','E','S','W'],    // Hallway (4 doors)
  3:  ['N','E','S'],        // Living Room (3 doors)
  4:  ['N','E','S'],        // Dining Room (3 doors)
  5:  ['N','E'],            // Bedroom (corner)
  6:  ['N','E'],            // Kitchen (corner)
  7:  ['N','E'],            // TV Room (corner)
  8:  ['N','E'],            // Nursery (corner)
  9:  ['N','S'],            // Mud Room (straight)
  10: ['N','S'],            // Office (straight)
  11: ['N'],                // Pantry (dead end)
  12: ['N'],                // Bathroom (dead end)
  13: ['N'],                // Linen Closet (dead end)
  14: ['N','E'],            // Dad's Room (corner)
  15: ['N','E','S'],        // Kids' Room (3 doors)
  16: ['N','E'],            // Garage (corner)
  17: ['N'],                // Supply Closet (dead end)
};

// Direction helpers
const OPPOSITE = {N:'S', S:'N', E:'W', W:'E'};
const DIR_DELTA = {N:[-1,0], S:[1,0], W:[0,-1], E:[0,1]};

function roomHasDoor(roomId, dir) {
  return ROOM_DOORS[roomId]?.includes(dir) || false;
}

function roomCanProvideDoor(roomId, dir) {
  const baseDirs = ROOM_DOORS[roomId] || [];
  for (let rot = 0; rot < 4; rot++) {
    if (rotateDirs(baseDirs, rot).includes(dir)) return true;
  }
  return false;
}


function getDoorDirSet(values = []) {
  return [...new Set((values || []).filter(dir => DIR_DELTA[dir]))];
}
function getBaseDoorDirs(tile, rotationOverride = null) {
  const baseDirs = ROOM_DOORS[tile.roomId] || [];
  const rot = rotationOverride ?? tile.rotationOffset ?? 0;
  return rot ? rotateDirs(baseDirs, rot) : [...baseDirs];
}

function getManualDoorDirs(tile) {
  if (!tile) return [];
  tile.manualDoorDirs = getDoorDirSet(tile.manualDoorDirs || []);
  return [...tile.manualDoorDirs];
}

function getForcedDoorDirs(tile) {
  if (!tile) return [];
  tile.pendingDoorDirs = getDoorDirSet(tile.pendingDoorDirs || []);
  return [...tile.pendingDoorDirs];
}

function addManualDoor(tile, dir) {
  if (!tile || !DIR_DELTA[dir]) return;
  const dirs = new Set(getManualDoorDirs(tile));
  dirs.add(dir);
  tile.manualDoorDirs = [...dirs];
  normalizeTileDoorState(tile);
}

function addForcedDoor(tile, dir) {
  if (!tile || !DIR_DELTA[dir]) return;
  const dirs = new Set(getForcedDoorDirs(tile));
  dirs.add(dir);
  tile.pendingDoorDirs = [...dirs];
  normalizeTileDoorState(tile);
}

function openDoorFromTile(tile, dir) {
  if (!tile || !DIR_DELTA[dir]) return false;
  const [dr, dc] = DIR_DELTA[dir];
  const nr = tile.row + dr, nc = tile.col + dc;
  const neighbor = G.grid[nr]?.[nc] || null;
  addManualDoor(tile, dir);
  if (neighbor) connectTilesWithDoor(tile, neighbor, dir);
  else addForcedDoor(tile, dir);
  normalizeTileDoorState(tile);
  if (neighbor) normalizeTileDoorState(neighbor);
  return true;
}

function getDynamiteTargets() {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome) return [];
  const myTile = G.grid[gnome.row]?.[gnome.col];
  if (!myTile) return [];

  const targets = [];
  for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
    const nr = gnome.row + dr, nc = gnome.col + dc;
    if (nr < 0 || nr >= G.GRID || nc < 0 || nc >= G.GRID) continue;
    const neighbor = G.grid[nr]?.[nc] || null;
    const myOpen = tileHasDoor(myTile, dir, { includeForced: true });
    if (!neighbor) {
      if (!myOpen) targets.push({ dir, nr, nc });
      continue;
    }
    const opp = OPPOSITE[dir];
    const neighborOpen = tileHasDoor(neighbor, opp);
    if (!myOpen || !neighborOpen) targets.push({ dir, nr, nc });
  }
  return targets;
}

function removeForcedDoor(tile, dir) {
  if (!tile) return;
  tile.pendingDoorDirs = getForcedDoorDirs(tile).filter(d => d !== dir);
  normalizeTileDoorState(tile);
}

function shroomRotationMaintainsConnection(r, c, rotation) {
  const tile = G.grid[r]?.[c];
  if (!tile) return false;
  const dirs = getShroomPreviewDoorDirs(tile, rotation);
  for (const dir of dirs) {
    const [dr, dc] = DIR_DELTA[dir];
    const nr = r + dr, nc = c + dc;
    const nb = G.grid[nr]?.[nc];
    if (!nb) continue;
    const opp = OPPOSITE[dir];
    if (getTileDoors(nb).includes(opp)) return true;
  }
  return false;
}

function isValidChangedShroomPreview(preview) {
  if (!preview) return false;
  const tile = G.grid[preview.r]?.[preview.c];
  if (!tile) return false;
  const originalRot = tile.rotationOffset || 0;
  if ((preview.rotation % 4) === originalRot) return false;
  return shroomRotationMaintainsConnection(preview.r, preview.c, preview.rotation);
}

function updateShroomActionTooltip() {
  const btn = document.getElementById('btn-shroom-confirm');
  if (!btn) return;
  if (!G.shroomMode) {
    btn.removeAttribute('title');
    return;
  }
  if (!G.shroomPreview) {
    btn.title = 'Cancel and refund the Shroom.';
    return;
  }
  const tile = G.grid[G.shroomPreview.r]?.[G.shroomPreview.c];
  const originalRot = tile ? (tile.rotationOffset || 0) : 0;
  if ((G.shroomPreview.rotation % 4) === originalRot) {
    btn.title = 'Cancel and refund the Shroom. This rotation matches the room\'s original position.';
    return;
  }
  if (!shroomRotationMaintainsConnection(G.shroomPreview.r, G.shroomPreview.c, G.shroomPreview.rotation)) {
    btn.title = 'This rotation cannot be confirmed because no door would connect to an existing adjacent room.';
    return;
  }
  btn.title = 'Confirm this Shroom rotation.';
}

function tileHasDoor(tile, dir, { includeForced = false } = {}) {
  if (!tile || !DIR_DELTA[dir]) return false;
  normalizeTileDoorState(tile);
  if ((tile.doors || []).includes(dir)) return true;
  return includeForced ? getForcedDoorDirs(tile).includes(dir) : false;
}

function tilesConnected(tileA, tileB) {
  if (!tileA || !tileB) return false;
  const dr = tileB.row - tileA.row;
  const dc = tileB.col - tileA.col;
  let dir = null;
  for (const [key, [rStep, cStep]] of Object.entries(DIR_DELTA)) {
    if (rStep === dr && cStep === dc) { dir = key; break; }
  }
  if (!dir) return false;
  const opp = OPPOSITE[dir];
  return tileHasDoor(tileA, dir, { includeForced: true }) && tileHasDoor(tileB, opp, { includeForced: true });
}

function connectTilesWithDoor(tileA, tileB, dirFromA) {
  if (!tileA || !DIR_DELTA[dirFromA]) return false;
  const opp = OPPOSITE[dirFromA];
  addManualDoor(tileA, dirFromA);
  removeForcedDoor(tileA, dirFromA);
  if (tileB) {
    addManualDoor(tileB, opp);
    removeForcedDoor(tileB, opp);
    normalizeTileDoorState(tileB);
  }
  normalizeTileDoorState(tileA);
  return true;
}

function getRenderableDoorDirs(r, c) {
  const tile = G.grid[r]?.[c];
  if (!tile) return [];
  // Only render doors that belong to an already-placed room.
  // Pending/forced doors may still exist in state to guide future reveals,
  // but they must stay hidden until a room is actually placed there.
  return getTileDoors(tile);
}

function reconcileDoorConnections(state = G) {
  if (!state?.grid) return;
  const prev = G;
  G = state;
  try {
    for (let r = 0; r < state.GRID; r++) {
      for (let c = 0; c < state.GRID; c++) {
        const tile = state.grid[r]?.[c];
        if (tile) normalizeTileDoorState(tile);
      }
    }
    for (let r = 0; r < state.GRID; r++) {
      for (let c = 0; c < state.GRID; c++) {
        const tile = state.grid[r]?.[c];
        if (!tile) continue;
        for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
          const neighbor = state.grid[r + dr]?.[c + dc];
          if (!neighbor) continue;
          const opp = OPPOSITE[dir];
          const wantsConnection = tileHasDoor(tile, dir, { includeForced: true }) || tileHasDoor(neighbor, opp, { includeForced: true });
          if (wantsConnection) connectTilesWithDoor(tile, neighbor, dir);
        }
        normalizeTileDoorState(tile);
      }
    }
  } finally {
    G = prev;
  }
}

function createElement(tag, { className = '', text = '', html = '', disabled = false, attrs = {}, onClick = null } = {}) {
  const node = document.createElement(tag);
  const normalizedClassName = normalizeClassNames(className);
  if (normalizedClassName) node.className = normalizedClassName;
  if (text) node.textContent = text;
  if (html) node.innerHTML = html;
  if (disabled) node.disabled = true;
  Object.entries(attrs).forEach(([key, value]) => {
    if (value !== undefined && value !== null) node.setAttribute(key, value);
  });
  if (typeof onClick === 'function') node.onclick = onClick;
  return node;
}

function buildButton(label, action, { className = '', disabled = false, stopPropagation = false, emitClick = false } = {}) {
  const btn = createElement('button', { className: cx(THEME_CLASSES.component.button, className), text: label, disabled });
  if (disabled) {
    btn.style.opacity = '0.4';
    btn.style.cursor = 'not-allowed';
  }
  btn.onclick = (e) => {
    if (stopPropagation) e.stopPropagation();
    if (!disabled && emitClick) GAME_EVENTS.emit('ui.click', { source: 'button', label });
    if (!disabled && typeof action === 'function') action();
  };
  return btn;
}

function parseCommandArg(raw) {
  if (raw == null || raw === '') return undefined;
  if (/^[\[{]/.test(raw)) {
    try { return JSON.parse(raw); } catch (_err) {}
  }
  if (/^-?\d+$/.test(raw)) return Number(raw);
  if (raw === 'true') return true;
  if (raw === 'false') return false;
  return raw;
}

  if (!btn) return null;
  if (commandName) btn.dataset.command = commandName;
  else delete btn.dataset.command;
  if (arg === undefined) delete btn.dataset.commandArg;
  else btn.dataset.commandArg = String(arg);
  return btn;
}

function updateActionControl(target, { visible = true, disabled = false, label = null, icon = null, active = false, title = '', commandName, commandArg } = {}) {
  const btn = typeof target === 'string' ? (el(target) || (target === 'btn-end' ? document.querySelector('.action-btn.end-turn') : null)) : target;
  if (!btn) return null;
  btn.style.display = visible ? 'block' : 'none';

  btn.classList.toggle('active-action', !!active);
  btn.classList.toggle('ready',
    ((target === 'btn-end') && !disabled && visible) ||
    ((target === 'btn-win-house') && !disabled && visible)
  );
  btn.title = title || '';
  if (label != null || icon != null) setActionButtonContent(btn, label ?? btn.dataset.actionLabel ?? btn.textContent.trim(), icon);
  if (commandName !== undefined) setButtonCommand(btn, commandName, commandArg);
  return btn;

  if (G.kickMode) { G.kickMode = null; changed = true; }
  if (G.ventMode) { G.ventMode = false; changed = true; }
  if (G.dynamiteMode) { disarmDynamite({ restoreInventory: true, render: false }); changed = true; }
  if (G.shroomMode) { disarmShroom({ restoreInventory: true, render: false }); changed = true; }
  else if (G.shroomPreview) { G.shroomPreview = null; changed = true; }
  if (changed && log) addLog(log, 'system');
  if (changed && render) renderAll();
  return changed;
}

function initCommandBindings(root = document) {
  const UI_CLICK_COMMANDS = new Set([
    'startGame','resetGame','toggleLogCollapsed','selectPlayers',
    'selectAction','doKick','cancelKick','doVent','cancelVent','cancelDynamite','cancelShroom',
    'dismissCard','openWeaver','hamperInteract','winHouse','endGnomeTurn'
  ]);

  root.addEventListener('click', event => {
    const trigger = event.target.closest('[data-command]');
    if (!trigger || !root.contains(trigger)) return;
    if (trigger.disabled) return;
    if (trigger.dataset.stopPropagation === 'true') event.stopPropagation();

    const commandName = trigger.dataset.command;
    const command = UI_COMMANDS[commandName];
    if (typeof command !== 'function') {
      console.warn('Unknown UI command', commandName, trigger);
      return;
    }

    const arg = parseCommandArg(trigger.dataset.commandArg);
    const shouldClick = UI_CLICK_COMMANDS.has(commandName);
    if (shouldClick) GAME_EVENTS.emit('ui.click', { source: 'command', commandName });
    command(trigger, arg, event);
  });
}
