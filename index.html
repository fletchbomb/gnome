function getActiveBoardInteractionId() {
  if (G.kickMode) return 'kickTarget';
  if (G.ventMode) return 'ventTarget';
  if (G.dynamiteMode) return 'dynamiteBlast';
  if (G.shroomMode) return 'shroomRotateTarget';
  if (G.selectedAction === 'move' || G.selectedAction === 'scurry') return G.selectedAction;
  return null;
}

function rotateShroomTarget(r, c) {
  const tile = G.grid[r]?.[c];
  if (!tile) return false;
  const shroomTargets = getShroomTargets();
  const isTarget = shroomTargets.some(([tr, tc]) => tr === r && tc === c);
  if (!isTarget) return false;
  const curRot = (G.shroomPreview?.r === r && G.shroomPreview?.c === c)
    ? G.shroomPreview.rotation
    : (tile.rotationOffset || 0);
  const nextRot = (curRot + 1) % 4;
  G.shroomPreview = { r, c, rotation: nextRot };
  renderAll();
  return true;
}

function handleMoveLikeRoomSelection(actionId, r, c, tile) {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome || gnome.ko) return false;
  if (gnome.stickyBlocked) {
    addLog(`🫟 ${gnome.name} is stuck — cannot move this turn!`, 'bad');
    return true;
  }
  const targets = getConnectedRooms(gnome.row, gnome.col);
  const isTarget = targets.some(([tr, tc]) => tr === r && tc === c);
  if (!isTarget) return false;
  return executeGameAction(actionId === 'scurry' ? 'scurryMoveToRoom' : 'moveToRoom', { r, c });
}

function resolveActiveBoardRoomAction(r, c, tile) {
  const actionId = getActiveBoardInteractionId();
  if (!actionId) return false;
  switch (actionId) {
    case 'move':
    case 'scurry':
      return handleMoveLikeRoomSelection(actionId, r, c, tile);
    case 'kickTarget': {
      const isTarget = G.kickMode?.destinations?.some(([dr, dc]) => dr === r && dc === c);
      if (!isTarget) return false;
      executeGameAction('kickTarget', { r, c });
      return true;
    }
    case 'ventTarget': {
      const gnome = G.gnomes[G.currentGnomeIdx];
      const isTarget = !!tile?.vent && !!gnome && !(gnome.row === r && gnome.col === c);
      if (!isTarget) return false;
      executeGameAction('ventTarget', { r, c });
      return true;
    }
    case 'shroomRotateTarget':
      return executeGameAction('shroomRotateTarget', { r, c });
    default:
      return false;
  }
}

function resolveActiveRevealAction(r, c, fromDir, options = {}) {
  const actionId = getActiveBoardInteractionId();
  const implicit = !!options.implicit;
  if (actionId !== 'move' && !implicit) return false;
  return executeGameAction('revealRoom', { r, c, fromDir, implicit });
}

function isMoveIntentArmed(requiredAction, intent = {}) {
  return G.selectedAction === requiredAction || !!intent?.implicit;
}

function getRevealCursorText(addsTrouble = false) {

function stripLeadingIconText(label = '') {
  return String(label).replace(/^[^\p{L}\p{N}]+/u, '').trim();

function createActionContext(intent = {}) {
  const actorIdx = intent.actorIdx ?? G.currentGnomeIdx;
  const gnome = actorIdx == null ? null : (G.gnomes?.[actorIdx] || null);
  const tile = gnome ? (G.grid[gnome.row]?.[gnome.col] || null) : null;
  return { intent, actorIdx, gnome, tile };
}

function validateGnomeTurnActionContext(ctx, { requireActions = true } = {}) {
  if (G.phase !== 'gnome') return 'Not in gnome phase.';
  if (!ctx.gnome || ctx.gnome.ko) return 'That gnome cannot act.';
  if (requireActions && G.actionsLeft <= 0) return 'No actions left.';
  return '';
}

function restoreGameState(snapshot, { render = true } = {}) {
  G = snapshotStateForTests(snapshot);
  if (render) renderAll();
  return G;
}

function createGameActionIntent(actionId, payload = undefined) {
  const action = GAME_ACTIONS[actionId];
  if (!action) return null;
  return action.createIntent ? action.createIntent(payload) : { actionId, payload };
}

function validateGameActionIntent(intent) {
  const action = intent ? GAME_ACTIONS[intent.actionId] : null;
  if (!action) return { ok: false, reason: `Unknown action: ${intent?.actionId || 'unknown'}` };
  if (!action.validate) return { ok: true };
  const result = action.validate(intent);
  if (result === true || result == null) return { ok: true };
  if (typeof result === 'string') return { ok: false, reason: result };
  return result;
}

function performGameActionIntent(intent) {
  const action = intent ? GAME_ACTIONS[intent.actionId] : null;
  if (!action || typeof action.apply !== 'function') {
    console.warn('Unknown game action intent', intent);
    return false;
  }
  if (action.transactional === false) {
    const result = action.apply(intent);
    return result === undefined ? true : result;
  }
  const snapshot = snapshotStateForTests();
  try {
    const result = action.apply(intent);
    return result === undefined ? true : result;
  } catch (err) {
    console.error(`Action failed: ${intent.actionId}`, err);
    restoreGameState(snapshot);
    addLog(`⚠️ ${intent.actionId} failed. State restored.`, 'bad');
    return false;
  }
}

const GAME_ACTIONS = Object.freeze({

    validate: intent => {
      const ctx = createActionContext(intent);
      const baseError = validateGnomeTurnActionContext(ctx);
      if (baseError) return baseError;
      if (!isMoveIntentArmed('move', intent)) return 'Move is not armed.';
      if (ctx.gnome.stickyBlocked) return `🫟 ${ctx.gnome.name} is stuck — cannot move this turn!`;
      const targets = getConnectedRooms(ctx.gnome.row, ctx.gnome.col);
      if (!targets.some(([r, c]) => r === intent.target.r && c === intent.target.c)) return 'That room is not a legal move target.';
      return { ok: true };

      const baseError = validateGnomeTurnActionContext(ctx);
      if (baseError) return baseError;
      if (G.selectedAction !== 'scurry') return 'Scurry is not armed.';
      if (G.dressCodeActive && ctx.gnome.hat === 1) return `👔 Dress Code! ${ctx.gnome.name} cannot use Red Cap this round.`;

    createIntent: payload => ({ actionId: 'revealRoom', actorIdx: G.currentGnomeIdx, target: { r: Number(payload?.r), c: Number(payload?.c) }, fromDir: payload?.fromDir, implicit: !!payload?.implicit }),
    validate: intent => {
      const ctx = createActionContext(intent);

      if (!isMoveIntentArmed('move', intent)) return 'Move is not armed.';
      if (ctx.gnome.stickyBlocked) return `🫟 ${ctx.gnome.name} is stuck — cannot move this turn!`;
      if (G.roomDeck.length === 0) return 'No rooms left to reveal!';

      return { ok: true };
    },
    apply: intent => {

    },
  },
  pickup: {
    createIntent: () => ({ actionId: 'pickup', actorIdx: G.currentGnomeIdx }),

      const ctx = createActionContext(intent);
      const baseError = validateGnomeTurnActionContext(ctx);
      if (baseError) return baseError;
      const free = findFirstFreeSatchelSlot(ctx.gnome);
      if (free === -1) return `${ctx.gnome.name}'s satchel is full!`;
      const tileHasItems = !!(ctx.tile?.Socks > 0 || ctx.tile?.goodieIds?.length > 0 || ctx.tile?.hatIds?.length > 0);
      if (!tileHasItems) return 'Nothing to pick up here!';
      return { ok: true };
    },

  },

    createIntent: () => ({ actionId: 'kick', actorIdx: G.currentGnomeIdx }),

      if (!getKickTargetsForGnome(ctx.gnome).length) return 'Nothing to kick here!';
      if (!getKickDestinationsForGnome(ctx.gnome).length) return 'No connected rooms to kick into!';

    },

  },
  kickTarget: {
    createIntent: payload => ({ actionId: 'kickTarget', actorIdx: G.currentGnomeIdx, target: { r: Number(payload?.r), c: Number(payload?.c) } }),
    validate: intent => {
      if (!G.kickMode) return 'Kick is not armed.';
      const isTarget = G.kickMode.destinations?.some(([r, c]) => r === intent.target.r && c === intent.target.c);
      return isTarget ? { ok: true } : 'That room is not a legal kick destination.';

  hide: {
    createIntent: () => ({ actionId: 'hide', actorIdx: G.currentGnomeIdx }),
    validate: intent => {

      if (ventRooms.filter(([r, c]) => !(ctx.gnome.row === r && ctx.gnome.col === c)).length <= 0) {

      return isValid ? { ok: true } : 'That vent destination is not legal.';

    apply: () => shroomConfirm(),
  },
  shroomRotateTarget: {

    createIntent: payload => ({ actionId: 'shroomRotateTarget', target: { r: Number(payload?.r), c: Number(payload?.c) } }),

function isGameplayInputLocked(actionId = '') {
  if (document.body.classList.contains('card-showing')) return true;
  if (SEQ.queuedCount > 0) {
    return !['moveToRoom', 'scurryMoveToRoom'].includes(actionId);
  }
  return false;
}

function executeGameAction(actionId, payload = undefined) {
  if (isGameplayInputLocked(actionId)) return false;
  const intent = createGameActionIntent(actionId, payload);
  if (!intent) {
    console.warn('Unknown game action', actionId, payload);
    return false;
  }
  const validation = validateGameActionIntent(intent);
  if (!validation.ok) {
    if (validation.reason) addLog(validation.reason, 'bad');
    return false;
  }
  return performGameActionIntent(intent);
}

function applyActionButtonLabels() {
  Object.entries(ACTION_BUTTON_META).forEach(([id, meta]) => {
    const btn = el(id) || (id === 'btn-end' ? document.querySelector('.action-btn.end-turn') : null);
    if (!btn || btn.dataset.decorated === '1') return;
    btn.dataset.decorated = '1';
    setActionButtonContent(btn, meta.label, meta.icon);
  });
}

function createRepeatedPool(ids, repeats = 1) {
  const pool = [];
  for (let i = 0; i < repeats; i++) pool.push(...ids);
  return pool;
}

function createCountedDeck(items, getCount) {
  return items.flatMap(item => Array.from({ length: getCount(item) || 0 }, () => item.id));
}

function finishTurnPortraitTransition(actorIdx) {
  const card = el('turn-portrait-card');
  if (!card) return;
  TURN_PORTRAIT_STATE.timeoutId = null;
  if (actorIdx == null || G.phase !== 'gnome') {
    TURN_PORTRAIT_STATE.displayedActorIdx = null;
    card.classList.remove('is-visible', 'is-exiting');
    return;
  }
  const gnome = G.gnomes?.[actorIdx];
  if (!gnome) return;
  setTurnPortraitContent(gnome);
  TURN_PORTRAIT_STATE.displayedActorIdx = actorIdx;
  card.classList.remove('is-exiting');
  requestAnimationFrame(() => card.classList.add('is-visible'));
}

function renderTurnPortrait() {
  const card = el('turn-portrait-card');
  if (!card) return;
  const desiredActorIdx = G.phase === 'gnome' ? G.currentGnomeIdx : null;
  if (TURN_PORTRAIT_STATE.desiredActorIdx === desiredActorIdx && TURN_PORTRAIT_STATE.displayedActorIdx === desiredActorIdx) {
    if (desiredActorIdx != null) setTurnPortraitContent(G.gnomes?.[desiredActorIdx]);
    return;
  }
  TURN_PORTRAIT_STATE.desiredActorIdx = desiredActorIdx;
  if (TURN_PORTRAIT_STATE.timeoutId) {
    clearTimeout(TURN_PORTRAIT_STATE.timeoutId);
    TURN_PORTRAIT_STATE.timeoutId = null;
  }
  if (TURN_PORTRAIT_STATE.displayedActorIdx == null && desiredActorIdx == null) {
    card.classList.remove('is-visible', 'is-exiting');
    return;
  }
  if (TURN_PORTRAIT_STATE.displayedActorIdx == null) {
    finishTurnPortraitTransition(desiredActorIdx);
    return;
  }
  card.classList.remove('is-visible');
  card.classList.add('is-exiting');
  TURN_PORTRAIT_STATE.timeoutId = setTimeout(() => finishTurnPortraitTransition(TURN_PORTRAIT_STATE.desiredActorIdx), 320);
}

// Get rooms reachable from (r,c) via door connections
function getConnectedRooms(r, c) {
  const tile = G.grid[r]?.[c];
  if (!tile) return [];
  const result = [];
  for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
    const nr = r + dr, nc = c + dc;
    const nb = G.grid[nr]?.[nc];
    if (!nb) continue;
    if (tilesConnected(tile, nb)) result.push([nr, nc]);
  }
  return result;
}

// Get empty cells where a new room COULD be placed from (r,c)
// i.e. current tile has a door in that direction AND the cell is empty
function getRevealableFrom(r, c) {
  const tile = G.grid[r]?.[c];
  if (!tile) return [];
  const result = [];
  for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
    const nr = r + dr, nc = c + dc;
    if (nr < 0 || nr >= G.GRID || nc < 0 || nc >= G.GRID) continue;
    if (G.grid[nr]?.[nc]) continue;
    if (tileHasDoor(tile, dir, { includeForced: true })) result.push([nr, nc, dir]);
  }
  return result;
}

// When placing a new room at (nr,nc) coming from direction fromDir (door on incoming tile),
// filter the room deck to only rooms that have a door on the OPPOSITE side (so they connect).
// Returns the first valid roomId from the deck.
function drawConnectingRoom(fromDir) {
  const needed = OPPOSITE[fromDir]; // new tile must be rotatable to provide a door on this side
  for (let i=G.roomDeck.length-1;i>=0;i--) {
    if (roomCanProvideDoor(G.roomDeck[i], needed)) {
      return G.roomDeck.splice(i,1)[0];
    }
  }
  // Fallback: no room in the deck can natively provide the needed door in any rotation.
  // Take whatever is left and signal doReveal to force-rotate it via _pendingEntryDoor.
  // This should be rare; if it fires often the room deck mix may need adjustment.
  const id = G.roomDeck.pop();
  if (id) {
    G._pendingEntryDoor = needed;
    console.warn(`drawConnectingRoom: fallback triggered — forcing entry door ${needed} on room ${id}`);
  }
  return id;
}

    setupSelectedGnomes = setupSelectedGnomes.filter(v => v !== index);
  } else {
    setupSelectedGnomes = [...setupSelectedGnomes, index].sort((a,b)=>a-b);
  }
  setupPlayerCount = setupSelectedGnomes.length;
  renderGnomeNameInputs();
}

const PERF = {

  cardWarm: false,
  startupWarmPromise: null,
};

function onNextFrame(fn) {
  requestAnimationFrame(() => requestAnimationFrame(fn));
}

function warmCardOverlay() {
  if (PERF.cardWarm) return;
  const overlay = el('card-overlay');
  const inner = el('game-card-inner');
  if (!overlay || !inner) return;

  const prevOverlayDisplay = overlay.style.display;
  const prevOverlayVisibility = overlay.style.visibility;
  const prevOverlayPointerEvents = overlay.style.pointerEvents;
  const prevOverlayOpacity = overlay.style.opacity;
  const prevBodyState = document.body.classList.contains('card-showing');
  const prevAnimation = inner.style.animation;
  const prevClassName = inner.className;

  document.body.classList.add('card-showing');
  overlay.classList.add('show');
  overlay.style.visibility = 'hidden';
  overlay.style.pointerEvents = 'none';
  overlay.style.opacity = '0';
  inner.className = 'game-card';
  inner.style.animation = 'none';
  void inner.offsetWidth;

  overlay.style.display = 'flex';
  void overlay.offsetWidth;

  onNextFrame(() => {
    overlay.classList.remove('show');
    overlay.style.display = prevOverlayDisplay;
    overlay.style.visibility = prevOverlayVisibility;
    overlay.style.pointerEvents = prevOverlayPointerEvents;
    overlay.style.opacity = prevOverlayOpacity;
    inner.className = prevClassName;
    inner.style.animation = prevAnimation;
    if (!prevBodyState) document.body.classList.remove('card-showing');
    PERF.cardWarm = true;
  });
}

function warmUiPerformance() {
  if (PERF.startupWarmPromise) return PERF.startupWarmPromise;
  const fontReady = document.fonts && document.fonts.ready ? document.fonts.ready.catch(() => undefined) : Promise.resolve();
  PERF.startupWarmPromise = fontReady.then(() => new Promise(resolve => {
    warmCardOverlay();
    onNextFrame(resolve);
  }));
  return PERF.startupWarmPromise;
}

function primeUiPerformance() {
  warmUiPerformance().catch(() => undefined);
}

  applyBuildMetadata();
  primeUiPerformance();
}, { once: true });

const BOARD_PAN_STATE = {
  active: false,
  pending: false,
  pointerId: null,
  startX: 0,
  startY: 0,
  originScrollLeft: 0,
  originScrollTop: 0,
  boardArea: null,
};

function isBoardPanBlocked() {
  return document.body.classList.contains('card-showing') ||
    document.body.classList.contains('weaver-manage-open') ||
    !!document.querySelector('.item-popup');
}

function isBoardPanEligibleTarget(target) {
  const boardArea = BOARD_PAN_STATE.boardArea || el('board-area');
  if (!boardArea || !target || !boardArea.contains(target) || isBoardPanBlocked()) return false;
  if (target.closest('#patrol-tray, .door, .room-item, .slot.clickable, .item-popup, #modal, #modal-overlay, #card-overlay, button, a, input, select, textarea, label')) {
    return false;
  }
  const cell = target.closest('.cell');
  if (!cell) return true;
  if (
    cell.classList.contains('can-reveal') ||
    cell.classList.contains('move-target') ||
    cell.classList.contains('current-gnome') ||
    cell.classList.contains('shroom-target') ||
    cell.classList.contains('kick-dest') ||
    cell.classList.contains('vent-dest')
  ) {
    return false;
  }
  return true;
}

function syncBoardPanCursor(target = null) {
  const boardArea = BOARD_PAN_STATE.boardArea || el('board-area');
  if (!boardArea) return;
  if (BOARD_PAN_STATE.active) {
    boardArea.classList.add('is-panning');
    boardArea.classList.remove('pan-ready');
    return;
  }
  boardArea.classList.remove('is-panning');
  const probeTarget = target || document.elementFromPoint(window.innerWidth / 2, window.innerHeight / 2);
  if (probeTarget && isBoardPanEligibleTarget(probeTarget)) {
    boardArea.classList.add('pan-ready');
  } else {
    boardArea.classList.remove('pan-ready');
  }
}

function beginBoardPanDrag(clientX, clientY) {
  const boardArea = BOARD_PAN_STATE.boardArea || el('board-area');
  if (!boardArea) return;
  BOARD_PAN_STATE.active = true;
  BOARD_PAN_STATE.pending = false;
  BOARD_PAN_STATE.startX = clientX;
  BOARD_PAN_STATE.startY = clientY;
  BOARD_PAN_STATE.originScrollLeft = boardArea.scrollLeft;
  BOARD_PAN_STATE.originScrollTop = boardArea.scrollTop;
  boardArea.classList.add('is-panning');
  boardArea.classList.remove('pan-ready');
}

function stopBoardPanDrag() {
  const boardArea = BOARD_PAN_STATE.boardArea || el('board-area');
  BOARD_PAN_STATE.active = false;
  BOARD_PAN_STATE.pending = false;
  BOARD_PAN_STATE.pointerId = null;
  if (boardArea) boardArea.classList.remove('is-panning');
}

function initBoardPanControls() {
  const boardArea = el('board-area');
  if (!boardArea || boardArea.dataset.panInit === '1') return;
  boardArea.dataset.panInit = '1';
  BOARD_PAN_STATE.boardArea = boardArea;

  boardArea.addEventListener('pointerdown', (e) => {
    if (e.button != 0) return;
    if (!isBoardPanEligibleTarget(e.target)) return;
    BOARD_PAN_STATE.pending = true;
    BOARD_PAN_STATE.pointerId = e.pointerId;
    BOARD_PAN_STATE.startX = e.clientX;
    BOARD_PAN_STATE.startY = e.clientY;
    BOARD_PAN_STATE.originScrollLeft = boardArea.scrollLeft;
    BOARD_PAN_STATE.originScrollTop = boardArea.scrollTop;
    boardArea.setPointerCapture?.(e.pointerId);
    syncBoardPanCursor(e.target);
  });

  boardArea.addEventListener('pointermove', (e) => {
    if (BOARD_PAN_STATE.pointerId !== null && e.pointerId !== BOARD_PAN_STATE.pointerId) return;
    if (BOARD_PAN_STATE.pending && !BOARD_PAN_STATE.active) {
      const dx = e.clientX - BOARD_PAN_STATE.startX;
      const dy = e.clientY - BOARD_PAN_STATE.startY;
      if ((dx * dx) + (dy * dy) >= 16) {
        beginBoardPanDrag(BOARD_PAN_STATE.startX, BOARD_PAN_STATE.startY);
      }
    }
    if (BOARD_PAN_STATE.active) {
      const dx = e.clientX - BOARD_PAN_STATE.startX;
      const dy = e.clientY - BOARD_PAN_STATE.startY;
      boardArea.scrollLeft = BOARD_PAN_STATE.originScrollLeft - dx;
      boardArea.scrollTop = BOARD_PAN_STATE.originScrollTop - dy;
      e.preventDefault();
      return;
    }
    syncBoardPanCursor(e.target);
  });

  const releasePan = (e) => {
    if (BOARD_PAN_STATE.pointerId !== null && e.pointerId !== undefined && e.pointerId !== BOARD_PAN_STATE.pointerId) return;
    const wasActive = BOARD_PAN_STATE.active;
    stopBoardPanDrag();
    boardArea.releasePointerCapture?.(e.pointerId);
    if (wasActive) e.preventDefault?.();
    syncBoardPanCursor(e.target || null);
  };

  boardArea.addEventListener('pointerup', releasePan);
  boardArea.addEventListener('pointercancel', releasePan);
  boardArea.addEventListener('lostpointercapture', releasePan);
  boardArea.addEventListener('pointerleave', () => {
    if (!BOARD_PAN_STATE.active && !BOARD_PAN_STATE.pending) boardArea.classList.remove('pan-ready');
  });
  boardArea.addEventListener('mousemove', (e) => {
    if (!BOARD_PAN_STATE.pending && !BOARD_PAN_STATE.active) syncBoardPanCursor(e.target);
  });
  boardArea.addEventListener('dragstart', (e) => {
    if (BOARD_PAN_STATE.active || BOARD_PAN_STATE.pending) e.preventDefault();
  });
}

document.addEventListener('DOMContentLoaded', initBoardPanControls, { once: true });

function distributeRoomOccupants({ gnomsHere, koHere, hamperHere, patrolsHere, r, c }) {
  const top = [];
  const bottom = [];
  const pushBalanced = (node) => {
    (top.length <= bottom.length ? top : bottom).push(node);
  };
  gnomsHere.forEach(og => pushBalanced(buildTokenNodeForGnome(og, r, c)));
  patrolsHere.forEach(p => pushBalanced(buildTokenNodeForPatrol(p, r, c)));
  koHere.forEach(og => pushBalanced(buildTokenNodeForKoGnome(og, r, c)));
  return { top, bottom };
}

function renderBoard() {
  const board = el('board');
  board.style.gridTemplateColumns = `repeat(${G.GRID}, ${GAME_BUILD.boardCellSize}px)`;
  board.style.gridTemplateRows = `repeat(${G.GRID}, ${GAME_BUILD.boardCellSize}px)`;
  BOARD_CELL_INDEX.clear();

  const frag = document.createDocumentFragment();
  const gnome = G.gnomes[G.currentGnomeIdx];
  const isPanic = G.phase === 'panic';
  const canMove = isPanic
    ? (gnome && !gnome.ko)
    : ((G.selectedAction==='move'||G.selectedAction==='scurry') && gnome && !gnome.stickyBlocked);
  const moveTargets = canMove
    ? new Set(getConnectedRooms(gnome.row, gnome.col).map(([r,c]) => getCellKey(r, c)))
    : new Set();
  const revealable = !isPanic && G.selectedAction==='move' && gnome && !gnome.stickyBlocked
    ? getRevealableFrom(gnome.row, gnome.col)
    : [];
  const revealSet = new Set(revealable.map(([r,c]) => getCellKey(r, c)));

  for (let r=0;r<G.GRID;r++) {
    for (let c=0;c<G.GRID;c++) {
      const tile = G.grid[r][c];
      const cell = createElement('div', { attrs: { 'data-r': r, 'data-c': c } });

      if (tile) {
        const cellKey = getCellKey(r, c);
        cell.className = getRoomCellClassNames({
          tile,
          key: cellKey,
          currentGnome: gnome,
          selectedCell: G.selectedCell,
          moveTargets,
        });

        const allDoors = getRenderableDoorDirs(r, c);
        allDoors.forEach(dir => {
          const disabledDoor = isDoorDisabled(r, c, dir);
          const doorClick = disabledDoor ? null : getDoorClickConfig(r, c, dir);
          const doorTitle = doorClick
            ? (() => {
                const [dr,dc] = DIR_DELTA[doorClick.dir];
                const nr = doorClick.fromR + dr, nc = doorClick.fromC + dc;
                const destTile = G.grid[nr]?.[nc];
                const addsTrouble = G.tilesRevealed > getFreeTiles();
                return destTile
                  ? (G.selectedAction === 'scurry' ? UI_TEXT.action.scurryHere : UI_TEXT.action.moveHere)
                  : UI_TEXT.reveal(addsTrouble);
              })()
            : '';
          cell.appendChild(createElement('div', { className: `door ${dir}${disabledDoor ? ' disabled' : ''}`, attrs: doorTitle ? { title: doorTitle } : {} }));
        });
        appendDebugDoorOverlay(cell, r, c);

        if (G.shroomMode) {
          const shroomTargets = getShroomTargets();
          const isTarget = shroomTargets.some(([tr,tc])=>tr===r&&tc===c);
          if (isTarget) {
            cell.classList.add('shroom-target');
            const preview = G.shroomPreview;
            const isPreview = preview && preview.r===r && preview.c===c;
            const previewRot = isPreview ? preview.rotation : (tile.rotationOffset||0);

            cell.querySelectorAll('.door').forEach(d=>d.remove());
            getShroomPreviewDoorDirs(tile, previewRot).forEach(dir => {
              const door = createElement('div', { className: `door ${dir}` });
              door.style.background = isPreview ? '#a855f7' : '#f5a623';
              cell.appendChild(door);
            });

            cell.appendChild(createBoardOverlay({
              title: isPreview ? '🍄 Rotate Again' : UI_TEXT.action.rotate90,
              style: `position:absolute;inset:0;z-index:15;cursor:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><text y='26' font-size='26'>🔄</text></svg>") 16 16, pointer;`,
              attrs: { 'data-stop-propagation': 'true' },
              commandName: 'shroomRotateTarget',
              commandArg: { r, c },
            }));
          }
        }

        if (G.kickMode) {
          const isKickDest = G.kickMode.destinations.some(([dr,dc])=>dr===r&&dc===c);

                const popup = createPopupShell();
                if (inRoom) {
                  const hasSocks = curGnome.satchel.some(s => s?.type === 'Socks');
                  if (hasSocks) {
                    addPopupBtn(popup, UI_TEXT.action.deposit, () => { closeItemPopup(); depositSocks(); });
                  } else {
                    addPopupBtn(popup, 'No Socks to deposit', () => closeItemPopup(), true);
                  }
                } else {
                  addPopupBtn(popup, UI_TEXT.action.deposit, () => closeItemPopup(), true);
                }
                mountPopupNearAnchor(e.currentTarget, popup);
              },
            }));
          }
          if (tile.hide) {
            bottomLeft.appendChild(createIconNode({
              emoji: '🪑',
              title: UI_TEXT.action.hide,
              className: 'room-static-icon hide-chair',
              onClick: (e) => { e.stopPropagation(); showQuirkPopup(e.currentTarget, 'hide', r, c); },
            }));
          }
          if (tile.weaver) {
            bottomLeft.appendChild(createIconNode({
              emoji: '🧌',
              title: UI_TEXT.action.weaver,
              onClick: (e) => { e.stopPropagation(); showQuirkPopup(e.currentTarget, 'weaver', r, c); },
            }));
          }
          if (tile.vent) {
            bottomLeft.appendChild(createIconNode({
              emoji: '♨️',
              title: UI_TEXT.action.vent,
              onClick: (e) => { e.stopPropagation(); showQuirkPopup(e.currentTarget, 'vent', r, c); },
            }));
          }
          if (tile.chute) {
            bottomLeft.appendChild(createIconNode({
              emoji: '🕳️',
              title: UI_TEXT.action.deposit,
              onClick: (e) => { e.stopPropagation(); showQuirkPopup(e.currentTarget, 'chute', r, c); },
            }));
          }
          inner.appendChild(bottomLeft);
        }

        const bottomRightIcons = [];
        if (tile.sticky) bottomRightIcons.push({ emoji:'🫟', title:UI_TEXT.status.sticky });
        if (tile.creaky) bottomRightIcons.push({ emoji:'📢', title:UI_TEXT.status.creaky });
        if (bottomRightIcons.length) {
          const bottomRight = createCornerNode('br');
          bottomRightIcons.forEach(icon => bottomRight.appendChild(createIconNode(icon)));
          inner.appendChild(bottomRight);
        }

        const nameBand = createElement('div', { className: 'room-name-band' });
        nameBand.appendChild(createElement('div', { className: 'room-name', text: def.name }));
        inner.appendChild(nameBand);

        const occupantNodes = createRoomOccupantNodes({ gnomsHere, patrolsHere, koHere, r, c });
        if (occupantNodes.length) placeRoomOccupants(inner, occupantNodes);

        cell.appendChild(inner);

        const stuckHere = G.gnomes.some(g => g.stickyBlocked && g.row===r && g.col===c);
        if (stuckHere) cell.classList.add('sticky-active');

        if (tile.creaky) {
          cell.classList.add('creaky-active');
          cell.appendChild(createCreakyOverlay(`${r},${c}`));
        }

        cell.onclick = () => handleRoomClick(r, c, tile);
        allDoors.forEach(dir => {
          const doorEl = cell.querySelector(`.door.${dir}`);
          if (!doorEl) return;
          const doorClick = getDoorClickConfig(r, c, dir);
          if (!doorClick) return;
          doorEl.onclick = (e) => { e.stopPropagation(); handleDoorClick(doorClick.fromR, doorClick.fromC, doorClick.dir, doorClick.tile); };
        });
      } else {
        cell.className = 'cell empty';
        if (revealSet.has(`${r},${c}`)) {
          cell.classList.add('can-reveal');
          const inTroubleZone = G.tilesRevealed > getFreeTiles();
          if (inTroubleZone) cell.classList.add('trouble-zone');
          const rData = revealable.find(([rr,cc])=>rr===r&&cc===c);
          cell.onclick = () => handleRevealClick(r, c, rData[2]);
          cell.title = getRevealCursorText(inTroubleZone);
        }
        // Intentionally do not render pending doors on empty cells.
        // The state can remember future-entry directions, but unexplored rooms
        // must remain visually blank until they are actually placed.
        appendDebugDoorOverlay(cell, r, c);
      }
      rememberBoardCell(r, c, cell);
      frag.appendChild(cell);
    }
  }
  board.replaceChildren(frag);
}


function patrolEmoji(t){ return PATROL_EMOJI_BY_TYPE[t]||'🚨'; }

function mountUnifiedTurnDock() {
  const bottomDock = el('bottom-dock');
  const gnomePanels = el('gnome-panels');
  const patrolTray = el('patrol-tray');
  const actionGrid = el('primary-action-grid');
  const endTurnBtn = el('btn-end');
  const winHouseBtn = el('btn-win-house');
  const actionDivider = document.querySelector('#actions .action-divider');
  if (!bottomDock || !gnomePanels) return;
  if (gnomePanels.parentElement !== bottomDock) bottomDock.prepend(gnomePanels);
  if (patrolTray && patrolTray.parentElement !== bottomDock) bottomDock.appendChild(patrolTray);
  if (actionGrid && endTurnBtn && endTurnBtn.parentElement !== actionGrid) actionGrid.appendChild(endTurnBtn);
  if (actionGrid && winHouseBtn && winHouseBtn.parentElement !== actionGrid) actionGrid.appendChild(winHouseBtn);
  if (actionDivider) actionDivider.style.display = 'none';
  layoutActionButtons();
}

function renderGnomePanels() {
  const container = document.getElementById('gnome-panels');
  const actionsShell = document.getElementById('actions-shell');
  const sidebar = document.getElementById('sidebar');
  const gnomesShell = document.getElementById('gnomes-shell');
  container.innerHTML = '';

  G.gnomes.forEach((g, i) => {
    const isActive = i === G.currentGnomeIdx && G.phase === 'gnome';
    const hat = HAT_DEF_BY_ID[g.hat] || null;
    const size = getSatchelSize(g);
    const canAct = isActive && !g.ko;
    const canManageInventory = !g.ko && (canAct || !!G.weaverModal);

    const card = document.createElement('div');
    card.className = `gnome-card floating-panel ${isActive?'active':''} ${g.ko?'ko':''}`;
    card.style.setProperty('--gnome-accent', g.color || 'var(--gold)');
    const main = createElement('div', { className: 'gnome-card-main' });
    const portraitChip = createElement('div', { className: 'gnome-portrait-chip' });
    const portraitImg = createElement('img', { attrs: { src: getGnomePortraitUrl(g), alt: `${g.name} portrait`, loading: 'eager' } });
    portraitChip.appendChild(portraitImg);
    main.appendChild(portraitChip);
    const content = createElement('div', { className: 'gnome-card-content' });

    const header = document.createElement('div');
    header.className = 'gnome-header';
    const emojiWrap = createElement('span', { className: 'gnome-emoji-wrap' });
    emojiWrap.appendChild(createElement('span', { className: 'gnome-emoji', text: g.emoji || '🧝' }));
    if (g.hidden || g.stickyBlocked) {
      const statusStack = createElement('span', { className: 'gnome-status-stack' });
      if (g.hidden) statusStack.appendChild(createElement('span', { className: 'gnome-status-badge hidden', text: '🫣' }));
      if (g.stickyBlocked) statusStack.appendChild(createElement('span', { className: 'gnome-status-badge sticky', text: '🫟' }));
      emojiWrap.appendChild(statusStack);
    }
    header.appendChild(emojiWrap);
    const nameEl = createElement('span', { className: 'gnome-name-text', text: g.name });
    if ((g.name || '').length > 7) {
      const fontSize = Math.max(0.62, 0.88 - (((g.name || '').length - 7) * 0.04));
      nameEl.style.fontSize = `${fontSize}rem`;
    }
    header.appendChild(nameEl);
    const hatSlot = document.createElement('div');
    hatSlot.className = 'slot hat-slot hat-slot-inline' + (canManageInventory ? ' clickable' : '');
    hatSlot.title = hat ? `${hat.name}: ${hat.desc}${showHatCancelled(g) ? ' (cancelled this round)' : ''}` : 'No hat equipped';
    hatSlot.textContent = hat ? (hat.emoji || '🎩') : '—';
    if (!hat) hatSlot.style.opacity = '0.4';
    if (showHatCancelled(g)) {
      hatSlot.classList.add('cancelled');
      hatSlot.dataset.cancelled = 'true';
    }
    if (canManageInventory) hatSlot.onclick = (e) => { e.stopPropagation(); showInventoryItemPopup(hatSlot, g, i, 'hat', -1); };
    header.appendChild(hatSlot);
    const headerStatus = document.createElement('div');
    headerStatus.className = 'gnome-header-status';
    if (g.ko) headerStatus.appendChild(createElement('span', { text: '💀KO', attrs: { style: 'color:#ff6b6b;font-size:.7rem' } }));
    header.appendChild(headerStatus);
    content.appendChild(header);

    const body = document.createElement('div');
    body.className = 'gnome-card-body';

    const meta = document.createElement('div');
    meta.className = 'gnome-meta';
    if (G.phase === 'patrol' && !isActive) {
      meta.appendChild(createElement('div', { className: 'inline-badge', text: 'Waiting' }));
    }
    if (meta.childNodes.length) body.appendChild(meta);

    const satchelLabel = document.createElement('div');
    satchelLabel.style.cssText = 'font-size:.6rem;color:var(--muted);margin-bottom:2px;';
    satchelLabel.textContent = `Satchel (${g.satchel.slice(0,size).filter(Boolean).length}/${size})`;

        else if (item.type === 'hat') { const hdef = HATS_DEFS.find(h=>h.id===item.id); tooltip = `${hdef?.name||'Hat'}: ${hdef?.desc||''}`; }
        else tooltip = getItemName(item);
      }

      slotEl.textContent = item ? getItemEmoji(item) : '';

    }

      for (let a = 0; a < capacity; a++) {
        const slot = document.createElement('div');
        slot.className = 'gnome-action-slot' + (a < G.actionsLeft ? ' filled' : '');

      }

    content.appendChild(body);

      else sidebar.appendChild(actionsShell);
    }
    actionsShell.classList.remove('gnome-card-actions');
  }

  if (info) info.innerHTML = '';

function showInventoryItemPopup(anchor, gnome, gnomeIdx, itemType, slotIdx) {
  closeItemPopup();
  const popup = createPopupShell();

  const isHatSlot = slotIdx === -1; // equipped hat
  const item = isHatSlot ? (gnome.hat ? {type:'hat', id: gnome.hat} : null) : gnome.satchel[slotIdx];
  if (!item && !isHatSlot) return;

  const tile = G.grid[gnome.row][gnome.col];

  if (itemType === 'goodie') {
    const def = GOODIES_DEFS.find(d=>d.id===normalizeGoodieId(item.id));
    const usable = isGoodieUsable(gnome, normalizeGoodieId(item.id));
    const canUse = usable && G.actionsLeft > 0;
    addPopupBtn(popup, `${def?.emoji||'🍄'} Use ${def?.name||'Goodie'}`, () => {
      if (!canUse) return;
      closeItemPopup();
      useGoodieFromSlot(slotIdx);
    }, !canUse);
    addPopupBtn(popup, UI_TEXT.action.drop, () => {
      if (G.actionsLeft <= 0) return;
      closeItemPopup();
      gnome.satchel[slotIdx] = null;
      spendAction();
      if (!tile.goodieIds) tile.goodieIds = [];
      tile.goodieIds.push(item.id);
      GAME_EVENTS.emit('item.dropped', { itemType: 'goodie', id: item.id });
      addLog(`${gnome.name} dropped ${def?.name||'Goodie'}.`);
      renderAll();
    }, G.actionsLeft <= 0);
  } else if (itemType === 'Socks') {
    addPopupBtn(popup, tile?.roomId===1 || tile?.chute ? UI_TEXT.action.deposit : UI_TEXT.action.drop, () => {
      if (G.actionsLeft <= 0) return;
      closeItemPopup();
      gnome.satchel[slotIdx] = null;
      spendAction();
      if (tile?.roomId === 1 || tile?.chute) {
        G.SocksBanked++;
        GAME_EVENTS.emit('item.dropped', { itemType: 'Socks', mode: 'deposit' });
        addLog(`${gnome.name} deposited 🧦! Total: ${G.SocksBanked}/${getHouseGoal()}`, 'good');
        checkGoalMet();
      } else {
        tile.Socks++;
        GAME_EVENTS.emit('item.dropped', { itemType: 'Socks', mode: 'floor' });
        addLog(`${gnome.name} dropped 🧦 in ${ROOM_DEFS[tile.roomId].name}.`);
      }
      renderAll();
    }, G.actionsLeft <= 0);
  } else if (itemType === 'hat') {
    if (isHatSlot) {
      if (!gnome.hat) {
        // No hat equipped — just info
        addPopupBtn(popup, '(no hat equipped — Scurry unavailable)', ()=>closeItemPopup(), true);
      } else {
      // Equipped hat — offer to move to satchel, swap with satchel hat, or drop to floor
      const hatsInSatchel = gnome.satchel.map((s,i)=>s?.type==='hat'?{item:s,idx:i}:null).filter(Boolean);
      const freeSlot = findFirstFreeSatchelSlot(gnome);

      // Move to Satchel (only if there's a free slot)
      if (freeSlot !== -1) {
        addPopupBtn(popup, `📦 Move to Satchel`, () => {
          closeItemPopup();
          const oldHat = gnome.hat;
          gnome.hat = null;
          gnome.satchel[freeSlot] = {type:'hat', id:oldHat};
          addLog(`${gnome.name} moves their hat to satchel.`);
          updateActionsForHat();
          renderAll();
        });
      }

      // Swap with a hat in satchel
      if (hatsInSatchel.length) {
        hatsInSatchel.forEach(({item:hItem, idx:hIdx}) => {
          const hdef = HATS_DEFS.find(h=>h.id===hItem.id);
          addPopupBtn(popup, `🔄 Equip ${hdef?.name||'Hat'}`, () => {
            closeItemPopup();
            const oldHat = gnome.hat;
            gnome.hat = hItem.id;
            gnome.satchel[hIdx] = {type:'hat', id: oldHat};
            addLog(`${gnome.name} equips ${hdef?.name}!`, 'good');
            updateActionsForHat();
            renderAll();
          });
        });
      }

      // Drop to floor
      addPopupBtn(popup, UI_TEXT.action.drop, () => {
        closeItemPopup();
        const oldHat = gnome.hat;
        gnome.hat = null;
        const dropTile = G.grid[gnome.row][gnome.col];
        if (!dropTile.hatIds) dropTile.hatIds = [];
        dropTile.hatIds.push(oldHat);
        GAME_EVENTS.emit('item.dropped', { itemType: 'hat', mode: 'floor' });
        addLog(`${gnome.name} drops their hat on the floor.`);
        updateActionsForHat();
        renderAll();
      });
      } // end else (hat equipped)
    } else {
      // Hat in satchel — equip or drop to floor
      const hdef = HATS_DEFS.find(h=>h.id===item.id);
      addPopupBtn(popup, `🎩 Equip ${hdef?.name||'Hat'} (replace current)`, () => {
        closeItemPopup();
        const oldHat = gnome.hat;
        gnome.hat = item.id;
        gnome.satchel[slotIdx] = oldHat ? {type:'hat', id: oldHat} : null;
        addLog(`${gnome.name} equips ${hdef?.name}!`, 'good');
        updateActionsForHat();
        renderAll();
      });
      addPopupBtn(popup, UI_TEXT.action.drop, () => {
        closeItemPopup();
        gnome.satchel[slotIdx] = null;
        const dropTile2 = G.grid[gnome.row][gnome.col];
        if (!dropTile2.hatIds) dropTile2.hatIds = [];
        dropTile2.hatIds.push(item.id);
        GAME_EVENTS.emit('item.dropped', { itemType: 'hat', id: item.id, mode: 'floor' });
        addLog(`${gnome.name} drops ${hdef?.name||'Hat'} on the floor.`);
        renderAll();
      });
    }
  }

  mountPopupNearAnchor(anchor, popup);
}

        });
      }
      const dests = getConnectedRooms(r, c);
      if (dests.length && G.actionsLeft > 0) {
        addPopupBtn(popup, '👟 Kick', () => {
          closeItemPopup();
          G.kickMode = { target: { label:`🍄 ${gdef?.name||'Goodie'}`, emoji:'🍄', type:'goodie', ref:{tile, idx} }, destinations: dests };
          addLog(UI_TEXT.kickChooseRoom(gdef?.name || 'Goodie'), 'system');
          renderAll();
        });
      }
    }
  } else if (type === 'hat') {
    const hid = tile.hatIds[idx];
    const hdef = HATS_DEFS.find(d=>d.id===hid);
    if (inRoom) {
      const satchelSize = getSatchelSize(gnome);
      const freeSlot = findFirstFreeSatchelSlot(gnome);
      const hatSlotEmpty = !gnome.hat;
      const canPickUp = G.actionsLeft > 0 && (freeSlot !== -1 || hatSlotEmpty);
      if (canPickUp) {
        addPopupBtn(popup, `🤏 Pick Up ${hdef?.name||'Hat'}`, () => {
          closeItemPopup();
          tile.hatIds.splice(idx, 1);
          const result = giveHatToGnome(gnome, hid);
          if (result === 'equipped') {
            addLog(`${gnome.name} picks up and equips ${hdef?.name||'Hat'}!`,'good');
          } else {
            addLog(`${gnome.name} picks up ${hdef?.name||'Hat'}.`,'good');
          }
          spendAction(); G.selectedAction=null; renderAll();
        });
      } else if (G.actionsLeft > 0) {
        addPopupBtn(popup, `🤏 Pick Up ${hdef?.name||'Hat'} (satchel full)`, ()=>closeItemPopup(), true);
      }
      const dests = getConnectedRooms(r, c);
      if (dests.length && G.actionsLeft > 0) {
        addPopupBtn(popup, '👟 Kick', () => {
          closeItemPopup();
          G.kickMode = { target: { label:`${hdef?.emoji||'🎩'} ${hdef?.name||'Hat'}`, emoji: hdef?.emoji||'🎩', type:'hat', ref:{tile, idx} }, destinations: dests };
          addLog(UI_TEXT.kickChooseRoom(hdef?.name || 'Hat'), 'system');
          renderAll();
        });
      }
    }
  }

  if (!popup.children.length) {
    addPopupBtn(popup, '(no actions available)', ()=>closeItemPopup(), true);
  }

  mountPopupNearAnchor(anchor, popup);
}

function addPopupBtn(popup, label, action, disabled=false) {
  appendPopupAction(popup, label, action, disabled);
}

function closeItemPopup() {
  const p = document.getElementById('active-item-popup');
  if (p) p.remove();
}

function mountPopupNearAnchor(anchor, popup) {
  if (!anchor || !popup) return;
  document.body.appendChild(popup);
  const rect = anchor.getBoundingClientRect();
  const popupRect = popup.getBoundingClientRect();
  const maxLeft = Math.max(8, window.innerWidth - popupRect.width - 8);
  const preferredLeft = rect.left + Math.max(0, (rect.width - popupRect.width) / 2);
  popup.style.left = `${Math.min(maxLeft, Math.max(8, preferredLeft))}px`;
  const aboveTop = rect.top - popupRect.height - 6;
  const belowTop = rect.bottom + 6;
  popup.style.top = `${aboveTop >= 8 ? aboveTop : Math.min(window.innerHeight - popupRect.height - 8, belowTop)}px`;
  deferDocumentOneShotClick(closeItemPopup);
}

function getDoorClickConfig(r, c, dir) {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome || gnome.ko || G.phase !== 'gnome') return null;

  if (gnome.row === r && gnome.col === c) {
    const tile = G.grid[r]?.[c];
    return tile ? { fromR:r, fromC:c, dir, tile } : null;
  }

  const [dr, dc] = DIR_DELTA[dir];
  const srcR = r + dr;
  const srcC = c + dc;
  if (gnome.row !== srcR || gnome.col !== srcC) return null;

  const srcTile = G.grid[srcR]?.[srcC];
  const clickedTile = G.grid[r]?.[c];
  const moveDir = OPPOSITE[dir];
  if (!srcTile || !clickedTile) return null;
  if (!tileHasDoor(srcTile, moveDir) || !tileHasDoor(clickedTile, dir)) return null;

  return { fromR:srcR, fromC:srcC, dir:moveDir, tile:srcTile };
}

function handleDoorClick(r, c, dir, tile) {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome || gnome.ko || G.phase !== 'gnome' || G.actionsLeft <= 0) return;
  if (gnome.row !== r || gnome.col !== c) return;
  if (gnome.stickyBlocked) { addLog('🫟 Stuck this turn!','bad'); return; }
  const [dr, dc] = DIR_DELTA[dir];
  const nr = r+dr, nc = c+dc;
  const destTile = G.grid[nr]?.[nc];
  if (destTile) {
    if (!tilesConnected(tile, destTile)) return;
    executeGameAction('moveToRoom', { r: nr, c: nc, implicit: true });
  } else {
    if (!tileHasDoor(tile, dir)) return;
    if (!G.roomDeck.length) { addLog('No rooms left!','bad'); return; }
    executeGameAction('revealRoom', { r: nr, c: nc, fromDir: dir, implicit: true });
  }
}

function showOccupantPopup(anchor, obj, type, r, c) {

function layoutActionButtons() {
  const actionsShell = document.getElementById('actions-shell');
  const primaryGrid = document.getElementById('primary-action-grid');
  if (!actionsShell || !primaryGrid) return;

  const orderedStatic = [
    'btn-move','btn-pickup','btn-kick','btn-hide',
    'btn-deposit','btn-weaver','btn-hamper','btn-vent','btn-scurry',
    'btn-shroom-confirm'
  ];
  const trailingStatic = ['btn-end','btn-win-house'];
  const dynamicButtons = [...document.querySelectorAll('.dynamic-goodie-btn')];
  const seen = new Set();
  const orderedButtons = [];

  const addButton = (btn) => {
    if (!btn || seen.has(btn)) return;
    seen.add(btn);
    orderedButtons.push(btn);
  };

  orderedStatic.forEach(id => addButton(document.getElementById(id)));
  dynamicButtons.forEach(addButton);
  trailingStatic.forEach(id => addButton(document.getElementById(id)));
  [...primaryGrid.querySelectorAll('.action-btn')].forEach(addButton);

  const fragment = document.createDocumentFragment();
  orderedButtons.forEach(btn => fragment.appendChild(btn));

  primaryGrid.replaceChildren(fragment);
  primaryGrid.style.gridTemplateColumns = 'repeat(4, 61px)';
  primaryGrid.style.columnGap = '7px';
  primaryGrid.style.rowGap = '7px';
  primaryGrid.style.justifyContent = 'start';
  primaryGrid.style.margin = actionsShell.classList.contains('gnome-card-actions') ? '0' : '0 auto';
  primaryGrid.style.width = '265px';
  primaryGrid.style.maxWidth = '265px';
}

function hamperInteract() {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome || gnome.ko || G.phase !== 'gnome') return;
  if (gnome.row !== G.hamper.row || gnome.col !== G.hamper.col) {
    addLog('Must be in the same room as the Hamper.', 'bad'); return;
  }
  const satchelSize = getSatchelSize(gnome);
  const buttons = [];

  // Store: move each satchel item into the hamper
  gnome.satchel.forEach((item, idx) => {
    if (!item) return;
    buttons.push({ label: getItemEmoji(item) + ' Store ' + getItemName(item), cls: 'good', action: () => {
      closeModal();
      G.hamper.items.push(item);
      gnome.satchel[idx] = null;
      addLog(gnome.name + ' stores ' + getItemName(item) + ' in the Hamper.');
      renderAll();
    }});
  });

  // Retrieve: move each hamper item into the satchel (if space)
  G.hamper.items.forEach((item, idx) => {
    const freeSlot = gnome.satchel.findIndex((s, i) => s === null && i < satchelSize);
    const canGet = freeSlot !== -1;
    buttons.push({
      label: getItemEmoji(item) + ' Retrieve ' + getItemName(item) + (canGet ? '' : ' (satchel full)'),
      cls: canGet ? 'good' : '',
      disabled: !canGet,
      action: () => {
        if (!canGet) return;
        closeModal();
        gnome.satchel[freeSlot] = item;
        G.hamper.items.splice(idx, 1);
        addLog(gnome.name + ' retrieves ' + getItemName(item) + ' from the Hamper.');
        renderAll();
      }
    });
  });

  if (!buttons.length) {
    addLog('Nothing to store or retrieve — both satchel and Hamper are empty.', 'bad'); return;
  }
  buttons.push({ label: 'Done', cls: 'cancel', action: closeModal });
  showModal('Hamper', 'Store items from your satchel, or retrieve items from the Hamper:', buttons);
}

function getRoomName(r,c) { const t=G.grid[r]?.[c]; return t?ROOM_DEF_BY_ID[t.roomId]?.name||'?':'?'; }
const BASE_SATCHEL_SIZE = 3;
function getSatchelSize(g) { const hatId = getEffectiveHatId(g); return BASE_SATCHEL_SIZE + (HAT_DEF_BY_ID[hatId]?.satchelBonus || 0); }
function findFirstFreeSatchelSlot(gnome) {
  const size = getSatchelSize(gnome);
  return gnome.satchel.findIndex((s,i)=>s===null && i < size);
}
function canReceiveInSatchel(gnome, item) {
  if (gnome?.ko) return false;
  if (findFirstFreeSatchelSlot(gnome) !== -1) return true;
  // For hats: also eligible if hat slot is empty
  if (item?.type === 'hat' && !gnome.hat) return true;
  return false;
}
function giveItemToGnomeSatchel(gnome, item) {
  const slot = findFirstFreeSatchelSlot(gnome);
  if (slot === -1) return false;
  gnome.satchel[slot] = item;
  return true;
}
// Give a hat to a gnome: auto-equips if the hat slot is empty, otherwise goes to satchel.
// Returns 'equipped' | 'satchel' | false
function giveHatToGnome(gnome, hid) {
  if (!gnome.hat) {
    gnome.hat = hid;
    updateActionsForHat();
    return 'equipped';
  }
  const slot = findFirstFreeSatchelSlot(gnome);
  if (slot === -1) return false;
  gnome.satchel[slot] = {type:'hat', id:hid};
  return 'satchel';
}
function getHatActionBonus(hatId) { return HAT_DEF_BY_ID[hatId]?.actionBonus || 0; }
function getItemEmoji(item) {
  if (!item) return '';
  if (item.type==='Socks') return '🧦';
  if (item.type==='goodie') return GOODIE_DEF_BY_ID[item.id]?.emoji||'🍄';
  if (item.type==='hat') return HAT_DEF_BY_ID[item.id]?.emoji||'🎩';
  return '?';
}
function getItemName(item) {
  if (!item) return 'Empty';
  if (item.type==='Socks') return 'Socks 🧦';
  if (item.type==='goodie') return GOODIE_DEF_BY_ID[item.id]?.name||'Goodie';
  if (item.type==='hat') return HAT_DEF_BY_ID[item.id]?.name||'Hat';
  return '?';
}

function getItemDesc(item) {
  if (!item) return '';
  if (item.type==='goodie') return GOODIE_DEF_BY_ID[item.id]?.desc || '';
  if (item.type==='hat') return HAT_DEF_BY_ID[item.id]?.desc || '';
  if (item.type==='Socks') return 'Trade currency.';
  return '';
}
