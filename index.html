function buildEventSequence(ev, r, c, opts = {}) {
  if (!ev) return [];
  const clsMap = {good:'event-good', trouble:'event-trouble', patrol:'event-patrol'};
  const patrolSpawnCardByEffect = {
    spawn_roomba: { cardType:'🚨 Patrol Spawn', emoji:'🤖', name:'Roomba Appears!', desc:'The Roomba has activated and is patrolling the house. Watch out — it destroys any socks it rolls over!', cls:'patrol-spawn', sfxHint:'roomba' },
    spawn_dog:    { cardType:'🚨 Patrol Spawn', emoji:'🐶', name:'The Dog is Loose!', desc:'The dog is on the hunt for gnomes. Getting caught means losing all your socks!', cls:'patrol-spawn', sfxHint:'dog' },
    spawn_kid:    { cardType:'🚨 Patrol Spawn', emoji:'👦', name:'The Kid is Up!', desc:'The kid is hunting the gnome with the most socks. Getting caught means getting KO\'d!', cls:'patrol-spawn', sfxHint:'kid' },
    spawn_dad:    { cardType:'🚨 Patrol Spawn', emoji:'👨', name:'Dad Woke Up!', desc:"Dad is patrolling between his room and the Laundry Room. You can't hide from Dad — and getting caught is brutal!", cls:'patrol-spawn', sfxHint:'dad' },
  };
  const stackedPatrolCard = patrolSpawnCardByEffect[ev.effect] || null;
  const preCardEffect = ev.effect === 'explosion'
    ? [{t:'effect', fn:() => { GAME_EVENTS.emit('dynamite.blast'); }}]
    : [];
  const patrolAlreadyInPlay = /spawn_/i.test(ev.effect||'') && (() => {
    if (/spawn_roomba/i.test(ev.effect||'')) return !!G.patrols.find(p=>p.type==='roomba');
    if (/spawn_dog/i.test(ev.effect||'')) return !!G.patrols.find(p=>p.type==='dog');
    if (/spawn_kid/i.test(ev.effect||'')) return !!G.patrols.find(p=>p.type==='kid');
    if (/spawn_dad/i.test(ev.effect||'')) return !!G.patrols.find(p=>p.type==='dad');
    return false;
  })();
  const cardStep = stackedPatrolCard
    ? {
        t:'card',
        cardType:'⁉️ Event Card', emoji:ev.emoji, name:ev.name, desc:ev.desc||'', cls:clsMap[ev.type]||'event-patrol',
        ...(patrolAlreadyInPlay ? {} : { stackAfterDelay: stackedPatrolCard, stackAfterDelayMs: 1000, noDismiss: true }),
        eventEffect: ev.effect || '',
        sfxHint: 'none'
      }
    : {
        t:'card', cardType:'⁉️ Event Card', emoji:ev.emoji, name:ev.name, desc:ev.desc||'', cls:clsMap[ev.type]||'event-good',
        eventEffect: ev.effect || '',
        sfxHint: (() => {
          if (/sticky/i.test(ev.effect||'')) return 'sticky';
          if (/creaky/i.test(ev.effect||'')) return 'creaky';
          if (/explosion/i.test(ev.effect||'')) return 'dynamite';
          if (/spawn_roomba/i.test(ev.effect||'')) return 'roomba';
          if (/spawn_dog/i.test(ev.effect||'')) return 'dog';
          if (/spawn_kid/i.test(ev.effect||'')) return 'kid';
          if (/spawn_dad/i.test(ev.effect||'')) return 'dad';
          if (/spawn_/i.test(ev.effect||'')) return 'none';
          return 'woosh';
        })()
      };
  const prefix = opts.logPrefix || '⁉️ Event';
  return [
    {t:'log', msg:`${prefix}: ${ev.emoji} ${ev.name}`, cls:opts.logClass || 'event'},
    ...preCardEffect,
    cardStep,
    {t:'effect', fn:() => applyEvent(ev,r,c)},
    {t:'render'}
  ];
}

}

function applyEvent(ev,r,c) {
  const tile=G.grid[r][c]; if(!tile) return;
  switch(ev.effect){
    case 'vent': tile.vent=true; break;
    case 'goodie': { if(!tile.goodieIds)tile.goodieIds=[]; const gid=G.goodiePool.length?G.goodiePool.pop():1; tile.goodieIds.push(gid); break; }
    case 'chute': tile.chute=true; break;
    case 'weaver': tile.weaver=true; break;
    case 'Socks': tile.Socks++; break;
    case 'creaky': if(tile.creaky)addTrouble(1);else{tile.creaky=true;addTrouble(1);} break;
    case 'sticky': if(tile.sticky)addTrouble(1);else{tile.sticky=true;addTrouble(1);} break;
    case 'avalanche': addTrouble(1);tile.Socks+=2; break;
    case 'alarm':
      if(!G.patrols.length){ addTrouble(1); addLog('⏰ Alarm: no patrols in play, +1 Trouble.','bad'); break; }
      {
        const near = getNearestPatrolTo(r, c) || G.patrols[0];
        const name=capitalize(near.type);
        queueEventPatrolMove(near, {
          mode: 'toward',
          targetR: r,
          targetC: c,
          label: 'Alarm!',
          logText: (tile, patrol, stepsLeft) => `⏰ Alarm: ${capitalize(patrol.type)} moves toward event (${stepsLeft} step${stepsLeft>1?'s':''} left).`,
          logClass: 'patrol',
          waitAfter: 0,
          steps: 2,
          hideBannerAtEnd: true,
          onBlocked: patrol => {
            if (patrol.row === r && patrol.col === c) addLog(`⏰ Alarm: ${name} is already at the event room.`, 'patrol');
          },
        });
      } break;
    case 'explosion':
      ['N','E','S','W'].forEach(dir => openDoorFromTile(tile, dir));
      addLog('💥 Explosion! All 4 walls of this room are now Doors.','good');
      reconcileDoorConnections();
      break;
    case 'laundry_day':
      { let count=0;
        for(let rr=0;rr<G.GRID;rr++) for(let cc=0;cc<G.GRID;cc++){
          const t=G.grid[rr][cc];
          if(t&&t.roomId===5){t.Socks++;count++;}
        }
        addLog(`👕 Laundry Day! Socks added to ${count} Bedroom(s).`,'good');
      } break;
    case 'lights_off':
      G.gnomes.forEach(g=>{ if(!g.ko) g.hidden=true; });
      addLog('🌑 Lights Off! All Gnomes are hidden this turn.','good');
      break;
    case 'cookie_waft':
      { const kitchenCell = (()=>{
          for(let rr=0;rr<G.GRID;rr++) for(let cc=0;cc<G.GRID;cc++){
            const t=G.grid[rr][cc]; if(t&&t.roomId===6) return [rr,cc];
          }
          return null;
        })();
        if(!kitchenCell){ addTrouble(1); addLog('🍪 Cookie Waft: Kitchen not in play! +1 Trouble.','bad'); break; }
        const [kr,kc]=kitchenCell;
        G.patrols.forEach(p=>{ p.row=kr; p.col=kc; checkPatrolCatch(p); });
        addLog(`🍪 Cookie Waft! All Patrols warp to the Kitchen.`,'patrol');
      } break;
    case 'spawn_roomba': if(G.patrols.find(p=>p.type==='roomba')){addTrouble(1);}else{spawnPatrolNear('roomba',17,r,c);addPatrolRefCard('roomba');} break;
    case 'spawn_dog':    if(G.patrols.find(p=>p.type==='dog'))   {addTrouble(1);}else{spawnPatrolNear('dog',16,r,c);   addPatrolRefCard('dog');}    break;
    case 'spawn_kid':    if(G.patrols.find(p=>p.type==='kid'))   {addTrouble(2);}else{spawnPatrolNear('kid',15,r,c);   addPatrolRefCard('kid');}    break;
    case 'spawn_dad':    if(G.patrols.find(p=>p.type==='dad'))   {addTrouble(2);}else{spawnPatrolNear('dad',14,r,c);   addPatrolRefCard('dad');}    break;
  }
}

function cloneSetLike(value) {
  return value instanceof Set ? new Set([...value]) : value;
}

function cloneTileForTest(tile) {
  if (!tile) return null;
  return {

    goodieIds: [...(tile.goodieIds || [])],

    manualDoorDirs: tile.manualDoorDirs ? [...tile.manualDoorDirs] : undefined,
    pendingDoorDirs: tile.pendingDoorDirs ? [...tile.pendingDoorDirs] : undefined,
    doors: tile.doors ? [...tile.doors] : undefined,
  };
}

function snapshotStateForTests(state = G) {
  return {
    ...state,
    grid: state.grid.map(row => row.map(cloneTileForTest)),
    roomDeck: [...state.roomDeck],

    })),

    log: [...state.log],
    newlySpawnedCells: cloneSetLike(state.newlySpawnedCells),
    stickyAnimated: cloneSetLike(state.stickyAnimated),
    crackedRooms: cloneSetLike(state.crackedRooms),
  };
}

function assertSmoke(condition, message) {
  if (!condition) throw new Error(message);
}

function verifyStateInvariants(state = G) {
  const issues = [];
  const push = msg => issues.push(msg);
  const laundry = GameQueries.getTile(state.CENTER, state.CENTER, state);
  if (!laundry || laundry.roomId !== 1) push('Center tile must stay the Laundry Room.');
  if ((state.gnomes || []).length < 1) push('At least one gnome must exist.');
  (state.gnomes || []).forEach((gnome, idx) => {
    if (!GameQueries.getTile(gnome.row, gnome.col, state)) push(`Gnome ${idx} is standing on an empty cell.`);
    if (!Array.isArray(gnome.satchel) || gnome.satchel.length < BASE_SATCHEL_SIZE) push(`Gnome ${idx} satchel shape is invalid.`);
  });
  (state.patrols || []).forEach((patrol, idx) => {
    if (!GameQueries.getTile(patrol.row, patrol.col, state)) push(`Patrol ${idx} is standing on an empty cell.`);
  });
  return { ok: issues.length === 0, issues };
}

function runSmokeTests() {
  const results = [];
  const test = (name, fn) => {
    try {
      const detail = fn();
      results.push({ name, ok: true, detail: detail || 'ok' });
    } catch (err) {
      results.push({ name, ok: false, detail: err.message || String(err) });
    }
  };

  test('fresh state invariants', () => {
    const temp = createBaseState(2, ['Pip', 'Brim']);
    withTempState(temp, () => hydrateInitialBoard(temp, 2, ['Pip', 'Brim']));
    const report = verifyStateInvariants(temp);
    assertSmoke(report.ok, report.issues.join(' | '));
  });

  test('connected-room query remains stable on fresh board', () => {
    const temp = createBaseState(2, ['Pip', 'Brim']);
    withTempState(temp, () => hydrateInitialBoard(temp, 2, ['Pip', 'Brim']));
    const connected = withTempState(temp, () => getConnectedRooms(temp.CENTER, temp.CENTER));
    assertSmoke(Array.isArray(connected), 'Connected rooms query must return an array.');
    assertSmoke(connected.length === 0, 'Fresh board should not begin with adjacent connected rooms.');
  });

  test('reveal query exposes legal empty neighbors from laundry', () => {
    const temp = createBaseState(2, ['Pip', 'Brim']);
    withTempState(temp, () => hydrateInitialBoard(temp, 2, ['Pip', 'Brim']));
    const revealable = withTempState(temp, () => getRevealableFrom(temp.CENTER, temp.CENTER));
    assertSmoke(revealable.length >= 1, 'Laundry Room should reveal at least one legal room.');
    revealable.forEach(([r, c]) => {
      assertSmoke(!GameQueries.getTile(r, c, temp), 'Reveal targets must stay empty before placement.');
    });
  });

  test('live game invariants', () => {
    const snap = snapshotStateForTests();
    const report = verifyStateInvariants(snap);
    assertSmoke(report.ok, report.issues.join(' | '));
  });

  return results;
}

function getDebugDoorMarkers(r, c) {
  const tile = G.grid[r]?.[c] || null;
  if (tile) {
    const renderable = new Set(getRenderableDoorDirs(r, c));
    const base = new Set(getBaseDoorDirs(tile));
    const manual = new Set(getManualDoorDirs(tile));
    const pending = new Set(getForcedDoorDirs(tile));
    return ['N','E','S','W'].map(dir => {
      const tags = [];
      if (renderable.has(dir)) tags.push('R');
      if (base.has(dir)) tags.push('B');
      if (manual.has(dir)) tags.push('M');
      if (pending.has(dir)) tags.push('P');
      if (!tags.length) return null;
      const cls = renderable.has(dir)
        ? 'render'
        : (pending.has(dir) && (base.has(dir) || manual.has(dir)))
          ? 'mix'
          : pending.has(dir)
            ? 'pending'
            : manual.has(dir)
              ? 'manual'
              : 'base';
      return { dir, text: tags.join(''), cls, title: `${dir}: ${tags.map(tag => ({ R:'renderable', B:'base', M:'manual', P:'pending' }[tag])).join(', ')}` };
    }).filter(Boolean);
  }
  return ['N','E','S','W'].map(dir => {
    const [dr, dc] = DIR_DELTA[dir];
    const nr = r + dr, nc = c + dc;
    const nb = G.grid[nr]?.[nc];
    if (!nb) return null;
    const opp = OPPOSITE[dir];
    const tags = [];
    if (getForcedDoorDirs(nb).includes(opp)) tags.push('P');
    if (tileHasDoor(nb, opp)) tags.push('I');
    if (!tags.length) return null;
    const cls = tags.includes('P') && tags.includes('I') ? 'mix' : tags.includes('P') ? 'pending' : 'inbound';
    return { dir, text: tags.join(''), cls, title: `${dir}: inbound from ${ROOM_DEF_BY_ID[nb.roomId]?.name || nb.roomId} (${tags.includes('P') ? 'pending' : 'existing'} on neighbor)` };
  }).filter(Boolean);
}

function debugNormalizeRoomPlacement(tile, r, c, fromDir) {
  const mandatoryEntry = fromDir ? OPPOSITE[fromDir] : null;
  let bestRot = tile.rotationOffset || 0;
  let bestScore = -Infinity;
  for (let rot = 0; rot < 4; rot++) {
    const dirs = getBaseDoorDirs(tile, rot);
    if (mandatoryEntry && !dirs.includes(mandatoryEntry) && !roomCanProvideDoor(tile.roomId, mandatoryEntry)) continue;
    let score = 0;
    if (mandatoryEntry && dirs.includes(mandatoryEntry)) score += 100;
    for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
      const nr = r + dr, nc = c + dc;
      const nb = G.grid[nr]?.[nc];
      if (!nb) continue;
      const opp = OPPOSITE[dir];
      if (dirs.includes(dir) && tileHasDoor(nb, opp, { includeForced: true })) score += 10;
      if (getForcedDoorDirs(nb).includes(opp)) score += 25;
    }
    if (score > bestScore) {
      bestScore = score;
      bestRot = rot;
    }
  }
  tile.rotationOffset = bestRot;
  normalizeTileDoorState(tile);
  if (mandatoryEntry && !tileHasDoor(tile, mandatoryEntry)) addManualDoor(tile, mandatoryEntry);
  for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
    const nr = r + dr, nc = c + dc;
    const nb = G.grid[nr]?.[nc];
    if (!nb) continue;
    const opp = OPPOSITE[dir];
    if (getForcedDoorDirs(nb).includes(opp)) connectTilesWithDoor(tile, nb, dir);
    else if (tileHasDoor(tile, dir) && tileHasDoor(nb, opp)) connectTilesWithDoor(tile, nb, dir);
  }
  reconcileDoorConnections();
}

function debugPlaceRoom(dir, requestedRoomId = 'auto') {
  const g = debugActiveGnome();

  const nr = g.row + dr, nc = g.col + dc;
  if (nr < 0 || nr >= G.GRID || nc < 0 || nc >= G.GRID) return addLog('Debug: target cell is off the board.', 'bad');
  if (G.grid[nr]?.[nc]) return addLog('Debug: that neighboring cell already has a room.', 'bad');
  openDoorFromTile(currentTile, dir);
  let roomId = requestedRoomId === 'auto' ? drawConnectingRoom(dir) : Number(requestedRoomId);

}

function initDebugFork() {
  if (!DEBUG_FORK.enabled) return;
  debugPopulatePanelOptions();
  refreshDebugOverlayToggle();
  const toggle = el('debug-toggle');
  if (toggle && !toggle.dataset.bound) {
    toggle.dataset.bound = '1';
    toggle.addEventListener('click', () => debugSetPanelVisibility());
  }
  if (!document.body.dataset.debugPanelResizeBound) {
    document.body.dataset.debugPanelResizeBound = '1';
    window.addEventListener('resize', syncDebugPanelBounds);
  }
  document.querySelectorAll('[data-debug-action]').forEach(btn => {
    if (btn.dataset.bound === '1') return;
    btn.dataset.bound = '1';
    btn.addEventListener('click', () => {
      const action = btn.dataset.debugAction;
      if (action === 'spawnItem') return debugSpawnItem(el('debug-spawn-kind').value, el('debug-spawn-target').value);
      if (action === 'triggerEvent') return debugTriggerSelectedEvent(el('debug-event-select').value);
      if (action === 'spawnPatrol') return debugSpawnPatrolInCurrentRoom(el('debug-patrol-select').value);
      if (action === 'placeRoom') return debugPlaceRoom(el('debug-room-dir').value, el('debug-room-select').value);
      if (action === 'openDoorN') { const tile = debugCurrentTile(); if (tile) { openDoorFromTile(tile, 'N'); reconcileDoorConnections(); renderAll(); } return; }
      if (action === 'openDoorE') { const tile = debugCurrentTile(); if (tile) { openDoorFromTile(tile, 'E'); reconcileDoorConnections(); renderAll(); } return; }
      if (action === 'openDoorS') { const tile = debugCurrentTile(); if (tile) { openDoorFromTile(tile, 'S'); reconcileDoorConnections(); renderAll(); } return; }
      if (action === 'openDoorW') { const tile = debugCurrentTile(); if (tile) { openDoorFromTile(tile, 'W'); reconcileDoorConnections(); renderAll(); } return; }
      if (action === 'rotateCurrentRoom') { const tile = debugCurrentTile(); if (tile) { tile.rotationOffset = ((tile.rotationOffset || 0) + 1) % 4; normalizeTileDoorState(tile); reconcileDoorConnections(); renderAll(); } return; }
      if (action === 'troublePlus') return debugAdjustTrouble(1);
      if (action === 'troubleMinus') return debugAdjustTrouble(-1);
      if (action === 'actionPlus') { G.actionsLeft = (G.actionsLeft || 0) + 1; renderAll(); return; }
      if (action === 'nextGnome') { G.currentGnomeIdx = ((G.currentGnomeIdx || 0) + 1) % (G.gnomes?.length || 1); renderAll(); return; }
      if (action === 'clearQueue') { SEQ.clear(); debugClearTransientUi(); renderAll(); return; }
      if (action === 'forceDefeat') { SEQ.clear(); debugClearTransientUi(); G.trouble = 20; showEndScreen(false); return; }
      if (action === 'inspectNow') return debugInspectState();
      if (action === 'toggleDoorOverlay') { DEBUG_FORK.showDoorOverlay = !DEBUG_FORK.showDoorOverlay; refreshDebugOverlayToggle(); renderAll(); return; }
      if (action === 'refreshRegistries') return debugRefreshRegistries();
    });
  });
  document.addEventListener('keydown', (ev) => {
    if (ev.key.toLowerCase() === 'd' && ev.shiftKey) {
      ev.preventDefault();
      debugSetPanelVisibility();
    }
  }, { passive: false });
  debugSetPanelVisibility(DEBUG_FORK.defaultPanelOpen);
  debugInspectState();
}

function getVentRooms() {

function getPathDistance(fr, fc, tr, tc) {
  if (fr === tr && fc === tc) return 0;
  const startKey = `${fr},${fc}`;
  const goalKey = `${tr},${tc}`;
  const seen = new Set([startKey]);
  const queue = [[fr, fc, 0]];
  while (queue.length) {
    const [r, c, dist] = queue.shift();
    for (const [nr, nc] of getConnectedRooms(r, c)) {
      const key = `${nr},${nc}`;
      if (seen.has(key)) continue;
      if (key === goalKey) return dist + 1;
      seen.add(key);
      queue.push([nr, nc, dist + 1]);
    }
  }
  return Infinity;
}

function getNearestPatrolTo(targetR, targetC) {
  let best = null;
  let bestDist = Infinity;
  G.patrols.forEach(patrol => {
    const pathDist = getPathDistance(patrol.row, patrol.col, targetR, targetC);
    const tieBreak = Math.abs(patrol.row - targetR) + Math.abs(patrol.col - targetC);
    if (pathDist < bestDist) {
      bestDist = pathDist;
      best = patrol;
    } else if (pathDist === bestDist && best) {
      const bestTie = Math.abs(best.row - targetR) + Math.abs(best.col - targetC);
      if (tieBreak < bestTie) best = patrol;
    }
  });
  return best;
}

function getNearestGnome(patrol, allowHidden) {
  let best = null;
  let bestPath = Infinity;
  let bestManhattan = Infinity;
  G.gnomes.forEach(g => {
    if (g.ko) return;
    if (!allowHidden && g.hidden) return;
    if (patrol.type === 'dog' && getEffectiveHatId(g) === 7) return;
    const pathDist = getPathDistance(patrol.row, patrol.col, g.row, g.col);
    const manhattan = Math.abs(g.row - patrol.row) + Math.abs(g.col - patrol.col);
    const effectivePath = Number.isFinite(pathDist) ? pathDist : Infinity;
    if (effectivePath < bestPath || (effectivePath === bestPath && manhattan < bestManhattan)) {
      best = g;
      bestPath = effectivePath;
      bestManhattan = manhattan;
    }
  });
  return best;
}

function getGnomeMostSocks() {
  let best = null;
  let most = -1;
  let bestPath = Infinity;
  let bestManhattan = Infinity;
  const kid = G.patrols.find(p => p.type === 'kid') || null;
  G.gnomes.forEach(g => {
    if (g.ko) return;
    if (g.hidden) return;
    const n = g.satchel.filter(s => s?.type === 'Socks').length;
    const pathDist = kid ? getPathDistance(kid.row, kid.col, g.row, g.col) : Infinity;
    const manhattan = kid ? Math.abs(g.row - kid.row) + Math.abs(g.col - kid.col) : Infinity;
    if (n > most || (n === most && (pathDist < bestPath || (pathDist === bestPath && manhattan < bestManhattan)))) {
      best = g;
      most = n;
      bestPath = pathDist;
      bestManhattan = manhattan;
    }
  });
  return best;
}

function bestStepToward(fr,fc,tr,tc,candidates) {
  if(!candidates.length) return [fr,fc];
  let best = candidates[0];
  let bestPath = Infinity;
  let bestManhattan = Infinity;
  candidates.forEach(([r,c])=>{
    const pathDist = getPathDistance(r, c, tr, tc);
    const manhattan = Math.abs(r-tr)+Math.abs(c-tc);
    if (pathDist < bestPath || (pathDist === bestPath && manhattan < bestManhattan)) {
      bestPath = pathDist;
      bestManhattan = manhattan;
      best = [r,c];
    }
  });
  if (bestPath !== Infinity) return best;
  return candidates.reduce((cur, cand) => {
    const candD = Math.abs(cand[0]-tr)+Math.abs(cand[1]-tc);
    const curD = Math.abs(cur[0]-tr)+Math.abs(cur[1]-tc);
    return candD < curD ? cand : cur;
  }, candidates[0]);
}

// ── Patrol next-move lookahead ────────────────────────────────────────────
// Returns the direction ('N'|'S'|'E'|'W') the patrol would move next,
// without mutating any state. Returns null if patrol cannot move.

  if (patrol.stickyBlocked) return null;
  const step = computePatrolMoveStep(patrol);

}

    [latestNode, logNode].forEach(node => {
      if (!node) return;
      node.addEventListener('click', () => GAME_EVENTS.emit('ui.click', { source: 'log' }));
    });
    G._audioLogClickBound = true;
  }
  ensureLogUiState();
  const items = G.log || [];
  const latestEl = el('log-latest');
  const logEl = el('log');
  if (!latestEl || !logEl) return;

  const latest = items[items.length - 1];
  latestEl.className = 'log-entry ' + (latest?.type || 'system');
  latestEl.textContent = latest ? latest.msg : 'No actions yet.';

  logEl.innerHTML = '';
  items.forEach(({ msg, type }) => {
    logEl.appendChild(createElement('div', { className: 'log-entry ' + type, text: msg }));
  });

  const area = el('log-area');
  if (area && !G.logCollapsed) logEl.scrollTop = logEl.scrollHeight;
}

function applyLogCollapsedState() {
  ensureLogUiState();
  const area = el('log-area');
  const btn = el('log-toggle');
  if (!area || !btn) return;
  area.classList.toggle('collapsed', G.logCollapsed);
  btn.textContent = G.logCollapsed ? 'Expand' : 'Collapse';
}

function toggleLogCollapsed() {
  ensureLogUiState();
  G.logCollapsed = !G.logCollapsed;
  applyLogCollapsedState();
  renderLogEntries();
}

function addLog(msg,type=''){
  G.log = G.log || [];
  G.log.push({ msg, type });
  renderLogEntries();
}

document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('btn-audio-mute');
  if (btn && !btn.dataset.audioMuteBound) {
    btn.dataset.audioMuteBound = '1';
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleGameAudioMute();
    });
  }
  syncAudioMuteUi();
});

applyThemeArchitectureShells();
mountUnifiedTurnDock();
applyActionButtonLabels();
initCommandBindings();
ensureLogUiState();
applyLogCollapsedState();
renderLogEntries();
selectPlayers(2);
renderGnomeNameInputs();
initDebugFork();
refreshDebugForkUi();

</script>
