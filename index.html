// Weaver shop state helper: keeps modal resets and shopper context consistent.
function buildWeaverShopState(mode, overrides = {}, base = G.weaverModal || {}) {
  const normalizedMode = mode || base.mode || 'room';
  const betweenHouseTrade = normalizedMode === 'between';
  const resolvedOffers = overrides.offers
    ?? base.offers
    ?? null;
  const fallbackShopperIdx = betweenHouseTrade
    ? (Number.isInteger(base.shopperIdx) ? base.shopperIdx : G.currentGnomeIdx)
    : undefined;
  return {
    kind: 'shop',
    mode: normalizedMode,
    offers: resolvedOffers,
    shopperIdx: overrides.shopperIdx ?? fallbackShopperIdx,
    selectedTileId: overrides.selectedTileId ?? '',
    selectedPayment: overrides.selectedPayment ?? { banked: [], satchel: [] },
    reviveTargetPhase: overrides.reviveTargetPhase ?? false
  };
}

function getWeaverItemLabel(item) {
  if (item.type === 'goodie') return getGoodieLabel(item.id);
  const def = getHatDefById(item.id);
  return `${def?.emoji || '🎩'} ${def?.name || 'Hat'}`;
}

function getWeaverShopDefs(type) {
  if (type === 'goodie') {
    return GOODIES_DEFS.map(def => ({ id:def.id, emoji:getGoodieEmoji(def.id), name:def.name, desc:def.desc || '' }));
  }
  const seen = new Set();
  return getBetweenHouseHatPoolTemplate()
    .map(id => getHatDefById(id))
    .filter(def => def && !seen.has(def.id) && seen.add(def.id))
    .map(def => ({ id:def.id, iconKey:def.iconKey || '', emoji:def.emoji || '🎩', name:def.name, desc:def.desc || '' }));
}

function getWeaverOfferCost(type) {
  return getGameRules().weaver.offerCostByType[type] ?? (type === 'hat' ? 5 : 1);
}

function pullWeaverOfferId(type) {
  if (type === 'hat') return G.hatPool.length ? G.hatPool.pop() : 2;
  return G.goodiePool.length ? G.goodiePool.pop() : 1;
}

function createWeaverOffer(type, forcedId = null) {
  const id = forcedId ?? pullWeaverOfferId(type);
  const def = type === 'hat'
    ? (getHatDefById(id) || getHatDefs()[0])
    : (getGoodieDef(id) || GOODIES_DEFS[0]);
  return {
    type,
    id,
    name: def?.name || (type === 'hat' ? 'Hat' : 'Goodie'),
    iconKey: def?.iconKey || '',
    emoji: type === 'hat' ? (def?.emoji || '🎩') : getGoodieEmoji(id),
    desc: def?.desc || '',
    cost: getWeaverOfferCost(type),
    rotation: `${(Math.random() * 6 - 3).toFixed(2)}deg`,
    delay: `${Math.round(Math.random() * 220)}ms`,
    appearing: true
  };
}


function buildWeaverOfferSet(type, count = getWeaverOfferCount(type), excludeIds = []) {
  const defs = getWeaverShopDefs(type);
  const pool = shuffledCopy(defs.filter(def => !excludeIds.includes(def.id)));
  const offers = [];
  while (offers.length < count) {
    if (!pool.length) {
      const refill = shuffledCopy(defs.filter(def => !offers.some(offer => offer.id === def.id)));
      if (!refill.length) break;
      pool.push(...refill);
    }
    const next = pool.pop();
    if (!next) break;
    offers.push(createWeaverOffer(type, next.id));
  }
  return offers;
}

function ensureWeaverOffers(ctx = G.weaverModal) {
  if (!ctx) return null;
  if (!ctx.offers) ctx.offers = { goodie: [], hat: [] };
  if (!Array.isArray(ctx.offers.goodie)) ctx.offers.goodie = [];
  if (!Array.isArray(ctx.offers.hat)) ctx.offers.hat = [];
  const goodieCount = getWeaverOfferCount('goodie');
  const hatCount = getWeaverOfferCount('hat');
  if (ctx.offers.goodie.length < goodieCount) {
    const next = buildWeaverOfferSet('goodie', goodieCount, ctx.offers.goodie.map(offer => offer?.id).filter(Boolean));
    ctx.offers.goodie = [...ctx.offers.goodie.filter(Boolean), ...next].slice(0, goodieCount);
  }
  if (ctx.offers.hat.length < hatCount) {
    const next = buildWeaverOfferSet('hat', hatCount, ctx.offers.hat.map(offer => offer?.id).filter(Boolean));
    ctx.offers.hat = [...ctx.offers.hat.filter(Boolean), ...next].slice(0, hatCount);
  }
  return ctx.offers;
}

function refillWeaverOfferSlot(type, index, ctx = G.weaverModal) {
  if (!ctx) return;
  ensureWeaverOffers(ctx);
  if (!ctx.offers[type]) ctx.offers[type] = [];
  const excludeIds = ctx.offers[type]
    .map((offer, idx) => idx === index ? null : offer?.id)
    .filter(Boolean);
  const replacement = buildWeaverOfferSet(type, 1, excludeIds)[0] || createWeaverOffer(type);
  ctx.offers[type][index] = replacement;
}

function applyWeaverItemToGnome(gnome, item, mode) {
  if (!gnome || !item) return false;
  const modal = G.weaverModal || {};
  let equipped = false;
  if (item.type === 'hat') {
    const result = giveHatToGnome(gnome, item.id);
    equipped = result === 'equipped';
  } else {
    if (!canReceiveInSatchel(gnome, item)) return false;
    giveItemToGnomeSatchel(gnome, item);
  }
  if (Number.isInteger(modal.selectedOfferIndex) && modal.selectedOfferType) {
    refillWeaverOfferSlot(modal.selectedOfferType, modal.selectedOfferIndex, modal);
  }
  addLog(`${getWeaverItemLabel(item)} goes to ${gnome.name}${equipped ? ' (auto-equipped!)' : ''}!`, 'good');
  setWeaverModalContext(buildWeaverShopState(mode, {
    offers: modal.offers || ensureWeaverOffers(modal),
    shopperIdx: mode === 'between' ? modal.shopperIdx : undefined
  }, modal));
  renderWeaverScreen();
  renderAll();
  return true;
}


function resolveWeaverSelectedTile(offers, selectedTileId) {
  if (!selectedTileId) return null;
  for (const type of ['hat', 'goodie']) {
    const found = (offers?.[type] || []).find(o => o && !o.soldOut && `offer:${type}:${o.id}` === selectedTileId);
    if (found) return { kind: 'offer', type, id: found.id, offer: found };
  }
  if (selectedTileId === 'action:reroll') return { kind: 'action', action: 'reroll', name: 'Reroll', desc: 'Refresh the available hat and goodie offers.', cost: 1, icon: '🔄' };
  if (selectedTileId === 'action:revive') return { kind: 'action', action: 'revive', name: 'Revive KO Gnome', desc: 'Revive a KO gnome where they fell. If more than one is KO\'d, choose which gnome after paying.', cost: 2, icon: '💖' };
  if (selectedTileId === 'action:reduce') return { kind: 'action', action: 'reduce', name: 'Reduce Trouble', desc: 'Lower Trouble by 1.', cost: 1, icon: '🕸️' };
  return null;
}

function getWeaverTileCost(tile) {
  if (!tile) return 0;
  if (tile.kind === 'offer') return tile.offer.cost ?? getWeaverOfferCost(tile.type);
  return tile.cost || 0;
}

function buildWeaverRenderContext() {
  if (!G.weaverModal) return null;
  const storeGrid = el('weaver-store-grid');
  const drawer = el('weaver-payment-drawer');
  const reviveDrawer = el('weaver-revive-drawer');
  if (!storeGrid || !drawer || !reviveDrawer) return null;

  const modal = G.weaverModal;
  const mode = modal.mode || 'room';
  const inRoomTrade = mode === 'room';
  const betweenHouseTrade = mode === 'between';
  const activeIdx = inRoomTrade
    ? G.currentGnomeIdx
    : (Number.isInteger(modal?.shopperIdx) ? modal.shopperIdx : G.currentGnomeIdx);
  const shopper = G.gnomes[activeIdx] || null;
  if (!shopper) return null;

  const offers = ensureWeaverOffers(modal);
  const selectedTileId = modal.selectedTileId || '';
  const selectedPayment = modal.selectedPayment || { banked: [], satchel: [] };
  const reviveTargetPhase = !!modal.reviveTargetPhase;
  const selectedTile = resolveWeaverSelectedTile(offers, selectedTileId);
  const activeSatchelSlots = shopper.satchel
    .map((item, idx) => ({ item, idx }))
    .filter(({ item }) => item && (item.type === 'Socks' || item.type === 'goodie'));
  const heldSockSlots = activeSatchelSlots.filter(({ item }) => item.type === 'Socks');
  const heldGoodieSlots = activeSatchelSlots.filter(({ item }) => item.type === 'goodie');
  const selectedBanked = Array.isArray(selectedPayment.banked) ? selectedPayment.banked : [];
  const selectedSatchel = Array.isArray(selectedPayment.satchel) ? selectedPayment.satchel : [];
  const paymentCount = selectedBanked.length + selectedSatchel.length;
  const koTargets = G.gnomes.filter(g => g && g.ko);

  return {
    storeGrid,
    drawer,
    reviveDrawer,
    modal,
    mode,
    inRoomTrade,
    betweenHouseTrade,
    activeIdx,
    shopper,
    offers,
    selectedTileId,
    selectedPayment,
    reviveTargetPhase,
    selectedTile,
    activeSatchelSlots,
    heldSockSlots,
    heldGoodieSlots,
    selectedBanked,
    selectedSatchel,
    paymentCount,
    koTargets,
  };
}

function getWeaverMaxPaymentValue(ctx) {
  return G.SocksBanked + ctx.heldSockSlots.length + ctx.heldGoodieSlots.length;
}

function getWeaverTileState(ctx, tile) {
  if (!tile) return { disabled: true, reason: 'Missing' };
  const cost = getWeaverTileCost(tile);
  if (tile.kind === 'offer' && tile.offer?.soldOut) return { disabled: true, reason: 'Sold Out' };
  if (tile.kind === 'action' && tile.action === 'revive' && ctx.koTargets.length === 0) return { disabled: true, reason: 'No KO' };
  if (tile.kind === 'action' && tile.action === 'reduce' && G.trouble <= 0) return { disabled: true, reason: 'At 0' };
  if (getWeaverMaxPaymentValue(ctx) < cost) return { disabled: true, reason: `Need ${cost}` };
  if (tile.kind === 'offer' && tile.type === 'goodie' && !canReceiveInSatchel(ctx.shopper, { type: 'goodie', id: tile.offer.id })) return { disabled: true, reason: 'Satchel Full' };
  if (tile.kind === 'offer' && tile.type === 'hat') {
    const hatResult = ctx.shopper.hat ? findFirstFreeSatchelSlot(ctx.shopper) !== -1 : true;
    if (!hatResult) return { disabled: true, reason: 'No Hat Room' };
  }
  return { disabled: false, reason: '' };
}

function setWeaverRenderSelection(ctx, patch = {}) {
  setWeaverModalContext(buildWeaverShopState(ctx.mode, {
    offers: ctx.offers,
    shopperIdx: ctx.betweenHouseTrade ? ctx.activeIdx : undefined,
    selectedTileId: ctx.selectedTileId,
    selectedPayment: ctx.selectedPayment,
    reviveTargetPhase: ctx.reviveTargetPhase,
    ...patch
  }, ctx.modal));
  renderWeaverScreen();
}

function clearWeaverRenderSelection(ctx) {
  setWeaverModalContext(buildWeaverShopState(ctx.mode, {
    offers: ctx.offers,
    shopperIdx: ctx.betweenHouseTrade ? ctx.activeIdx : undefined
  }, ctx.modal));
  renderWeaverScreen();
}

function spendWeaverSelectedPayment(ctx) {
  const uniqueBanked = [...ctx.selectedBanked].sort((a, b) => b - a);
  const uniqueSatchel = [...ctx.selectedSatchel].sort((a, b) => b - a);
  G.SocksBanked = Math.max(0, G.SocksBanked - uniqueBanked.length);
  uniqueSatchel.forEach(slotIdx => {
    if (Number.isInteger(slotIdx) && slotIdx >= 0 && ctx.shopper.satchel[slotIdx]) ctx.shopper.satchel[slotIdx] = null;
  });
}

function finalizeWeaverSelectedTile(ctx, reviveIdx = null) {
  if (!ctx.selectedTile) return;
  spendWeaverSelectedPayment(ctx);
  if (ctx.selectedTile.kind === 'offer') {
    const item = { type: ctx.selectedTile.type, id: ctx.selectedTile.offer.id };
    if (ctx.selectedTile.type === 'hat') {
      const result = giveHatToGnome(ctx.shopper, ctx.selectedTile.offer.id);
      addLog(`${getWeaverItemLabel(item)} goes to ${ctx.shopper.name}${result === 'equipped' ? ' (auto-equipped!)' : ''}!`, 'good');
    } else {
      giveItemToGnomeSatchel(ctx.shopper, item);
      addLog(`${getWeaverItemLabel(item)} goes to ${ctx.shopper.name}!`, 'good');
    }
    const arr = ctx.offers[ctx.selectedTile.type] || [];
    const match = arr.find(o => o && o.id === ctx.selectedTile.offer.id && !o.soldOut);
    if (match) match.soldOut = true;
  } else if (ctx.selectedTile.action === 'reroll') {
    ctx.offers.goodie = buildWeaverOfferSet('goodie', 3).map(o => ({ ...o, soldOut: false }));
    ctx.offers.hat = buildWeaverOfferSet('hat', 3).map(o => ({ ...o, soldOut: false }));
    addLog('🧶 The Weaver refreshes the table.', 'good');
  } else if (ctx.selectedTile.action === 'reduce') {
    const before = G.trouble;
    G.trouble = Math.max(0, G.trouble - 1);
    if (G.trouble < before) addLog('💢 Trouble reduced by 1.', 'good');
  } else if (ctx.selectedTile.action === 'revive') {
    const target = Number.isInteger(reviveIdx) ? G.gnomes[reviveIdx] : ctx.koTargets[0];
    if (target?.ko) {
      target.ko = false;
      addLog(`💖 ${target.name} is revived!`, 'good');
    }
  }
  setWeaverModalContext(buildWeaverShopState(ctx.mode, {
    offers: ctx.offers,
    shopperIdx: ctx.betweenHouseTrade ? ctx.activeIdx : undefined
  }, ctx.modal));
  renderWeaverScreen();
  renderAll();
}

function getWeaverTileMatrix(ctx) {
  const hats = (ctx.offers.hat || []).slice(0, 3);
  const goodies = (ctx.offers.goodie || []).slice(0, 3);
  return [
    hats[0] ? { kind: 'offer', type: 'hat', id: hats[0].id, offer: hats[0] } : null,
    goodies[0] ? { kind: 'offer', type: 'goodie', id: goodies[0].id, offer: goodies[0] } : null,
    { kind: 'action', action: 'reroll', name: 'Reroll', desc: 'Refresh all six hat and goodie offers.', cost: 1, icon: '🔄' },
    hats[1] ? { kind: 'offer', type: 'hat', id: hats[1].id, offer: hats[1] } : null,
    goodies[1] ? { kind: 'offer', type: 'goodie', id: goodies[1].id, offer: goodies[1] } : null,
    { kind: 'action', action: 'revive', name: 'Revive KO Gnome', desc: 'Revive any KO gnome in the room where they were knocked out.', cost: 2, icon: '💖' },
    hats[2] ? { kind: 'offer', type: 'hat', id: hats[2].id, offer: hats[2] } : null,
    goodies[2] ? { kind: 'offer', type: 'goodie', id: goodies[2].id, offer: goodies[2] } : null,
    { kind: 'action', action: 'reduce', name: 'Reduce Trouble', desc: 'Lower Trouble by 1.', cost: 1, icon: '🕸️' }
  ];
}

function buildWeaverStoreTileHTML(ctx, tile, state, extra = {}) {
  const cost = getWeaverTileCost(tile);
  const isSelected = ctx.selectedTileId && extra.key === ctx.selectedTileId;
  const icon = extra.icon || tile.offer?.emoji || tile.offer?.iconKey || tile.icon || '🧵';
  const name = extra.name || tile.offer?.name || tile.name || 'Unknown';
  const desc = extra.desc || tile.offer?.desc || tile.desc || '';
  const note = state.reason || '\u00A0';
  const tileClasses = ['weaver-store-tile'];
  if (tile.kind === 'action') tileClasses.push('is-action');
  if (isSelected) tileClasses.push('is-selected');
  if (state.disabled) tileClasses.push('is-disabled');
  if (tile.kind === 'offer' && tile.offer?.soldOut) tileClasses.push('is-sold');
  return `<button class="${tileClasses.join(' ')}" type="button" data-weaver-tile="${extra.key}" title="${name}: ${desc}">
    <span class="weaver-store-cost">🧦 ${cost}</span>
    <span class="weaver-store-icon">${typeof icon === 'string' && icon.length <= 2 ? icon : getIconHTML({ iconKey: tile.offer?.iconKey || '', emoji: tile.offer?.emoji || tile.icon || '🧵', fallbackEmoji: tile.kind === 'action' ? tile.icon : (tile.kind === 'offer' && tile.type === 'hat' ? '🎩' : '🍄'), alt: name })}</span>
    <span class="weaver-store-name">${name}</span>
    <span class="weaver-store-note">${note}</span>
  </button>`;
}

function buildWeaverHatCompareHTML(ctx) {
  return ctx.selectedTile?.kind === 'offer' && ctx.selectedTile.type === 'hat'
    ? `<div class="weaver-compare-row">
        <div class="weaver-compare-mini">
          <div class="weaver-compare-icon">${ctx.shopper.hat ? getItemEmoji({ type: 'hat', id: ctx.shopper.hat }) : '—'}</div>
          <div><div class="weaver-compare-sub">Current</div><div class="weaver-compare-name">${ctx.shopper.hat ? getItemName({ type: 'hat', id: ctx.shopper.hat }) : 'No Hat Equipped'}</div></div>
        </div>
        <div class="weaver-compare-arrow">→</div>
        <div class="weaver-compare-mini">
          <div class="weaver-compare-icon">${getItemEmoji({ type: 'hat', id: ctx.selectedTile.offer.id })}</div>
          <div><div class="weaver-compare-sub">New</div><div class="weaver-compare-name">${ctx.selectedTile.offer.name}</div></div>
        </div>
      </div>` : '';
}

function buildWeaverPaymentSlotsHTML(ctx, items, kind) {
  if (!items.length) return '<div class="weaver-pay-slot is-empty">—</div>';
  return items.map((entry, idx) => {
    const slotIndex = kind === 'banked' ? idx : entry.idx;
    const selected = kind === 'banked' ? ctx.selectedBanked.includes(idx) : ctx.selectedSatchel.includes(entry.idx);
    const icon = kind === 'banked' ? '🧦' : getItemEmoji(entry.item);
    const title = kind === 'banked' ? 'Spend 1 banked sock.' : `${getItemName(entry.item)} — ${getItemDesc(entry.item) || 'Trade away this item.'}`;
    return `<button class="weaver-pay-slot${selected ? ' is-selected' : ''}" type="button" data-pay-kind="${kind}" data-pay-slot="${slotIndex}" title="${title}">${icon}</button>`;
  }).join('');
}

function getWeaverReviveRoomName(gnome) {
  if (!gnome) return 'Current room';
  const row = Number.isInteger(gnome.row) ? gnome.row : null;
  const col = Number.isInteger(gnome.col) ? gnome.col : null;
  const cell = row != null && col != null && G.grid?.[row]?.[col] ? G.grid[row][col] : null;
  const roomId = cell?.roomId || null;
  return roomId ? (ROOM_DEF_BY_ID[roomId]?.name || 'Current room') : 'Current room';
}

function buildWeaverPaymentDrawerHTML(ctx) {
  if (!ctx.selectedTile) return '';
  const cost = getWeaverTileCost(ctx.selectedTile);
  const progressPct = cost ? Math.max(0, Math.min(100, (ctx.paymentCount / cost) * 100)) : 0;
  const canConfirm = !!ctx.selectedTile && ctx.paymentCount === cost;
  return `
    <div class="weaver-drawer-head"><div class="weaver-drawer-title">Trade</div></div>
    <div class="weaver-progress-box">
      <div class="weaver-progress-row"><span>Selected</span><strong>${ctx.paymentCount} / ${cost}</strong></div>
      <div class="weaver-progress-bar"><div class="weaver-progress-fill" style="width:${progressPct}%"></div></div>
    </div>
    ${buildWeaverHatCompareHTML(ctx)}
    <div class="weaver-pay-group"><div class="weaver-pay-label">Banked Socks</div><div class="weaver-pay-row">${buildWeaverPaymentSlotsHTML(ctx, Array.from({ length: G.SocksBanked }, (_, idx) => idx), 'banked')}</div></div>
    <div class="weaver-pay-group"><div class="weaver-pay-label">Held Socks</div><div class="weaver-pay-row">${buildWeaverPaymentSlotsHTML(ctx, ctx.heldSockSlots, 'satchel')}</div></div>
    <div class="weaver-pay-group"><div class="weaver-pay-label">Held Goodies</div><div class="weaver-pay-row">${buildWeaverPaymentSlotsHTML(ctx, ctx.heldGoodieSlots, 'satchel')}</div></div>
    <div class="weaver-drawer-actions">
      <button id="weaver-confirm-btn" class="weaver-drawer-btn is-primary" type="button" ${canConfirm ? '' : 'disabled'}>Trade</button>
      <button id="weaver-cancel-btn" class="weaver-drawer-btn" type="button">Cancel</button>
    </div>
  `;
}

function buildWeaverReviveDrawerHTML(ctx) {
  const needsReviveTarget = ctx.reviveTargetPhase && ctx.selectedTile?.kind === 'action' && ctx.selectedTile.action === 'revive' && ctx.koTargets.length > 1;
  return {
    needsReviveTarget,
    html: needsReviveTarget ? `
      <div class="weaver-drawer-head"><div class="weaver-revive-title">Revive Target</div></div>
      <div class="weaver-revive-note">Choose which KO'd gnome to bring back.</div>
      <div class="weaver-drawer-actions"><button id="weaver-revive-back-btn" class="weaver-drawer-btn" type="button">Back</button></div>
      <div class="weaver-revive-chooser">${ctx.koTargets.map((g) => `<button class="weaver-revive-target" type="button" data-revive-idx="${G.gnomes.indexOf(g)}"><span>💀</span><span><strong>${g.name}</strong><em>${getWeaverReviveRoomName(g)}</em></span></button>`).join('')}</div>
    ` : ''
  };
}

function bindWeaverStoreTileEvents(ctx, tileMatrix) {
  document.querySelectorAll('#screen-weaver [data-weaver-tile]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.weaverTile;
      const tile = tileMatrix.find(candidate => candidate && ((candidate.kind === 'offer' ? `offer:${candidate.type}:${candidate.id}` : `action:${candidate.action}`) === key));
      if (!tile) return;
      const state = getWeaverTileState(ctx, tile);
      if (state.disabled) return;
      setWeaverRenderSelection(ctx, { selectedTileId: key, selectedPayment: { banked: [], satchel: [] }, reviveTargetPhase: false });
    });
  });
}

function bindWeaverDrawerEvents(ctx) {
  const cost = getWeaverTileCost(ctx.selectedTile);
  ctx.drawer.querySelectorAll('[data-pay-kind]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!ctx.selectedTile) return;
      const payKind = btn.dataset.payKind;
      const slot = Number(btn.dataset.paySlot);
      const nextBanked = [...ctx.selectedBanked];
      const nextSatchel = [...ctx.selectedSatchel];
      const targetArr = payKind === 'banked' ? nextBanked : nextSatchel;
      const idx = targetArr.indexOf(slot);
      if (idx >= 0) targetArr.splice(idx, 1);
      else if ((nextBanked.length + nextSatchel.length) < cost) targetArr.push(slot);
      setWeaverRenderSelection(ctx, { selectedPayment: { banked: nextBanked, satchel: nextSatchel } });
    });
  });

  ctx.drawer.querySelector('#weaver-cancel-btn')?.addEventListener('click', () => clearWeaverRenderSelection(ctx));
  const leaveBtn = el('weaver-leave-btn');
  if (leaveBtn) leaveBtn.onclick = () => { closeWeaverOverlay({ render:true }); };
  ctx.drawer.querySelector('#weaver-confirm-btn')?.addEventListener('click', () => {
    if (!ctx.selectedTile || ctx.paymentCount !== cost) return;
    if (ctx.selectedTile.kind === 'action' && ctx.selectedTile.action === 'revive' && ctx.koTargets.length > 1 && !ctx.reviveTargetPhase) {
      setWeaverRenderSelection(ctx, { reviveTargetPhase: true });
      return;
    }
    finalizeWeaverSelectedTile(ctx);
  });

  ctx.reviveDrawer.querySelector('#weaver-revive-back-btn')?.addEventListener('click', () => setWeaverRenderSelection(ctx, { reviveTargetPhase: false }));
  ctx.reviveDrawer.querySelectorAll('[data-revive-idx]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = Number(btn.dataset.reviveIdx);
      finalizeWeaverSelectedTile(ctx, idx);
    });
  });
}


function renderWeaverScreen() {
  const ctx = buildWeaverRenderContext();
  if (!ctx) return;

  const tileMatrix = getWeaverTileMatrix(ctx);
  ctx.storeGrid.innerHTML = tileMatrix.map(tile => {
    if (!tile) return `<div class="weaver-store-tile is-empty"></div>`;
    const key = tile.kind === 'offer' ? `offer:${tile.type}:${tile.id}` : `action:${tile.action}`;
    return buildWeaverStoreTileHTML(ctx, tile, getWeaverTileState(ctx, tile), { key });
  }).join('');

  ctx.drawer.innerHTML = buildWeaverPaymentDrawerHTML(ctx);
  const reviveState = buildWeaverReviveDrawerHTML(ctx);
  ctx.reviveDrawer.innerHTML = reviveState.html;

  ctx.drawer.classList.toggle('open', !!ctx.selectedTile && !reviveState.needsReviveTarget);
  ctx.reviveDrawer.classList.toggle('open', !!reviveState.needsReviveTarget);
  el('screen-weaver')?.classList.toggle('drawer-open', !!ctx.selectedTile || !!reviveState.needsReviveTarget);

  bindWeaverStoreTileEvents(ctx, tileMatrix);
  bindWeaverDrawerEvents(ctx);
}


function syncWeaverScreenMode(mode = '') {
  const screen = document.getElementById('screen-weaver');
  if (!screen) return;
  screen.classList.remove('weaver-mode-room','weaver-mode-between');
  document.body.classList.remove('weaver-mode-room','weaver-mode-between');
  if (mode === 'room') { screen.classList.add('weaver-mode-room'); document.body.classList.add('weaver-mode-room'); }
  if (mode === 'between') { screen.classList.add('weaver-mode-between'); document.body.classList.add('weaver-mode-between'); }
}

function showWeaverShopModal(mode) {
  const existing = G.weaverModal?.mode === mode ? G.weaverModal : null;
  const ctx = buildWeaverShopState(mode, {
    offers: existing?.offers || null,
    shopperIdx: mode === 'between'
      ? (Number.isInteger(existing?.shopperIdx) ? existing.shopperIdx : G.currentGnomeIdx)
      : undefined
  }, existing || {});
  ensureWeaverOffers(ctx);
  setWeaverModalContext(ctx);
  syncWeaverScreenMode(mode);
  renderAll();
  renderWeaverScreen();
}

function refreshWeaverModalIfOpen() {
  if (!G.weaverModal) return;
  renderWeaverScreen();
}

function openWeaver() {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome||G.phase!=='gnome') return;
  const tile = G.grid[gnome.row][gnome.col];
  if (!(tile?.weaver || tile?.roomId === 1)) { addLog('Weaver not accessible here.','bad'); return; }
  if (G.actionsLeft <= 0) { addLog('No actions left to visit the Weaver.','bad'); return; }
  if (!hasWeaverTradeResources(gnome)) { addLog('Need at least 1 banked sock, held sock, or held goodie to trade.','bad'); return; }
  spendAction();
  showWeaverShopModal('room');
}

function showEscapeVictoryScreen() {
  closeModal();
  closeItemPopup();
  hideBanner();
  document.getElementById('card-overlay').classList.remove('show');
  document.body.classList.remove('card-showing');
  const msg = document.getElementById('victory-message');
  if (msg) msg.textContent = `Escaped with ${G.SocksBanked} socks! House ${G.house} complete. Trouble: ${G.trouble}/${getMaxTrouble()}.`;
  setOverlayScreenOpen('screen-victory', true);
}

function hideEscapeVictoryScreen() {
  setOverlayScreenOpen('screen-victory', false);
}

function visitWeaverAfterEscape() {
  hideEscapeVictoryScreen();
  openWeaverBetweenHouses();
}

function startNextHouse() {
  hideEscapeVictoryScreen();
  advanceHouse();
}


function resetGnomeForNewHouse(gnome) {
  return {
    ...gnome,
    row: GRID_CENTER,
    col: GRID_CENTER,
    ko: false,
    hidden: false,
    stickyBlocked: false,
    stickyExitMoves: 0,
    thiefCowlRevealUntilTurnStart: false,
    cowlHiddenActive: false,
  };
}

function destroySatchelSocksForHouseWin() {
  let destroyed = 0;
  G.gnomes.forEach(gnome => {
    gnome.satchel = gnome.satchel.map(item => {
      if (item?.type === 'Socks') {
        destroyed++;
        return null;
      }
      return item;
    });
  });
  if (destroyed) addLog(`🧦 ${destroyed} sock${destroyed === 1 ? '' : 's'} still in satchels are destroyed as the house is won.`, 'system');
}

function advanceHouse() {
  hideEscapeVictoryScreen();
  clearPatrolRefCards();
  const nextHouse = G.house + 1;
  const savedGnomes = G.gnomes.map(resetGnomeForNewHouse);

  G = createCoreState({
    house: nextHouse,
    roomDeck: shuffledCopy(BASE_ROOM_DECK_TEMPLATE),
    goodiePool: buildGoodiePool(1, getBetweenHouseGoodiePoolTemplate()),
    hatPool: shuffledCopy(getBetweenHouseHatPoolTemplate()),
    gnomes: savedGnomes,
  });
  G.grid[GRID_CENTER][GRID_CENTER] = createRoomTile(1, GRID_CENTER, GRID_CENTER);

  updateActionsForHat();
  addLog(`=== HOUSE ${nextHouse} BEGINS ===`,'system');
  addLog(`Goal: ${getHouseGoal()} socks. Trouble resets. Good luck!`,'system');
  showCard('🏠 New House!','🏠',`House ${nextHouse} Begins!`,`New goal: ${getHouseGoal()} Socks. Patrols will arrive sooner. Stay sneaky!`,'event-good');
  renderAll();
}

function checkLoss() {
  if(G.gnomes.every(g=>g.ko)||G.trouble>=getMaxTrouble()) showEndScreen(false);
}

function showEndScreen(won) {
  if (G.gameEnded) return;
  G.gameEnded = true;
  SEQ.clear();
  closeModal();
  closeItemPopup();
  hideBanner();
  document.getElementById('card-overlay').classList.remove('show');
  document.body.classList.remove('card-showing');
  hideEscapeVictoryScreen();
  const screen=document.getElementById('screen-end');
  const title=document.getElementById('end-title');
  const msg=document.getElementById('end-message');
  const art=document.getElementById('end-art');
  const backdrop=screen.querySelector('.screen-backdrop');
  if(won){
    title.textContent='🎉 Victory!'; title.style.color='#4cff9e';
    msg.textContent=`Escaped with ${G.SocksBanked} socks! House ${G.house} complete. Trouble: ${G.trouble}/${getMaxTrouble()}.`;
    art.className='end-figure victory is-revealing-victory';
    art.textContent='🧦';
    backdrop.className='screen-backdrop victory';
  } else {
    title.textContent='💀 Defeated!'; title.style.color='#ff8d8d';
    const reason=G.trouble>=getMaxTrouble()?`Trouble reached ${getMaxTrouble()}!`:'All gnomes KO\'d!';
    msg.textContent=`${reason} Collected ${G.SocksBanked}/${getHouseGoal()} socks.`;
    art.className='end-figure defeat is-revealing-defeat';
    art.textContent='';
    backdrop.className='screen-backdrop defeat';
  }
  screen.classList.add('show');
  refreshDebugForkUi();
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
// startPanic receives a resume() from SEQ's 'pause' step; called when all gnomes have moved
function startPanic(seqResume) {
  G.panicState = {
    seqResume,               // stored so advancePanic can unblock SEQ when done
    savedPhase: G.phase,
    savedGnomeIdx: G.currentGnomeIdx,
    savedActionsLeft: G.actionsLeft,
    savedSelectedAction: G.selectedAction,
    panicQueue: G.gnomes.map((_,i)=>i).filter(i=>!G.gnomes[i].ko),
  };
  G.panicMoving = false;
  setInterruptMode({ kind:'panic' }, { render:false });
  advancePanic();
}

function advancePanic() {
  if (!G.panicState || !G.panicState.panicQueue.length) {
    const s = G.panicState;
    G.panicState = null;
    G.currentGnomeIdx = s.savedGnomeIdx;
    G.actionsLeft = s.savedActionsLeft;
    G.selectedAction = s.savedSelectedAction;
    G.phase = s.savedPhase;
    G.panicMoving = false;
    clearInterruptMode({ render:false });
    addLog('😱 Panic resolved — resuming turn.', 'system');
    renderAll();
    if (s.seqResume) s.seqResume();   // unblock SEQ — next queued step runs
    return;
  }
  G.currentGnomeIdx = G.panicState.panicQueue[0];
  const gnome = G.gnomes[G.currentGnomeIdx];
  const remaining = G.panicState.panicQueue.length;
  syncInterruptUi();
  addLog(`😱 ${gnome.name} must move one room!`, 'bad');
  renderAll();
}

function completePanicMove(r, c) {
  if (G.panicMoving) return;
  G.panicMoving = true;
  const gnome = G.gnomes[G.currentGnomeIdx];
  moveGnomeTo(gnome, r, c);
  G.panicState.panicQueue.shift();
  renderAll();
  // Panic was started from a paused SEQ step, so anything moveGnomeTo queued must stay
  // queued until panic fully resolves. Advance panic directly instead of re-queueing into SEQ.
  setTimeout(() => {
    G.panicMoving = false;
    advancePanic();
  }, 0);
}

function endGnomeTurn() {
  if (G.phase!=='gnome') return;
  clearInteractionModes();
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (gnome) addLog(`${gnome.name} ends turn.`,'system');

  const nextGnomeIdx = getNextActiveGnomeIndex(G.currentGnomeIdx);
  if (nextGnomeIdx === -1) {
    startPatrolPhase();
  } else {
    beginGnomeTurn(nextGnomeIdx);
    renderAll();
  }
}

function updateActionsForHat() {
  const g = G.gnomes[G.currentGnomeIdx];
  if (!g) return;
  G.actionsLeft = 2 + getHatActionBonus(getEffectiveHatId(g));
  G.actionCapacity = G.actionsLeft;
  G.gnomes?.forEach(gn => reconcileSatchelOverflow(gn, { log: false }));
  ensureDistractStateValid();
  syncPassiveHiddenForAllGnomes();
}

function spendAction() {
  G.actionsLeft = Math.max(0, G.actionsLeft-1);
}

// ─────────────────────────────────────────────
// PATROL PHASE
// ─────────────────────────────────────────────
// startPatrolPhase defined above in PATROL PHASE section

// ─────────────────────────────────────────────
// PATROL PHASE
// ─────────────────────────────────────────────
function setActivePatrolType(type, { render = true } = {}) {
  G.currentPatrolType = type || null;
  if (render) renderAll();
}

function getOrderedPatrols() {
  const order = getPatrolOrder();
  return [...G.patrols].sort((a,b)=>order.indexOf(a.type)-order.indexOf(b.type));
}

function queuePendingPatrolPhaseEnd() {
  if (G._pendingEndPatrolPhase) return;
  G._pendingEndPatrolPhase = true;
  SEQ.push({t:'effect', fn:() => {
    G._pendingEndPatrolPhase = false;
    endPatrolPhase();
  }});
}

function finishPatrolStepSequence(done) {
  SEQ.push({t:'effect', fn:() => {
    setActivePatrolType(null);
    done();
  }});
}

function startPatrolPhase() {
  setPhaseState('patrol', { clearSelectedAction: true, clearCurrentPatrolType: true });
  addLog('=== PATROL PHASE ===','patrol');
  updateHeader();
  renderAll();
  SEQ.push({t:'wait', ms:300}, {t:'effect', fn:() => runPatrolsAnimated()});
}

// Compute all patrol moves as a sequence of steps, then play them one at a time
function runPatrolsAnimated() {
  if (!G.patrols.length) {
    endPatrolPhase();
    return;
  }
  const sorted = getOrderedPatrols();
  queuePatrolPhaseStartChecks(sorted, () => continuePatrolMovement(sorted));
}

function queuePatrolPhaseStartChecks(sorted, onComplete) {
  SEQ.push(
    {t:'effect', fn:() => {
      sorted.forEach(patrol => checkPatrolCatch(patrol));
    }},
    {t:'render'},
    {t:'effect', fn:onComplete}
  );
}

function snapshotPatrolStates(patrols = G.patrols) {
  const snapshots = new Map();
  patrols.forEach(patrol => {
    snapshots.set(patrol.type, {
      row: patrol.row,
      col: patrol.col,
      lastDir: patrol.lastDir,
      returningToRoom: patrol.returningToRoom,
      stickyBlocked: !!patrol.stickyBlocked,
      stickyCell: patrol.stickyCell ?? null,
    });
  });
  return snapshots;
}

function restorePatrolStatesFromSnapshots(snapshots, patrols = G.patrols) {
  patrols.forEach(patrol => {
    const snap = snapshots.get(patrol.type);
    if (!snap) return;
    patrol.row = snap.row;
    patrol.col = snap.col;
    patrol.lastDir = snap.lastDir;
    patrol.returningToRoom = snap.returningToRoom;
    patrol.stickyBlocked = snap.stickyBlocked;
    patrol.stickyCell = snap.stickyCell;
  });
}

function getPatrolStepBudget(patrol) {
  if (isPatrolMovementLocked()) return 0;
  return getPatrolStepCount(patrol.type) + consumeQueuedPatrolBonusMoves(patrol);
}

function buildPatrolMoveStepsForActor(patrol, totalSteps) {
  const patrolSteps = [];
  for (let step = 0; step < totalSteps; step++) {
    const moveStep = computePatrolMoveStep(patrol);
    if (!moveStep) break;
    patrol.row = moveStep.toR;
    patrol.col = moveStep.toC;
    patrol.lastDir = moveStep.newLastDir;
    patrolSteps.push({ ...moveStep });
    updateDadReturnState(patrol);
    const tile = G.grid[patrol.row][patrol.col];
    if (!tile || (tile.sticky && !isPatrolStickyImmune(patrol))) break;
  }
  return patrolSteps;
}

function buildPatrolMovementPlan(sorted) {
  const snapshots = snapshotPatrolStates();
  const steps = [];

  sorted.forEach(patrol => {
    let totalSteps = getPatrolStepBudget(patrol);
    if (patrol.stickyBlocked) {
      if (isPatrolStickyImmune(patrol)) {
        steps.push({ patrol, kind:'stickyClearFree' });
        clearStickyStateForActor(patrol);
      } else if (totalSteps > 0) {
        steps.push({ patrol, kind:'stickyClear' });
        clearStickyStateForActor(patrol);
        totalSteps -= 1;
      }
    }
    buildPatrolMoveStepsForActor(patrol, totalSteps).forEach(step => {
      steps.push({ patrol, ...step });
    });
  });

  restorePatrolStatesFromSnapshots(snapshots);
  return steps;
}

function continuePatrolMovement(sorted) {
  const allSteps = buildPatrolMovementPlan(sorted);
  playPatrolStep(allSteps, 0, sorted, () => {
    endPatrolPhase();
  });
}

function queuePatrolStickyClearStep(patrol, isFree, onComplete) {
  SEQ.push(
    {t:'wait', ms:0},
    {t:'effect', fn:() => {
      setActivePatrolType(patrol.type);
      clearStickyStateForActor(patrol);
      addLog(
        isFree
          ? `Roomba shrugs off Sticky without losing a move.`
          : `${capitalize(patrol.type)} spends 1 move to remove Sticky.`,
        'patrol'
      );
    }},
    {t:'render'},
    {t:'wait', ms:0},
    {t:'effect', fn:onComplete}
  );
}

function queuePatrolMovementStep(stepEntry, onComplete) {
  const {patrol, fromR, fromC, toR, toC, newLastDir} = stepEntry;
  const em = patrolEmoji(patrol.type);
  const name = capitalize(patrol.type);
  SEQ.push(
    {t:'wait', ms:0},
    {t:'effect', fn:() => {
      setActivePatrolType(patrol.type);
      AUDIO_MANAGER.beginMove(patrol.type, { patrol, fromR, fromC, toR, toC, phase: 'regular-turn-start' });
    }},
    {t:'patrolMove', patrol, fromR, fromC, toR, toC},
    {t:'effect', fn:() => {
      resolvePatrolArrival(patrol, {fromR, fromC, toR, toC, newLastDir}, {
        logText: tile => `${em} ${name} → ${ROOM_DEFS[tile.roomId].name}.`,
        logClass: 'patrol',
        animateSticky: true,
        _sfxPlayedAtStart: true,
      });
    }},
    {t:'render'},
    {t:'wait', ms:0},
    {t:'effect', fn:onComplete}
  );
}

function playPatrolStep(steps, idx, sorted, done) {
  if (idx >= steps.length) {
    finishPatrolStepSequence(done);
    return;
  }
  const stepEntry = steps[idx];
  if (stepEntry?.kind === 'stickyClear' || stepEntry?.kind === 'stickyClearFree') {
    queuePatrolStickyClearStep(stepEntry.patrol, stepEntry.kind === 'stickyClearFree', () => playPatrolStep(steps, idx+1, sorted, done));
    return;
  }
  queuePatrolMovementStep(stepEntry, () => playPatrolStep(steps, idx+1, sorted, done));
}

function hideBanner() {
  document.getElementById('patrol-banner').classList.remove('show');
}


function triggerExplosionFlash() {
  const fx = document.getElementById('explosion-flash');
  if (!fx) return;
  fx.classList.remove('show');
  void fx.offsetWidth;
  fx.classList.add('show');
  setTimeout(() => fx.classList.remove('show'), 650);
}

function animatePatrolMeeple(patrol, emoji, fromR, fromC, toR, toC, cb) {
  const board = document.getElementById('board');
  const srcCell = document.querySelector(`[data-r="${fromR}"][data-c="${fromC}"]`);
  const dstCell = document.querySelector(`[data-r="${toR}"][data-c="${toC}"]`);
  if (!board || !srcCell || !dstCell) { cb(); return; }

  const patrolSelector = patrol?.type
    ? `.patrol-coin[data-patrol-type="${CSS.escape(String(patrol.type))}"]`
    : '.patrol-coin';
  const token = srcCell.querySelector(patrolSelector) || srcCell.querySelector('.patrol-coin');
  const boardRect = board.getBoundingClientRect();
  const srcRect = srcCell.getBoundingClientRect();
  const dstRect = dstCell.getBoundingClientRect();
  const fromX = (srcRect.left - boardRect.left) + ((srcRect.width  - (token?.offsetWidth  || 26)) / 2);
  const fromY = (srcRect.top  - boardRect.top)  + ((srcRect.height - (token?.offsetHeight || 26)) / 2);
  const toX   = (dstRect.left - boardRect.left) + ((dstRect.width  - (token?.offsetWidth  || 26)) / 2);
  const toY   = (dstRect.top  - boardRect.top)  + ((dstRect.height - (token?.offsetHeight || 26)) / 2);

  let movingToken = token;
  let cleanupClone = null;
  if (!movingToken) {
    movingToken = document.createElement('div');
    movingToken.className = 'patrol-coin';
    movingToken.innerHTML = `<span class="patrol-coin-emoji">${emoji}</span>`;
    cleanupClone = movingToken;
  }

  const prevStyle = movingToken.getAttribute('style') || '';
  movingToken.style.position = 'absolute';
  movingToken.style.left = `${fromX}px`;
  movingToken.style.top = `${fromY}px`;
  movingToken.style.zIndex = '40';
  movingToken.style.margin = '0';
  movingToken.style.transition = 'left 1.35s cubic-bezier(.4,0,.2,1), top 1.35s cubic-bezier(.4,0,.2,1)';
  movingToken.style.pointerEvents = 'none';
  board.appendChild(movingToken);

  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    movingToken.removeEventListener('transitionend', onEnd);
    if (cleanupClone) cleanupClone.remove();
    else movingToken.setAttribute('style', prevStyle);
    cb();
  };
  const onEnd = (ev) => {
    if (ev.propertyName !== 'left' && ev.propertyName !== 'top') return;
    finish();
  };

  requestAnimationFrame(() => requestAnimationFrame(() => {
    movingToken.addEventListener('transitionend', onEnd);
    movingToken.style.left = `${toX}px`;
    movingToken.style.top = `${toY}px`;
    setTimeout(finish, 1365);
  }));
}

function runPatrols() {
  // Synchronous fallback — not used in animated flow but kept for Hustle card mid-turn
  const order = getPatrolOrder();
  const sorted = [...G.patrols].sort((a,b)=>order.indexOf(a.type)-order.indexOf(b.type));
  sorted.forEach(p=>movePatrol(p));
}


function getRoombaPriorityFacing(facing) {
  return { N:['E','N','W','S'], E:['S','E','N','W'], S:['W','S','E','N'], W:['N','W','S','E'] }[facing] || ['E','N','W','S'];
}

function computeRoombaStep(patrol, connected) {
  const OPPOSITE_DIR = {N:'S',S:'N',E:'W',W:'E'};
  let facing = patrol.lastDir;
  if (!facing) {
    for (const dir of ['N','E','S','W']) {
      const [dr,dc]=DIR_DELTA[dir];
      if (connected.some(([cr,cc])=>cr===patrol.row+dr&&cc===patrol.col+dc)) { facing = dir; break; }
    }
    facing = facing || 'S';
  }
  const cameFrom = patrol.lastDir ? OPPOSITE_DIR[patrol.lastDir] : null;
  const priority = getRoombaPriorityFacing(facing);
  for (const allowReverse of [false, true]) {
    for (const dir of priority) {
      if (!allowReverse && dir === cameFrom) continue;
      const [dr,dc] = DIR_DELTA[dir];
      const tr = patrol.row + dr, tc = patrol.col + dc;
      if (connected.some(([cr,cc]) => cr===tr && cc===tc)) {
        return { toR: tr, toC: tc, newLastDir: dir };
      }
    }
  }
  const [toR, toC] = connected[0];
  for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
    if (patrol.row + dr === toR && patrol.col + dc === toC) return { toR, toC, newLastDir: dir };
  }
  return { toR, toC, newLastDir: patrol.lastDir };
}

function getPatrolIdleDestination(patrol) {
  const spawn = findPatrolSpawnPos(patrol.type);
  if (!spawn) return [G.CENTER, G.CENTER];
  if (patrol.row === spawn[0] && patrol.col === spawn[1]) return [G.CENTER, G.CENTER];
  return spawn;
}

function computePatrolMoveStep(patrol) {
  const connected = getConnectedRooms(patrol.row, patrol.col);
  if (!connected.length) return null;
  let toR = patrol.row, toC = patrol.col, newLastDir = patrol.lastDir;

  if (patrol.type === 'roomba') {
    const distractTarget = getPatrolBehaviorTarget(patrol);
    if (distractTarget) {
      const pair = bestStepToward(patrol.row, patrol.col, distractTarget.row, distractTarget.col, connected);
      const toR = pair[0], toC = pair[1];
      if (toR === patrol.row && toC === patrol.col) return null;
      for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) { if (patrol.row + dr === toR && patrol.col + dc === toC) { newLastDir = dir; break; } }
      return { fromR: patrol.row, fromC: patrol.col, toR, toC, newLastDir };
    }
    return { fromR: patrol.row, fromC: patrol.col, ...computeRoombaStep(patrol, connected) };
  } else if (patrol.type === 'dog') {
    const target = getPatrolBehaviorTarget(patrol) || getNearestGnome(patrol, false);
    if (target) [toR, toC] = bestStepToward(patrol.row, patrol.col, target.row, target.col, connected);
    if (toR === patrol.row && toC === patrol.col) {
      const [idleR, idleC] = getPatrolIdleDestination(patrol);
      [toR, toC] = bestStepToward(patrol.row, patrol.col, idleR, idleC, connected);
    }
  } else if (patrol.type === 'kid') {
    const target = getPatrolBehaviorTarget(patrol) || getGnomeMostSocks();
    if (target) [toR, toC] = bestStepToward(patrol.row, patrol.col, target.row, target.col, connected);
    if (toR === patrol.row && toC === patrol.col) {
      const [idleR, idleC] = getPatrolIdleDestination(patrol);
      [toR, toC] = bestStepToward(patrol.row, patrol.col, idleR, idleC, connected);
    }
  } else if (patrol.type === 'dad') {
    const distractTarget = getPatrolBehaviorTarget(patrol);
    const dest = distractTarget ? [distractTarget.row, distractTarget.col] : (patrol.returningToRoom ? findPatrolSpawnPos('dad') : [G.CENTER, G.CENTER]);
    if (dest) [toR, toC] = bestStepToward(patrol.row, patrol.col, dest[0], dest[1], connected);
  }

  if (toR === patrol.row && toC === patrol.col) return null;

  for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
    if (patrol.row + dr === toR && patrol.col + dc === toC) { newLastDir = dir; break; }
  }
  return { fromR: patrol.row, fromC: patrol.col, toR, toC, newLastDir };
}

function computePatrolStepTowardTarget(patrol, targetR, targetC) {
  if (patrol.row === targetR && patrol.col === targetC) return null;
  const connected = getConnectedRooms(patrol.row, patrol.col);
  if (!connected.length) return null;
  const [toR, toC] = bestStepToward(patrol.row, patrol.col, targetR, targetC, connected);
  if (toR === patrol.row && toC === patrol.col) return null;
  let newLastDir = patrol.lastDir;
  for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
    if (patrol.row + dr === toR && patrol.col + dc === toC) { newLastDir = dir; break; }
  }
  return { fromR: patrol.row, fromC: patrol.col, toR, toC, newLastDir };
}

function updateDadReturnState(patrol) {
  if (patrol.type !== 'dad') return;
  if (!patrol.returningToRoom && patrol.row === G.CENTER && patrol.col === G.CENTER) patrol.returningToRoom = true;
  else if (patrol.returningToRoom) {
    const sp = findPatrolSpawnPos('dad');
    if (sp && patrol.row === sp[0] && patrol.col === sp[1]) patrol.returningToRoom = false;
  }
}

function isPatrolStickyImmune(patrol) {
  return patrol?.type === 'roomba';
}

function addPatrolCarriedSocks(patrol, count = 1) {
  if (!canPatrolCarrySocks(patrol) || count <= 0) return getPatrolCarriedSockCount(patrol);
  const next = getPatrolCarriedSockCount(patrol) + Math.max(0, Math.floor(count));
  patrol.carriedSocks = next;
  return next;
}

function dropPatrolCarriedSocks(patrol, tile, { log = true, reason = 'kick' } = {}) {
  const carried = getPatrolCarriedSockCount(patrol);
  if (!canPatrolCarrySocks(patrol) || carried <= 0 || !tile) return 0;
  tile.Socks = (tile.Socks || 0) + carried;
  patrol.carriedSocks = 0;
  GAME_EVENTS.emit('item.dropped', { itemType: 'Socks', mode: `patrol-${reason}`, patrolType: patrol.type, count: carried });
  if (log) {
    const noun = carried === 1 ? 'Sock' : 'Socks';
    addLog(`${capitalize(patrol.type)} drops ${carried} ${noun} in ${ROOM_DEFS[tile.roomId].name}.`, 'good');
  }
  return carried;
}

function pickupSockForPatrol(patrol, tile, { log = true } = {}) {
  if (!canPatrolCarrySocks(patrol) || !tile || (tile.Socks || 0) <= 0) return false;
  tile.Socks--;
  const next = addPatrolCarriedSocks(patrol, 1);
  GAME_EVENTS.emit('item.pickedUp', { itemType: 'Socks', mode: 'patrol', patrolType: patrol.type, count: 1, totalCarried: next });
  if (log) addLog(`${capitalize(patrol.type)} picks up 1 Sock in ${ROOM_DEFS[tile.roomId].name}.`, 'patrol');
  return true;
}

function applyPatrolRoomEntryEffects(patrol, tile) {
  if (!patrol || !tile) return;
  if (patrol.type === 'roomba' && tile.sticky) {
    tile.sticky = false;
    addLog(`Roomba removes Sticky from ${ROOM_DEFS[tile.roomId].name}.`, 'patrol');
  }
  if (patrol.type === 'dog' && tile.Socks > 0) {
    tile.Socks--;
    addLog(`Dog destroys 1 Sock in ${ROOM_DEFS[tile.roomId].name}.`, 'bad');
  }
  if (canPatrolCarrySocks(patrol) && tile.Socks > 0) {
    pickupSockForPatrol(patrol, tile);
  }
}

function resolvePatrolArrival(patrol, step, options={}) {
  const { logText, logClass='patrol' } = options;
  patrol.row = step.toR;
  patrol.col = step.toC;
  if (step.newLastDir !== undefined) patrol.lastDir = step.newLastDir;
  const tile = G.grid[step.toR]?.[step.toC];
  if (!tile) return;
  if (logText) addLog(logText(tile), logClass);
  updateDadReturnState(patrol);
  applyPatrolRoomEntryEffects(patrol, tile);
  checkPatrolCatch(patrol);
  if (tile.sticky && !isPatrolStickyImmune(patrol)) {
    patrol.stickyBlocked = true;
    patrol.stickyCell = `${step.toR},${step.toC}`;
    addLog(`${capitalize(patrol.type)} hits sticky floor and gains Sticky.`, 'patrol');
    if (options.animateSticky) SEQ.push({t:'boardAnim', r:step.toR, c:step.toC, css:'sticky-splat-anim', ms:3000});
  }
}

function queueAnimatedPatrolStep(patrol, step, options={}) {
  if (!step) return false;
  const em = patrolEmoji(patrol.type);
  const name = capitalize(patrol.type);
  const bannerText = options.bannerText || `${em} ${name}`;
  const waitAfter = options.waitAfter ?? 0;
  const arrivalOptions = { ...options, _sfxPlayedAtStart: true };
  SEQ.push(
    {t:'wait', ms: 0},
    {t:'effect', fn:() => {
      G.currentPatrolType = patrol.type;
      renderAll();
      AUDIO_MANAGER.beginMove(patrol.type, { patrol, step, phase: 'start' });
    }},
    {t:'patrolMove', patrol, fromR: step.fromR, fromC: step.fromC, toR: step.toR, toC: step.toC},
    {t:'effect', fn:() => resolvePatrolArrival(patrol, step, arrivalOptions)},
    {t:'render'},
    {t:'wait', ms: waitAfter}
  );
  return true;
}


function movePatrol(patrol) {
  const steps = getPatrolStepCount(patrol.type);
  for (let step = 0; step < steps; step++) {
    const moveStep = computePatrolMoveStep(patrol);
    if (!moveStep) break;
    resolvePatrolArrival(patrol, moveStep, {
      logText: tile => `${patrolEmoji(patrol.type)} ${capitalize(patrol.type)} → ${ROOM_DEFS[tile.roomId].name}.`,
      logClass: 'patrol',
    });
    const tile = G.grid[patrol.row]?.[patrol.col];
    if (!tile || (tile.sticky && !isPatrolStickyImmune(patrol))) break;
  }
}

function checkPatrolCatch(patrol) {
  G.gnomes.forEach(gnome=>{
    if(gnome.ko) return;
    if(gnome.row!==patrol.row||gnome.col!==patrol.col) return;
    if(gnome.hidden&&patrol.type!=='dad') return;
    addLog(`🚨 ${capitalize(patrol.type)} catches ${gnome.name}!`,'bad');
    applyCatchPenalty(patrol.type, gnome, patrol);
  });
}

function applyCatchPenalty(type, gnome, patrolRef=null) {
  switch(type) {
    case 'roomba': {
      // Push in the catching Roomba's current facing direction, then rotate clockwise.
      const roomba = patrolRef || G.patrols.find(p => p.type === 'roomba');
      const facing = roomba?.lastDir || 'E';
      const CW = { N:'E', E:'S', S:'W', W:'N' };
      const connected = getConnectedRooms(gnome.row, gnome.col);
      let pushed = false;
      let pushDir = facing;
      for (let i = 0; i < 4; i++) {
        const [dr, dc] = DIR_DELTA[pushDir];
        const pr = gnome.row + dr, pc = gnome.col + dc;
        if (connected.some(([cr, cc]) => cr === pr && cc === pc)) {
          gnome.row = pr; gnome.col = pc; pushed = true; break;
        }
        pushDir = CW[pushDir];
      }
      if (!pushed && connected.length) { gnome.row = connected[0][0]; gnome.col = connected[0][1]; }
      addLog(`Roomba pushes ${gnome.name} into ${getRoomName(gnome.row,gnome.col)}!`,'bad');
      addTrouble(1, 'Roomba catch');
      break;
    }
    case 'dog': {
      gnome.satchel = gnome.satchel.map(s => s?.type === 'Socks' ? null : s);
      addLog(`Dog destroys ${gnome.name}'s socks!`,'bad');
      addTrouble(1, 'Dog catch');
      break;
    }
    case 'kid': {
      gnome.satchel = gnome.satchel.map(s => s?.type === 'Socks' ? null : s);
      gnome.stickyBlocked = true;
      gnome.stickyCell = `${gnome.row},${gnome.col}`;
      addLog(`Kid destroys ${gnome.name}'s socks!`,'bad');
      addLog(`${gnome.name} is now Sticky in ${getRoomName(gnome.row, gnome.col)}!`,'bad');
      addTrouble(1, 'Kid catch');
      queueStickyTriggerAnimation(gnome.row, gnome.col);
      break;
    }
    case 'dad':
      gnome.ko = true;
      dropAllInventoryToCurrentRoom(gnome, { includeHat: true, log: false });

function addTrouble(n, options = {}) {
  const sourceLabel = getTroubleSourceLabel(options);
  for (let i = 0; i < n; i++) {
    SEQ.push(
      {t:'effect', fn:() => {
        if (G.trouble >= getMaxTrouble()) {

        checkTroubleMilestones();
        if (G.trouble >= getMaxTrouble()) checkLoss();
        updateHeader();

      {t:'render'}
    );
  }
}

function spawnPatrolNear(type, roomId, targetR, targetC) {
  const baseDoors = ROOM_DOORS[roomId] || [];

  // Build candidate list starting from trigger tile, then expanding to whole grid
  const tr = targetR ?? G.CENTER;
  const tc = targetC ?? G.CENTER;

  function getCandidatesFrom(startR, startC) {
    const sourceTile = G.grid[startR]?.[startC];
    if (!sourceTile) return [];
    const found = [];
    for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
      const er = startR + dr, ec = startC + dc;
      if (er < 0 || er >= G.GRID || ec < 0 || ec >= G.GRID) continue;
      if (G.grid[er][ec]) continue; // occupied
      if (!tileHasDoor(sourceTile, dir)) continue;
      const needed = OPPOSITE[dir];
      for (let rot = 0; rot <= 3; rot++) {
        const rotDoors = rotateDirs(baseDoors, rot);
        if (!rotDoors.includes(needed)) continue;
        let connections = 0;
        for (const [d2, [dr2, dc2]] of Object.entries(DIR_DELTA)) {
          const nr = er + dr2, nc = ec + dc2;
          if (nr < 0 || nr >= G.GRID || nc < 0 || nc >= G.GRID) continue;
          const nb = G.grid[nr][nc];
          if (!nb) continue;
          if (rotDoors.includes(d2) && tileHasDoor(nb, OPPOSITE[d2])) connections++;
        }
        found.push({ r: er, c: ec, rot, connections, dist: Math.abs(er-tr)+Math.abs(ec-tc) });
      }
    }
    return found;
  }

  // First try adjacent to trigger tile
  let candidates = getCandidatesFrom(tr, tc);

  // If nothing found, search every placed room for unexplored doors
  if (!candidates.length) {
    const allCandidates = [];
    for (let r = 0; r < G.GRID; r++) {
      for (let c = 0; c < G.GRID; c++) {
        if (!G.grid[r][c]) continue;
        allCandidates.push(...getCandidatesFrom(r, c));
      }
    }
    candidates = allCandidates;
    if (candidates.length) {
      addLog(`🚨 No space near trigger — spawning ${type} at nearest available door.`, 'bad');
    }
  }

  if (!candidates.length) { addLog(`No space to spawn ${type} — house is fully enclosed!`, 'bad'); return; }

  // Pick candidate closest to trigger tile; connections break ties
  candidates.sort((a, b) => a.dist - b.dist || b.connections - a.connections);

  const { r, c, rot } = candidates[0];
  const tile = createRoomTile(roomId, r, c);
  if (rot > 0) tile.rotationOffset = rot;
  G.grid[r][c] = tile;
  G.tilesRevealed++;
  spawnPatrol(type, r, c);
}

function getEventSpawnMeta(effect) {
  return EVENT_PATROL_SPAWN_CARD_META[effect] || null;
}

function getEventCardClass(ev) {
  return EVENT_CARD_CLASS_MAP[ev?.type] || 'event-good';
}

function isPatrolSpawnEffect(effect) {
  return !!getEventSpawnMeta(effect);
}

function isPatrolAlreadyInPlayForEventEffect(effect) {
  const spawnMeta = getEventSpawnMeta(effect);
  return !!(spawnMeta && G.patrols.find(p => p.type === spawnMeta.patrolType));
}

function getEventSfxHint(effect) {
  if (isPatrolSpawnEffect(effect)) return EVENT_SFX_HINT_BY_EFFECT[effect] || 'none';
  if (/spawn_/i.test(effect || '')) return 'none';
  return EVENT_SFX_HINT_BY_EFFECT[effect] || 'woosh';
}

function buildEventPreCardSteps(ev) {
  if (ev?.effect === 'explosion') {
    return [{t:'effect', fn:() => { GAME_EVENTS.emit('dynamite.blast'); }}];
  }
  return [];
}

function buildEventCardStep(ev) {
  const spawnMeta = getEventSpawnMeta(ev?.effect);
  if (spawnMeta) {
    const patrolAlreadyInPlay = isPatrolAlreadyInPlayForEventEffect(ev.effect);
    return {
      t:'card',
      cardType:'⁉️ Event Card',
      emoji:ev.emoji,
      name:ev.name,
      desc:ev.desc || '',
      cls:getEventCardClass(ev),
      ...(patrolAlreadyInPlay ? {} : { stackAfterDelay: spawnMeta, stackAfterDelayMs: 1000, noDismiss: true }),
      eventEffect: ev.effect || '',
      sfxHint: 'none'
    };
  }
  return {
    t:'card',
    cardType:'⁉️ Event Card',
    emoji:ev.emoji,
    name:ev.name,
    desc:ev.desc || '',
    cls:getEventCardClass(ev),
    eventEffect: ev.effect || '',
    sfxHint: getEventSfxHint(ev.effect)
  };
}

function buildEventSequence(ev, r, c, opts = {}) {
  if (!ev) return [];
  const prefix = opts.logPrefix || '⁉️ Event';
  return [
    {t:'log', msg:`${prefix}: ${ev.emoji} ${ev.name}`, cls:opts.logClass || 'event'},
    ...buildEventPreCardSteps(ev),
    buildEventCardStep(ev),
    {t:'effect', fn:() => applyEvent(ev, r, c, opts)},
    {t:'render'}
  ];
}

function triggerEvent(r,c, opts = {}) {
  if (!G?.grid?.[r]?.[c] || G.gameEnded) return false;
  if (!G.eventDeck.length) G.eventDeck = buildEventDeck();
  const id=G.eventDeck.pop();
  const ev=getEventCardById(id);
  if (!ev) return false;
  const enqueue = opts.insert === 'prepend' ? SEQ.prepend.bind(SEQ) : opts.insert === 'afterCurrent' ? SEQ.insertAfterCurrent.bind(SEQ) : SEQ.push.bind(SEQ);
  enqueue(...buildEventSequence(ev, r, c, opts));
  return true;
}

function createEventApplyContext(ev, r, c, opts = {}) {
  const tile = G.grid?.[r]?.[c] || null;
  const actorGnomeIdx = Number.isInteger(opts.actorGnomeIdx)
    ? opts.actorGnomeIdx
    : (Number.isInteger(G.currentGnomeIdx) ? G.currentGnomeIdx : null);
  return { ev, r, c, tile, opts, actorGnomeIdx };
}

function applyTileBooleanEventEffect(tile, key, { duplicateLog, applyLog } = {}) {
  if (!tile) return;
  if (tile[key]) {
    if (duplicateLog) duplicateLog();
    return;
  }
  tile[key] = true;
  if (applyLog) applyLog();
}

function applyPatrolSpawnEventEffect(spawnMeta, r, c) {

  if (G.patrols.find(p => p.type === spawnMeta.patrolType)) {
    addTrouble(spawnMeta.duplicateTrouble || 1, `${capitalize(spawnMeta.patrolType)} already in play`);
    return;
  }
  spawnPatrolNear(spawnMeta.patrolType, getPatrolSpawnRoomId(spawnMeta.patrolType), r, c);
  addPatrolRefCard(spawnMeta.patrolType);
}

function cloneSetLike(value) {
  return value instanceof Set ? new Set([...value]) : value;
}

function cloneTileForTest(tile) {
  if (!tile) return null;
  return {
    ...tile,
    goodieIds: [...(tile.goodieIds || [])],
    hatIds: [...(tile.hatIds || [])],
    manualDoorDirs: tile.manualDoorDirs ? [...tile.manualDoorDirs] : undefined,
    pendingDoorDirs: tile.pendingDoorDirs ? [...tile.pendingDoorDirs] : undefined,
    doors: tile.doors ? [...tile.doors] : undefined,
  };
}

function snapshotStateForTests(state = G) {
  return {
    ...state,
    grid: state.grid.map(row => row.map(cloneTileForTest)),
    roomDeck: [...state.roomDeck],
    goodiePool: [...state.goodiePool],
    eventDeck: [...state.eventDeck],
    hatPool: [...state.hatPool],
    gnomes: state.gnomes.map(g => ({
      ...g,
      satchel: g.satchel.map(item => item ? {...item} : null),
    })),
    patrols: state.patrols.map(p => ({...p})),
    log: [...state.log],
    newlySpawnedCells: cloneSetLike(state.newlySpawnedCells),
    newPatrolTypes: cloneSetLike(state.newPatrolTypes),
    stickyAnimated: cloneSetLike(state.stickyAnimated),
    crackedRooms: cloneSetLike(state.crackedRooms),
  };
}

function assertSmoke(condition, message) {
  if (!condition) throw new Error(message);
}

function verifyStateInvariants(state = G) {
  const issues = [];
  const push = msg => issues.push(msg);
  const laundry = GameQueries.getTile(state.CENTER, state.CENTER, state);
  if (!laundry || laundry.roomId !== 1) push('Center tile must stay the Laundry Room.');
  if ((state.gnomes || []).length < 1) push('At least one gnome must exist.');
  (state.gnomes || []).forEach((gnome, idx) => {
    if (!GameQueries.getTile(gnome.row, gnome.col, state)) push(`Gnome ${idx} is standing on an empty cell.`);
    if (!Array.isArray(gnome.satchel) || gnome.satchel.length < BASE_SATCHEL_SIZE) push(`Gnome ${idx} satchel shape is invalid.`);
  });
  (state.patrols || []).forEach((patrol, idx) => {
    if (!GameQueries.getTile(patrol.row, patrol.col, state)) push(`Patrol ${idx} is standing on an empty cell.`);
  });
  return { ok: issues.length === 0, issues };
}

function verifyRuleConfig() {
  const issues = [];
  const eventIds = new Set();
  const eventEffects = new Set();

  getEventCards().forEach(card => {
    if (!card?.id) issues.push('Event card missing id.');
    if (!card?.effect) issues.push(`Event ${card?.name || card?.id || '?'} missing effect.`);
    if (card?.id && eventIds.has(card.id)) issues.push(`Duplicate event id: ${card.id}`);
    if (card?.effect && eventEffects.has(card.effect)) issues.push(`Duplicate event effect: ${card.effect}`);
    if (card?.id && !Number.isFinite(getEventQty(card.id))) issues.push(`Event ${card.id} has invalid quantity.`);
    if (card?.id) eventIds.add(card.id);
    if (card?.effect) eventEffects.add(card.effect);
  });


  getStartingHatPoolTemplate().forEach(id => {
    if (!getHatDefById(id)) issues.push(`Starting hat pool references missing hat ${id}.`);
  });

  getBetweenHouseHatPoolTemplate().forEach(id => {
    if (!getHatDefById(id)) issues.push(`Weaver hat pool references missing hat ${id}.`);
  });

  getBetweenHouseGoodiePoolTemplate().forEach(id => {
    if (!GOODIE_DEF_BY_ID[normalizeGoodieId(id)]) issues.push(`Between-house goodie pool references missing goodie ${id}.`);
  });

  getPatrolOrder().forEach(type => {
    if (!PATROL_REF_DATA[type]) issues.push(`Patrol order references missing patrol type ${type}.`);
    if (!Number.isInteger(getPatrolStepCount(type)) || getPatrolStepCount(type) < 1) issues.push(`Patrol ${type} has invalid step count.`);
  });

  ['goodie', 'hat'].forEach(type => {
    if (!Number.isInteger(getWeaverOfferCount(type)) || getWeaverOfferCount(type) < 1) issues.push(`Weaver ${type} offer count is invalid.`);
    if (!Number.isFinite(getWeaverOfferCost(type)) || getWeaverOfferCost(type) < 0) issues.push(`Weaver ${type} cost is invalid.`);
  });

  return { ok: issues.length === 0, issues };
}

function runSmokeTests() {
  const results = [];
  const test = (name, fn) => {
    try {
      const detail = fn();
      results.push({ name, ok: true, detail: detail || 'ok' });
    } catch (err) {
      results.push({ name, ok: false, detail: err.message || String(err) });
    }
  };

  test('fresh state invariants', () => {
    const temp = createBaseState(2, ['Bill', 'Brim']);
    withTempState(temp, () => hydrateInitialBoard(temp, 2, ['Bill', 'Brim']));
    const report = verifyStateInvariants(temp);
    assertSmoke(report.ok, report.issues.join(' | '));
  });

  test('connected-room query remains stable on fresh board', () => {
    const temp = createBaseState(2, ['Bill', 'Brim']);
    withTempState(temp, () => hydrateInitialBoard(temp, 2, ['Bill', 'Brim']));
    const connected = withTempState(temp, () => getConnectedRooms(temp.CENTER, temp.CENTER));
    assertSmoke(Array.isArray(connected), 'Connected rooms query must return an array.');
    assertSmoke(connected.length === 0, 'Fresh board should not begin with adjacent connected rooms.');
  });

  test('reveal query exposes legal empty neighbors from laundry', () => {
    const temp = createBaseState(2, ['Bill', 'Brim']);
    withTempState(temp, () => hydrateInitialBoard(temp, 2, ['Bill', 'Brim']));
    const revealable = withTempState(temp, () => getRevealableFrom(temp.CENTER, temp.CENTER));
    assertSmoke(revealable.length >= 1, 'Laundry Room should reveal at least one legal room.');
    revealable.forEach(([r, c]) => {
      assertSmoke(!GameQueries.getTile(r, c, temp), 'Reveal targets must stay empty before placement.');
    });
  });

  test('live game invariants', () => {
    const snap = snapshotStateForTests();
    const report = verifyStateInvariants(snap);
    assertSmoke(report.ok, report.issues.join(' | '));
  });

  test('rules config is internally consistent', () => {
    const report = verifyRuleConfig();
    assertSmoke(report.ok, report.issues.join(' | '));
  });

  return results;
}

function getDebugDoorMarkers(r, c) {
  const tile = G.grid[r]?.[c] || null;
  if (tile) {
    const renderable = new Set(getRenderableDoorDirs(r, c));
    const base = new Set(getBaseDoorDirs(tile));
    const manual = new Set(getManualDoorDirs(tile));
    const pending = new Set(getForcedDoorDirs(tile));
    return ['N','E','S','W'].map(dir => {
      const tags = [];
      if (renderable.has(dir)) tags.push('R');
      if (base.has(dir)) tags.push('B');
      if (manual.has(dir)) tags.push('M');
      if (pending.has(dir)) tags.push('P');
      if (!tags.length) return null;
      const cls = renderable.has(dir)
        ? 'render'
        : (pending.has(dir) && (base.has(dir) || manual.has(dir)))
          ? 'mix'
          : pending.has(dir)
            ? 'pending'
            : manual.has(dir)
              ? 'manual'
              : 'base';
      return { dir, text: tags.join(''), cls, title: `${dir}: ${tags.map(tag => ({ R:'renderable', B:'base', M:'manual', P:'pending' }[tag])).join(', ')}` };
    }).filter(Boolean);
  }
  return ['N','E','S','W'].map(dir => {
    const [dr, dc] = DIR_DELTA[dir];
    const nr = r + dr, nc = c + dc;
    const nb = G.grid[nr]?.[nc];
    if (!nb) return null;
    const opp = OPPOSITE[dir];
    const tags = [];
    if (getForcedDoorDirs(nb).includes(opp)) tags.push('P');
    if (tileHasDoor(nb, opp)) tags.push('I');
    if (!tags.length) return null;
    const cls = tags.includes('P') && tags.includes('I') ? 'mix' : tags.includes('P') ? 'pending' : 'inbound';
    return { dir, text: tags.join(''), cls, title: `${dir}: inbound from ${ROOM_DEF_BY_ID[nb.roomId]?.name || nb.roomId} (${tags.includes('P') ? 'pending' : 'existing'} on neighbor)` };
  }).filter(Boolean);
}

  openDoorFromTile(currentTile, dir);

function debugSpawnItem(kind, target) {
  const g = debugActiveGnome();
  const tile = debugCurrentTile();
  if (!g || !tile) return addLog('Debug: start a game first.', 'bad');
  if (kind === 'Socks') {
    if (target === 'satchel') {
      const ok = giveItemToGnomeSatchel(g, { type: 'Socks' });
      addLog(ok ? `Debug: spawned 🧦 Socks into ${g.name}'s satchel.` : `Debug: ${g.name}'s satchel is full.`, ok ? 'good' : 'bad');

      addLog(`Debug: spawned 🧦 Socks in ${ROOM_DEF_BY_ID[tile.roomId]?.name || 'current room'}.`, 'good');
    }

  const [type, idRaw] = kind.split(':');

  if (toggle && !toggle.dataset.bound) {
    toggle.dataset.bound = '1';
    toggle.addEventListener('click', () => debugSetPanelVisibility());
  }
  if (!document.body.dataset.debugPanelResizeBound) {
    document.body.dataset.debugPanelResizeBound = '1';
    window.addEventListener('resize', syncDebugPanelBounds);
  }
  document.querySelectorAll('[data-debug-action]').forEach(btn => {
    if (btn.dataset.bound === '1') return;
    btn.dataset.bound = '1';
    btn.addEventListener('click', () => {
      const action = btn.dataset.debugAction;
      if (action === 'spawnItem') return debugSpawnItem(el('debug-spawn-kind').value, el('debug-spawn-target').value);
      if (action === 'triggerEvent') return debugTriggerSelectedEvent(el('debug-event-select').value);
      if (action === 'spawnPatrol') return debugSpawnPatrolInCurrentRoom(el('debug-patrol-select').value);
      if (action === 'placeRoom') return debugPlaceRoom(el('debug-room-dir').value, el('debug-room-select').value);
      if (action === 'openDoorN') { const tile = debugCurrentTile(); if (tile) { openDoorFromTile(tile, 'N'); reconcileDoorConnections(); renderAll(); } return; }
      if (action === 'openDoorE') { const tile = debugCurrentTile(); if (tile) { openDoorFromTile(tile, 'E'); reconcileDoorConnections(); renderAll(); } return; }
      if (action === 'openDoorS') { const tile = debugCurrentTile(); if (tile) { openDoorFromTile(tile, 'S'); reconcileDoorConnections(); renderAll(); } return; }
      if (action === 'openDoorW') { const tile = debugCurrentTile(); if (tile) { openDoorFromTile(tile, 'W'); reconcileDoorConnections(); renderAll(); } return; }
      if (action === 'rotateCurrentRoom') { const tile = debugCurrentTile(); if (tile) { tile.rotationOffset = ((tile.rotationOffset || 0) + 1) % 4; normalizeTileDoorState(tile); reconcileDoorConnections(); renderAll(); } return; }
      if (action === 'troublePlus') return debugAdjustTrouble(1);
      if (action === 'troubleMinus') return debugAdjustTrouble(-1);
      if (action === 'actionPlus') { G.actionsLeft = (G.actionsLeft || 0) + 1; renderAll(); return; }
      if (action === 'nextGnome') { G.currentGnomeIdx = ((G.currentGnomeIdx || 0) + 1) % (G.gnomes?.length || 1); renderAll(); return; }
      if (action === 'clearQueue') { SEQ.clear(); debugClearTransientUi(); renderAll(); return; }
      if (action === 'forceDefeat') { SEQ.clear(); debugClearTransientUi(); G.trouble = getMaxTrouble(); showEndScreen(false); return; }
      if (action === 'inspectNow') return debugInspectState();

      if (action === 'refreshRegistries') return debugRefreshRegistries();
    });

    }
  }, { passive: false });

function getPathDistance(fr, fc, tr, tc) {
  if (fr === tr && fc === tc) return 0;
  const startKey = `${fr},${fc}`;
  const goalKey = `${tr},${tc}`;
  const seen = new Set([startKey]);
  const queue = [[fr, fc, 0]];
  while (queue.length) {
    const [r, c, dist] = queue.shift();
    for (const [nr, nc] of getConnectedRooms(r, c)) {
      const key = `${nr},${nc}`;
      if (seen.has(key)) continue;
      if (key === goalKey) return dist + 1;
      seen.add(key);
      queue.push([nr, nc, dist + 1]);
    }
  }
  return Infinity;
}

function getNearestGnome(patrol, allowHidden) {
  let best = null;
  let bestPath = Infinity;
  let bestManhattan = Infinity;
  G.gnomes.forEach(g => {
    if (g.ko) return;
    if (!allowHidden && g.hidden) return;
    const pathDist = getPathDistance(patrol.row, patrol.col, g.row, g.col);
    const manhattan = Math.abs(g.row - patrol.row) + Math.abs(g.col - patrol.col);
    const effectivePath = Number.isFinite(pathDist) ? pathDist : Infinity;
    if (effectivePath < bestPath || (effectivePath === bestPath && manhattan < bestManhattan)) {
      best = g;
      bestPath = effectivePath;
      bestManhattan = manhattan;
    }
  });
  return best;
}

function getGnomeMostSocks() {
  let best = null;
  let most = -1;
  let bestPath = Infinity;
  let bestManhattan = Infinity;
  const kid = G.patrols.find(p => p.type === 'kid') || null;
  G.gnomes.forEach(g => {
    if (g.ko) return;
    if (g.hidden) return;
    const n = g.satchel.filter(s => s?.type === 'Socks').length;
    const pathDist = kid ? getPathDistance(kid.row, kid.col, g.row, g.col) : Infinity;
    const manhattan = kid ? Math.abs(g.row - kid.row) + Math.abs(g.col - kid.col) : Infinity;
    if (n > most || (n === most && (pathDist < bestPath || (pathDist === bestPath && manhattan < bestManhattan)))) {
      best = g;
      most = n;

      seen.set(value, out);
      (value.values || []).forEach(item => out.add(deepDeserialize(item, seen)));

  function getCardOverlaySnapshot() {
    const overlay = el('card-overlay');
    const inner = el('game-card-inner');
    if (!overlay || !inner) return { show: false };
    return {
      show: overlay.classList.contains('show'),
      bodyCardShowing: document.body.classList.contains('card-showing'),
      cardType: inner.querySelector('.card-type-band')?.textContent || '',
      emoji: inner.querySelector('.card-emoji-big')?.textContent || '',
      name: inner.querySelector('.card-name-big')?.textContent || '',
      desc: inner.querySelector('.card-desc-body')?.textContent || '',
      cls: Array.from(inner.classList || []).filter(cls => cls !== 'game-card' && cls !== 'dismissing' && cls !== 'stacked-front' && cls !== 'no-dismiss').join(' '),
      noDismiss: inner.classList.contains('no-dismiss'),
      stackPending: inner.dataset.stackPending === '1'
    };
  }

  function applyCardOverlaySnapshot(snapshot) {
    const overlay = el('card-overlay');
    const inner = el('game-card-inner');
    const back = el('game-card-back');
    if (!overlay || !inner) return;
    if (!snapshot || !snapshot.show) {
      overlay.classList.remove('show');
      document.body.classList.remove('card-showing');
      inner.className = 'game-card';
      inner.style.animation = 'none';
      inner.dataset.stackPending = '0';
      inner.dataset.command = 'dismissCard';
      inner.classList.remove('no-dismiss');
      if (back) {
        back.classList.remove('show', 'dismissing');
        back.style.animation = 'none';
      }
      syncCardOverlayInteraction();
      return;
    }
    if (typeof window.setOverlayCardContent === 'function') {
      window.setOverlayCardContent(inner, snapshot);
    }
    inner.className = 'game-card' + (snapshot.cls ? ` ${snapshot.cls}` : '');
    inner.style.animation = '';
    inner.dataset.stackPending = snapshot.stackPending ? '1' : '0';
    inner.dataset.command = 'dismissCard';
    inner.classList.toggle('no-dismiss', !!snapshot.noDismiss);
    if (back) {
      back.classList.remove('show', 'dismissing');
      back.style.animation = 'none';
    }
    overlay.classList.add('show');
    document.body.classList.toggle('card-showing', snapshot.bodyCardShowing !== false);
    syncCardOverlayInteraction();
  }

  function syncCardOverlayInteraction() {
    const overlay = el('card-overlay');
    const inner = el('game-card-inner');
    if (!overlay || !inner) return;
    const isShown = overlay.classList.contains('show');
    const dismissBtns = overlay.querySelectorAll('[data-command="dismissCard"], .card-ok');
    if (!isShown) {
      dismissBtns.forEach(btn => { if ('disabled' in btn) btn.disabled = false; });
      if (!inner.classList.contains('no-dismiss')) inner.dataset.command = 'dismissCard';
      overlay.classList.remove('read-only');
      return;
    }
    const lockState = getMultiplayerInputLockState('', 'dismissCard');
    const canDismiss = !lockState.active && !inner.classList.contains('no-dismiss') && inner.dataset.stackPending !== '1';
    inner.dataset.command = canDismiss ? 'dismissCard' : '';
    dismissBtns.forEach(btn => { if ('disabled' in btn) btn.disabled = !canDismiss; });
    overlay.classList.toggle('read-only', !canDismiss);
  }

  function requestHostAction(actionId, payload) {

  }

  function invokeHostCommand(command, args = []) {
    switch (command) {
      case 'dismissCard':
        if (typeof MP.originals.dismissCard === 'function') return MP.originals.dismissCard.apply(window, args);
        return false;
      case 'cancelPendingBoardAction':
        if (typeof MP.originals.cancelPendingBoardAction === 'function') return MP.originals.cancelPendingBoardAction.apply(window, args);
        return false;
      case 'cancelTempActionMode':

        return false;

        return false;
      case 'clearSharedDecisionPopup':

        return false;
      case 'applySharedDecisionAction':

  function makeSnapshotPayload() {

      type: 'snapshot',
      state: deepSerialize(window.G),

  }

  function scheduleHostSnapshot(delayMs = 80) {
    if (!MP.isHost || !isGameStarted()) return;
    const timer = window.setTimeout(() => {

      broadcast(makeSnapshotPayload());
    }, delayMs);
    MP.syncTimers.add(timer);
  }

  function broadcastLobbyState() {
    if (!MP.isHost) return;
    syncSetupSelectionsFromClaims({ render: false });
    const payload = {
      type: 'lobby_state',
      hostPeerId: MP.hostPeerId,
      roomId: MP.roomId,
      playerOrder: MP.playerOrder.slice(),
      gnomeOwners: Object.assign({}, MP.gnomeOwners),
