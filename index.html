// CLICK HANDLERS
// ─────────────────────────────────────────────
function handleRoomClick(r, c, tile) {
  // Panic phase: current gnome must move to an adjacent room
  if (G.phase === 'panic') {
    if (G.panicMoving) return;   // still resolving previous move
    const gnome = G.gnomes[G.currentGnomeIdx];
    if (!gnome || gnome.ko) return;
    // Only respond if this gnome is actually at the front of the panic queue
    if (!G.panicState || G.panicState.panicQueue[0] !== G.currentGnomeIdx) return;
    const targets = getConnectedRooms(gnome.row, gnome.col);
    const isTarget = targets.some(([tr,tc])=>tr===r&&tc===c);
    if (isTarget) {
      completePanicMove(r, c);
    } else {
      addLog(`😱 Panic! ${gnome.name} must move to an adjacent room.`, 'bad');
    }
    return;
  }
  if (G.phase!=='gnome') { showRoomDetail(r,c,tile); return; }
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome||gnome.ko) { showRoomDetail(r,c,tile); return; }

  const handled = resolveActiveBoardRoomAction(r, c, tile);
  if (!handled) {
    G.selectedCell = [r,c];
    showRoomDetail(r,c,tile);
  }
  renderAll();

}

function handleRevealClick(r, c, fromDir) {
  if (G.phase!=='gnome'||G.actionsLeft<=0) return;
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome||gnome.ko) return;
  if (gnome.stickyBlocked) { addLog(`🫟 ${gnome.name} is stuck — cannot move this turn!`,'bad'); return; }
  if (G.roomDeck.length===0) { addLog('No rooms left to reveal!','bad'); return; }
  if (resolveActiveRevealAction(r, c, fromDir)) return;
  executeGameAction('revealRoom', { r, c, fromDir, implicit: true });
}

function cancelPendingBoardAction(kind='action') {
  let cancelled = false;
  if (G.kickMode) { G.kickMode = null; cancelled = true; }
  if (G.ventMode) { G.ventMode = false; cancelled = true; }
  if (G.dynamiteMode) { disarmDynamite({ restoreInventory: true, render: false }); cancelled = true; }
  if (G.shroomMode) { disarmShroom({ restoreInventory: true, render: false }); cancelled = true; }
  if (G.selectedAction) { G.selectedAction = null; cancelled = true; }
  if (cancelled) {
    addLog(`Cancelled ${kind}.`, 'system');
    renderAll();
  }
  return cancelled;
}

function selectAction(action) {
  if (G.phase!=='gnome'||G.actionsLeft<=0) return;
  if (action==='scurry' && G.dressCodeActive && G.gnomes[G.currentGnomeIdx]?.hat === 1) { addLog('👔 Dress Code! Silly Hat benefits are cancelled this round.','bad'); return; }
  if (G.selectedAction===action) {
    cancelPendingBoardAction(action);
    return;
  }
  clearInteractionModes({ clearScurry: true });
  G.selectedAction = action;
  renderAll();
}

// ─────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────
let scurryState = null; // tracks first step of scurry

function doMove(gnome, r, c) {
  moveGnomeTo(gnome, r, c);
  spendAction();
}

function doScurryStep(gnome, r, c) {
  if (!scurryState) {
    // First step
    moveGnomeTo(gnome, r, c, true);
    const tile = G.grid[gnome.row][gnome.col];
    if (tile?.sticky) {
      // Landed on sticky — scurry ends, action spent
      scurryState = null;
      G.selectedAction = null;
      spendAction();
      renderAll();

    } else {
      scurryState = { fromR: gnome.row, fromC: gnome.col };
      addLog(`${gnome.name} scurries — choose a second room to continue, or End Turn to stop.`);
      renderAll();
    }
  } else {
    // Second step
    moveGnomeTo(gnome, r, c, true);
    scurryState = null;
    G.selectedAction = null;
    spendAction();
    renderAll();

  }
}

function moveGnomeTo(gnome, r, c, isScurry=false) {
  if (G.dynamiteMode) disarmDynamite({ restoreInventory: true, render: false });
  if (G.shroomMode) disarmShroom({ restoreInventory: true, render: false });
  const fromKey = `${gnome.row},${gnome.col}`;
  const toKey = `${r},${c}`;
  if (gnome.stickyBlocked && fromKey !== toKey) clearStickyStateForActor(gnome);
  const tile = G.grid[r][c];
  AUDIO_MANAGER.beginMove('gnome', { gnome, toR: r, toC: c, isScurry, suppressMoveSound: !!tile?.sticky });
  gnome.row = r; gnome.col = c;
  gnome.hidden = false;
  const def = ROOM_DEFS[tile.roomId];
  addLog(`${gnome.name} → ${def.name}`);

  // Sticky: state change is immediate; splat animation is a SEQ step
  if (tile.sticky) {
    GAME_EVENTS.emit('sticky.triggered', { gnome, r, c });
    addLog(`🫟 Sticky floor! ${gnome.name} cannot move again this turn (can still be Kicked).`, 'bad');
    gnome.stickyBlocked = true;
    gnome.stickyCell = `${r},${c}`;
    G.selectedAction = null;
    if (!G.stickyAnimated.has(`${r},${c}`)) {
      G.stickyAnimated.add(`${r},${c}`);
      SEQ.push({t:'boardAnim', r, c, css:'sticky-splat-anim', ms:900});
    }
  }

  // Creaky: board anim fires THEN trouble (card THEN effect) — all via SEQ
  if (tile.creaky && gnome.satchel.some(s=>s?.type==='Socks')) {
    GAME_EVENTS.emit('creaky.triggered', { gnome, r, c });
    addLog(`📢 Creaky floor! ${gnome.name} carries socks → +1 Trouble`,'bad');
    SEQ.push(
      {t:'boardAnim', r, c, css:'creaky-crack-anim', ms:900},
      {t:'effect', fn:() => addTrouble(1)}
    );
  }

  // Chute: notify gnome they can deposit via Drop button
  if (tile.chute && gnome.satchel.some(s=>s?.type==='Socks')) {
    addLog(`🕳️ Chute room! Use ${UI_TEXT.action.deposit} to bank Socks here.`, 'good');
  }

  updateAllPatrolNextDirs();
}

function doReveal(gnome, r, c, fromDir) {
  const roomId = drawConnectingRoom(fromDir);
  if (!roomId) { addLog('No compatible room available!','bad'); return; }

  const previewDef = ROOM_DEFS[roomId] || {};
  AUDIO_MANAGER.planMove('gnome', {
    toR: r,
    toC: c,
    suppressMoveSound: !!previewDef.sticky,
    reason: previewDef.sticky ? 'reveal-entry-sticky' : 'reveal-entry'
  });

  const tile = createRoomTile(roomId, r, c);
  G.grid[r][c] = tile;

  const mandatoryEntry = fromDir ? OPPOSITE[fromDir] : null;
  let bestRot = tile.rotationOffset || 0;
  let bestScore = -Infinity;

  for (let rot = 0; rot < 4; rot++) {
    const dirs = getBaseDoorDirs(tile, rot);
    if (mandatoryEntry && !dirs.includes(mandatoryEntry) && !roomCanProvideDoor(tile.roomId, mandatoryEntry)) continue;

    let score = 0;
    if (mandatoryEntry && dirs.includes(mandatoryEntry)) score += 100;
    for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
      const nr = r + dr, nc = c + dc;
      const nb = G.grid[nr]?.[nc];
      if (!nb) continue;
      const opp = OPPOSITE[dir];
      if (dirs.includes(dir) && tileHasDoor(nb, opp, { includeForced: true })) score += 10;
      if (getForcedDoorDirs(nb).includes(opp)) score += 25;
    }
    if (score > bestScore) {
      bestScore = score;
      bestRot = rot;
    }
  }

  tile.rotationOffset = bestRot;
  normalizeTileDoorState(tile);
  if (mandatoryEntry && !tileHasDoor(tile, mandatoryEntry)) addManualDoor(tile, mandatoryEntry);

  for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
    const nr = r + dr, nc = c + dc;
    const nb = G.grid[nr]?.[nc];
    if (!nb) continue;
    const opp = OPPOSITE[dir];

    if (getForcedDoorDirs(nb).includes(opp)) {
      connectTilesWithDoor(tile, nb, dir);
    } else if (tileHasDoor(tile, dir) && tileHasDoor(nb, opp)) {
      connectTilesWithDoor(tile, nb, dir);
    }
  }

  reconcileDoorConnections();
  G.tilesRevealed++;
  SEQ.push({t:'effect', fn:() => GAME_EVENTS.emit('tile.created', { r, c, roomId })});
  addLog(`🗺️ Revealed: ${ROOM_DEFS[roomId].name}!`,'good');
  moveGnomeTo(gnome, r, c);

  const extra = G.tilesRevealed - getFreeTiles() - 1;
  if (extra > 0) { addLog(`🏠 Extra tile → +1 Trouble`,'bad'); addTrouble(1); }
  if (tile.event) triggerEvent(r,c);

  if (isHouseFullyEnclosed()) {
    addLog(`💥 Fully enclosed house! ${ROOM_DEFS[tile.roomId].name} instantly triggers an automatic Explosion Event.`, 'good');
    GAME_EVENTS.emit('dynamite.blast');
    applyEvent({ effect: 'explosion' }, r, c);
  }

  G.selectedAction = null;
  spendAction();
  renderAll();
}

// Returns walls the current gnome can blast with dynamite.
// Includes walls facing discovered rooms (no door yet) AND undiscovered cells.
function getBlastableWalls() {
  return getDynamiteTargets();
}

// Rotate a set of door directions 90° clockwise n times
function rotateDirs(dirs, times) {
  const CW = {N:'E', E:'S', S:'W', W:'N'};
  let result = [...dirs];
  for (let t=0; t<times; t++) result = result.map(d=>CW[d]);
  return result;
}

function pruneUnmatchedNeighborDoor(tile, dir) {
  if (!tile || !DIR_DELTA[dir]) return;
  const [dr, dc] = DIR_DELTA[dir];
  const neighbor = G.grid[tile.row + dr]?.[tile.col + dc];
  if (!neighbor) return;
  const opp = OPPOSITE[dir];
  const neighborBase = getBaseDoorDirs(neighbor);
  const neighborForced = getForcedDoorDirs(neighbor);
  if (!getManualDoorDirs(neighbor).includes(opp)) return;
  if (neighborBase.includes(opp) || neighborForced.includes(opp)) return;
  neighbor.manualDoorDirs = getManualDoorDirs(neighbor).filter(d => d !== opp);
  normalizeTileDoorState(neighbor);
}

function pruneShroomDisconnectedNeighbors(tile, prevVisibleDirs = []) {
  if (!tile) return;
  const currentVisibleDirs = getTileDoors(tile);
  const removedDirs = prevVisibleDirs.filter(dir => !currentVisibleDirs.includes(dir));
  for (const dir of removedDirs) pruneUnmatchedNeighborDoor(tile, dir);
}

function getShroomPreviewDoorDirs(tile, rotationOverride = null) {
  if (!tile) return [];
  const currentRot = tile.rotationOffset || 0;
  const nextRot = rotationOverride ?? currentRot;
  const delta = (nextRot - currentRot + 4) % 4;
  return delta ? rotateDirs(getTileDoors(tile), delta) : getTileDoors(tile);
}

function shroomConfirm() {
  if (!G.shroomPreview) { addLog('No rotation selected — click a room first.','bad'); return; }
  const {r, c, rotation} = G.shroomPreview;
  const tile = G.grid[r][c];
  if (!tile) return;
  if (!shroomRotationMaintainsConnection(r, c, rotation)) {
    const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    showGameTooltip('Confirm only works while this room connects to a matching door on an adjacent placed room.', cell);
    return;
  }

  const prevRot = tile.rotationOffset || 0;
  const nextRot = rotation % 4;
  const delta = (nextRot - prevRot + 4) % 4;
  const rotatedVisibleDirs = getShroomPreviewDoorDirs(tile, nextRot);
  const rotatedPendingDirs = rotateDirs(getForcedDoorDirs(tile), delta).filter(dir => {
    const [dr, dc] = DIR_DELTA[dir];
    return !G.grid[r + dr]?.[c + dc];
  });

  tile.rotationOffset = nextRot;
  const nextBaseDirs = getBaseDoorDirs(tile, nextRot);
  tile.manualDoorDirs = rotatedVisibleDirs.filter(dir => !nextBaseDirs.includes(dir));
  tile.pendingDoorDirs = rotatedPendingDirs;
  normalizeTileDoorState(tile);

  if (!G.shroomMode?.committed) {
    const sourceSlotIdx = G.shroomMode?.sourceSlotIdx;
    const sourceActorIdx = G.shroomMode?.sourceActorIdx ?? G.currentGnomeIdx;
    if (typeof sourceSlotIdx === 'number' && sourceSlotIdx >= 0) {
      const actor = G.gnomes[sourceActorIdx];
      if (actor && actor.satchel[sourceSlotIdx]?.type === 'goodie' && actor.satchel[sourceSlotIdx]?.id === 1) actor.satchel[sourceSlotIdx] = null;
    }
    spendAction();
    G.shroomMode.committed = true;
  }
  GAME_EVENTS.emit('shroom.rotate');
  addLog(`🍄 Shroom applied — ${ROOM_DEFS[tile.roomId].name} rotated to ${rotation*90}°!`, 'good');
  G.shroomMode = false;
  G.shroomPreview = null;
  renderAll();
}

function getShroomTargets() {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome) return [];
  const targets = [[gnome.row, gnome.col]];
  for (const [,[dr,dc]] of Object.entries(DIR_DELTA)) {
    const nr=gnome.row+dr, nc=gnome.col+dc;
    if (nr>=0&&nr<G.GRID&&nc>=0&&nc<G.GRID&&G.grid[nr][nc]) targets.push([nr,nc]);
  }
  return targets;
}

function blastWall(dir, nr, nc) {
  const gnome = G.gnomes[G.currentGnomeIdx];
  const myTile = G.grid[gnome.row]?.[gnome.col];
  if (!myTile || !G.dynamiteMode || !DIR_DELTA[dir]) return false;

  const [dr, dc] = DIR_DELTA[dir];
  const targetR = gnome.row + dr, targetC = gnome.col + dc;
  if (targetR !== nr || targetC !== nc) return false;

  openDoorFromTile(myTile, dir);
  reconcileDoorConnections();

  const neighbor = G.grid[targetR]?.[targetC] || null;
  if (neighbor) addLog(`💥 Dynamite blasts a door ${dir} into ${ROOM_DEFS[neighbor.roomId].name}!`, 'good');
  else addLog(`💥 Dynamite blasts a door ${dir} into the unknown — explore there to reveal a room!`, 'good');

  GAME_EVENTS.emit('dynamite.blast');
  disarmDynamite({ restoreInventory: false, render: false });
  spendAction();
  renderAll();
  return true;
}

function pickupInCurrentRoom() {
  if (G.phase!=='gnome'||G.actionsLeft<=0) return;
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome||gnome.ko) return;
  const tile = G.grid[gnome.row][gnome.col];
  if (!tile) return;

  const free = findFirstFreeSatchelSlot(gnome);
  if (free===-1) { addLog(`${gnome.name}'s satchel is full!`,'bad'); return; }

  const hasSocks = tile.Socks > 0;
  const hasGoodies = tile.goodieIds?.length > 0;
  const hasHats = tile.hatIds?.length > 0;

  if (!hasSocks && !hasGoodies && !hasHats) { addLog('Nothing to pick up here!','bad'); return; }

  function pickSocks() {
    gnome.satchel[free] = {type:'Socks'};
    tile.Socks--;
    GAME_EVENTS.emit('item.pickedUp', { itemType: 'Socks' });
    addLog(`${gnome.name} picked up 🧦 Socks.`,'good');
    spendAction(); G.selectedAction=null; renderAll();
  }

  function pickGoodie(idx) {
    const gid = tile.goodieIds.splice(idx, 1)[0];
    const gdef = GOODIES_DEFS.find(d=>d.id===gid);
    gnome.satchel[free] = {type:'goodie', id:gid};
    GAME_EVENTS.emit('item.pickedUp', { itemType: 'goodie', id: gid });
    addLog(`${gnome.name} picked up ${gdef?.emoji||'🎁'} ${gdef?.name||'Goodie'}.`,'good');
    spendAction(); G.selectedAction=null; renderAll();
  }

  function pickHat(idx) {
    const hid = tile.hatIds.splice(idx, 1)[0];
    const hdef = HAT_DEF_BY_ID[hid];
    const result = giveHatToGnome(gnome, hid);
    if (result === 'equipped') {
      GAME_EVENTS.emit('item.pickedUp', { itemType: 'hat', id: hid });
      addLog(`${gnome.name} picked up and equipped ${hdef?.name||'Hat'}!`,'good');
    } else {
      GAME_EVENTS.emit('item.pickedUp', { itemType: 'hat', id: hid });
      addLog(`${gnome.name} picked up ${hdef?.name||'Hat'}.`,'good');
    }
    spendAction(); G.selectedAction=null; renderAll();
  }

  const buttons = [];
  if (hasSocks) buttons.push({ label:'🧦 Socks', cls:'good', action:()=>{ closeModal(); pickSocks(); } });
  if (hasGoodies) {
    tile.goodieIds.forEach((gid, idx) => {
      const gdef = GOODIES_DEFS.find(d=>d.id===gid);
      buttons.push({ label:`🤏 Pick Up ${gdef?.emoji||'🎁'} ${gdef?.name||'Goodie'}`, cls:'good', action:()=>{ closeModal(); pickGoodie(idx); } });
    });
  }
  if (hasHats) {
    tile.hatIds.forEach((hid, idx) => {
      const hdef = HAT_DEF_BY_ID[hid];
      buttons.push({ label:`${hdef?.emoji||'🎩'} ${hdef?.name||'Hat'} — ${hdef?.desc||''}`, cls:'good', action:()=>{ closeModal(); pickHat(idx); } });
    });
  }
  buttons.push({ label:'Cancel', cls:'cancel', action:closeModal });

  if (buttons.length === 2) {
    buttons[0].action();
  } else {
    showModal('🤏 Pick Up', 'What do you want to pick up?', buttons);
  }
}

function doHide() {
  if (G.phase!=='gnome'||G.actionsLeft<=0) return;
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome||gnome.ko) return;
  if (G.lightsOn) { addLog('💡 Lights On! Cannot hide this turn.','bad'); return; }
  if (!isInHidingRoom(gnome)) { addLog('No hiding spot here!','bad'); return; }
  gnome.hidden = true;
  addLog(`${gnome.name} hides! 🫣`,'good');
  spendAction();
  G.selectedAction = null;
  renderAll();
}

function buildKickTarget(label, emoji, type, ref) {
  return { label, emoji, type, ref };
}

function getKickTargetsForGnome(kicker = G.gnomes[G.currentGnomeIdx]) {
  if (!kicker) return [];
  const targets = [];
  G.gnomes.forEach((g, i) => {
    if (i === G.currentGnomeIdx) return;
    if (g.row !== kicker.row || g.col !== kicker.col) return;
    targets.push(buildKickTarget(`${g.emoji} ${g.name}${g.ko?' (KO)':''}`, g.emoji, 'gnome', g));
  });
  G.patrols.forEach(p => {
    if (p.row !== kicker.row || p.col !== kicker.col) return;
    const em = patrolEmoji(p.type);
    targets.push(buildKickTarget(`${em} ${capitalize(p.type)} patrol`, em, 'patrol', p));
  });
  if (G.hamper.row === kicker.row && G.hamper.col === kicker.col) {
    targets.push(buildKickTarget('🧺 Hamper', '🧺', 'hamper', G.hamper));
  }
  const kickTile = G.grid[kicker.row]?.[kicker.col];
  if (kickTile?.Socks > 0) {
    targets.push(buildKickTarget('🧦 Socks', '🧦', 'Socks', kickTile));
  }
  if (kickTile?.goodieIds?.length > 0) {
    kickTile.goodieIds.forEach((gid, idx) => {
      const gdef = GOODIES_DEFS.find(d=>d.id===gid);
      targets.push(buildKickTarget(`${gdef?.emoji||'🎁'} ${gdef?.name||'Goodie'}`, gdef?.emoji||'🎁', 'goodie', { tile: kickTile, idx }));
    });
  }
  if (kickTile?.hatIds?.length > 0) {
    kickTile.hatIds.forEach((hid, idx) => {
      const hdef = HATS_DEFS.find(d=>d.id===hid);
      targets.push(buildKickTarget(`${hdef?.emoji||'🎩'} ${hdef?.name||'Hat'}`, hdef?.emoji||'🎩', 'hat', { tile: kickTile, idx }));
    });
  }
  return targets;
}

function getKickDestinationsForGnome(kicker = G.gnomes[G.currentGnomeIdx]) {
  return kicker ? getConnectedRooms(kicker.row, kicker.col) : [];
}

function doKick() {
  if (G.kickMode) { cancelPendingBoardAction('kick'); return; }
  if (G.phase!=='gnome'||G.actionsLeft<=0) return;
  const kicker = G.gnomes[G.currentGnomeIdx];
  if (!kicker||kicker.ko) return;

  const targets = getKickTargetsForGnome(kicker);
  if (!targets.length) { addLog('Nothing to kick here!', 'bad'); return; }
  const destinations = getKickDestinationsForGnome(kicker);
  if (!destinations.length) { addLog('No connected rooms to kick into!', 'bad'); return; }

  if (targets.length === 1) {
    // Only one target — go straight to board mode
    G.kickMode = { target: targets[0], destinations };
    addLog(UI_TEXT.kickChooseRoom(targets[0]), 'system');
    renderAll();
  } else {
    // Pick target first, then board mode
    showModal('👟 Kick — Choose Target', 'Who do you want to kick?',
      targets.map(t => ({
        label: t.label, cls: 'confirm',
        action: () => {
          closeModal();
          G.kickMode = { target: t, destinations };
          addLog(UI_TEXT.kickChooseRoom(t), 'system');
          renderAll();
        }
      })).concat([{ label: 'Cancel', cls: 'cancel', action: closeModal }])
    );
  }
}

function executeKick(dr, dc) {
  if (!G.kickMode) return;
  const { target } = G.kickMode;
  const destName = getRoomName(dr, dc);
  const kicker = G.gnomes[G.currentGnomeIdx];

  if (target.type === 'gnome') {
    if (target.ref.stickyBlocked && `${target.ref.row},${target.ref.col}` !== `${dr},${dc}`) clearStickyStateForActor(target.ref);
    target.ref.row = dr;
    target.ref.col = dc;
    GAME_EVENTS.emit('kick.executed', { itemType: 'gnome' });
    addLog(`${kicker.name} kicks ${target.ref.name} into ${destName}!`, 'good');
    const helmed = getEffectiveHatId(target.ref) === 5;
    const patrolThere = G.patrols.find(p => p.row===dr && p.col===dc);
    if (helmed && patrolThere) {
      G.patrols.splice(G.patrols.indexOf(patrolThere), 1);
      addLog(`⛑️ Spiked Helm! ${capitalize(patrolThere.type)} patrol removed!`, 'good');
    }
    const destTile = G.grid[dr][dc];
    if (destTile?.sticky) { target.ref.stickyBlocked = true; target.ref.stickyCell = `${dr},${dc}`; addLog(`🫟 ${target.ref.name} lands in sticky room!`, 'bad'); }
  } else if (target.type === 'hamper') {
    G.hamper.row = dr;
    G.hamper.col = dc;
    GAME_EVENTS.emit('kick.executed', { itemType: 'hamper' });
    addLog(`${kicker.name} kicks 🧺 Hamper into ${destName}!`, 'good');
  } else if (target.type === 'Socks') {
    const srcTile = target.ref;
    const destTile = G.grid[dr][dc];
    if (destTile && srcTile.Socks > 0) {
      srcTile.Socks--;
      destTile.Socks++;
      GAME_EVENTS.emit('kick.executed', { itemType: 'Socks' });
      addLog(`${kicker.name} kicks 🧦 Socks into ${destName}!`, 'good');
    }
  } else if (target.type === 'goodie') {
    const { tile: srcTile, idx } = target.ref;
    const gid = srcTile.goodieIds.splice(idx, 1)[0];
    const gdef = GOODIES_DEFS.find(d=>d.id===gid);
    const destTile = G.grid[dr][dc];
    if (destTile) {
      if (!destTile.goodieIds) destTile.goodieIds = [];
      destTile.goodieIds.push(gid);
      GAME_EVENTS.emit('kick.executed', { itemType: 'goodie' });
      addLog(`${kicker.name} kicks 🍄 ${gdef?.name||'Goodie'} into ${destName}!`, 'good');
    }
  } else if (target.type === 'hat') {
    const { tile: srcTile, idx } = target.ref;
    const hid = srcTile.hatIds.splice(idx, 1)[0];
    const hdef = HATS_DEFS.find(d=>d.id===hid);
    const destTile = G.grid[dr][dc];
    if (destTile) {
      if (!destTile.hatIds) destTile.hatIds = [];
      destTile.hatIds.push(hid);
      GAME_EVENTS.emit('kick.executed', { itemType: 'hat' });
      addLog(`${kicker.name} kicks ${hdef?.emoji||'🎩'} ${hdef?.name||'Hat'} into ${destName}!`, 'good');
    }
  } else {
    const patrol = target.ref;
    patrol.row = dr;
    patrol.col = dc;
    GAME_EVENTS.emit('kick.executed', { itemType: patrol?.type || 'patrol' });
    addLog(`${kicker.name} kicks ${capitalize(patrol.type)} into ${destName}!`, 'good');
    const destTile = G.grid[dr][dc];
    if (destTile?.sticky) patrol.stickyBlocked = true;
    checkPatrolCatch(patrol);
  }

  G.kickMode = null;
  G.selectedAction = null;
  playSfx('kick');
  spendAction();
  renderAll();
}

function dropItem() {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome||gnome.ko||G.phase!=='gnome' || G.actionsLeft<=0) return;
  const items = gnome.satchel.map((s,i)=>s?{item:s,idx:i}:null).filter(Boolean);
  if (!items.length) { addLog('Nothing to drop!','bad'); return; }

  const buttons = items.map(({item, idx}) => {
    const capturedItem = item;
    const capturedIdx = idx;
    return {
      label: getItemName(capturedItem),
      cls: 'cancel',
      action: () => {
        // Re-read tile at action time (not popup-open time) to ensure correct room
        const tile = G.grid[gnome.row][gnome.col];
        if (capturedItem.type==='Socks') {
          tile.Socks++;
          GAME_EVENTS.emit('item.dropped', { itemType: 'Socks', mode: 'floor' });
        addLog(`${gnome.name} dropped 🧦 in ${ROOM_DEFS[tile.roomId].name}.`);
        } else if (capturedItem.type==='goodie') {
          if (!tile.goodieIds) tile.goodieIds = [];
          tile.goodieIds.push(capturedItem.id);
          addLog(`${gnome.name} dropped ${getItemName(capturedItem)}.`);
        } else if (capturedItem.type==='hat') {
          if (!tile.hatIds) tile.hatIds = [];
          tile.hatIds.push(capturedItem.id);
          addLog(`${gnome.name} dropped ${getItemName(capturedItem)}.`);
        } else {
          addLog(`${gnome.name} dropped ${getItemName(capturedItem)}.`);
        }
        gnome.satchel[capturedIdx] = null;
        closeModal(); renderAll();
      }
    };
  });

  showModal('📤 Drop Item', 'Choose one item to drop to the floor:', buttons);
}

function depositSocks() {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome||gnome.ko||G.phase!=='gnome') return;
  const tile = G.grid[gnome.row][gnome.col];
  const socks = gnome.satchel.map((s,i)=>s?.type==='Socks'?{item:s,idx:i}:null).filter(Boolean);
  if (!socks.length) { addLog('No socks to deposit!','bad'); return; }
  socks.forEach(({idx})=>{ gnome.satchel[idx]=null; G.SocksBanked++; });
  const via = tile?.chute ? ' via chute' : '';
  const plural = socks.length > 1 ? ` ${socks.length}🧦` : ' 🧦';
  spendAction();
  GAME_EVENTS.emit('item.dropped', { itemType: 'Socks', mode: 'deposit-bulk', count: socks.length });
  addLog(`${gnome.name} deposited${plural}${via}! Total: ${G.SocksBanked}/${getHouseGoal()}`, 'good');
  checkGoalMet();
  renderAll();
}


function useGoodieFromSlot(slotIdx) {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome||gnome.ko||G.phase!=='gnome' || G.actionsLeft<=0) return;
  const item = gnome.satchel[slotIdx];
  if (!item || item.type !== 'goodie') return;
  if (!isGoodieUsable(gnome, item.id)) { addLog("That goodie can't be used here.",'bad'); return; }
  if (item.id !== 1) gnome.satchel[slotIdx] = null;
  if (item.id !== 3 && item.id !== 1) spendAction();
  applyGoodie(gnome, item.id, { slotIdx });
  renderAll();
}

function useGoodie() {
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (!gnome||gnome.ko||G.phase!=='gnome' || G.actionsLeft<=0) return;
  const goodies = gnome.satchel.map((s,i)=>s?.type==='goodie'?{item:s,idx:i}:null).filter(Boolean);
  if (!goodies.length) { addLog('No goodies!','bad'); return; }
  const buttons = goodies.map(({item, idx}) => {
    const capturedItem = item;
    const capturedIdx = idx;
    const def = GOODIES_DEFS.find(g=>g.id===capturedItem.id);
    const usable = isGoodieUsable(gnome, capturedItem.id);
    return {
      label: `${def?.emoji} ${def?.name}: ${def?.desc}${usable?'':' (can\'t use here)'}`,
      cls: 'good',
      disabled: !usable,
      action: usable ? () => {
        if (capturedItem.id !== 1) gnome.satchel[capturedIdx]=null;
        if (capturedItem.id !== 3 && capturedItem.id !== 1) spendAction();
        applyGoodie(gnome, capturedItem.id, { slotIdx: capturedIdx });
        closeModal();
        renderAll();
      } : ()=>{}
    };
  });
  showModal('🍄 Use Goodie', 'Choose one goodie to use:', buttons);
}

function isGoodieUsable(gnome, id) {
  switch(id) {
    case 1: return true;
    case 2: return true;
    case 3: return getBlastableWalls().length > 0;
    case 4: return G.trouble > 0;
    case 5: return G.gnomes.some(g=>g.ko);
    case 6: {
      const t=G.grid[gnome.row][gnome.col];
      return !!(t?.sticky || t?.creaky);
    }
    default: return true;
  }
}

function applyGoodie(gnome, id, options = {}) {
  id = normalizeGoodieId(id);
  const def = GOODIES_DEFS.find(g=>g.id===id);
  addLog(`${gnome.name} used ${def?.emoji} ${def?.name}!`,'good');

  switch(id) {
    case 1:
      armShroom(gnome, { actorIdx: G.currentGnomeIdx, slotIdx: options.slotIdx ?? null });
      addLog('🍄 Shroom! Choose your room or an adjacent room, then rotate and confirm.','good');
      renderAll();
      break;
    case 2:
      G.actionsLeft += 2;
      G.actionCapacity = Math.max(G.actionCapacity || 0, G.actionsLeft);
      addLog(`☕ Coffee Bean! +2 actions this turn.`, 'good');
      renderAll();
      break;
    case 3: {
      const blastable = getBlastableWalls();
      if (!blastable.length) {
        const free = gnome.satchel.findIndex(s=>s===null);
        if (free !== -1) gnome.satchel[free] = {type:'goodie', id};
        addLog('💥 No walls to blast here — Dynamite returned.', 'bad');
        renderAll();
      } else {
        armDynamite(gnome, { actorIdx: G.currentGnomeIdx, slotIdx: options.slotIdx ?? null });
        addLog(`💥 Dynamite! Click a wall to ${UI_TEXT.action.addDoor.replace(/^💥\s*/, '').toLowerCase()}.`,'good');
        renderAll();
      }
      break;
    }
    case 4:
      if (G.trouble <= 0) {
        const free = gnome.satchel.findIndex(s=>s===null);
        if (free !== -1) gnome.satchel[free] = {type:'goodie', id};
        addLog('🪈 Trouble is already 0 — Pipe returned.', 'bad');
      } else {
        G.trouble = Math.max(0, G.trouble-2); updateHeader(); addLog('🪈 Trouble -2!','good');
      }
      break;
    case 5: {
      const ko = G.gnomes.find(g=>g.ko);
      if (ko) { ko.ko=false; addLog(`🐭 ${ko.name} revived!`,'good'); }
      else {
        const free = gnome.satchel.findIndex(s=>s===null);
        if (free !== -1) gnome.satchel[free] = {type:'goodie', id};
        addLog('🐭 Nobody to revive — Mouse Heart returned.', 'bad');
      }
      break;
    }
    case 6: {
      const tileTools = G.grid[gnome.row][gnome.col];
      if (tileTools?.sticky || tileTools?.creaky) {
        const cleared = [];
        if (tileTools.sticky) {
          tileTools.sticky = false;
          G.gnomes.forEach(g => { if(g.row===gnome.row&&g.col===gnome.col) { g.stickyBlocked=false; g.stickyCell=null; } });
          document.querySelectorAll('.sticky-splat').forEach(el=>el.remove());
          cleared.push('Sticky');
        }
        if (tileTools.creaky) {
          tileTools.creaky = false;
          cleared.push('Creaky');
        }
        addLog(`🧰 Tools! ${cleared.join(' and ')} removed from ${ROOM_DEFS[tileTools.roomId].name}.`,'good');
      } else {
        const free = gnome.satchel.findIndex(s=>s===null);
        if (free !== -1) gnome.satchel[free] = {type:'goodie', id};
        addLog('🧰 No Sticky or Creaky here — Tools returned.','bad');
      }
      break;
    }
    default: addLog(`(Effect applied)`,'good');
  }
}
// ─────────────────────────────────────────────────────────────────────────
// SEQ — linear step-queue that serialises all animations, cards and effects.
//
// Every timed operation in the game flows through here, one step at a time.
// The queue pauses at 'card' and 'pause' steps until explicitly resumed.
//
// Step types:
//   {t:'render'}                           — call renderAll()
//   {t:'log', msg, cls}                    — addLog()
//   {t:'wait', ms}                         — setTimeout delay
//   {t:'effect', fn}                       — synchronous game-state change
//   {t:'boardAnim', r, c, css, ms}         — add/remove CSS class on a cell
//   {t:'card', cardType,emoji,name,desc,cls} — show card; queue pauses until dismissed
//   {t:'banner', text}                     — show patrol banner
//   {t:'hideBanner'}                       — hide patrol banner
//   {t:'patrolMove', patrol,fromR,fromC,toR,toC} — animate meeple, then continue
//   {t:'pause', fn}                        — fn(resume) called; queue pauses until resume()
//
// To add a new sequenced step from anywhere in game code:
//   SEQ.push( {t:'card', ...}, {t:'effect', fn:()=>applyMyThing()} )
// ─────────────────────────────────────────────────────────────────────────
const SEQ = (() => {
  const q = [];       // pending steps
  let running = false;
  let cancelled = false;
  let generation = 0;

  function shouldStop(runGen = generation) {
    return cancelled || runGen !== generation || !!G?.gameEnded;
  }

  function drain() {
    if (shouldStop()) {
      q.length = 0;
      running = false;
      return;
    }
    if (running || !q.length) return;
    running = true;
    exec(q.shift(), generation);
  }

  function next(runGen = generation) {
    if (runGen !== generation) return;
    running = false;
    if (shouldStop(runGen)) {
      q.length = 0;
      return;
    }
    drain();
  }

  function exec(step, runGen = generation) {
    if (shouldStop(runGen)) {
      running = false;
      q.length = 0;
      return;
    }
    switch (step.t) {

      case 'render':
        renderAll();
        next(runGen);
        break;

      case 'log':
        addLog(step.msg, step.cls || '');
        next(runGen);
        break;

      case 'wait':
        setTimeout(() => next(runGen), step.ms);
        break;

      case 'effect':
        step.fn();
        next(runGen);
        break;

      case 'boardAnim': {
        // Wait one rAF pair so the board is painted before we query the DOM
        const go = () => {
          const cell = getBoardCell(step.r, step.c);
          if (cell) {
            cell.classList.add(step.css);
            setTimeout(() => {
              if (runGen !== generation) return;
              cell.classList.remove(step.css);
              next(runGen);
            }, step.ms);
          } else {
            next(runGen);
          }
        };
        requestAnimationFrame(() => requestAnimationFrame(go));
        break;
      }

      case 'card': {
        try { GAME_EVENTS.emit('card.presented', { step }); } catch(e) {}
        document.body.classList.remove('card-showing');
        const overlay = document.getElementById('card-overlay');
        const inner = document.getElementById('game-card-inner');
        const back = document.getElementById('game-card-back');
        overlay.classList.remove('show');
        inner.classList.remove('dismissing', 'stacked-front', 'no-dismiss');
        inner.style.animation = 'none';
        inner.dataset.stackPending = '0';
        inner.dataset.command = 'dismissCard';
        if (back) {
          back.classList.remove('show', 'dismissing');
          back.style.animation = 'none';
        }

        document.getElementById('card-type-label').textContent = step.cardType;
        document.getElementById('card-emoji').textContent      = step.emoji;
        document.getElementById('card-name').textContent       = step.name;
        document.getElementById('card-desc').textContent       = step.desc;
        inner.className = 'game-card ' + (step.cls || '');
        if (step.noDismiss) {
          inner.classList.add('no-dismiss');
          inner.dataset.command = '';
        }

        if (back && step.stackBehind) {
          setOverlayCardContent(back, step.stackBehind);
          back.classList.add('show');
          inner.classList.add('stacked-front');
        }

        inner.classList.remove('dismissing');
        void inner.offsetWidth;
        document.body.classList.add('card-showing');
        overlay.classList.add('show');

        requestAnimationFrame(() => {
          inner.style.animation = step.stackBehind
            ? 'cardStackDeal .48s cubic-bezier(.22,.68,0,1.12) 1s forwards'
            : 'cardDeal .55s cubic-bezier(.22,.68,0,1.15) forwards';
        });

        if (back && step.stackAfterDelay && !step.stackBehind) {
          const baseCard = { cardType: step.cardType, emoji: step.emoji, name: step.name, desc: step.desc, cls: step.cls || '' };
          inner.dataset.stackPending = '1';
          const stackDelay = Number.isFinite(step.stackAfterDelayMs) ? step.stackAfterDelayMs : 1000;
          setTimeout(() => {
            if (!overlay.classList.contains('show')) return;
            setOverlayCardContent(back, baseCard);
            back.classList.add('show');
            back.style.animation = 'none';
            void back.offsetWidth;
            back.style.animation = 'cardBumpBase .34s cubic-bezier(.22,.68,0,1.08) forwards';
            document.getElementById('card-type-label').textContent = step.stackAfterDelay.cardType;
            document.getElementById('card-emoji').textContent      = step.stackAfterDelay.emoji;
            document.getElementById('card-name').textContent       = step.stackAfterDelay.name;
            document.getElementById('card-desc').textContent       = step.stackAfterDelay.desc;
            inner.className = 'game-card ' + (step.stackAfterDelay.cls || '');
            inner.classList.remove('no-dismiss');
            inner.dataset.command = 'dismissCard';
            inner.classList.add('stacked-front');
            inner.style.animation = 'none';
            void inner.offsetWidth;
            requestAnimationFrame(() => {
              inner.style.animation = 'cardStackDeal .48s cubic-bezier(.22,.68,0,1.12) forwards';
              setTimeout(() => {
                inner.dataset.stackPending = '0';
              }, 520);
            });
          }, stackDelay);
        }
        break;
      }

      case 'banner':
        document.getElementById('patrol-banner').textContent = step.text;
        document.getElementById('patrol-banner').classList.add('show');
        next(runGen);
        break;

      case 'hideBanner':
        document.getElementById('patrol-banner').classList.remove('show');
        next(runGen);
        break;

      case 'patrolMove': {
        const {patrol, fromR, fromC, toR, toC} = step;
        animatePatrolMeeple(patrolEmoji(patrol.type), fromR, fromC, toR, toC, () => next(runGen));
        break;
      }

      case 'pause':
        // fn receives a resume callback; queue stays paused until resume() is called
        step.fn(() => next(runGen));
        break;

      default:
        console.warn('SEQ: unknown step type', step.t);
        next(runGen);
    }
  }

  return {
    // Push steps; accepts individual steps or flat arrays
    push(...steps) {
      if (shouldStop()) return;
      for (const s of steps) {
        if (Array.isArray(s)) q.push(...s);
        else if (s != null) q.push(s);
      }
      drain();
    },
    // Called by dismissCard to unblock a 'card' step
    resume() {
      if (shouldStop()) return;
      next(generation);
    },
    clear() {
      q.length = 0;
      running = false;
      cancelled = true;
      generation++;
    },
    reset() {
      q.length = 0;
      running = false;
      cancelled = false;
      generation++;
    },
    // True while a card or pause is blocking — callers can check this if needed
    get blocked() { return !shouldStop() && running && q.length === 0 && document.getElementById('card-overlay').classList.contains('show'); },
    get queuedCount() { return q.length; },
  };
})();

// ── showCard: push a card step onto SEQ (existing call-sites unchanged) ──
function showCard(cardType, emoji, name, desc, cls) {
  SEQ.push({t:'card', cardType, emoji, name, desc, cls});
}

function setOverlayCardContent(cardNode, data = {}) {
  if (!cardNode) return;
  const typeNode = cardNode.querySelector('.card-type-band');
  const emojiNode = cardNode.querySelector('.card-emoji-big');
  const nameNode = cardNode.querySelector('.card-name-big');
  const descNode = cardNode.querySelector('.card-desc-body');
  if (typeNode) typeNode.textContent = data.cardType || '';
  if (emojiNode) emojiNode.textContent = data.emoji || '';
  if (nameNode) nameNode.textContent = data.name || '';
  if (descNode) descNode.textContent = data.desc || '';
  cardNode.className = 'game-card ' + (data.cls || '');
}


// ── dismissCard: called by the player clicking the card overlay ───────────
function dismissCard() {
  // Card dismissal is intentionally silent — no click SFX.
  const overlay = document.getElementById('card-overlay');
  const inner = document.getElementById('game-card-inner');
  const back = document.getElementById('game-card-back');
  if (inner && inner.dataset.stackPending === '1') return;
  const finishDismiss = () => {
    overlay.classList.remove('show');
    document.body.classList.remove('card-showing');
    inner.classList.remove('dismissing', 'stacked-front', 'no-dismiss');
    inner.style.animation = 'none';
    inner.dataset.stackPending = '0';
    inner.dataset.command = 'dismissCard';
    if (back) {
      back.classList.remove('show', 'dismissing');
      back.style.animation = 'none';
    }
    SEQ.resume();
  };
  inner.classList.add('dismissing');
  if (back && back.classList.contains('show')) back.classList.add('dismissing');
  let done = false;
  const onceFinish = () => {
    if (done) return;
    done = true;
    inner.removeEventListener('animationend', onceFinish);
    finishDismiss();
  };
  inner.addEventListener('animationend', onceFinish, { once: true });
  setTimeout(onceFinish, 450);
}

// ── afterCards: legacy shim — pushes an effect step so existing call-sites work ──
function afterCards(fn) {
  SEQ.push({t:'effect', fn});
}

function setWeaverModalContext(ctx) {
  G.weaverModal = ctx;
  document.body.classList.toggle('weaver-manage-open', !!ctx);
  el('modal-overlay').classList.remove('show');
  const screen = el('screen-weaver');
  if (screen) screen.classList.toggle('show', !!ctx);
}

function getWeaverItemLabel(item) {
  const def = item.type==='goodie' ? GOODIES_DEFS.find(g=>g.id===item.id) : HATS_DEFS.find(h=>h.id===item.id);
  return `${item.type==='goodie' ? '🍄' : '🎩'} ${def?.name || (item.type==='goodie' ? 'Goodie' : 'Hat')}`;
}

function getWeaverShopDefs(type) {
  if (type === 'goodie') {
    return GOODIES_DEFS.map(def => ({ id:def.id, emoji:def.emoji || '🍄', name:def.name, desc:def.desc || '' }));
  }
  const seen = new Set();
  return BETWEEN_HOUSE_HAT_POOL_TEMPLATE
    .map(id => HAT_DEF_BY_ID[id])
    .filter(def => def && !seen.has(def.id) && seen.add(def.id))
    .map(def => ({ id:def.id, emoji:def.emoji || '🎩', name:def.name, desc:def.desc || '' }));
}

function getWeaverOfferCost(type) {
  return type === 'hat' ? 5 : 1;
}

function pullWeaverOfferId(type) {
  if (type === 'hat') return G.hatPool.length ? G.hatPool.pop() : 2;
  return G.goodiePool.length ? G.goodiePool.pop() : 1;
}

function createWeaverOffer(type, forcedId = null) {
  const id = forcedId ?? pullWeaverOfferId(type);
  const def = type === 'hat'
    ? (HAT_DEF_BY_ID[id] || HATS_DEFS[0])
    : (GOODIE_DEF_BY_ID[normalizeGoodieId(id)] || GOODIES_DEFS[0]);
  return {
    type,
    id,
    name: def?.name || (type === 'hat' ? 'Hat' : 'Goodie'),
    emoji: def?.emoji || (type === 'hat' ? '🎩' : '🍄'),
    desc: def?.desc || '',
    cost: getWeaverOfferCost(type),
    rotation: `${(Math.random() * 6 - 3).toFixed(2)}deg`,
    delay: `${Math.round(Math.random() * 220)}ms`
  };
}


function buildWeaverOfferSet(type, count = 4, excludeIds = []) {
  const defs = getWeaverShopDefs(type);
  const pool = shuffledCopy(defs.filter(def => !excludeIds.includes(def.id)));
  const offers = [];
  while (offers.length < count) {
    if (!pool.length) {
      const refill = shuffledCopy(defs.filter(def => !offers.some(offer => offer.id === def.id)));
      if (!refill.length) break;
      pool.push(...refill);
    }
    const next = pool.pop();
    if (!next) break;
    offers.push(createWeaverOffer(type, next.id));
  }
  return offers;
}

function ensureWeaverOffers(ctx = G.weaverModal) {
  if (!ctx) return null;
  if (!ctx.offers) ctx.offers = { goodie: [], hat: [] };
  if (!Array.isArray(ctx.offers.goodie)) ctx.offers.goodie = [];
  if (!Array.isArray(ctx.offers.hat)) ctx.offers.hat = [];
  if (ctx.offers.goodie.length < 4) {
    const next = buildWeaverOfferSet('goodie', 4, ctx.offers.goodie.map(offer => offer?.id).filter(Boolean));
    ctx.offers.goodie = [...ctx.offers.goodie.filter(Boolean), ...next].slice(0, 4);
  }
  if (ctx.offers.hat.length < 4) {
    const next = buildWeaverOfferSet('hat', 4, ctx.offers.hat.map(offer => offer?.id).filter(Boolean));
    ctx.offers.hat = [...ctx.offers.hat.filter(Boolean), ...next].slice(0, 4);
  }
  return ctx.offers;
}

function refillWeaverOfferSlot(type, index, ctx = G.weaverModal) {
  if (!ctx) return;
  ensureWeaverOffers(ctx);
  if (!ctx.offers[type]) ctx.offers[type] = [];
  const excludeIds = ctx.offers[type]
    .map((offer, idx) => idx === index ? null : offer?.id)
    .filter(Boolean);
  const replacement = buildWeaverOfferSet(type, 1, excludeIds)[0] || createWeaverOffer(type);
  ctx.offers[type][index] = replacement;
}

function renderWeaverActionPips(gnome) {
  if (!gnome) return '';
  const capacity = Math.max(1, G.actionCapacity || G.actionsLeft || 0);
  const remaining = gnome === (G.gnomes[G.currentGnomeIdx] || null) ? G.actionsLeft : 0;
  const slots = Array.from({ length: capacity }, (_, idx) => `<div class="gnome-action-slot${idx < remaining ? ' filled' : ''}"></div>`).join('');
  return `<div class="weaver-active-pips"><div class="gnome-action-label">Actions</div><div class="gnome-action-slots" style="--action-capacity:${capacity}">${slots}</div></div>`;
}

function applyWeaverItemToGnome(gnome, item, mode) {
  if (!gnome || !item) return false;
  const modal = G.weaverModal || {};
  let equipped = false;
  if (item.type === 'hat') {
    const result = giveHatToGnome(gnome, item.id);
    equipped = result === 'equipped';
  } else {
    if (!canReceiveInSatchel(gnome, item)) return false;
    giveItemToGnomeSatchel(gnome, item);
  }
  if (Number.isInteger(modal.selectedOfferIndex) && modal.selectedOfferType) {
    refillWeaverOfferSlot(modal.selectedOfferType, modal.selectedOfferIndex, modal);
  }
  addLog(`${getWeaverItemLabel(item)} goes to ${gnome.name}${equipped ? ' (auto-equipped!)' : ''}!`, 'good');
  setWeaverModalContext({kind:'shop', mode, offers: modal.offers || ensureWeaverOffers(modal)});
  renderWeaverScreen();
  renderAll();
  return true;
}

function startWeaverRoll(type, mode, offerIndex = 0) {
  const modal = G.weaverModal || {};
  ensureWeaverOffers(modal);
  const offer = modal.offers?.[type]?.[offerIndex];
  if (!offer) return;
  const cost = offer.cost ?? getWeaverOfferCost(type);
  if (G.SocksBanked < cost) return;
  if (mode === 'room' && G.actionsLeft <= 0) return;
  const item = { type, id: offer.id };
  if (mode === 'room') {
    const activeGnome = G.gnomes[G.currentGnomeIdx] || null;
    if (!activeGnome) return;
    if (type === 'goodie' && !canReceiveInSatchel(activeGnome, item)) return;
    G.SocksBanked -= cost;
    spendAction();
    applyWeaverItemToGnome(activeGnome, item, mode);
    return;
  }
  G.SocksBanked -= cost;
  setWeaverModalContext({
    kind:'recipient',
    mode,
    item,
    offers: modal.offers,
    selectedOfferType: type,
    selectedOfferIndex: offerIndex
  });
  renderWeaverScreen();
}

function rerollWeaverOffers(mode) {
  const modal = G.weaverModal || {};
  ensureWeaverOffers(modal);
  if (mode !== 'room') return false;
  if (G.SocksBanked < 1 || G.actionsLeft <= 0) return false;
  G.SocksBanked -= 1;
  spendAction();
  modal.offers = {
    goodie: buildWeaverOfferSet('goodie', 4),
    hat: buildWeaverOfferSet('hat', 4)
  };
  setWeaverModalContext({ kind:'shop', mode, offers: modal.offers });
  renderWeaverScreen();
  renderAll();
  return true;
}

function renderWeaverScreen() {
  if (!G.weaverModal) return;
  const goodiesPanel = document.querySelector('#screen-weaver .weaver-goodies-panel');
  const hatsPanel = document.querySelector('#screen-weaver .weaver-hats-panel');
  const roster = el('weaver-roster');
  if (!goodiesPanel || !hatsPanel || !roster) return;

  const mode = G.weaverModal.mode || 'room';
  const inRoomTrade = mode === 'room';
  const currentItem = G.weaverModal.item || null;
  const activeGnome = G.gnomes[G.currentGnomeIdx] || null;
  const eligible = currentItem
    ? G.gnomes.filter(g => (currentItem.type === 'hat' || canReceiveInSatchel(g, currentItem)) && (!inRoomTrade || g === activeGnome))
    : [];
  const offers = ensureWeaverOffers(G.weaverModal);
  const selectedOfferType = G.weaverModal.selectedOfferType || '';

function resetGnomeForNewHouse(gnome) {

function advanceHouse() {
  clearPatrolRefCards();
  const nextHouse = G.house + 1;
  const savedGnomes = G.gnomes.map(resetGnomeForNewHouse);

  G = createCoreState({
    house: nextHouse,
    roomDeck: shuffledCopy(BASE_ROOM_DECK_TEMPLATE),
    goodiePool: buildGoodiePool(1, BETWEEN_HOUSE_GOODIE_POOL_TEMPLATE),
    hatPool: shuffledCopy(BETWEEN_HOUSE_HAT_POOL_TEMPLATE),
    gnomes: savedGnomes,
  });
  G.grid[GRID_CENTER][GRID_CENTER] = createRoomTile(1, GRID_CENTER, GRID_CENTER);

  updateActionsForHat();
  addLog(`=== HOUSE ${nextHouse} BEGINS ===`,'system');
  addLog(`Goal: ${getHouseGoal()} socks. Trouble resets. Good luck!`,'system');
  showCard('🏠 New House!','🏠',`House ${nextHouse} Begins!`,`New goal: ${getHouseGoal()} Socks. Patrols will arrive sooner. Stay sneaky!`,'event-good');

}

  G.gameEnded = true;

// startPanic receives a resume() from SEQ's 'pause' step; called when all gnomes have moved
function startPanic(seqResume) {
  G.panicState = {
    seqResume,               // stored so advancePanic can unblock SEQ when done
    savedPhase: G.phase,
    savedGnomeIdx: G.currentGnomeIdx,
    savedActionsLeft: G.actionsLeft,
    savedSelectedAction: G.selectedAction,
    panicQueue: G.gnomes.map((_,i)=>i).filter(i=>!G.gnomes[i].ko),
  };
  G.phase = 'panic';
  G.panicMoving = false;
  G.selectedAction = 'move';
  document.body.classList.add('panic-mode');
  document.getElementById('panic-overlay').classList.add('show');
  document.getElementById('panic-banner').classList.add('show');
  advancePanic();
}

function advancePanic() {
  if (!G.panicState || !G.panicState.panicQueue.length) {
    const s = G.panicState;
    G.panicState = null;
    G.phase = s.savedPhase;
    G.currentGnomeIdx = s.savedGnomeIdx;
    G.actionsLeft = s.savedActionsLeft;
    G.selectedAction = s.savedSelectedAction;
    G.panicMoving = false;
    document.body.classList.remove('panic-mode');
    document.getElementById('panic-overlay').classList.remove('show');
    document.getElementById('panic-banner').classList.remove('show');
    addLog('😱 Panic resolved — resuming turn.', 'system');
    renderAll();
    if (s.seqResume) s.seqResume();   // unblock SEQ — next queued step runs
    return;
  }
  G.currentGnomeIdx = G.panicState.panicQueue[0];
  const gnome = G.gnomes[G.currentGnomeIdx];
  const remaining = G.panicState.panicQueue.length;
  document.getElementById('panic-banner').textContent =
    `😱 PANIC! ${gnome.name} — move one room (${remaining} gnome${remaining!==1?'s':''} remaining)`;
  addLog(`😱 ${gnome.name} must move one room!`, 'bad');
  renderAll();
}

function completePanicMove(r, c) {
  if (G.panicMoving) return;
  G.panicMoving = true;
  const gnome = G.gnomes[G.currentGnomeIdx];
  moveGnomeTo(gnome, r, c);
  G.panicState.panicQueue.shift();
  renderAll();
  // Panic was started from a paused SEQ step, so anything moveGnomeTo queued must stay
  // queued until panic fully resolves. Advance panic directly instead of re-queueing into SEQ.
  setTimeout(() => {
    G.panicMoving = false;
    advancePanic();
  }, 0);
}

function endGnomeTurn() {
  if (G.phase!=='gnome') return;
  clearInteractionModes({ clearScurry: true });
  const gnome = G.gnomes[G.currentGnomeIdx];
  if (gnome) {
    addLog(`${gnome.name} ends turn.`,'system');
    if (gnome.stickyBlocked) {
      if (gnome.stickyCell) { G.stickyAnimated.delete(gnome.stickyCell); gnome.stickyCell = null; }
      gnome.stickyBlocked = false;
    }
  }

  let next = G.currentGnomeIdx+1;
  while (next<G.gnomes.length&&G.gnomes[next].ko) next++;

  if (next>=G.gnomes.length) {
    startPatrolPhase();
  } else {
    G.currentGnomeIdx=next;
    clearInteractionModes({ clearScurry: true, render: false });
    updateActionsForHat();
    addLog(`--- ${G.gnomes[next].name}'s turn ---`,'system');
    renderAll();
  }
}

function updateActionsForHat() {
  const g = G.gnomes[G.currentGnomeIdx];
  if (!g) return;
  G.actionsLeft = 2 + getHatActionBonus(getEffectiveHatId(g));
  G.actionCapacity = G.actionsLeft;
}

function spendAction() {
  G.actionsLeft = Math.max(0, G.actionsLeft-1);
}

function startPatrolPhase() {
  G.phase='patrol'; G.selectedAction=null;
  G.dressCodeActive = false;
  addLog('=== PATROL PHASE ===','patrol');
  updateHeader(); renderAll();
  SEQ.push({t:'wait', ms:300}, {t:'effect', fn:() => runPatrolsAnimated()});
}

// Compute all patrol moves as a sequence of steps, then play them one at a time
function runPatrolsAnimated() {
  if (!G.patrols.length) { endPatrolPhase(); return; }
  const order = ['roomba','dog','kid','dad'];
  const sorted = [...G.patrols].sort((a,b)=>order.indexOf(a.type)-order.indexOf(b.type));

  // Check catches at START of patrol phase (before movement) via SEQ so addTrouble
  // chains work correctly and don't interfere with the move-planning step.
  SEQ.push(
    {t:'effect', fn:() => {
      sorted.forEach(patrol => checkPatrolCatch(patrol));
    }},
    {t:'render'},
    {t:'effect', fn:() => continuePatrolMovement(sorted)}
  );
}

function continuePatrolMovement(sorted) {
  // We simulate moves on a copy to get positions, then replay on real patrols
  // Actually easier: just compute each patrol's moves in order, collecting steps
  const patrolSnapshots = G.patrols.map(p=>({...p})); // shallow copy positions

  function buildStepsForPatrol(patrol) {
    const steps = patrol.type === 'dad' ? 2 : 1;
    const patrolSteps = [];
    for (let step=0; step<steps; step++) {
      const moveStep = computePatrolMoveStep(patrol);
      if (!moveStep) break;
      patrol.row = moveStep.toR;
      patrol.col = moveStep.toC;
      patrol.lastDir = moveStep.newLastDir;
      patrolSteps.push(moveStep);
      updateDadReturnState(patrol);
      const tile = G.grid[patrol.row][patrol.col];
      if (!tile || tile.sticky) break;
    }
    return patrolSteps;
  }

  // Build all steps keeping patrol state in sync (use actual patrol objects so positions are correct)
  // Reset patrol positions to pre-phase state first, then re-compute
  const preMovePositions = sorted.map(p=>({row:p.row,col:p.col,lastDir:p.lastDir,returningToRoom:p.returningToRoom}));
  // Actually just build steps using patrol objects directly (they're already at correct start pos)
  const allSteps = []; // {patrol (ref), fromR, fromC, toR, toC}
  sorted.forEach(patrol => {
    const steps = buildStepsForPatrol(patrol);
    steps.forEach(s=>allSteps.push({patrol, ...s}));
  });

  // Handle hustle after all normal moves
  if (G.hustle) {
    const lowest = sorted[0];
    if (lowest) {
      const hustleSteps = buildStepsForPatrol(lowest);
      hustleSteps.forEach(s=>allSteps.push({patrol:lowest, isHustle:true, ...s}));
    }
    G.hustle=false;
  }

  // Reset all patrol positions to start (we moved them during planning)
  sorted.forEach((p,i)=>{
    p.row=preMovePositions[i].row; p.col=preMovePositions[i].col;
    p.lastDir=preMovePositions[i].lastDir; p.returningToRoom=preMovePositions[i].returningToRoom;
  });

  // Now play back steps one at a time
  playPatrolStep(allSteps, 0, sorted, ()=>{
    endPatrolPhase();
  });
}

function playPatrolStep(steps, idx, sorted, done) {
  if (idx >= steps.length) {
    SEQ.push({t:'hideBanner'}, {t:'effect', fn:done});
    return;
  }
  const {patrol, fromR, fromC, toR, toC, newLastDir, isHustle} = steps[idx];
  const em = patrolEmoji(patrol.type);
  const name = capitalize(patrol.type);
  const nextDelay = 0;

  SEQ.push(
    {t:'banner', text:`${em} ${name}${isHustle?' (Hustle!)':''}`},
    {t:'wait', ms:0},
    {t:'effect', fn:() => {
      AUDIO_MANAGER.beginMove(patrol.type, { patrol, fromR, fromC, toR, toC, phase: 'regular-turn-start' });
    }},
    {t:'patrolMove', patrol, fromR, fromC, toR, toC},
    {t:'effect', fn:() => {
      resolvePatrolArrival(patrol, {fromR, fromC, toR, toC, newLastDir}, {
        logText: tile => `${em} ${name} → ${ROOM_DEFS[tile.roomId].name}.`,
        logClass: 'patrol',
        animateSticky: true,
        _sfxPlayedAtStart: true,
      });
    }},
    {t:'hideBanner'},
    {t:'render'},
    {t:'wait', ms: nextDelay},
    {t:'effect', fn:() => playPatrolStep(steps, idx+1, sorted, done)}
  );
}

function animatePatrolMeeple(emoji, fromR, fromC, toR, toC, cb) {
  const board = document.getElementById('board');
  const srcCell = document.querySelector(`[data-r="${fromR}"][data-c="${fromC}"]`);
  const dstCell = document.querySelector(`[data-r="${toR}"][data-c="${toC}"]`);
  if (!board || !srcCell || !dstCell) { cb(); return; }

  const token = srcCell.querySelector('.patrol-coin');
  const boardRect = board.getBoundingClientRect();
  const srcRect = srcCell.getBoundingClientRect();
  const dstRect = dstCell.getBoundingClientRect();
  const fromX = (srcRect.left - boardRect.left) + ((srcRect.width  - (token?.offsetWidth  || 26)) / 2);
  const fromY = (srcRect.top  - boardRect.top)  + ((srcRect.height - (token?.offsetHeight || 26)) / 2);
  const toX   = (dstRect.left - boardRect.left) + ((dstRect.width  - (token?.offsetWidth  || 26)) / 2);
  const toY   = (dstRect.top  - boardRect.top)  + ((dstRect.height - (token?.offsetHeight || 26)) / 2);

  let movingToken = token;
  let cleanupClone = null;
  if (!movingToken) {
    movingToken = document.createElement('div');
    movingToken.className = 'patrol-coin';
    movingToken.innerHTML = `<span class="patrol-coin-emoji">${emoji}</span>`;
    cleanupClone = movingToken;
  }

  const prevStyle = movingToken.getAttribute('style') || '';
  movingToken.style.position = 'absolute';
  movingToken.style.left = `${fromX}px`;
  movingToken.style.top = `${fromY}px`;
  movingToken.style.zIndex = '40';
  movingToken.style.margin = '0';
  movingToken.style.transition = 'left 1.35s cubic-bezier(.4,0,.2,1), top 1.35s cubic-bezier(.4,0,.2,1)';
  movingToken.style.pointerEvents = 'none';
  board.appendChild(movingToken);

  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    movingToken.removeEventListener('transitionend', onEnd);
    if (cleanupClone) cleanupClone.remove();
    else movingToken.setAttribute('style', prevStyle);
    cb();
  };
  const onEnd = (ev) => {
    if (ev.propertyName !== 'left' && ev.propertyName !== 'top') return;
    finish();
  };

  requestAnimationFrame(() => requestAnimationFrame(() => {
    movingToken.addEventListener('transitionend', onEnd);
    movingToken.style.left = `${toX}px`;
    movingToken.style.top = `${toY}px`;
    setTimeout(finish, 1365);
  }));
}

function runPatrols() {
  // Synchronous fallback — not used in animated flow but kept for Hustle card mid-turn
  const order = ['roomba','dog','kid','dad'];
  const sorted = [...G.patrols].sort((a,b)=>order.indexOf(a.type)-order.indexOf(b.type));
  sorted.forEach(p=>movePatrol(p));
}


function getRoombaPriorityFacing(facing) {
  return { N:['E','N','W','S'], E:['S','E','N','W'], S:['W','S','E','N'], W:['N','W','S','E'] }[facing] || ['E','N','W','S'];
}

function computeRoombaStep(patrol, connected) {
  const OPPOSITE_DIR = {N:'S',S:'N',E:'W',W:'E'};
  let facing = patrol.lastDir;
  if (!facing) {
    for (const dir of ['N','E','S','W']) {
      const [dr,dc]=DIR_DELTA[dir];
      if (connected.some(([cr,cc])=>cr===patrol.row+dr&&cc===patrol.col+dc)) { facing = dir; break; }
    }
    facing = facing || 'S';
  }
  const cameFrom = patrol.lastDir ? OPPOSITE_DIR[patrol.lastDir] : null;
  const priority = getRoombaPriorityFacing(facing);
  for (const allowReverse of [false, true]) {
    for (const dir of priority) {
      if (!allowReverse && dir === cameFrom) continue;
      const [dr,dc] = DIR_DELTA[dir];
      const tr = patrol.row + dr, tc = patrol.col + dc;
      if (connected.some(([cr,cc]) => cr===tr && cc===tc)) {
        return { toR: tr, toC: tc, newLastDir: dir };
      }
    }
  }
  const [toR, toC] = connected[0];
  for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
    if (patrol.row + dr === toR && patrol.col + dc === toC) return { toR, toC, newLastDir: dir };
  }
  return { toR, toC, newLastDir: patrol.lastDir };
}

function getPatrolIdleDestination(patrol) {
  const spawn = findPatrolSpawnPos(patrol.type);
  if (!spawn) return [G.CENTER, G.CENTER];
  if (patrol.row === spawn[0] && patrol.col === spawn[1]) return [G.CENTER, G.CENTER];
  return spawn;
}

function computePatrolMoveStep(patrol) {
  const connected = getConnectedRooms(patrol.row, patrol.col);
  if (!connected.length) return null;
  let toR = patrol.row, toC = patrol.col, newLastDir = patrol.lastDir;

  if (patrol.type === 'roomba') {
    return { fromR: patrol.row, fromC: patrol.col, ...computeRoombaStep(patrol, connected) };
  } else if (patrol.type === 'dog') {
    const target = getNearestGnome(patrol, false);
    if (target) [toR, toC] = bestStepToward(patrol.row, patrol.col, target.row, target.col, connected);
    if (toR === patrol.row && toC === patrol.col) {
      const [idleR, idleC] = getPatrolIdleDestination(patrol);
      [toR, toC] = bestStepToward(patrol.row, patrol.col, idleR, idleC, connected);
    }
  } else if (patrol.type === 'kid') {
    const target = getGnomeMostSocks();
    if (target) [toR, toC] = bestStepToward(patrol.row, patrol.col, target.row, target.col, connected);
    if (toR === patrol.row && toC === patrol.col) {
      const [idleR, idleC] = getPatrolIdleDestination(patrol);
      [toR, toC] = bestStepToward(patrol.row, patrol.col, idleR, idleC, connected);
    }
  } else if (patrol.type === 'dad') {
    const dest = patrol.returningToRoom ? findPatrolSpawnPos('dad') : [G.CENTER, G.CENTER];
    if (dest) [toR, toC] = bestStepToward(patrol.row, patrol.col, dest[0], dest[1], connected);
  }

  if (toR === patrol.row && toC === patrol.col) return null;

  for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
    if (patrol.row + dr === toR && patrol.col + dc === toC) { newLastDir = dir; break; }
  }
  return { fromR: patrol.row, fromC: patrol.col, toR, toC, newLastDir };
}

function computePatrolStepTowardTarget(patrol, targetR, targetC) {
  if (patrol.row === targetR && patrol.col === targetC) return null;
  const connected = getConnectedRooms(patrol.row, patrol.col);
  if (!connected.length) return null;
  const [toR, toC] = bestStepToward(patrol.row, patrol.col, targetR, targetC, connected);
  if (toR === patrol.row && toC === patrol.col) return null;
  let newLastDir = patrol.lastDir;
  for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
    if (patrol.row + dr === toR && patrol.col + dc === toC) { newLastDir = dir; break; }
  }
  return { fromR: patrol.row, fromC: patrol.col, toR, toC, newLastDir };
}

function updateDadReturnState(patrol) {
  if (patrol.type !== 'dad') return;
  if (!patrol.returningToRoom && patrol.row === G.CENTER && patrol.col === G.CENTER) patrol.returningToRoom = true;
  else if (patrol.returningToRoom) {
    const sp = findPatrolSpawnPos('dad');
    if (sp && patrol.row === sp[0] && patrol.col === sp[1]) patrol.returningToRoom = false;
  }
}

function resolvePatrolArrival(patrol, step, options={}) {
  const { logText, logClass='patrol' } = options;
  patrol.row = step.toR;
  patrol.col = step.toC;
  if (step.newLastDir !== undefined) patrol.lastDir = step.newLastDir;
  const tile = G.grid[step.toR]?.[step.toC];
  if (!tile) return;
  if (logText) addLog(logText(tile), logClass);
  updateDadReturnState(patrol);
  if (patrol.type === 'roomba' && tile.Socks > 0) {
    tile.Socks--;
    addLog(`🤖 Roomba destroys 1 Socks!`, 'bad');
  }
  checkPatrolCatch(patrol);
  if (tile.sticky) {
    addLog(`🫟 ${capitalize(patrol.type)} hits sticky floor — stops here.`, 'patrol');
    if (options.animateSticky) SEQ.push({t:'boardAnim', r:step.toR, c:step.toC, css:'sticky-splat-anim', ms:3000});
  }
}

function queueAnimatedPatrolStep(patrol, step, options={}) {
  if (!step) return false;
  const em = patrolEmoji(patrol.type);
  const name = capitalize(patrol.type);
  const bannerText = options.bannerText || `${em} ${name}`;
  const waitAfter = options.waitAfter ?? 0;
  const arrivalOptions = { ...options, _sfxPlayedAtStart: true };
  SEQ.push(
    {t:'banner', text: bannerText},
    {t:'wait', ms: 0},
    {t:'effect', fn:() => {
      AUDIO_MANAGER.beginMove(patrol.type, { patrol, step, phase: 'start' });
    }},
    {t:'patrolMove', patrol, fromR: step.fromR, fromC: step.fromC, toR: step.toR, toC: step.toC},
    {t:'effect', fn:() => resolvePatrolArrival(patrol, step, arrivalOptions)},
    {t:'hideBanner'},
    {t:'render'},
    {t:'wait', ms: waitAfter}
  );
  return true;
}

function queueEventPatrolMove(patrol, options={}) {
  const {
    mode='normal',
    targetR,
    targetC,
    label,
    logText,
    logClass='patrol',
    waitAfter=0,
    steps=1,
    hideBannerAtEnd=true,
    onBlocked,
  } = options;

  function computeLiveStep() {
    if (mode === 'toward') return computePatrolStepTowardTarget(patrol, targetR, targetC);
    if (mode === 'normal') return computePatrolMoveStep(patrol);
    return null;
  }

  function queueRemaining(stepsLeft) {
    SEQ.push({t:'effect', fn:() => {
      if (stepsLeft <= 0) {
        if (hideBannerAtEnd) hideBanner();
        return;
      }

      const step = computeLiveStep();
      if (!step) {
        if (onBlocked) onBlocked(patrol, stepsLeft);
        if (hideBannerAtEnd) hideBanner();
        return;
      }

      const moveOptions = {
        bannerText: label ? `${patrolEmoji(patrol.type)} ${capitalize(patrol.type)} (${label})` : undefined,
        logText: typeof logText === 'function' ? tile => logText(tile, patrol, stepsLeft) : logText,
        logClass,
        waitAfter,
        _sfxPlayedAtStart: true,
      };

      queueAnimatedPatrolStep(patrol, step, moveOptions);

      SEQ.push({t:'effect', fn:() => {
        const tile = G.grid[patrol.row]?.[patrol.col];
        if (stepsLeft > 1 && tile && !tile.sticky) queueRemaining(stepsLeft - 1);
        else if (hideBannerAtEnd) hideBanner();
      }});
    }});
  }

  queueRemaining(steps);
  return true;
}

function movePatrol(patrol) {
  const steps = patrol.type === 'dad' ? 2 : 1;
  for (let step = 0; step < steps; step++) {
    const moveStep = computePatrolMoveStep(patrol);
    if (!moveStep) break;
    resolvePatrolArrival(patrol, moveStep, {
      logText: tile => `${patrolEmoji(patrol.type)} ${capitalize(patrol.type)} → ${ROOM_DEFS[tile.roomId].name}.`,
      logClass: 'patrol',
    });
    const tile = G.grid[patrol.row]?.[patrol.col];
    if (!tile || tile.sticky) break;
  }
}

function checkPatrolCatch(patrol) {
  G.gnomes.forEach(gnome=>{
    if(gnome.ko) return;
    if(gnome.row!==patrol.row||gnome.col!==patrol.col) return;
    if(gnome.hidden&&patrol.type!=='dad') return;
    addLog(`🚨 ${capitalize(patrol.type)} catches ${gnome.name}!`,'bad');
    applyCatchPenalty(patrol.type, gnome, patrol);
  });
}

function applyCatchPenalty(type, gnome, patrolRef=null) {
  switch(type) {
    case 'roomba': {
      // Push in the catching Roomba's current facing direction, then rotate clockwise.
      const roomba = patrolRef || G.patrols.find(p => p.type === 'roomba');
      const facing = roomba?.lastDir || 'E';
      const CW = { N:'E', E:'S', S:'W', W:'N' };
      const connected = getConnectedRooms(gnome.row, gnome.col);
      let pushed = false;
      let pushDir = facing;
      for (let i = 0; i < 4; i++) {
        const [dr, dc] = DIR_DELTA[pushDir];
        const pr = gnome.row + dr, pc = gnome.col + dc;
        if (connected.some(([cr, cc]) => cr === pr && cc === pc)) {
          gnome.row = pr; gnome.col = pc; pushed = true; break;
        }
        pushDir = CW[pushDir];
      }
      if (!pushed && connected.length) { gnome.row = connected[0][0]; gnome.col = connected[0][1]; }
      addLog(`Roomba pushes ${gnome.name} into ${getRoomName(gnome.row,gnome.col)}!`,'bad');
      addTrouble(1);
      break;
    }
    case 'dog':
      gnome.satchel=gnome.satchel.map(s=>s?.type==='Socks'?null:s);
      addLog(`🐶 Dog destroys ${gnome.name}'s socks!`,'bad');
      addTrouble(1);
      break;
    case 'kid':
      gnome.ko=true;
      addLog(`👦 Kid KO's ${gnome.name}!`,'bad');
      addTrouble(2);
      break;
    case 'dad':
      gnome.ko=true;
      addLog(`👨 Dad KO's ${gnome.name}!`,'bad');
      addTrouble(3);
      break;
  }
  checkLoss();
}

function endPatrolPhase() {
  if (SEQ.queuedCount > 0) {
    if (!G._pendingEndPatrolPhase) {
      G._pendingEndPatrolPhase = true;
      SEQ.push({t:'effect', fn:() => { G._pendingEndPatrolPhase = false; endPatrolPhase(); }});
    }
    return;
  }
  G.phase='gnome';
  clearInteractionModes({ clearScurry: true, render: false });
  G.newlySpawnedCells.clear();
  G.messy = false;
  G.lightsOn = false;
  G.gnomes.forEach(g => { if (!g.ko) g.hidden = false; });
  G.currentGnomeIdx=0;
  while(G.currentGnomeIdx<G.gnomes.length&&G.gnomes[G.currentGnomeIdx].ko) G.currentGnomeIdx++;
  if(G.currentGnomeIdx>=G.gnomes.length){checkLoss();return;}
  updateActionsForHat();
  G.selectedAction=null;
  const firstG = G.gnomes[G.currentGnomeIdx];
  firstG.stickyBlocked = false;
  if (firstG.stickyCell) { G.stickyAnimated.delete(firstG.stickyCell); firstG.stickyCell = null; }
  addLog(`=== GNOME PHASE ===`,'system');
  addLog(`--- ${G.gnomes[G.currentGnomeIdx].name}'s turn ---`,'system');
  renderAll();
}

// ─────────────────────────────────────────────
// TROUBLE & EVENTS
// ─────────────────────────────────────────────
// addTrouble: each +1 is fully serialised — increment, then show card, then apply effect,
// then check milestones — so effects never interleave with the card they belong to.
function addTrouble(n) {
  for (let i = 0; i < n; i++) {
    SEQ.push(
      {t:'effect', fn:() => { G.trouble++; updateHeader(); }},
      {t:'effect', fn:() => {
        if (G.trouble >= 20) {
          G._pendingTroubleId = null;
          G._pendingTroubleCard = null;
          return;
        }
        if (!G.troubleDeck.length) { G.troubleDeck=[1,2,2,2,3,4,4,4,5,6,7,8,8,8,9,9,9,9,9]; shuffle(G.troubleDeck); }
        const id = G.troubleDeck.pop();
        const card = TROUBLE_CARDS.find(c=>c.id===id);
        if (!card) {
          G._pendingTroubleId = null;
          G._pendingTroubleCard = null;
          return;
        }
        addLog(`💢 Trouble Card: ${card.emoji} ${card.name} — ${card.desc}`, 'bad');
        G._pendingTroubleId = id;
        G._pendingTroubleCard = card;
      }},
      {t:'effect', fn:() => {
        if (!G._pendingTroubleCard || !G._pendingTroubleId) return;
        SEQ.push(
          {t:'card', cardType:'💢 Trouble Card', emoji:G._pendingTroubleCard.emoji, name:G._pendingTroubleCard.name, desc:G._pendingTroubleCard.desc, cls:'trouble'},
          {t:'effect', fn:() => { applyTroubleCard(G._pendingTroubleId); G._pendingTroubleId=null; G._pendingTroubleCard=null; }},
          {t:'effect', fn:() => { checkTroubleMilestones(); if(G.trouble>=20) checkLoss(); updateHeader(); }},
          {t:'render'}
        );
      }},
      {t:'effect', fn:() => {
        if (G.trouble >= 20) checkLoss();
        updateHeader();
      }},
      {t:'render'}
    );
  }
}

// drawTroubleCard is now handled inside addTrouble — kept as a no-op shim for safety
function drawTroubleCard() {}

function applyTroubleCard(id) {
  switch(id){
    case 1:
      G.gnomes.forEach(g=>{
        const dropped=g.satchel.filter(Boolean);
        g.satchel=g.satchel.map(()=>null);
        const tile=G.grid[g.row][g.col];
        if(tile) dropped.forEach(item=>{
          if(item.type==='Socks'){if(tile.roomId===1){G.SocksBanked++;}else tile.Socks++;}
          else if(item.type==='goodie'){ if(!tile.goodieIds)tile.goodieIds=[]; tile.goodieIds.push(item.id); }
        });
      }); break;
    case 2: G.dressCodeActive=true; addLog('👔 Dress Code! Silly Hat benefits are cancelled until the round ends.','bad'); renderAll(); break;
    case 3: {
      // Hustle — lowest-ranked patrol moves immediately via SEQ
      const order = ['roomba','dog','kid','dad'];
      const sorted = [...G.patrols].sort((a,b)=>order.indexOf(a.type)-order.indexOf(b.type));
      const lowest = sorted[0];
      if (lowest) {
        lowest.stickyBlocked = false;
        addLog(`🏃 Hustle! ${capitalize(lowest.type)} moves immediately!`,'patrol');
        const moveStep = computePatrolMoveStep(lowest);
        if (moveStep) {
          const em=patrolEmoji(lowest.type), name=capitalize(lowest.type);
          SEQ.push(
            {t:'banner', text:`${em} ${name} (Hustle!)`},
            {t:'wait', ms:400},
            {t:'patrolMove', patrol:lowest, fromR:moveStep.fromR, fromC:moveStep.fromC, toR:moveStep.toR, toC:moveStep.toC},
            {t:'effect', fn:()=>{
              resolvePatrolArrival(lowest, moveStep, {
                logText: tile => `${em} ${name} (Hustle) → ${ROOM_DEFS[tile.roomId].name}.`,
                logClass: 'patrol',
              });
              const tile=G.grid[lowest.row]?.[lowest.col];
              if (tile?.sticky) lowest.stickyBlocked=true;
            }},
            {t:'hideBanner'},
            {t:'render'}
          );
        }
      }
      break;
    }
    case 4:
      // Lights On — Gnomes cannot hide this turn
      G.lightsOn = true;
      G.gnomes.forEach(g => { g.hidden = false; });
      addLog('💡 Lights On! All Gnomes are revealed and cannot hide this turn.', 'bad');
      break;
    case 5:
      // Panic! — pause the SEQ queue; startPanic receives resume() to unblock it when all gnomes move
      addLog('😱 Panic! Each Gnome must move one room — resolve in order, then resume your turn.', 'bad');
      SEQ.push({t:'pause', fn:(resume) => startPanic(resume)});
      break;
    case 6:
      // Stiff Breeze — All Gnomes drop their equipped hats
      addLog('🌬️ Stiff Breeze! All Gnomes lose their hats!', 'bad');
      G.gnomes.forEach(g => {
        if (g.hat === null) return;
        const tile = G.grid[g.row][g.col];
        if (tile) { if (!tile.hatIds) tile.hatIds = []; tile.hatIds.push(g.hat); }
        addLog(`  ${g.name} drops their hat.`, 'bad');
        g.hat = null;
      });
      break;
    case 7:
      // Moths — Destroy 1 Socks from each Satchel
      addLog('🦋 Moths! 1 Socks eaten from each Gnome\'s Satchel!', 'bad');
      G.gnomes.forEach(g => {
        const idx = g.satchel.findIndex(s => s?.type === 'Socks');
        if (idx !== -1) { g.satchel[idx] = null; addLog(`  ${g.name} loses 1 🧦.`, 'bad'); }
      });
      break;
    case 8:
      // Investigation — All Patrols move one room toward the Laundry Room
      addLog('🔍 Investigation! All Patrols move toward the Laundry Room!', 'patrol');
      {
        const order = ['roomba','dog','kid','dad'];
        const sorted = [...G.patrols].sort((a,b)=>order.indexOf(a.type)-order.indexOf(b.type));
        sorted.forEach((p, idx) => {
          queueEventPatrolMove(p, {
            mode: 'toward',
            targetR: G.CENTER,
            targetC: G.CENTER,
            label: 'Investigation!',
            logText: tile => `  ${capitalize(p.type)} → ${ROOM_DEFS[tile.roomId].name}`,
            logClass: 'patrol',
            waitAfter: 300,
            steps: 1,
            hideBannerAtEnd: idx === sorted.length - 1,
            onBlocked: patrol => {
              if (patrol.row === G.CENTER && patrol.col === G.CENTER) addLog(`  ${capitalize(patrol.type)} is already in the Laundry Room.`, 'patrol');
            },
          });
        });
      }
      break;
    case 9:
      // Lucky Break — Nothing happens
      addLog('🍀 Lucky Break! Nothing happens. Phew!', 'good');
      break;
  }
}

function checkTroubleMilestones() {
  // Spawn is a synchronous state change; the announcement card is queued via SEQ
  // so it appears AFTER the board re-renders to show the new patrol tile.
  if(G.trouble>=3&&!G.patrols.find(p=>p.type==='roomba')){
    addLog('🤖 Trouble 3: Roomba spawns!','patrol');
    spawnPatrolNear('roomba',17);

    SEQ.push(
      {t:'render'},
      {t:'card', cardType:'🚨 Patrol Spawn', emoji:'🤖', name:'Roomba Appears!',
       desc:'The Roomba has activated and is patrolling the house. Watch out — it destroys any socks it rolls over!', cls:'patrol-spawn', sfxHint:'roomba'}
    );

    addPatrolRefCard('dog');
    SEQ.push(
      {t:'render'},
      {t:'card', cardType:'🚨 Patrol Spawn', emoji:'🐶', name:'The Dog is Loose!',
       desc:'The dog is on the hunt for gnomes. Getting caught means losing all your socks!', cls:'patrol-spawn', sfxHint:'dog'}
    );
  }
  if(G.trouble>=10&&!G.patrols.find(p=>p.type==='kid')){
    addLog('👦 Trouble 10: Kid spawns!','patrol');
    spawnPatrolNear('kid',15);
    addPatrolRefCard('kid');
    SEQ.push(
      {t:'render'},
      {t:'card', cardType:'🚨 Patrol Spawn', emoji:'👦', name:'The Kid is Up!',
       desc:'The kid is hunting the gnome with the most socks. Getting caught means getting KO\'d!', cls:'patrol-spawn', sfxHint:'kid'}
    );
  }
  if(G.trouble>=15&&!G.patrols.find(p=>p.type==='dad')){
    addLog('👨 Trouble 15: Dad spawns!','patrol');

function spawnPatrolNear(type, roomId, targetR, targetC) {
  const baseDoors = ROOM_DOORS[roomId] || [];

  // Build candidate list starting from trigger tile, then expanding to whole grid
  const tr = targetR ?? G.CENTER;
  const tc = targetC ?? G.CENTER;

  function getCandidatesFrom(startR, startC) {
    const sourceTile = G.grid[startR]?.[startC];
    if (!sourceTile) return [];
    const found = [];
    for (const [dir, [dr, dc]] of Object.entries(DIR_DELTA)) {
      const er = startR + dr, ec = startC + dc;
      if (er < 0 || er >= G.GRID || ec < 0 || ec >= G.GRID) continue;
      if (G.grid[er][ec]) continue; // occupied
      if (!tileHasDoor(sourceTile, dir)) continue;
      const needed = OPPOSITE[dir];
      for (let rot = 0; rot <= 3; rot++) {
        const rotDoors = rotateDirs(baseDoors, rot);
        if (!rotDoors.includes(needed)) continue;
        let connections = 0;
        for (const [d2, [dr2, dc2]] of Object.entries(DIR_DELTA)) {
          const nr = er + dr2, nc = ec + dc2;
          if (nr < 0 || nr >= G.GRID || nc < 0 || nc >= G.GRID) continue;
          const nb = G.grid[nr][nc];
          if (!nb) continue;
          if (rotDoors.includes(d2) && tileHasDoor(nb, OPPOSITE[d2])) connections++;
        }
        found.push({ r: er, c: ec, rot, connections, dist: Math.abs(er-tr)+Math.abs(ec-tc) });
      }
    }
    return found;
  }

  // First try adjacent to trigger tile
  let candidates = getCandidatesFrom(tr, tc);

  // If nothing found, search every placed room for unexplored doors
  if (!candidates.length) {
    const allCandidates = [];
    for (let r = 0; r < G.GRID; r++) {
      for (let c = 0; c < G.GRID; c++) {
        if (!G.grid[r][c]) continue;
        allCandidates.push(...getCandidatesFrom(r, c));
      }
    }
    candidates = allCandidates;
    if (candidates.length) {
      addLog(`🚨 No space near trigger — spawning ${type} at nearest available door.`, 'bad');
    }
  }

  if (!candidates.length) { addLog(`No space to spawn ${type} — house is fully enclosed!`, 'bad'); return; }

  // Pick candidate closest to trigger tile; connections break ties
  candidates.sort((a, b) => a.dist - b.dist || b.connections - a.connections);

  const { r, c, rot } = candidates[0];
  const tile = createRoomTile(roomId, r, c);
  if (rot > 0) tile.rotationOffset = rot;
  G.grid[r][c] = tile;
  G.tilesRevealed++;
  spawnPatrol(type, r, c);
}
